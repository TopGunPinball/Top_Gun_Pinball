#config_version=6

# Backbox LED strip — WS2812 RGB lights
# Hardware: FAST Neuron board (FP-CPU-2000-5)
#   PORT1 (J19): LEDs 1–32   (neuron-1-1  through neuron-1-32)  <- FAST hard limit: 32/port
#   PORT2 (J20): LEDs 33–57  (neuron-2-1  through neuron-2-25)
# Total: 57 LEDs
# LED type: rgb (standard WS2812 color order)
# If colors appear wrong (red shows as green), change type: rgb -> type: grb
#
# 80% brightness is enforced in base.yaml by using color: E6E6E6 instead of white
# NOTE: base.yaml must be updated to cover l_backbox_1 through l_backbox_57

lights:

# ---------------------------------------------------------------------------
# PORT1 -- LEDs 1-32  (neuron-1-1 through neuron-1-32)
# FAST platform maximum is 32 LEDs per port -- do not exceed neuron-1-32
# ---------------------------------------------------------------------------

  l_backbox_1:
    number: neuron-1-1
    subtype: led
    type: rgb
    tags: backbox, backbox_lights

