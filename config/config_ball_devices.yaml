#config_version=6

ball_devices:
  bd_plunger:
    ball_switches: s_shooter_lane
    entrance_count_delay: 300ms
    mechanical_eject: true
    confirm_eject_type: event
    confirm_eject_event: s_shooter_lane_inactive
    eject_timeouts: 3s
    
  bd_trough:
    ball_switches: s_trough_1, s_trough_2, s_trough_3, s_trough_4, s_trough_5, s_trough_6, s_jam
    eject_coil: c_trough_eject
    jam_switch: s_jam
    entrance_count_delay: 300ms
    eject_coil_jam_pulse: 15ms
    eject_timeouts: 3s
    eject_targets: bd_plunger
    eject_events: lock_serve_new_ball
    tags: trough, home, drain
    debug: true
    
  bd_lock_elevator:
    ball_switches: s_lock_plunger
    eject_coil: c_lock_upkicker
    entrance_count_delay: 1s       # CHANGED from 300ms - 1 second debounce to prevent
                                    # false fires from playfield vibration
    eject_timeouts: 3s
    eject_targets: playfield        # Ball ejects "to playfield" so goose captures as
                                    # unexpected → MPF serves replacement from trough
    eject_all_events: tilt
    
  # Lock position 1 (Goose) - first ball lands here
  bd_lock_goose:
    ball_switches: s_lock_goose
    entrance_count_delay: 500ms
    eject_timeouts: 5s
    eject_targets: playfield
    auto_fire_on_unexpected_ball: false
    eject_all_events: game_ending
    ejector:
      class: mpf.devices.ball_device.event_ejector.EventEjector
      events_when_eject_try: lock_released

  # Lock position 2 (Mav) - second ball lands here
  bd_lock_mav:
    ball_switches: s_lock_mav
    entrance_count_delay: 500ms
    eject_timeouts: 5s
    eject_targets: playfield
    auto_fire_on_unexpected_ball: false
    eject_all_events: game_ending
    ejector:
      class: mpf.devices.ball_device.event_ejector.EventEjector
      events_when_eject_try: lock_released

  bd_mode_scoop:
    ball_switches: s_mode_start
    eject_coil: c_mode_outkicker
    entrance_count_delay: 300ms
    eject_timeouts: 3s
    eject_all_events: tilt
    # CRITICAL: Prevent auto-eject of unexpected balls
    # The scoop should HOLD balls until a mode/event releases them
    auto_fire_on_unexpected_ball: false

####################################################################################
# MACHINE-WIDE BALL HOLDS FOR LOCK DEVICES
# Claims balls entering locks so MPF doesn't create eject chains.
# Persists across mode restarts and player changes.
#
# CRITICAL DESIGN:
# - enable_events: lock_servo_to_held (servo in hold position = ready to catch)
# - disable_events: lock_mech_release (multiball starting, stop claiming)
# - release_all_events: game_ending ONLY (not lock_mech_release — multiball
#   device handles eject via ball_locks, adding here causes double eject)
# - reset_events: includes mode_top_gun_multiball_stopped to zero balls_held
#   counter after multiball. Without this, the counter stays stale at 1 and
#   the hold thinks it's full, refusing to claim future balls.
####################################################################################
ball_holds:
  lock_goose_hold:
    balls_to_hold: 1
    hold_devices: bd_lock_goose
    enable_events: lock_servo_to_held
    disable_events: lock_mech_release
    release_all_events: game_ending
    reset_events: machine_reset_phase_3, service_mode_entered, mode_top_gun_multiball_stopped

  lock_mav_hold:
    balls_to_hold: 1
    hold_devices: bd_lock_mav
    enable_events: lock_servo_to_held
    disable_events: lock_mech_release
    release_all_events: game_ending
    reset_events: machine_reset_phase_3, service_mode_entered, mode_top_gun_multiball_stopped