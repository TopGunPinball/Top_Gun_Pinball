      5000000: "5,000,000"
      10000000: "10,000,000"
      15000000: "15,000,000"
      20000000: "20,000,000"
    default: 0
    key_type: int
    sort: 200
    
  free_play:
    label: Free Play
    values:
      1: "Yes - Free Play"
      0: "No - Coins Required"
    default: 1
    key_type: int
    sort: 300
    
  volume_level:
    label: Master Volume
    values:
      5: "5 (Quiet)"
      10: "10"
      15: "15 (Default)"
      20: "20"
      25: "25 (Loud)"
    default: 15
    key_type: int
    sort: 400