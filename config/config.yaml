####################################################################################
# SOUNDS - All machine sounds defined here (MPF 0.80 requires machine-level definition)
####################################################################################
sounds:

  ##############################################
  ## SPINNER CANNON BURST - 4 variants, randomly selected per spin
  ## Files: sounds/effects/spinner_cannon_burst_1-4.wav
  ## Triggered via random_event_player in base.yaml
  ##############################################
  spinner_cannon_burst_1:
    file: effects/spinner_cannon_burst_1.wav
    bus: voice
    max_instances: 4
    simultaneous_limit: 4
    volume: 0.8

  spinner_cannon_burst_2:
    file: effects/spinner_cannon_burst_2.wav
    bus: voice
    max_instances: 4
    simultaneous_limit: 4
    volume: 0.8

  spinner_cannon_burst_3:
    file: effects/spinner_cannon_burst_3.wav
    bus: voice
    max_instances: 4
    simultaneous_limit: 4
    volume: 0.8

  spinner_cannon_burst_4:
    file: effects/spinner_cannon_burst_4.wav
    bus: voice
    max_instances: 4
    simultaneous_limit: 4
    volume: 0.8

