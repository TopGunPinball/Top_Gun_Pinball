#show_version=6
# Engine fire flicker for l_gi_light_24 and l_gi_light_25 (engine_fire tag)
# Run at speed: 30 — each duration:1 step = ~33ms for rapid flame effect

- duration: 1
  lights:
    l_gi_light_24: {color: FF4400, fade: 0ms}
    l_gi_light_25: {color: FF6600, fade: 0ms}
- duration: 1
  lights:
    l_gi_light_24: {color: FF0000, fade: 0ms}
    l_gi_light_25: {color: FF3300, fade: 0ms}
- duration: 2
  lights:
    l_gi_light_24: {color: FFAA00, fade: 0ms}
    l_gi_light_25: {color: FF2200, fade: 0ms}
- duration: 1
  lights:
    l_gi_light_24: {color: FF2200, fade: 0ms}
    l_gi_light_25: {color: FFCC00, fade: 0ms}
- duration: 1
  lights:
    l_gi_light_24: {color: FF6600, fade: 0ms}
    l_gi_light_25: {color: FF0000, fade: 0ms}
- duration: 2
  lights:
    l_gi_light_24: {color: FF0000, fade: 0ms}
    l_gi_light_25: {color: FF8800, fade: 0ms}
- duration: 1
  lights:
    l_gi_light_24: {color: FFCC00, fade: 0ms}
    l_gi_light_25: {color: FF4400, fade: 0ms}
- duration: 1
  lights:
    l_gi_light_24: {color: FF4400, fade: 0ms}
    l_gi_light_25: {color: FF0000, fade: 0ms}
- duration: 2
  lights:
    l_gi_light_24: {color: FF8800, fade: 0ms}
    l_gi_light_25: {color: FFAA00, fade: 0ms}
- duration: 1
  lights:
    l_gi_light_24: {color: FF1100, fade: 0ms}
    l_gi_light_25: {color: FF6600, fade: 0ms}
