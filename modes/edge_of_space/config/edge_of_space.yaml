        color: '0033AA'
    tl_flash_miss_4:
      show: sync_flash_mode
      key: mode_l_shot_upper_orbit
      sync_ms: 1000
      loops: -1
      show_tokens:
        led: l_shot_upper_orbit
        color: '0033AA'

  # Diverter miss at step 10 (victory hold) — same
  timer_edge_of_space_diverter_timer_complete{current_player.edge_of_space_step==10}:
    sp_flash_miss_10:
      show: sync_flash_mode
      key: mode_l_shot_spinner
      sync_ms: 1000
      loops: -1
      show_tokens:
        led: l_shot_spinner
        color: '0033AA'
    tl_flash_miss_10:
      show: sync_flash_mode
      key: mode_l_shot_upper_orbit
      sync_ms: 1000
      loops: -1
      show_tokens:
        led: l_shot_upper_orbit
        color: '0033AA'

  # Victory hold start — stop any SP/TL cue flashes still running
  edge_of_space_victory_hold_start:
    stop_sp_waiting_v:
      show: sync_flash_mode
      action: stop
      key: mode_l_shot_spinner
    stop_tl_waiting_v:
      show: sync_flash_mode
      action: stop
      key: mode_l_shot_upper_orbit

  # GI shot flash on each hit
  edge_of_space_step_1_shot_hit:
    eos_gi_flash1:
      show: eos_gi_shot_flash
      key: eos_gi_hit
      speed: 30
      loops: 0
    eos_left_shot_1:
      show: edge_of_space_left_shot
      speed: 30
      loops: 0
  edge_of_space_step_2_shot_hit:
    eos_gi_flash2:
      show: eos_gi_shot_flash
      key: eos_gi_hit
      speed: 30
      loops: 0
    eos_right_shot_1:
      show: edge_of_space_right_shot
      speed: 30
      loops: 0
  edge_of_space_step_3_shot_hit:
    eos_gi_flash3:
      show: eos_gi_shot_flash
      key: eos_gi_hit
      speed: 30
      loops: 0
    eos_center_shot_1:
      show: edge_of_space_center_shot
      speed: 30
      loops: 0
  edge_of_space_step_4b_shot_hit:
    eos_gi_flash4:
      show: eos_gi_shot_flash
      key: eos_gi_hit
      speed: 30
      loops: 0
    eos_center_shot_2:
      show: edge_of_space_center_shot
      speed: 30
      loops: 0
  edge_of_space_step_5_shot_hit:
    eos_gi_flash5:
      show: eos_gi_shot_flash
      key: eos_gi_hit
      speed: 30
      loops: 0
    eos_left_shot_2:
      show: edge_of_space_left_shot
      speed: 30
      loops: 0
  edge_of_space_step_6_shot_hit:
    eos_gi_flash6:
      show: eos_gi_shot_flash
      key: eos_gi_hit
      speed: 30
      loops: 0
    eos_right_shot_2:
      show: edge_of_space_right_shot
      speed: 30
      loops: 0
  edge_of_space_step_7_shot_hit:
    eos_gi_flash7:
      show: eos_gi_shot_flash
      key: eos_gi_hit
      speed: 30
      loops: 0
    eos_center_shot_3:
      show: edge_of_space_center_shot
      speed: 30
      loops: 0

  # COMBO shows
  edge_of_space_combo_setup_lr:
    combo_lr_flash:
      show: sync_flash_mode
      key: mode_l_combo_lr
      sync_ms: 1000
      loops: -1
      show_tokens:
        led: l_shot_left_ramp
        color: '0033AA'

  edge_of_space_combo_lr_hit:
    stop_combo_lr:
      show: sync_flash_mode
      action: stop
      key: mode_l_combo_lr
    combo_rr_flash:
      show: sync_flash_mode
      key: mode_l_combo_rr
      sync_ms: 1000
      loops: -1
      show_tokens:
        led: l_shot_right_orbit
        color: '0033AA'
    eos_gi_combo_lr:
      show: eos_gi_shot_flash
      key: eos_gi_hit
      speed: 30
      loops: 0
    eos_left_combo_lr:
      show: edge_of_space_left_shot
      speed: 30
      loops: 0

  edge_of_space_combo_rr_hit:
    stop_combo_rr:
      show: sync_flash_mode
      action: stop
      key: mode_l_combo_rr
    combo_sp_flash:
      show: sync_flash_mode
      key: mode_l_combo_sp
      sync_ms: 1000
      loops: -1
      show_tokens:
        led: l_shot_spinner
        color: '0033AA'
    eos_gi_combo_rr:
      show: eos_gi_shot_flash
      key: eos_gi_hit
      speed: 30
      loops: 0
    eos_right_combo_rr:
      show: edge_of_space_right_shot
      speed: 30
      loops: 0

  edge_of_space_combo_sp_hit:
    stop_combo_sp:
      show: sync_flash_mode
      action: stop
      key: mode_l_combo_sp
    combo_tl_flash:
      show: sync_flash_mode
      key: mode_l_combo_tl
      sync_ms: 1000
      loops: -1
      show_tokens:
        led: l_shot_upper_orbit
        color: '0033AA'
    eos_gi_combo_sp:
      show: eos_gi_shot_flash
      key: eos_gi_hit
      speed: 30
      loops: 0
    eos_center_combo_sp:
      show: edge_of_space_center_shot
      speed: 30
      loops: 0

  edge_of_space_combo_reset:
    stop_combo_rr_reset:
      show: sync_flash_mode
      action: stop
      key: mode_l_combo_rr
    stop_combo_sp_reset:
      show: sync_flash_mode
      action: stop
      key: mode_l_combo_sp

  edge_of_space_end_combo:
    stop_combo_tl:
      show: sync_flash_mode
      action: stop
      key: mode_l_combo_tl

  edge_of_space_combo_3x_payout:
    eos_gi_combo_tl:
      show: eos_gi_shot_flash
      key: eos_gi_hit
      speed: 30
      loops: 0
    eos_center_combo_tl:
      show: edge_of_space_center_shot
      speed: 30
      loops: 0

  # Cleanup — stop all mode shows
  edge_of_space_cleanup:
    stop_s1:
      show: sync_flash_mode
      action: stop
      key: mode_l_shot_left_orbit
    stop_s2:
      show: sync_flash_mode
      action: stop
      key: mode_l_shot_right_orbit
    stop_s3:
      show: sync_flash_mode
      action: stop
      key: mode_l_shot_spinner
    stop_s4:
      show: sync_flash_mode
      action: stop
      key: mode_l_shot_upper_orbit
    stop_s5:
      show: sync_flash_mode
      action: stop
      key: mode_l_shot_left_ramp
    stop_s6:
      show: sync_flash_mode
      action: stop
      key: mode_l_shot_tower_ramp
    stop_s7:
      show: sync_flash_mode
      action: stop
      key: mode_l_combo_lr
    stop_s8:
      show: sync_flash_mode
      action: stop
      key: mode_l_combo_rr
    stop_s9:
