      action: stop
      key: eos_gi_key

####################################################################################
# SOUND PLAYER
# Shot SFX play on the voice bus when a progression shot is hit.
# These events only fire when that shot is the active step — no extra conditional needed.
# Step 1: LO  → sound_barrier
# Step 2: RO  → super_fast
# Step 3: SP/TL → super_slow_speed
# Step 4b: TWR → top_ramp
# Step 5: LR  → left_ramp
# Step 6: RO  → super_fast
# Step 7: TL/SP → super_slow_speed
####################################################################################

sound_player:

  edge_of_space_step_1_shot_hit:
    mach_scoring_soundfx_sound_barrier:
      bus: voice
      loops: 0

  edge_of_space_step_2_shot_hit:
    mach_scoring_soundfx_super_fast:
      bus: voice
      loops: 0

  edge_of_space_step_3_shot_hit:
    mach_scoring_soundfx_super_slow_speed:
      bus: voice
      loops: 0

  edge_of_space_step_4b_shot_hit:
    soundfx_jet_fly_by_top_ramp:
      bus: voice
      loops: 0

  edge_of_space_step_5_shot_hit:
    soundfx_jet_fly_by_left_ramp:
      bus: voice
      loops: 0

  edge_of_space_step_6_shot_hit:
    mach_scoring_soundfx_super_fast:
      bus: voice
      loops: 0

  edge_of_space_step_7_shot_hit:
    mach_scoring_soundfx_super_slow_speed:
      bus: voice
      loops: 0

  # COMBO shot sounds
  edge_of_space_combo_lr_hit:
    soundfx_jet_fly_by_left_ramp:
      bus: voice
      loops: 0

  edge_of_space_combo_rr_hit:
    soundfx_jet_fly_by_right_ramp:
      bus: voice
      loops: 0

  edge_of_space_combo_sp_hit:
    mach_scoring_soundfx_super_slow_speed:
      bus: voice
      loops: 0

  edge_of_space_combo_3x_payout:
    mach_scoring_soundfx_sound_barrier:
      bus: voice
      loops: 0

####################################################################################
# SHOWS
# NOTE: GI lights use type: grb (expansion board ports 3/4) so hex colors are
# already in RGB order — MPF will send them correctly with the grb type declared
# in config_lights.yaml. Use standard hex values here.
####################################################################################