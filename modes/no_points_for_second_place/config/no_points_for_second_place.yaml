####################################################################################
# SHOW PLAYER
# sync_flash_mode: required shots (flash on/off, 1000ms cycle)
# sync_pulse_mode: assist shots (breathe in/out, never fully off, 2000ms cycle)
# Both defined in base.yaml shows: section.
####################################################################################

show_player:

  ##############################################
  ## WAVE 1 — Flash all 4 required shots (light blue)
  ##############################################
  no_points_for_second_place_setup_wave1:
    npfsp_lr_flash:
      show: sync_flash_mode
      key: mode_l_shot_left_ramp
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_left_ramp, color: ADD8E6 }
    npfsp_rr_flash:
      show: sync_flash_mode
      key: mode_l_shot_right_orbit
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_right_orbit, color: ADD8E6 }
    npfsp_sp_flash:
      show: sync_flash_mode
      key: mode_l_shot_spinner
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_spinner, color: ADD8E6 }
    npfsp_twr_flash:
      show: sync_flash_mode
      key: mode_l_shot_tower_ramp
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_tower_ramp, color: ADD8E6 }

  no_points_for_second_place_wave1_lr_hit:
    npfsp_lr_flash:
      show: sync_flash_mode
      action: stop
      key: mode_l_shot_left_ramp
  no_points_for_second_place_wave1_rr_hit:
    npfsp_rr_flash:
      show: sync_flash_mode
      action: stop
      key: mode_l_shot_right_orbit
  no_points_for_second_place_wave1_sp_hit:
    npfsp_sp_flash:
      show: sync_flash_mode
      action: stop
      key: mode_l_shot_spinner
  no_points_for_second_place_wave1_twr_hit:
    npfsp_twr_flash:
      show: sync_flash_mode
      action: stop
      key: mode_l_shot_tower_ramp

  no_points_for_second_place_wave1_final_shot_setup:
    npfsp_scoop_flash:
      show: sync_flash_mode
      key: mode_l_shot_barrier
      sync_ms: 500
      loops: -1
      show_tokens: { led: l_shot_barrier, color: ADD8E6 }

  no_points_for_second_place_wave1_final_shot_hit:
    npfsp_scoop_flash:
      show: sync_flash_mode
      action: stop
      key: mode_l_shot_barrier

  ##############################################
  ## WAVE 2 — Required shots flash, assist shots pulse (sunset orange)
  ## Left lane insert: solid via light_player — no show needed
  ##############################################
  no_points_for_second_place_setup_wave2:
    # LOCK targets — required (flash)
    npfsp_w2_lock_l:
      show: sync_flash_mode
      key: mode_l_lock_l
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_lock_l, color: FF8C42 }
    npfsp_w2_lock_o:
      show: sync_flash_mode
      key: mode_l_lock_o
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_lock_o, color: FF8C42 }
    npfsp_w2_lock_c:
      show: sync_flash_mode
      key: mode_l_lock_c
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_lock_c, color: FF8C42 }
    npfsp_w2_lock_k:
      show: sync_flash_mode
      key: mode_l_lock_k
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_lock_k, color: FF8C42 }
    # ICEMAN targets — required (flash)
    npfsp_w2_iceman_a:
      show: sync_flash_mode
      key: mode_l_iceman_a
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_iceman_a, color: FF8C42 }
    npfsp_w2_iceman_c:
      show: sync_flash_mode
      key: mode_l_iceman_c
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_iceman_c, color: FF8C42 }

  # Stop individual required shot flashes as they're completed
  no_points_for_second_place_wave2_l_hit:
    npfsp_w2_lock_l:
      show: sync_flash_mode
      action: stop
      key: mode_l_lock_l
  no_points_for_second_place_wave2_o_hit:
    npfsp_w2_lock_o:
      show: sync_flash_mode
      action: stop
      key: mode_l_lock_o
  no_points_for_second_place_wave2_c_hit:
    npfsp_w2_lock_c:
      show: sync_flash_mode
      action: stop
      key: mode_l_lock_c
  no_points_for_second_place_wave2_k_hit:
    npfsp_w2_lock_k:
      show: sync_flash_mode
      action: stop
      key: mode_l_lock_k
  no_points_for_second_place_wave2_iceman_a_hit:
    npfsp_w2_iceman_a:
      show: sync_flash_mode
      action: stop
      key: mode_l_iceman_a
  no_points_for_second_place_wave2_iceman_c_hit:
    npfsp_w2_iceman_c:
      show: sync_flash_mode
      action: stop
      key: mode_l_iceman_c

  # Wave 2 final shot hit — stop all remaining wave 2 shows
  no_points_for_second_place_wave2_final_shot_hit:
    npfsp_w2_ro_stop:
      show: sync_flash_mode
      action: stop
      key: mode_w2_l_shot_right_orbit
    npfsp_w2_sp_stop:
      show: sync_flash_mode
      action: stop
      key: mode_w2_l_shot_spinner
    npfsp_w2_tl_stop:
      show: sync_flash_mode
      action: stop
      key: mode_w2_l_shot_upper_orbit
    npfsp_w2_lock_l_stop:
      show: sync_flash_mode
      action: stop
      key: mode_l_lock_l
    npfsp_w2_lock_o_stop:
      show: sync_flash_mode
      action: stop
      key: mode_l_lock_o
    npfsp_w2_lock_c_stop:
      show: sync_flash_mode
      action: stop
      key: mode_l_lock_c
    npfsp_w2_lock_k_stop:
      show: sync_flash_mode
      action: stop
      key: mode_l_lock_k
    npfsp_w2_iceman_a_stop:
      show: sync_flash_mode
      action: stop
      key: mode_l_iceman_a
    npfsp_w2_iceman_c_stop:
      show: sync_flash_mode
      action: stop
      key: mode_l_iceman_c
    npfsp_w2_sp_pulse_stop:
      show: sync_pulse_mode
      action: stop
      key: mode_w2_l_shot_spinner
    npfsp_w2_ro_pulse_stop:
      show: sync_pulse_mode
      action: stop
      key: mode_w2_l_shot_right_orbit
    npfsp_w2_tl_pulse_stop:
      show: sync_pulse_mode
      action: stop
      key: mode_w2_l_shot_upper_orbit

  # Wave 2 final shot setup — all required shots hit, activate assist routing inserts
  no_points_for_second_place_wave2_final_shot_setup:
    npfsp_w2_sp_flash:
      show: sync_flash_mode
      key: mode_w2_l_shot_spinner
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_spinner, color: FF8C42 }
    npfsp_w2_tl_flash:
      show: sync_flash_mode
      key: mode_w2_l_shot_upper_orbit
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_upper_orbit, color: FF8C42 }
    npfsp_w2_ro_flash:
      show: sync_flash_mode
      key: mode_w2_l_shot_right_orbit
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_right_orbit, color: FF8C42 }

  ##############################################
  ## WAVE 3 — Flash LR, TL, RR (yellow), left lane flash at final shot
  ##############################################
  no_points_for_second_place_setup_wave3:
    npfsp_w3_lr_flash:
      show: sync_flash_mode
      key: mode_w3_l_shot_left_ramp
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_left_ramp, color: FFFF00 }
    npfsp_w3_tl_flash:
      show: sync_flash_mode
      key: mode_w3_l_shot_upper_orbit
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_upper_orbit, color: FFFF00 }
    npfsp_w3_rr_flash:
      show: sync_flash_mode
      key: mode_w3_l_shot_right_orbit
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_right_orbit, color: FFFF00 }

  no_points_for_second_place_wave3_lr_hit:
    npfsp_w3_lr_flash:
      show: sync_flash_mode
      action: stop
      key: mode_w3_l_shot_left_ramp
  no_points_for_second_place_wave3_tl_hit:
    npfsp_w3_tl_flash:
      show: sync_flash_mode
      action: stop
      key: mode_w3_l_shot_upper_orbit
  no_points_for_second_place_wave3_rr_hit:
    npfsp_w3_rr_flash:
      show: sync_flash_mode
      action: stop
      key: mode_w3_l_shot_right_orbit

  # Wave 3 final shot setup — all required shots hit, activate assist routing inserts
  no_points_for_second_place_wave3_final_shot_setup:
    npfsp_w3_sp_flash:
      show: sync_flash_mode
      key: mode_w3_l_shot_spinner
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_spinner, color: FFFF00 }
    npfsp_w3_ro_flash:
      show: sync_flash_mode
      key: mode_w3_l_shot_right_orbit
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_right_orbit, color: FFFF00 }

  # Wave 3 final shot hit — stop all remaining wave 3 shows
  no_points_for_second_place_wave3_final_shot_hit:
    npfsp_w3_lr_stop:
      show: sync_flash_mode
      action: stop
      key: mode_w3_l_shot_left_ramp
    npfsp_w3_tl_stop:
      show: sync_flash_mode
      action: stop
      key: mode_w3_l_shot_upper_orbit
    npfsp_w3_rr_stop:
      show: sync_flash_mode
      action: stop
      key: mode_w3_l_shot_right_orbit
    npfsp_w3_sp_stop:
      show: sync_flash_mode
      action: stop
      key: mode_w3_l_shot_spinner
    npfsp_w3_ro_stop:
      show: sync_flash_mode
      action: stop
      key: mode_w3_l_shot_right_orbit

  ##############################################
  ## WAVE 4 — All 5 letters start lit. Hits turn position off.
  ## Rotation moves remaining lit positions around via goose_letters mechanic.
  ##############################################
  no_points_for_second_place_setup_wave4:
    npfsp_w4_g_flash:
      show: sync_flash_mode
      key: mode_w4_l_goose_g
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_goose_g, color: FFFFFF }
    npfsp_w4_o_left_flash:
      show: sync_flash_mode
      key: mode_w4_l_goose_o_left
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_goose_o_left, color: FFFFFF }
    npfsp_w4_e_flash:
      show: sync_flash_mode
      key: mode_w4_l_goose_e
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_goose_e, color: FFFFFF }
    npfsp_w4_o_right_flash:
      show: sync_flash_mode
      key: mode_w4_l_goose_o_right
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_goose_o_right, color: FFFFFF }
    npfsp_w4_s_flash:
      show: sync_flash_mode
      key: mode_w4_l_goose_s
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_goose_s, color: FFFFFF }

  ## Cursor moves to a letter — start its flash (only if not already collected)
  player_goose_letter_g{current_player.no_points_for_second_place_wave==4 and value==1 and current_player.no_points_for_second_place_wave4_g_hit==0}:
    npfsp_w4_g_flash:
      show: sync_flash_mode
      key: mode_w4_l_goose_g
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_goose_g, color: FFFFFF }
  player_goose_letter_o_left{current_player.no_points_for_second_place_wave==4 and value==1 and current_player.no_points_for_second_place_wave4_o_left_hit==0}:
    npfsp_w4_o_left_flash:
      show: sync_flash_mode
      key: mode_w4_l_goose_o_left
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_goose_o_left, color: FFFFFF }
  player_goose_letter_e{current_player.no_points_for_second_place_wave==4 and value==1 and current_player.no_points_for_second_place_wave4_e_hit==0}:
    npfsp_w4_e_flash:
      show: sync_flash_mode
      key: mode_w4_l_goose_e
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_goose_e, color: FFFFFF }
  player_goose_letter_o_right{current_player.no_points_for_second_place_wave==4 and value==1 and current_player.no_points_for_second_place_wave4_o_right_hit==0}:
    npfsp_w4_o_right_flash:
      show: sync_flash_mode
      key: mode_w4_l_goose_o_right
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_goose_o_right, color: FFFFFF }
  player_goose_letter_s{current_player.no_points_for_second_place_wave==4 and value==1 and current_player.no_points_for_second_place_wave4_s_hit==0}:
    npfsp_w4_s_flash:
      show: sync_flash_mode
      key: mode_w4_l_goose_s
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_goose_s, color: FFFFFF }

  ## Cursor leaves a letter — stop its flash
  player_goose_letter_g{current_player.no_points_for_second_place_wave==4 and value==0}:
    npfsp_w4_g_flash:
      show: sync_flash_mode
      action: stop
      key: mode_w4_l_goose_g
  player_goose_letter_o_left{current_player.no_points_for_second_place_wave==4 and value==0}:
    npfsp_w4_o_left_flash:
      show: sync_flash_mode
      action: stop
      key: mode_w4_l_goose_o_left
  player_goose_letter_e{current_player.no_points_for_second_place_wave==4 and value==0}:
    npfsp_w4_e_flash:
      show: sync_flash_mode
      action: stop
      key: mode_w4_l_goose_e
  player_goose_letter_o_right{current_player.no_points_for_second_place_wave==4 and value==0}:
    npfsp_w4_o_right_flash:
      show: sync_flash_mode
      action: stop
      key: mode_w4_l_goose_o_right
  player_goose_letter_s{current_player.no_points_for_second_place_wave==4 and value==0}:
    npfsp_w4_s_flash:
      show: sync_flash_mode
      action: stop
      key: mode_w4_l_goose_s

  # Stop each letter flash when collected
  no_points_for_second_place_wave4_g_hit:
    npfsp_w4_g_flash:
      show: sync_flash_mode
      action: stop
      key: mode_w4_l_goose_g
  no_points_for_second_place_wave4_o_left_hit:
    npfsp_w4_o_left_flash:
      show: sync_flash_mode
      action: stop
      key: mode_w4_l_goose_o_left
  no_points_for_second_place_wave4_e_hit:
    npfsp_w4_e_flash:
      show: sync_flash_mode
      action: stop
      key: mode_w4_l_goose_e
  no_points_for_second_place_wave4_o_right_hit:
    npfsp_w4_o_right_flash:
      show: sync_flash_mode
      action: stop
      key: mode_w4_l_goose_o_right
  no_points_for_second_place_wave4_s_hit:
    npfsp_w4_s_flash:
      show: sync_flash_mode
      action: stop
      key: mode_w4_l_goose_s

  # Wave 4 final shot setup — scoop flashes white faster ("shoot here now")
  no_points_for_second_place_wave4_final_shot_setup:
    npfsp_w4_scoop_flash:
      show: sync_flash_mode
      key: mode_w4_l_shot_barrier
      sync_ms: 500
      loops: -1
      show_tokens: { led: l_shot_barrier, color: FFFFFF }

  # Wave 4 final shot hit — stop all remaining wave 4 shows
  no_points_for_second_place_wave4_final_shot_hit:
    npfsp_w4_g_stop:
      show: sync_flash_mode
      action: stop
      key: mode_w4_l_goose_g
    npfsp_w4_o_left_stop:
      show: sync_flash_mode
      action: stop
      key: mode_w4_l_goose_o_left
    npfsp_w4_e_stop:
      show: sync_flash_mode
      action: stop
      key: mode_w4_l_goose_e
    npfsp_w4_o_right_stop:
      show: sync_flash_mode
      action: stop
      key: mode_w4_l_goose_o_right
    npfsp_w4_s_stop:
      show: sync_flash_mode
      action: stop
      key: mode_w4_l_goose_s
    npfsp_w4_scoop_stop:
      show: sync_flash_mode
      action: stop
      key: mode_w4_l_shot_barrier

####################################################################################
# SOUND PLAYER
####################################################################################

sound_player:
  no_points_for_second_place_complete:
    silence:
      bus: music
      loops: 0

  no_points_for_second_place_failed:
    silence:
      bus: music
      loops: 0