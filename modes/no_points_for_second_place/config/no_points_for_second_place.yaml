      action: play
      priority: 850

  no_points_for_second_place_wave3_final_shot_hit:
    no_points_for_second_place_completion_3:
      action: remove
    no_points_for_second_place_decision_3_video:
      action: remove
    no_points_for_second_place_timer:
      action: remove
    no_points_for_second_place_risk_3:
      action: play
      priority: 850

  no_points_for_second_place_risk_wave3:
    no_points_for_second_place_decision_3_video:
      action: remove
    no_points_for_second_place_risk_3:
      action: remove

  # Wave 4: background + timer during GOOSE collection phase
  no_points_for_second_place_setup_wave4:
    no_points_for_second_place_wave_4:
      action: play
      priority: 800
    no_points_for_second_place_timer:
      action: play
      priority: 1000

  # Wave 4 final shot setup: scoop opens; remove wave 4 background + timer
  no_points_for_second_place_wave4_final_shot_setup:
    no_points_for_second_place_wave_4:
      action: remove
    no_points_for_second_place_timer:
      action: remove
    no_points_for_second_place_completion_4:
      action: play
      priority: 850

  no_points_for_second_place_wave4_final_shot_hit:
    no_points_for_second_place_completion_4:
      action: remove

  # Win
  no_points_for_second_place_complete:
    no_points_for_second_place_points_bank:
      action: remove
    no_points_for_second_place_intro:
      action: remove
    no_points_for_second_place_wave_1:
      action: remove
    no_points_for_second_place_wave_2:
      action: remove
    no_points_for_second_place_wave_3:
      action: remove
    no_points_for_second_place_wave_4:
      action: remove
    no_points_for_second_place_timer:
      action: remove
    no_points_for_second_place_decision_1_video:
      action: remove
    no_points_for_second_place_risk_1:
      action: remove
    no_points_for_second_place_decision_2_video:
      action: remove
    no_points_for_second_place_risk_2:
      action: remove
    no_points_for_second_place_decision_3_video:
      action: remove
    no_points_for_second_place_risk_3:
      action: remove
    timer_perk_activated_npfsp:
      action: remove
    no_points_for_second_place_won:
      action: play
      priority: 900
      expire: 34s  # [WON_TIMER]

  # Fail
  no_points_for_second_place_failed:
    no_points_for_second_place_points_bank:
      action: remove
    no_points_for_second_place_intro:
      action: remove
    no_points_for_second_place_wave_1:
      action: remove
    no_points_for_second_place_wave_2:
      action: remove
    no_points_for_second_place_wave_3:
      action: remove
    no_points_for_second_place_wave_4:
      action: remove
    no_points_for_second_place_timer:
      action: remove
    no_points_for_second_place_decision_1_video:
      action: remove
    no_points_for_second_place_risk_1:
      action: remove
    no_points_for_second_place_decision_2_video:
      action: remove
    no_points_for_second_place_risk_2:
      action: remove
    no_points_for_second_place_decision_3_video:
      action: remove
    no_points_for_second_place_risk_3:
      action: remove
    timer_perk_activated_npfsp:
      action: remove
    no_points_for_second_place_lost:
      action: play
      priority: 900
      expire: 10s  # [FAILED_TIMER]

  # Mode stopped safety cleanup
  mode_no_points_for_second_place_stopped:
    no_points_for_second_place_intro:
      action: remove
    no_points_for_second_place_wave_1:
      action: remove
    no_points_for_second_place_wave_2:
      action: remove
    no_points_for_second_place_wave_3:
      action: remove
    no_points_for_second_place_wave_4:
      action: remove
    no_points_for_second_place_timer:
      action: remove
    no_points_for_second_place_points_bank:
      action: remove
    no_points_for_second_place_decision_1_video:
      action: remove
    no_points_for_second_place_risk_1:
      action: remove
    no_points_for_second_place_decision_2_video:
      action: remove
    no_points_for_second_place_risk_2:
      action: remove
    no_points_for_second_place_decision_3_video:
      action: remove
    no_points_for_second_place_risk_3:
      action: remove
    timer_perk_activated_npfsp:
      action: remove
    afterburner_perk_active:
      action: remove

  no_points_for_second_place_cleanup:
    timer_perk_activated_npfsp:
      action: remove

####################################################################################
# TIMERS
####################################################################################

timers:

  # Wave timer — shared across waves, restarted at each new wave
  no_points_for_second_place_timer:
    start_value: 90  # [WAVE1_TIMER]
    end_value: 0
    direction: down
    tick_interval: 1s
    start_running: false
    control_events:
      - event: no_points_for_second_place_ball_released    # Wave 1 start
        action: start
      - event: no_points_for_second_place_wave1_final_shot_hit
        action: stop
      - event: no_points_for_second_place_wave2_ball_released  # Wave 2 restart
        action: restart
        value: 90  # [WAVE2_TIMER]
      - event: no_points_for_second_place_wave2_final_shot_hit
        action: stop
      - event: no_points_for_second_place_wave3_ball_released  # Wave 3 restart
        action: restart
        value: 60  # [WAVE3_TIMER]
      - event: no_points_for_second_place_wave3_final_shot_hit
        action: stop
      - event: no_points_for_second_place_wave4_ball_released  # Wave 4 restart
        action: restart
        value: 60  # [WAVE4_TIMER]
      - event: no_points_for_second_place_wave4_final_shot_hit
        action: stop
      - event: timer_no_points_for_second_place_complete_delay_start
        action: stop
      - event: timer_no_points_for_second_place_failed_delay_start
        action: stop
      - event: afterburner_extend_no_points_for_second_place_timer
        action: jump
        value: 9999

  # Decision timer — shared across wave decisions
  no_points_for_second_place_decision_timer:
    start_value: 20  # [DECISION_TIMER]
    end_value: 0
    direction: down
    tick_interval: 1s
    start_running: false
    control_events:
      - event: no_points_for_second_place_wave1_final_shot_hit
        action: start
      - event: no_points_for_second_place_collect
        action: stop
      - event: no_points_for_second_place_risk_wave1
        action: stop
      - event: no_points_for_second_place_wave2_final_shot_hit
        action: restart
      - event: no_points_for_second_place_risk_wave2
        action: stop
      - event: no_points_for_second_place_wave3_final_shot_hit
        action: restart
      - event: no_points_for_second_place_risk_wave3
        action: stop

  # Intro video delay
  no_points_for_second_place_intro_video_delay:
    start_value: 0
    end_value: 39  # [INTRO_TIMER]
    direction: up
    tick_interval: 1s
    start_running: false
    control_events:
      - event: mode_no_points_for_second_place_started
        action: start
      - event: no_points_for_second_place_skip_intro
        action: stop

  # Scoop eject debounce
  no_points_for_second_place_eject_debounce:
    start_value: 0
    end_value: 150  # [EJECT_DEBOUNCE]
    direction: up
    tick_interval: 1ms
    start_running: false
    control_events:
      - event: s_mode_start_inactive
        action: restart
      - event: s_mode_start_active
        action: stop

  # Barrier raise delay
  no_points_for_second_place_barrier_delay:
    start_value: 0
    end_value: 750  # [BARRIER_DELAY]
    direction: up
    tick_interval: 1ms
    start_running: false
    control_events:
      - event: timer_no_points_for_second_place_eject_debounce_complete
        action: restart

  # Wave 2 diverter assist — 3s open window, restarts on each trigger
  no_points_for_second_place_diverter_assist:
    start_value: 0
    end_value: 3000  # [DIVERTER_ASSIST]
    direction: up
    tick_interval: 1ms
    start_running: false
    control_events:
      - event: no_points_for_second_place_diverter_assist_trigger
        action: restart
      - event: no_points_for_second_place_wave2_final_shot_hit
        action: stop
      - event: no_points_for_second_place_cleanup
        action: stop

  # Won video delay
  no_points_for_second_place_complete_delay:
    start_value: 34  # [WON_TIMER]
    end_value: 0
    direction: down
    tick_interval: 1s
    start_running: false
    control_events:
      - event: timer_no_points_for_second_place_complete_delay_start
        action: start
      - event: no_points_for_second_place_skip_end_video
        action: jump
        value: 0

  # Fail video delay
  no_points_for_second_place_failed_delay:
    start_value: 10  # [FAILED_TIMER]
    end_value: 0
    direction: down
    tick_interval: 1s
    start_running: false
    control_events:
      - event: timer_no_points_for_second_place_failed_delay_start
        action: start
      - event: no_points_for_second_place_skip_end_video
        action: jump
        value: 0

  # Drain delay
  no_points_for_second_place_drain_delay:
    start_value: 0
    end_value: 10  # [FAILED_TIMER]
    direction: up
    tick_interval: 1s
    start_running: false
    control_events:
      - event: no_points_for_second_place_drain_detected
        action: start
      - event: no_points_for_second_place_skip_end_video
        action: jump
        value: 8

####################################################################################
# EVENT PLAYER
####################################################################################

event_player:

  # Afterburner perk — 500ms delay ensures wave timer has started
  no_points_for_second_place_ball_released{current_player.afterburner_perk_active==1}:
    - afterburner_extend_no_points_for_second_place_timer|500ms

  ##############################################
  ## SKIP END VIDEOS — Both flippers
  ##############################################
  s_flipper_left_active{device.timers.no_points_for_second_place_complete_delay.running}:
    - no_points_for_second_place_check_skip_end_video
  s_flipper_right_active{device.timers.no_points_for_second_place_complete_delay.running}:
    - no_points_for_second_place_check_skip_end_video
  s_flipper_left_active{device.timers.no_points_for_second_place_failed_delay.running}:
    - no_points_for_second_place_check_skip_end_video
  s_flipper_right_active{device.timers.no_points_for_second_place_failed_delay.running}:
    - no_points_for_second_place_check_skip_end_video
  s_flipper_left_active{device.timers.no_points_for_second_place_drain_delay.running}:
    - no_points_for_second_place_check_skip_end_video
  s_flipper_right_active{device.timers.no_points_for_second_place_drain_delay.running}:
    - no_points_for_second_place_check_skip_end_video

  no_points_for_second_place_check_skip_end_video{device.switches.s_flipper_left.state and device.switches.s_flipper_right.state}:
    - no_points_for_second_place_skip_end_video

  # Drop barrier immediately when skip fires — before timer jumps and mode stops
  # Gives the barrier maximum physical drop time before ball auto-ejects
  no_points_for_second_place_skip_end_video:
    - barrier_drop

  ##############################################
  ## DRAIN
  ##############################################
  no_points_for_second_place_ball_ending_hold:
    - no_points_for_second_place_failed
    - no_points_for_second_place_drain_detected

  timer_no_points_for_second_place_drain_delay_complete:
    - no_points_for_second_place_drain_cleanup_complete
    - no_points_for_second_place_cleanup

  ##############################################
  ## MODE START
  ##############################################
  mode_no_points_for_second_place_started:
    - reset_topgun_letters
    - barrier_raise

  ##############################################
  ## SKIP INTRO — Both flippers during intro timer
  ##############################################
  s_flipper_left_active{current_player.no_points_for_second_place_wave==1 and device.timers.no_points_for_second_place_intro_video_delay.running}:
    - no_points_for_second_place_check_skip_intro
  s_flipper_right_active{current_player.no_points_for_second_place_wave==1 and device.timers.no_points_for_second_place_intro_video_delay.running}:
    - no_points_for_second_place_check_skip_intro

  no_points_for_second_place_check_skip_intro{device.switches.s_flipper_left.state and device.switches.s_flipper_right.state}:
    - no_points_for_second_place_skip_intro

  no_points_for_second_place_skip_intro:
    - barrier_drop
    - no_points_for_second_place_ball_released
    - no_points_for_second_place_setup_wave1

  timer_no_points_for_second_place_intro_video_delay_complete:
    - barrier_drop
    - no_points_for_second_place_ball_released
    - no_points_for_second_place_setup_wave1

  ##############################################
  ## BARRIER RAISE + WAVE ROUTING (scoop exit only)
  ## Fires after ball exits scoop (debounce + barrier_delay).
  ## Routes to next wave setup when wave counter indicates a post-scoop wave start.
  ## complete_flag guard prevents misfiring during won ball exit.
  ##############################################
  timer_no_points_for_second_place_barrier_delay_complete:
    - barrier_raise
    - no_points_for_second_place_post_barrier_wave_check

  no_points_for_second_place_post_barrier_wave_check{current_player.no_points_for_second_place_wave==2 and current_player.no_points_for_second_place_complete_flag==0}:
    - no_points_for_second_place_setup_wave2
  no_points_for_second_place_post_barrier_wave_check{current_player.no_points_for_second_place_wave==3 and current_player.no_points_for_second_place_complete_flag==0}:
    - no_points_for_second_place_setup_wave3
  no_points_for_second_place_post_barrier_wave_check{current_player.no_points_for_second_place_wave==4 and current_player.no_points_for_second_place_complete_flag==0}:
    - no_points_for_second_place_setup_wave4

  ##############################################
  ## WAVE 1 SETUP
  ##############################################
  no_points_for_second_place_setup_wave1:
    - right_ramp_down

  ##############################################
  ## WAVE 1 SHOT DETECTION
  ##############################################
  s_ramp_left_exit_active{current_player.no_points_for_second_place_wave==1 and current_player.no_points_for_second_place_wave1_lr_hit==0 and current_player.no_points_for_second_place_wave1_final_shot_lit==0}:
    - no_points_for_second_place_wave1_lr_hit
    - no_points_for_second_place_wave1_shot_hit

  s_ramp_right_exit_active{current_player.no_points_for_second_place_wave==1 and current_player.no_points_for_second_place_wave1_rr_hit==0 and current_player.no_points_for_second_place_wave1_final_shot_lit==0}:
    - no_points_for_second_place_wave1_rr_hit
    - no_points_for_second_place_wave1_shot_hit

  spinner_shot_made{current_player.no_points_for_second_place_wave==1 and current_player.no_points_for_second_place_wave1_sp_hit==0 and current_player.no_points_for_second_place_wave1_final_shot_lit==0}:
    - no_points_for_second_place_wave1_sp_hit
    - no_points_for_second_place_wave1_shot_hit

  s_ramp_tower_exit_active{current_player.no_points_for_second_place_wave==1 and current_player.no_points_for_second_place_wave1_twr_hit==0 and current_player.no_points_for_second_place_wave1_final_shot_lit==0}:
    - no_points_for_second_place_wave1_twr_hit
    - no_points_for_second_place_wave1_shot_hit

  ##############################################
  ## WAVE 1 COMPLETION
  ##############################################
  no_points_for_second_place_wave1_shot_hit:
    - no_points_for_second_place_wave1_check_complete|0ms
    - no_points_for_second_place_wave_shot_hit

  no_points_for_second_place_wave1_check_complete{current_player.no_points_for_second_place_wave1_shots_remaining==0}:
    - no_points_for_second_place_wave1_shots_complete

  no_points_for_second_place_wave1_shots_complete:
    - no_points_for_second_place_wave1_final_shot_setup

  no_points_for_second_place_wave1_final_shot_setup:
    - barrier_drop

  s_mode_start_active{current_player.no_points_for_second_place_wave==1 and current_player.no_points_for_second_place_wave1_final_shot_lit==1}:
    - no_points_for_second_place_wave1_final_shot_hit

  no_points_for_second_place_wave1_final_shot_hit:
    - shaker_soft
    - barrier_raise
    - right_ramp_down

  ##############################################
  ## GENERIC WAVE SHOT HIT — Callout + GI strobe
  ## Fires from ALL wave required shot hits (not capture shots).
  ## npfsp_gi_wave_color_flash is wave-aware (see light_player).
  ##############################################
  no_points_for_second_place_wave_shot_hit:
    - shaker_soft
    - play_shot_made_callout
    - no_points_for_second_place_gi_strobe_flash_on
    - npfsp_gi_wave_color_flash|200ms
    - no_points_for_second_place_gi_strobe_flash_on|400ms
    - npfsp_gi_wave_color_flash|600ms
    - no_points_for_second_place_gi_strobe_flash_on|800ms
    - npfsp_gi_wave_color_flash|1000ms

  ##############################################
  ## WAVE 2 SETUP
  ## Fires from post_barrier_wave_check{wave==2} after wave 1 → 2 transition.
  ##############################################
  no_points_for_second_place_setup_wave2:
    - no_points_for_second_place_wave2_ball_released  # Starts wave 2 timer

  ##############################################
  ## WAVE 2 SHOT DETECTION
  ## Required: L+O+C+K lock targets + ICEMAN A + ICEMAN C (6 total)
  ## IMPORTANT: s_c_lock_target and s_c_iceman_target are DIFFERENT switches
  ##############################################
  s_l_lock_target_active{current_player.no_points_for_second_place_wave==2 and current_player.no_points_for_second_place_wave2_l_hit==0 and current_player.no_points_for_second_place_wave2_final_shot_lit==0}:
    - no_points_for_second_place_wave2_l_hit
    - no_points_for_second_place_wave2_shot_hit

  s_o_lock_target_active{current_player.no_points_for_second_place_wave==2 and current_player.no_points_for_second_place_wave2_o_hit==0 and current_player.no_points_for_second_place_wave2_final_shot_lit==0}:
    - no_points_for_second_place_wave2_o_hit
    - no_points_for_second_place_wave2_shot_hit

  s_c_lock_target_active{current_player.no_points_for_second_place_wave==2 and current_player.no_points_for_second_place_wave2_c_hit==0 and current_player.no_points_for_second_place_wave2_final_shot_lit==0}:
    - no_points_for_second_place_wave2_c_hit
    - no_points_for_second_place_wave2_shot_hit

  s_k_lock_target_active{current_player.no_points_for_second_place_wave==2 and current_player.no_points_for_second_place_wave2_k_hit==0 and current_player.no_points_for_second_place_wave2_final_shot_lit==0}:
    - no_points_for_second_place_wave2_k_hit
    - no_points_for_second_place_wave2_shot_hit

  s_a_iceman_target_active{current_player.no_points_for_second_place_wave==2 and current_player.no_points_for_second_place_wave2_iceman_a_hit==0 and current_player.no_points_for_second_place_wave2_final_shot_lit==0}:
    - no_points_for_second_place_wave2_iceman_a_hit
    - no_points_for_second_place_wave2_shot_hit

  s_c_iceman_target_active{current_player.no_points_for_second_place_wave==2 and current_player.no_points_for_second_place_wave2_iceman_c_hit==0 and current_player.no_points_for_second_place_wave2_final_shot_lit==0}:
    - no_points_for_second_place_wave2_iceman_c_hit
    - no_points_for_second_place_wave2_shot_hit

  ##############################################
  ## DIVERTER ASSIST — SP/TL/RO open left diverter 3s during collection phase only
  s_spinner_active{(current_player.no_points_for_second_place_wave==2 and current_player.no_points_for_second_place_wave2_final_shot_lit==1) or (current_player.no_points_for_second_place_wave==3 and current_player.no_points_for_second_place_wave3_final_shot_lit==1)}:
    - no_points_for_second_place_diverter_assist_trigger

  s_orbit_right_active{(current_player.no_points_for_second_place_wave==2 and current_player.no_points_for_second_place_wave2_final_shot_lit==1) or (current_player.no_points_for_second_place_wave==3 and current_player.no_points_for_second_place_wave3_final_shot_lit==1)}:
    - no_points_for_second_place_diverter_assist_trigger

  s_orbit_upper_active{(current_player.no_points_for_second_place_wave==2 and current_player.no_points_for_second_place_wave2_final_shot_lit==1) or (current_player.no_points_for_second_place_wave==3 and current_player.no_points_for_second_place_wave3_final_shot_lit==1)}:
    - no_points_for_second_place_diverter_assist_trigger

  no_points_for_second_place_diverter_assist_trigger:
    - left_orbit_diverter_open

  timer_no_points_for_second_place_diverter_assist_complete:
    - left_orbit_diverter_closed

  ##############################################
  ## WAVE 2 COMPLETION
  ##############################################
  no_points_for_second_place_wave2_shot_hit:
    - no_points_for_second_place_wave2_check_complete|0ms
    - no_points_for_second_place_wave_shot_hit

  no_points_for_second_place_wave2_check_complete{current_player.no_points_for_second_place_wave2_shots_remaining==0}:
    - no_points_for_second_place_wave2_shots_complete

  no_points_for_second_place_wave2_shots_complete:
    - no_points_for_second_place_wave2_final_shot_setup

  ##############################################
  ## WAVE 2 FINAL SHOT SETUP — Raise left lane post
  ## coil_player enables c_left_lane_up_post on this event.
  ## variable_player sets wave2_final_shot_lit=1 on this event.
  ## Assist shots (SP/TL/RO diverter) continue to work during final shot phase.
  ##############################################
  no_points_for_second_place_wave2_final_shot_setup:
    - right_ramp_up
    - ball_search_block

  ##############################################
  ## WAVE 2 FINAL SHOT HIT — Ball captured at left lane post
  ## Guard: wave==2 AND wave2_final_shot_lit==1
  ##############################################
  s_lane_left_active{current_player.no_points_for_second_place_wave==2 and current_player.no_points_for_second_place_wave2_final_shot_lit==1}:
    - no_points_for_second_place_wave2_final_shot_hit

  no_points_for_second_place_wave2_final_shot_hit:
    - shaker_soft
    - left_orbit_diverter_closed
    - right_ramp_down

  ##############################################
  ## DECISION — LEFT FLIPPER = Risk It (wave-aware)
  ##############################################
  s_flipper_left_active{device.timers.no_points_for_second_place_decision_timer.running and current_player.no_points_for_second_place_complete_flag==0 and current_player.no_points_for_second_place_wave==1}:
    - no_points_for_second_place_risk_wave1
  s_flipper_left_active{device.timers.no_points_for_second_place_decision_timer.running and current_player.no_points_for_second_place_complete_flag==0 and current_player.no_points_for_second_place_wave==2}:
    - no_points_for_second_place_risk_wave2
  s_flipper_left_active{device.timers.no_points_for_second_place_decision_timer.running and current_player.no_points_for_second_place_complete_flag==0 and current_player.no_points_for_second_place_wave==3}:
    - no_points_for_second_place_risk_wave3

  timer_no_points_for_second_place_decision_timer_complete{current_player.no_points_for_second_place_wave==1}:
    - no_points_for_second_place_risk_wave1
  timer_no_points_for_second_place_decision_timer_complete{current_player.no_points_for_second_place_wave==2}:
    - no_points_for_second_place_risk_wave2
  timer_no_points_for_second_place_decision_timer_complete{current_player.no_points_for_second_place_wave==3}:
    - no_points_for_second_place_risk_wave3

  ##############################################
  ## DECISION — RIGHT FLIPPER = Cash In (any wave)
  ##############################################
  s_flipper_right_active{device.timers.no_points_for_second_place_decision_timer.running and current_player.no_points_for_second_place_complete_flag==0}:
    - no_points_for_second_place_collect

  ##############################################
  ## COLLECT / WIN — Wave-aware ball release
  ##############################################
  no_points_for_second_place_collect{current_player.no_points_for_second_place_complete_flag==0}:
    - no_points_for_second_place_complete

  no_points_for_second_place_complete:
    - timer_no_points_for_second_place_complete_delay_start
    - missiles_perk_unload
    - barrier_raise

  # Wave 1 win: release scoop via ball_holds
  no_points_for_second_place_release_hold{current_player.no_points_for_second_place_wave==1}:
    - barrier_drop
    - no_points_for_second_place_victory_ball_released

  # Wave 2 win: drop left lane post
  no_points_for_second_place_release_hold{current_player.no_points_for_second_place_wave==2}:
    - no_points_for_second_place_wave2_left_lane_post_deactivate
    - ball_search_unblock

  # Wave 3 win: drop left lane post (same mechanism as wave 2)
  no_points_for_second_place_release_hold{current_player.no_points_for_second_place_wave==3}:
    - no_points_for_second_place_wave3_left_lane_post_deactivate
    - ball_search_unblock
  # WAVE 4: Add release_hold{wave==4} here when built

  no_points_for_second_place_victory_ball_released:
    - scoop_ball_release
    - no_points_for_second_place_victory_ball_exit|400ms

  timer_no_points_for_second_place_complete_delay_complete:
    - barrier_drop  # Drop barrier same tick as mode stop — wave 4 uses release_all_events, barrier must drop first
    - no_points_for_second_place_release_hold
    # scoop_ball_release is NOT fired here — it is already fired by:
    #   release_hold{wave==1} → victory_ball_released → scoop_ball_release
    # Firing it here was a duplicate AND caused barrier_drop + barrier_raise in the
    # same event tick (cleanup fires barrier_raise immediately after release_hold fires
    # barrier_drop, giving the coil 3ms before it's cancelled → ball hits raised barrier).
    - barrier_raise|600ms                        # Raise barrier 600ms after ball exits (machine-level event, fires after mode stops)
    - no_points_for_second_place_cleanup|600ms   # Delayed 600ms: barrier must stay down
    - pilot_mode_cleanup_complete|600ms          # until ball has physically cleared the barrier

  ##############################################
  ## FAIL
  ##############################################
  timer_no_points_for_second_place_timer_complete{current_player.afterburner_perk_active==0}:
    - no_points_for_second_place_failed

  no_points_for_second_place_failed:
    - barrier_raise
    - left_orbit_diverter_closed
    - timer_no_points_for_second_place_failed_delay_start
    - missiles_perk_unload
    - no_points_for_second_place_release_hold

  # Only fire cleanup in the failed path (complete_flag==0).
  # In the won path, skip_end_video also jumps this timer to 0 — without this
  # condition, cleanup fires immediately and raises the barrier before the ball exits.
  timer_no_points_for_second_place_failed_delay_complete{current_player.no_points_for_second_place_complete_flag==0}:
    - no_points_for_second_place_cleanup
    - pilot_mode_cleanup_complete

  ##############################################
  ## RISK WAVE 1 — Release scoop, barrier cycle → wave 2
  ##############################################
  no_points_for_second_place_risk_wave1:
    - barrier_drop
    - no_points_for_second_place_decision_continue_ball_released

  ##############################################
  ## RISK WAVE 2 — Drop left lane post, 500ms delay → wave 3
  ##############################################
  no_points_for_second_place_risk_wave2:
    - no_points_for_second_place_wave2_left_lane_post_deactivate
    - ball_search_unblock
    - no_points_for_second_place_post_barrier_wave_check|500ms

  ##############################################
  ## WAVE 3 SETUP
  ##############################################
  no_points_for_second_place_setup_wave3:
    - right_ramp_down             # RR shot uses ramp down (s_ramp_right_exit)
    - no_points_for_second_place_wave3_ball_released  # Starts wave 3 timer at 60s

  ##############################################
  ## WAVE 3 SHOT DETECTION
  ## Required: LR (s_ramp_left_exit) + TL (s_orbit_upper) + RR (s_ramp_right_exit)
  ##############################################
  s_ramp_left_exit_active{current_player.no_points_for_second_place_wave==3 and current_player.no_points_for_second_place_wave3_lr_hit==0 and current_player.no_points_for_second_place_wave3_final_shot_lit==0}:
    - no_points_for_second_place_wave3_lr_hit
    - no_points_for_second_place_wave3_shot_hit

  s_orbit_upper_active{current_player.no_points_for_second_place_wave==3 and current_player.no_points_for_second_place_wave3_tl_hit==0 and current_player.no_points_for_second_place_wave3_final_shot_lit==0}:
    - no_points_for_second_place_wave3_tl_hit
    - no_points_for_second_place_wave3_shot_hit

  s_ramp_right_exit_active{current_player.no_points_for_second_place_wave==3 and current_player.no_points_for_second_place_wave3_rr_hit==0 and current_player.no_points_for_second_place_wave3_final_shot_lit==0}:
    - no_points_for_second_place_wave3_rr_hit
    - no_points_for_second_place_wave3_shot_hit

  ##############################################
  ## WAVE 3 COMPLETION
  ##############################################
  no_points_for_second_place_wave3_shot_hit:
    - no_points_for_second_place_wave3_check_complete|0ms
    - no_points_for_second_place_wave_shot_hit

  no_points_for_second_place_wave3_check_complete{current_player.no_points_for_second_place_wave3_shots_remaining==0}:
    - no_points_for_second_place_wave3_shots_complete

  no_points_for_second_place_wave3_shots_complete:
    - no_points_for_second_place_wave3_final_shot_setup

  ##############################################
  ## WAVE 3 FINAL SHOT SETUP — Raise left lane post (same mechanism as wave 2)
  ## coil_player enables c_left_lane_up_post on this event.
  ## variable_player sets wave3_final_shot_lit=1 on this event.
  ##############################################
  no_points_for_second_place_wave3_final_shot_setup:
    - right_ramp_up
    - ball_search_block

  ##############################################
  ## WAVE 3 FINAL SHOT HIT — Ball captured at left lane post
  ## Guard: wave==3 AND wave3_final_shot_lit==1
  ##############################################
  s_lane_left_active{current_player.no_points_for_second_place_wave==3 and current_player.no_points_for_second_place_wave3_final_shot_lit==1}:
    - no_points_for_second_place_wave3_final_shot_hit

  no_points_for_second_place_wave3_final_shot_hit:
    - shaker_soft
    - right_ramp_down  # Safety reset

  ##############################################
  ## RISK WAVE 3 — Drop left lane post, 500ms → wave 4 setup
  ##############################################
  no_points_for_second_place_risk_wave3:
    - no_points_for_second_place_wave3_left_lane_post_deactivate
    - ball_search_unblock
    - no_points_for_second_place_post_barrier_wave_check|500ms
  ##############################################
  ## WAVE 4 SETUP + GOOSE LETTER COLLECTION
  ##############################################
  no_points_for_second_place_setup_wave4:
    - right_ramp_down
    - no_points_for_second_place_wave4_ball_released

  ## Wave 4 collection: ball hits lit position (goose_letter_X==1)
  ## All 5 start lit. Each hit sets that position to 0. Rotation moves remaining 1s around.
  s_outlane_left_active{current_player.no_points_for_second_place_wave==4 and current_player.goose_letter_g==1}:
    - no_points_for_second_place_wave4_g_hit
    - no_points_for_second_place_wave_shot_hit

  s_inlane_left_active{current_player.no_points_for_second_place_wave==4 and current_player.goose_letter_o_left==1}:
    - no_points_for_second_place_wave4_o_left_hit
    - no_points_for_second_place_wave_shot_hit

  s_outlane_right_active{current_player.no_points_for_second_place_wave==4 and current_player.goose_letter_e==1}:
    - no_points_for_second_place_wave4_e_hit
    - no_points_for_second_place_wave_shot_hit

  s_inner_inlane_right_active{current_player.no_points_for_second_place_wave==4 and current_player.goose_letter_o_right==1}:
    - no_points_for_second_place_wave4_o_right_hit
    - no_points_for_second_place_wave_shot_hit

  s_outer_inlane_right_active{current_player.no_points_for_second_place_wave==4 and current_player.goose_letter_s==1}:
    - no_points_for_second_place_wave4_s_hit
    - no_points_for_second_place_wave_shot_hit

  ## Completion: shots_remaining==1 means this is the last letter
  no_points_for_second_place_wave4_g_hit{current_player.no_points_for_second_place_wave4_shots_remaining==1}:
    - no_points_for_second_place_wave4_shots_complete
  no_points_for_second_place_wave4_o_left_hit{current_player.no_points_for_second_place_wave4_shots_remaining==1}:
    - no_points_for_second_place_wave4_shots_complete
  no_points_for_second_place_wave4_e_hit{current_player.no_points_for_second_place_wave4_shots_remaining==1}:
    - no_points_for_second_place_wave4_shots_complete
  no_points_for_second_place_wave4_o_right_hit{current_player.no_points_for_second_place_wave4_shots_remaining==1}:
    - no_points_for_second_place_wave4_shots_complete
  no_points_for_second_place_wave4_s_hit{current_player.no_points_for_second_place_wave4_shots_remaining==1}:
    - no_points_for_second_place_wave4_shots_complete

  no_points_for_second_place_wave4_shots_complete:
    - no_points_for_second_place_wave4_final_shot_setup

  no_points_for_second_place_wave4_final_shot_setup:
    - barrier_drop

  s_mode_start_active{current_player.no_points_for_second_place_wave==4 and current_player.no_points_for_second_place_wave4_final_shot_lit==1}:
    - no_points_for_second_place_wave4_final_shot_hit

  ## AUTO WIN — no decision for wave 4. Ball held in scoop during won video.
  ## No release_hold{wave==4} entry; mode_will_stop triggers ball_holds release_all.
  ## cleanup fires barrier_drop so ball can exit when release_all fires.
  no_points_for_second_place_wave4_final_shot_hit:
    - shaker_soft
    - barrier_raise
    - no_points_for_second_place_collect

  ##############################################
  ## MISSILES PERK — Auto-complete one non-capture shot per missile
  ## 4 missiles total. Cannot complete capture shots (left lane / scoop).
  ## Cascading conditions ensure only ONE handler fires per missile use.
  ##############################################

  # WAVE 1 — LR → RR → SP → TWR (in priority order)
  missiles_perk_complete_shot{current_player.no_points_for_second_place_wave==1 and current_player.no_points_for_second_place_wave1_lr_hit==0 and current_player.no_points_for_second_place_wave1_final_shot_lit==0 and current_player.no_points_for_second_place_complete_flag==0}:
    - no_points_for_second_place_wave1_lr_hit
    - no_points_for_second_place_wave1_shot_hit

  missiles_perk_complete_shot{current_player.no_points_for_second_place_wave==1 and current_player.no_points_for_second_place_wave1_lr_hit==1 and current_player.no_points_for_second_place_wave1_rr_hit==0 and current_player.no_points_for_second_place_wave1_final_shot_lit==0 and current_player.no_points_for_second_place_complete_flag==0}:
    - no_points_for_second_place_wave1_rr_hit
    - no_points_for_second_place_wave1_shot_hit

  missiles_perk_complete_shot{current_player.no_points_for_second_place_wave==1 and current_player.no_points_for_second_place_wave1_lr_hit==1 and current_player.no_points_for_second_place_wave1_rr_hit==1 and current_player.no_points_for_second_place_wave1_sp_hit==0 and current_player.no_points_for_second_place_wave1_final_shot_lit==0 and current_player.no_points_for_second_place_complete_flag==0}:
    - no_points_for_second_place_wave1_sp_hit
    - no_points_for_second_place_wave1_shot_hit

  missiles_perk_complete_shot{current_player.no_points_for_second_place_wave==1 and current_player.no_points_for_second_place_wave1_lr_hit==1 and current_player.no_points_for_second_place_wave1_rr_hit==1 and current_player.no_points_for_second_place_wave1_sp_hit==1 and current_player.no_points_for_second_place_wave1_twr_hit==0 and current_player.no_points_for_second_place_wave1_final_shot_lit==0 and current_player.no_points_for_second_place_complete_flag==0}:
    - no_points_for_second_place_wave1_twr_hit
    - no_points_for_second_place_wave1_shot_hit

  # WAVE 2 — L → O → C → K → ICEMAN A → ICEMAN C (in priority order)
  missiles_perk_complete_shot{current_player.no_points_for_second_place_wave==2 and current_player.no_points_for_second_place_wave2_l_hit==0 and current_player.no_points_for_second_place_wave2_final_shot_lit==0 and current_player.no_points_for_second_place_complete_flag==0}:
    - no_points_for_second_place_wave2_l_hit
    - no_points_for_second_place_wave2_shot_hit

  missiles_perk_complete_shot{current_player.no_points_for_second_place_wave==2 and current_player.no_points_for_second_place_wave2_l_hit==1 and current_player.no_points_for_second_place_wave2_o_hit==0 and current_player.no_points_for_second_place_wave2_final_shot_lit==0 and current_player.no_points_for_second_place_complete_flag==0}:
    - no_points_for_second_place_wave2_o_hit
    - no_points_for_second_place_wave2_shot_hit

  missiles_perk_complete_shot{current_player.no_points_for_second_place_wave==2 and current_player.no_points_for_second_place_wave2_l_hit==1 and current_player.no_points_for_second_place_wave2_o_hit==1 and current_player.no_points_for_second_place_wave2_c_hit==0 and current_player.no_points_for_second_place_wave2_final_shot_lit==0 and current_player.no_points_for_second_place_complete_flag==0}:
    - no_points_for_second_place_wave2_c_hit
    - no_points_for_second_place_wave2_shot_hit

  missiles_perk_complete_shot{current_player.no_points_for_second_place_wave==2 and current_player.no_points_for_second_place_wave2_l_hit==1 and current_player.no_points_for_second_place_wave2_o_hit==1 and current_player.no_points_for_second_place_wave2_c_hit==1 and current_player.no_points_for_second_place_wave2_k_hit==0 and current_player.no_points_for_second_place_wave2_final_shot_lit==0 and current_player.no_points_for_second_place_complete_flag==0}:
    - no_points_for_second_place_wave2_k_hit
    - no_points_for_second_place_wave2_shot_hit

  missiles_perk_complete_shot{current_player.no_points_for_second_place_wave==2 and current_player.no_points_for_second_place_wave2_l_hit==1 and current_player.no_points_for_second_place_wave2_o_hit==1 and current_player.no_points_for_second_place_wave2_c_hit==1 and current_player.no_points_for_second_place_wave2_k_hit==1 and current_player.no_points_for_second_place_wave2_iceman_a_hit==0 and current_player.no_points_for_second_place_wave2_final_shot_lit==0 and current_player.no_points_for_second_place_complete_flag==0}:
    - no_points_for_second_place_wave2_iceman_a_hit
    - no_points_for_second_place_wave2_shot_hit

  missiles_perk_complete_shot{current_player.no_points_for_second_place_wave==2 and current_player.no_points_for_second_place_wave2_l_hit==1 and current_player.no_points_for_second_place_wave2_o_hit==1 and current_player.no_points_for_second_place_wave2_c_hit==1 and current_player.no_points_for_second_place_wave2_k_hit==1 and current_player.no_points_for_second_place_wave2_iceman_a_hit==1 and current_player.no_points_for_second_place_wave2_iceman_c_hit==0 and current_player.no_points_for_second_place_wave2_final_shot_lit==0 and current_player.no_points_for_second_place_complete_flag==0}:
    - no_points_for_second_place_wave2_iceman_c_hit
    - no_points_for_second_place_wave2_shot_hit

  # WAVE 3 — LR → TL → RR (in priority order)
  missiles_perk_complete_shot{current_player.no_points_for_second_place_wave==3 and current_player.no_points_for_second_place_wave3_lr_hit==0 and current_player.no_points_for_second_place_wave3_final_shot_lit==0 and current_player.no_points_for_second_place_complete_flag==0}:
    - no_points_for_second_place_wave3_lr_hit
    - no_points_for_second_place_wave3_shot_hit

  missiles_perk_complete_shot{current_player.no_points_for_second_place_wave==3 and current_player.no_points_for_second_place_wave3_lr_hit==1 and current_player.no_points_for_second_place_wave3_tl_hit==0 and current_player.no_points_for_second_place_wave3_final_shot_lit==0 and current_player.no_points_for_second_place_complete_flag==0}:
    - no_points_for_second_place_wave3_tl_hit
    - no_points_for_second_place_wave3_shot_hit

  missiles_perk_complete_shot{current_player.no_points_for_second_place_wave==3 and current_player.no_points_for_second_place_wave3_lr_hit==1 and current_player.no_points_for_second_place_wave3_tl_hit==1 and current_player.no_points_for_second_place_wave3_rr_hit==0 and current_player.no_points_for_second_place_wave3_final_shot_lit==0 and current_player.no_points_for_second_place_complete_flag==0}:
    - no_points_for_second_place_wave3_rr_hit
    - no_points_for_second_place_wave3_shot_hit

  # WAVE 4 — G → O_left → E → O_right → S (in priority order)
  ## Missiles set the goose_letter variable directly, triggering all downstream handling
  missiles_perk_complete_shot{current_player.no_points_for_second_place_wave==4 and current_player.goose_letter_g==0 and current_player.no_points_for_second_place_wave4_final_shot_lit==0 and current_player.no_points_for_second_place_complete_flag==0}:
    - no_points_for_second_place_wave4_missile_g

  missiles_perk_complete_shot{current_player.no_points_for_second_place_wave==4 and current_player.goose_letter_g==1 and current_player.goose_letter_o_left==0 and current_player.no_points_for_second_place_wave4_final_shot_lit==0 and current_player.no_points_for_second_place_complete_flag==0}:
    - no_points_for_second_place_wave4_missile_o_left

  missiles_perk_complete_shot{current_player.no_points_for_second_place_wave==4 and current_player.goose_letter_g==1 and current_player.goose_letter_o_left==1 and current_player.goose_letter_e==0 and current_player.no_points_for_second_place_wave4_final_shot_lit==0 and current_player.no_points_for_second_place_complete_flag==0}:
    - no_points_for_second_place_wave4_missile_e

  missiles_perk_complete_shot{current_player.no_points_for_second_place_wave==4 and current_player.goose_letter_g==1 and current_player.goose_letter_o_left==1 and current_player.goose_letter_e==1 and current_player.goose_letter_o_right==0 and current_player.no_points_for_second_place_wave4_final_shot_lit==0 and current_player.no_points_for_second_place_complete_flag==0}:
    - no_points_for_second_place_wave4_missile_o_right

  missiles_perk_complete_shot{current_player.no_points_for_second_place_wave==4 and current_player.goose_letter_g==1 and current_player.goose_letter_o_left==1 and current_player.goose_letter_e==1 and current_player.goose_letter_o_right==1 and current_player.goose_letter_s==0 and current_player.no_points_for_second_place_wave4_final_shot_lit==0 and current_player.no_points_for_second_place_complete_flag==0}:
    - no_points_for_second_place_wave4_missile_s

  ##############################################
  ## CLEANUP
  ##############################################
  no_points_for_second_place_cleanup:
    - right_ramp_down
    - left_orbit_diverter_closed
    - barrier_raise
    - ball_search_unblock

####################################################################################
# COIL PLAYER
# Wave 2 left lane post control.
# c_left_lane_up_post has allow_enable: true in config_coils.yaml.
####################################################################################

coil_player:
  no_points_for_second_place_wave2_final_shot_hit:
    c_left_lane_up_post:
      action: enable  # Ball is in lane — raise post to hold it

  no_points_for_second_place_wave2_left_lane_post_deactivate:
    c_left_lane_up_post:
      action: disable

  no_points_for_second_place_wave3_final_shot_hit:
    c_left_lane_up_post:
      action: enable  # Ball is in lane — raise post to hold it

  no_points_for_second_place_wave3_left_lane_post_deactivate:
    c_left_lane_up_post:
      action: disable

####################################################################################
# LIGHT PLAYER
####################################################################################

light_player:

  ##############################################
  ## GI STROBE — Wave-aware color restore
  ## npfsp_gi_wave_color_flash fires from wave_shot_hit strobe chain.
  ## Returns GI to current wave color after each white flash.
  ##############################################
  npfsp_gi_wave_color_flash{current_player.no_points_for_second_place_wave==1}:
    gi_lights:
      color: ADD8E6
      fade: 30ms

  npfsp_gi_wave_color_flash{current_player.no_points_for_second_place_wave==2}:
    gi_lights:
      color: FF8C42
      fade: 30ms

  npfsp_gi_wave_color_flash{current_player.no_points_for_second_place_wave==3}:
    gi_lights:
      color: FFFF00
      fade: 30ms

  npfsp_gi_wave_color_flash{current_player.no_points_for_second_place_wave==4}:
    gi_lights:
      color: FF8C00
      fade: 30ms

  no_points_for_second_place_gi_strobe_flash_on:
    gi_lights:
      color: white
      fade: 30ms

  ##############################################
  ## MODE START — Wave 1 GI
  ##############################################
  mode_no_points_for_second_place_started:
    gi_lights:
      color: ADD8E6
      fade: 500ms

  ##############################################
  ## WAVE 2 SETUP — GI to sunset orange, left lane solid
  ##############################################
  no_points_for_second_place_setup_wave2:
    gi_lights:
      color: FF8C42
      fade: 500ms

  no_points_for_second_place_wave2_final_shot_setup:
    l_shot_left_lane:
      color: FF8C42
      fade: 0ms

  ##############################################
  ## WAVE 3 SETUP — GI to yellow, left lane solid yellow
  ##############################################
  no_points_for_second_place_setup_wave3:
    gi_lights:
      color: FFFF00
      fade: 500ms

  no_points_for_second_place_wave3_final_shot_setup:
    l_shot_left_lane:
      color: FFFF00
      fade: 0ms

  ##############################################
  ## WAVE 1 SHOT HITS
  ##############################################
  no_points_for_second_place_wave1_lr_hit:
    l_shot_left_ramp:
      color: off
  no_points_for_second_place_wave1_rr_hit:
    l_shot_right_orbit:
      color: off
  no_points_for_second_place_wave1_sp_hit:
    l_shot_spinner:
      color: off
