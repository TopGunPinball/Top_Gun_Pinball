#config_version=6

####################################################################################
# NO POINTS FOR SECOND PLACE — PILOT MISSION MODE
# Priority: 600
#
# 4-WAVE STRUCTURE:
#   Intro (39s, skippable) → Wave 1 (90s) → Decision 1 (20s)
#   → [Wave 2 → Decision 2 (20s)] → [Wave 3 → Decision 3 (20s)] → [Wave 4 → AUTO WIN]
#
#   Left flipper or timer expiry at decision = Risk It (continue to next wave)
#   Right flipper at decision = Cash In (WIN → bank awarded to score)
#   Timer expires during wave = FAIL → zero points
#   Ball drain = FAIL → zero points
#   Wave 4 complete = AUTO WIN → no decision, bank awarded
#
# WAVE 1: LR + RR + Spinner + TWR → Scoop           | 90s | Light Blue  (ADD8E6) GI
# WAVE 2: L+O+C+K + ICEMAN A+C   → Left Lane post   | 90s | Sunset Orange (FF8C42) GI
#         Assist: SP/TL/RO opens left orbit diverter 3s. Right ramp UP for RO.
# WAVE 3: TBD
# WAVE 4: G+O+O+S+E letters (inlanes/outlanes, cycling via flippers) → Scoop | 60s | Mango (FF8C00) GI | White inserts
#         All 5 GOOSE letters cleared at wave start. goose_letters.yaml handles switch detection and cycling.
#         Auto-win on scoop capture — no decision. Ball held in scoop while won slide plays.
#
# POINTS BANK: no_points_for_second_place_points_bank
#   Bank accumulates during wave play (NOT scored directly).
#   Awarded to score on win. ZERO on fail or drain.
#   Wave 1: 250K/shot | Wave 2: 500K/shot | Wave 3: 750K/shot | Wave 4: 1M/shot
#
# MUSIC: npfsp_music — controlled in base.yaml
#
# ADJUSTABLE VALUES:
#   [WAVE1_TIMER] 90s  [WAVE2_TIMER] 90s  [DECISION_TIMER] 20s
#   [INTRO_TIMER] 39s  [WON_TIMER] 34s    [FAILED_TIMER] 10s
#   [BARRIER_DELAY] 750ms  [EJECT_DEBOUNCE] 150ms
#   [DIVERTER_ASSIST] 3000ms
#
####################################################################################
# BASE.YAML / QUALIFIER ADDITIONS: Already done in previous sessions.
####################################################################################

mode:
  start_events: start_mode_no_points_for_second_place
  stop_events:
    - timer_no_points_for_second_place_complete_delay_complete
    - timer_no_points_for_second_place_failed_delay_complete
    - no_points_for_second_place_drain_cleanup_complete
  priority: 600
  game_mode: true
  use_wait_queue: true

mode_settings:
  can_stack_with_multiball: true

####################################################################################
# BALL HOLDS
# Scoop hold: intro video + wave 1 decision.
# Wave 2 capture (left lane post) managed via coil_player — NOT ball_holds.
####################################################################################

ball_holds:
  no_points_for_second_place_scoop_hold:
    balls_to_hold: 1
    hold_devices: bd_mode_scoop
    enable_events:
      - mode_no_points_for_second_place_started
      - no_points_for_second_place_wave1_final_shot_setup    # Wave 1 decision hold
      - no_points_for_second_place_wave4_final_shot_setup    # Wave 4 auto-win capture
    release_one_events:
      - no_points_for_second_place_ball_released
      - no_points_for_second_place_decision_continue_ball_released
      - no_points_for_second_place_victory_ball_exit
    release_all_events:
      - mode_no_points_for_second_place_will_stop

####################################################################################
# QUEUE RELAY PLAYER
####################################################################################

queue_relay_player:
  ball_ending{mode.no_points_for_second_place.active==True}:
    post: no_points_for_second_place_ball_ending_hold
    wait_for: no_points_for_second_place_drain_cleanup_complete
    priority: 1000

