slide_player:
  mode_attract_started: attract

sound_player:
  mode_attract_started:
    top_gun_pinball_attract_scene_music:
      bus: music
      loops: -1

  timer_attract_music_stop_timer_complete:
    silence:
      bus: music
      loops: 0

# Kick off the chained cycle and home all servos
# Also clear any ball stuck in mode scoop (barrier blocks eject on cold boot)
event_player:
  mode_attract_started:
    - attract_cycle_step1
    - right_ramp_down
    - top_ramp_down
    - lock_released

  # If ball is stuck in mode scoop on boot, drop barrier so it can eject
  mode_attract_started{device.switches.s_mode_start.state==1}:
    - attract_scoop_clear_start

  # After delay, raise barrier back up
  timer_attract_scoop_clear_delay_complete:
    - attract_scoop_clear_done

##############################################
## Start Button LED - Slow flash in attract mode
##############################################
coil_player:
  # Stop flashing (turn off) when attract mode ends + safety barrier raise
  mode_attract_stopping:
    c_start_button_led:
      action: disable
    c_mode_barrier:
      action: disable

  # Clear any ball stuck in shooter lane when attract starts (boot/game over)
  mode_attract_started{device.switches.s_shooter_lane.state==1}:
    c_plunger:
      action: pulse

  # Drop barrier directly (pilot_mission_qualifier not running in attract)
  attract_scoop_clear_start:
    c_mode_barrier:
      action: enable

  # Raise barrier after delay
  attract_scoop_clear_done:
    c_mode_barrier:
      action: disable

show_player:                                            # Light Shows being played
  # Start button slow flash during attract
  mode_attract_started:
    start_button_flash:
      show: start_button_slow_flash
      loops: -1
      priority: 100

  attract_cycle_step1:
    attract_corners_sweep:
      loops: 1
      speed: 40
      priority: 200
      events_when_completed: attract_cycle_step2 

  attract_cycle_step2:
    attract_spiral_in_and_out:
      loops: 4
      speed: 40
      priority: 200
      events_when_completed: attract_cycle_step3

  attract_cycle_step3:
    attract_color_plus_spin:
      loops: 1
      speed: 40
      priority: 200
      events_when_completed: attract_cycle_step4

  attract_cycle_step4:
    attract_insert_color_bounce:
      loops: 4
      speed: 40
      priority: 200
      events_when_completed: attract_cycle_step5

  attract_cycle_step5:
    attract_chase_all_inserts:
      loops: 5
      speed: 85
      priority: 200
      events_when_completed: attract_cycle_step6

  attract_cycle_step6:
    attract_color_wheel:
      loops: 5
      speed: 40
      priority: 200
      events_when_completed: attract_cycle_step1

  # Clean stop on mode end
  mode_attract_stopping:
    attract_corners_sweep: stop
    attract_spiral_in_and_out: stop
    attract_color_plus_spin: stop
    attract_insert_color_bounce: stop
    attract_chase_all_inserts: stop
    attract_color_wheel: stop
    start_button_flash: stop

timers:
  attract_carousel_timer:
    end_value: 1
    tick_interval: 7s
    start_running: true
    control_events:
      - event: carousel_item_highlighted
        action: restart
      - event: flipper_cradle
        action: stop
      - event: flipper_cradle_release
        action: restart

  # Stop music after 2 minutes — lights keep going
  attract_music_stop_timer:
    start_value: 0
    end_value: 120
    direction: up
    tick_interval: 1s
    control_events:
      - event: mode_attract_started
        action: restart
      - event: mode_attract_will_stop
        action: stop

  # Delay before raising barrier after scoop clears stuck ball
  attract_scoop_clear_delay:
    start_value: 0
    end_value: 3
    direction: up
    tick_interval: 1s
    start_running: false
    control_events:
      - event: attract_scoop_clear_start
        action: start
      - event: mode_attract_will_stop
        action: stop

##############################################
## SHOWS - Start Button Flash
##############################################
shows:
  # Slow flash for start button LED (1 second on, 1 second off)
  start_button_slow_flash:
    - duration: 1s
      coils:
        c_start_button_led: enable
    - duration: 1s
      coils:
        c_start_button_led: disable