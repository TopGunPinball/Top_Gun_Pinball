####################################################################################
# COIL PLAYER
####################################################################################

coil_player:

  # Pre-emptive diverter open — fires when right orbit switch hits at step 10/11
  # Ball is in orbit heading left, needs diverter open before it arrives
  nmfe_preemptive_open_diverter:
    c_left_orbit_diverter:
      action: enable

  # Won catch — opens diverter AND raises left lane post
  # Fires after step 11 shot confirmed; also fires on re-shots at step==11
  nmfe_activate_won_catch:
    c_left_orbit_diverter:
      action: enable
    c_left_lane_up_post:
      action: enable

  # Close diverter only (post stays up to hold ball during won video)
  nmfe_close_left_diverter:
    c_left_orbit_diverter:
      action: disable

  # Release ball after 18s won video completes
  timer_nmfe_complete_delay_complete:
    c_left_lane_up_post:
      action: disable

  # Safety cleanup — both coils off
  nmfe_cleanup:
    c_left_orbit_diverter:
      action: disable
    c_left_lane_up_post:
      action: disable

####################################################################################
# SLIDE PLAYER
####################################################################################

slide_player:

  # Mode start — show intro video only (timer/HUD show after ball released)
  mode_no_margin_for_error_started:
    no_margin_for_error_intro:
      action: play
      priority: 900

  # Ball released — intro done, start HUD slides + instructions
  nmfe_ball_released:
    no_margin_for_error_intro:
      action: remove
    no_margin_for_error_timer:
      action: play
      priority: 800
    no_margin_for_error_shots_remaining:
      action: play
      priority: 800
    no_margin_for_error_instructions:
      action: play
      priority: 800

  # Penalty slide on/off
  nmfe_show_penalty_slide:
    no_margin_for_error_no_hold_penalty:
      action: play
      priority: 870

  nmfe_no_hold_end:
    no_margin_for_error_no_hold_penalty:
      action: remove

  # STEP VIDEOS — play on shot hit, remove when next step video plays
  # Previous step video is removed by the NEXT step's shot_hit event
  nmfe_step_1_shot_hit:
    no_margin_for_error_step_1:
      action: play
      priority: 810
    mode_points_scored:
      action: play
      priority: 840
      expire: 2s

  nmfe_step_2_shot_hit:
    no_margin_for_error_step_1:
      action: remove
    no_margin_for_error_step_2:
      action: play
      priority: 810
    mode_points_scored:
      action: play
      priority: 840
      expire: 2s

  nmfe_step_3_shot_hit:
    no_margin_for_error_step_2:
      action: remove
    no_margin_for_error_step_3:
      action: play
      priority: 810
    mode_points_scored:
      action: play
      priority: 840
      expire: 2s

  nmfe_step_4_shot_hit:
    no_margin_for_error_step_3:
      action: remove
    no_margin_for_error_step_4:
      action: play
      priority: 810
    mode_points_scored:
      action: play
      priority: 840
      expire: 2s

  nmfe_step_5_shot_hit:
    no_margin_for_error_step_4:
      action: remove
    no_margin_for_error_step_5:
      action: play
      priority: 810
    mode_points_scored:
      action: play
      priority: 840
      expire: 2s

  nmfe_step_6_shot_hit:
    no_margin_for_error_step_5:
      action: remove
    no_margin_for_error_step_6:
      action: play
      priority: 810
    mode_points_scored:
      action: play
      priority: 840
      expire: 2s

  nmfe_step_7_shot_hit:
    no_margin_for_error_step_6:
      action: remove
    no_margin_for_error_step_7:
      action: play
      priority: 810
    mode_points_scored:
      action: play
      priority: 840
      expire: 2s

  nmfe_step_8_shot_hit:
    no_margin_for_error_step_7:
      action: remove
    no_margin_for_error_step_8:
      action: play
      priority: 810
    mode_points_scored:
      action: play
      priority: 840
      expire: 2s

  nmfe_step_9_shot_hit:
    no_margin_for_error_step_8:
      action: remove
    no_margin_for_error_step_9:
      action: play
      priority: 810
    mode_points_scored:
      action: play
      priority: 840
      expire: 2s

  nmfe_step_10_shot_hit:
    no_margin_for_error_step_9:
      action: remove
    no_margin_for_error_step_10:
      action: play
      priority: 810
    mode_points_scored:
      action: play
      priority: 840
      expire: 2s

  # Step 11 shot made — remove step 10 video, remove HUD
  # Won video plays when ball physically enters left lane (nmfe_won)
  nmfe_step_11_shot_hit:
    no_margin_for_error_step_10:
