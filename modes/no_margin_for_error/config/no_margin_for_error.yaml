#config_version=6

####################################################################################
# NO MARGIN FOR ERROR - PILOT MISSION MODE
# Timer: 180 seconds countdown | Steps: 11 | GI: Yellow
# Scoring: Direct to score (multiplier applied)
# Flipper Mechanic: Bad shots = no-hold flippers for 10s (resets on each bad shot)
#                   Good shot = immediately restores normal flippers
# Music: Controlled in base.yaml
#
# STEP SEQUENCE (nmfe_step = steps completed):
# Step 1  (step==0):  ALL shots lit
# Step 2  (step==1):  LL bad
# Step 3  (step==2):  LL, LO bad
# Step 4  (step==3):  LL, LO, RO/RR bad
# Step 5  (step==4):  LL, LO, CNT, RO/RR bad
# Step 6  (step==5):  LL, LO, CNT, TWR, RO/RR bad
# Step 7  (step==6):  LR, SP, LO lit only
# Step 8  (step==7):  TWR, TL, TO, RR lit; TOP RAMP UP
# Step 9  (step==8):  SP, CNT, TWR lit; TOP RAMP DOWN
# Step 10 (step==9):  LO, LR lit only
# Step 11 (step==10): SP, TL, RO lit; RIGHT RAMP UP (final shot)
#                     Won when shot made; video plays when ball enters left lane
#
# SCORING (direct, multiplier applied):
# 1: 200K  2: 375K  3: 525K  4: 650K  5: 725K  6: 800K
# 7: 875K  8: 950K  9: 1,025K  10: 1,125K  11: 1,250K  TOTAL: 8,500,000
#
# SLIDES (Godot):
#   no_margin_for_error_intro       — intro video (43s, skippable)
#   no_margin_for_error_timer       — var: device.timers.nmfe_timer.ticks
#   no_margin_for_error_shots_remaining — var: player nmfe_shots_remaining
#   no_margin_for_error_step_1 through step_10 — step videos
#   no_margin_for_error_no_hold_penalty — var: player nmfe_no_hold_timer_ticks
#   no_margin_for_error_won         — won video (18s, ball held by post)
#   no_margin_for_error_lost        — lost video (14s)
#   mode_points_scored              — var: player mode_points_scored
#
# PENALTY GI STROBE LIGHTS (red during no-hold penalty):
#   l_gi_light_1, l_gi_light_2, l_gi_light_3, l_gi_light_4
#   l_gi_light_18, l_gi_light_19, l_gi_light_20, l_gi_light_21
#
# ADJUSTABLE TIMING:
#   Mode timer:         180s  (nmfe_timer start_value)
#   Intro video:         43s  (nmfe_intro_video_delay end_value)
#   No-hold penalty:     10s  (nmfe_no_hold_timer start_value)
#   Left diverter hold:   3s  (nmfe_left_diverter_timer end_value)
#   Won video hold:      18s  (nmfe_complete_delay end_value)
#   Lost video:          14s  (nmfe_failed_delay end_value)
#   Drain delay:          5s  (nmfe_drain_delay end_value)
####################################################################################

mode:
  start_events: start_mode_no_margin_for_error
  stop_events:
    - timer_nmfe_complete_delay_complete
    - timer_nmfe_failed_delay_complete
    - nmfe_drain_cleanup_complete
  priority: 600
  game_mode: true
  use_wait_queue: true

mode_settings:
  can_stack_with_multiball: true

####################################################################################
# BALL HOLDS
####################################################################################

ball_holds:
  nmfe_scoop_hold:
    balls_to_hold: 1
    hold_devices: bd_mode_scoop
    enable_events:
      - mode_no_margin_for_error_started
    release_one_events:
      - nmfe_ball_released
    release_all_events:
      - mode_no_margin_for_error_will_stop

####################################################################################
# TIMERS
####################################################################################

timers:

  # Main mode countdown — starts on ball release (NOT mode start, avoids scoop bounce)
  nmfe_timer:
    start_value: 180
    end_value: 0
    direction: down
    tick_interval: 1s
    control_events:
      - event: nmfe_ball_released
        action: start
      - event: nmfe_step_11_complete
        action: stop
      - event: nmfe_failed
        action: stop
      - event: nmfe_drain_detected
        action: stop
      - event: afterburner_extend_nmfe_timer
        action: jump
        value: 9999
      - event: lock_sequence_timer_pause
        action: pause
      - event: lock_sequence_timer_resume
        action: start

  # Intro video — 43 seconds, skippable via both flippers
  nmfe_intro_video_delay:
    start_value: 0
    end_value: 43
    direction: up
    tick_interval: 1s
    control_events:
      - event: mode_no_margin_for_error_started
        action: start
      - event: nmfe_skip_intro
        action: stop

  # Barrier release delay — ensures barrier physically drops before ball arrives
  nmfe_barrier_delay:
    start_value: 0
    end_value: 2
    direction: up
    tick_interval: 1s
    control_events:
      - event: nmfe_ball_released
        action: restart

  # No-hold penalty countdown — 10s, restarts on each additional bad shot
  nmfe_no_hold_timer:
    start_value: 10
    end_value: 0
    direction: down
    tick_interval: 1s
    control_events:
      - event: nmfe_penalty_activate
        action: restart
      - event: nmfe_no_hold_end
        action: stop
      - event: nmfe_cleanup
        action: stop

  # Left orbit diverter hold — 3s, restarts on each step 11 re-shot attempt
  nmfe_left_diverter_timer:
    start_value: 0
    end_value: 3
    direction: up
    tick_interval: 1s
    control_events:
      - event: nmfe_activate_won_catch
        action: restart
      - event: nmfe_preemptive_open_diverter
        action: restart

  # Won video hold — 18s, ball held by left lane post
  nmfe_complete_delay:
    start_value: 0
    end_value: 18
    direction: up
    tick_interval: 1s
    control_events:
      - event: nmfe_won
        action: start

  # Lost video delay — 14s
  nmfe_failed_delay:
    start_value: 0
    end_value: 14
    direction: up
    tick_interval: 1s
    control_events:
      - event: nmfe_failed
        action: start

  # Drain cleanup delay — holds ball_ending queue while lost video plays
  nmfe_drain_delay:
    start_value: 0
    end_value: 5
    direction: up
    tick_interval: 1s
    control_events:
      - event: nmfe_drain_detected
        action: start

  # Servo stagger — fires top_ramp_down 500ms after nmfe_cleanup
  # (right_ramp_down fires immediately on nmfe_cleanup in event_player)
  nmfe_servo_cleanup_delay:
    start_value: 0
    end_value: 1
    direction: up
    tick_interval: 500ms
    control_events:
      - event: nmfe_cleanup
        action: restart

####################################################################################
# QUEUE RELAY PLAYER
####################################################################################

queue_relay_player:
  ball_ending{mode.no_margin_for_error.active==True}:
    post: nmfe_ball_ending_hold
    wait_for: nmfe_drain_cleanup_complete
    priority: 1000


####################################################################################
# VARIABLE PLAYER
####################################################################################

variable_player:

  mode_no_margin_for_error_started:
    pilot_mode_active:
      action: set
      int: 1
    letter_collection_paused:
      action: set
      int: 1
    pilot_missions_played:
      action: add
      int: 1
    mode_no_margin_for_error_played:
      action: set
      int: 1
    missiles_perk_blocked:
      action: set
      int: 0
    bonus_delay_time:
      action: set
      int: 5
    nmfe_step:
      action: set
      int: 0
    nmfe_complete_flag:
      action: set
      int: 0
    nmfe_shots_remaining:
      action: set
      int: 11
    nmfe_no_hold_active:
      action: set
      int: 0
    nmfe_no_hold_timer_ticks:
      action: set
      int: 10
    mode_points_scored:
      action: set
      int: 0

  # Penalty timer display variable — updates every tick for Godot slide
  timer_nmfe_no_hold_timer_tick:
    nmfe_no_hold_timer_ticks:
      action: set
      int: device.timers.nmfe_no_hold_timer.ticks

  # Main mode timer display variable — updates every tick for Godot slide
  timer_nmfe_timer_tick:
    nmfe_timer_ticks:
      action: set
      int: device.timers.nmfe_timer.ticks

  # Track no-hold active state
  nmfe_penalty_activate:
    nmfe_no_hold_active:
      action: set
      int: 1

  nmfe_no_hold_end:
    nmfe_no_hold_active:
      action: set
      int: 0

  # Mark drain pending so qualifier routes bonus correctly
  ball_will_end{mode.no_margin_for_error.active==True}:
    pilot_mode_drain_pending:
      action: set
      int: 1

  # Safety clear of no-hold flag on timer expiry
  timer_nmfe_timer_complete:
    nmfe_no_hold_active:
      action: set
      int: 0

  ##############################################
  ## STEP COMPLETIONS — Direct to score
  ##############################################

  nmfe_step_1_complete:
    nmfe_step:
      action: set
      int: 1
    score:
      action: add
      int: 200000 * current_player.total_scoring_multiplier
    mode_points_scored:
      action: set
      int: 200000 * current_player.total_scoring_multiplier
    nmfe_shots_remaining:
      action: add
      int: -1

  nmfe_step_2_complete:
    nmfe_step:
      action: set
      int: 2
    score:
      action: add
      int: 375000 * current_player.total_scoring_multiplier
    mode_points_scored:
      action: set
      int: 375000 * current_player.total_scoring_multiplier
    nmfe_shots_remaining:
      action: add
      int: -1

  nmfe_step_3_complete:
    nmfe_step:
      action: set
      int: 3
    score:
      action: add
      int: 525000 * current_player.total_scoring_multiplier
    mode_points_scored:
      action: set
      int: 525000 * current_player.total_scoring_multiplier
    nmfe_shots_remaining:
      action: add
      int: -1

  nmfe_step_4_complete:
    nmfe_step:
      action: set
      int: 4
    score:
      action: add
      int: 650000 * current_player.total_scoring_multiplier
    mode_points_scored:
      action: set
      int: 650000 * current_player.total_scoring_multiplier
    nmfe_shots_remaining:
      action: add
      int: -1

  nmfe_step_5_complete:
    nmfe_step:
      action: set
      int: 5
    score:
      action: add
      int: 725000 * current_player.total_scoring_multiplier
    mode_points_scored:
      action: set
      int: 725000 * current_player.total_scoring_multiplier
    nmfe_shots_remaining:
      action: add
      int: -1

  nmfe_step_6_complete:
    nmfe_step:
      action: set
      int: 6
    score:
      action: add
      int: 800000 * current_player.total_scoring_multiplier
    mode_points_scored:
      action: set
      int: 800000 * current_player.total_scoring_multiplier
    nmfe_shots_remaining:
      action: add
      int: -1

  nmfe_step_7_complete:
    nmfe_step:
      action: set
      int: 7
    score:
      action: add
      int: 875000 * current_player.total_scoring_multiplier
    mode_points_scored:
      action: set
      int: 875000 * current_player.total_scoring_multiplier
    nmfe_shots_remaining:
      action: add
      int: -1

  nmfe_step_8_complete:
    nmfe_step:
      action: set
      int: 8
    score:
      action: add
      int: 950000 * current_player.total_scoring_multiplier
    mode_points_scored:
      action: set
      int: 950000 * current_player.total_scoring_multiplier
    nmfe_shots_remaining:
      action: add
      int: -1

  nmfe_step_9_complete:
    nmfe_step:
      action: set
      int: 9
    score:
      action: add
      int: 1025000 * current_player.total_scoring_multiplier
    mode_points_scored:
      action: set
      int: 1025000 * current_player.total_scoring_multiplier
    nmfe_shots_remaining:
      action: add
      int: -1

  nmfe_step_10_complete:
    nmfe_step:
      action: set
      int: 10
    score:
      action: add
      int: 1125000 * current_player.total_scoring_multiplier
    mode_points_scored:
      action: set
      int: 1125000 * current_player.total_scoring_multiplier
    nmfe_shots_remaining:
      action: add
      int: -1

  # Step 11: sets step=11 (won-but-waiting for ball to reach left lane)
  nmfe_step_11_complete:
    nmfe_step:
      action: set
      int: 11
    nmfe_complete_flag:
      action: set
      int: 1
    score:
      action: add
      int: 1250000 * current_player.total_scoring_multiplier
    mode_points_scored:
      action: set
      int: 1250000 * current_player.total_scoring_multiplier
    nmfe_shots_remaining:
      action: add
      int: -1

  # Won confirmed — ball entered left lane while step==11
  nmfe_won:
    pilot_missions_won:
      action: add
      int: 1
    mode_no_margin_for_error_won:
      action: set
      int: 1
    mode_no_margin_for_error_complete:
      action: set
      int: 1
    modes_completed_count:
      action: add
      int: 1
    missiles_perk_saved:
      action: set
      int: current_player.missiles_perk_active
    missiles_perk_active:
      action: set
      int: 0


####################################################################################
# EVENT PLAYER
####################################################################################

event_player:

  ##############################################
  ## MODE START — GI yellow after 200ms settle, raise barrier during intro
  ##############################################
  mode_no_margin_for_error_started:
    - nmfe_set_gi_yellow|200ms
    - barrier_raise

  ##############################################
  ## SKIP INTRO — Both flippers during 43s intro
  ##############################################
  s_flipper_left_active{current_player.nmfe_step==0 and device.timers.nmfe_intro_video_delay.running}:
    - nmfe_check_skip_intro
  s_flipper_right_active{current_player.nmfe_step==0 and device.timers.nmfe_intro_video_delay.running}:
    - nmfe_check_skip_intro

  nmfe_check_skip_intro{device.switches.s_flipper_left.state and device.switches.s_flipper_right.state}:
    - nmfe_skip_intro

  # SKIP PATH — drop barrier first, kick ball 400ms later once barrier is physically down
  nmfe_skip_intro:
    - barrier_drop
    - scoop_ball_release|400ms
    - nmfe_ball_released|400ms
    - nmfe_setup_step_1|400ms

  # NORMAL PATH — drop barrier first, kick ball 400ms later
  timer_nmfe_intro_video_delay_complete:
    - barrier_drop
    - scoop_ball_release|400ms
    - nmfe_ball_released|400ms
    - nmfe_setup_step_1|400ms

  ##############################################
  ## BALL RELEASED — Ensure normal flippers active
  ##############################################
  nmfe_ball_released:
    - disable_no_hold_flippers
    - enable_normal_flippers

  nmfe_ball_released{current_player.afterburner_perk_active==1}:
    - afterburner_extend_nmfe_timer|500ms

  ##############################################
  ## NO-HOLD PENALTY SYSTEM
  ## nmfe_bad_shot fires nmfe_penalty_activate
  ## First activation (no_hold_active==0): swap flippers, show slide, start GI strobe
  ## Subsequent bad shots: timer restarts (variable_player handles this via nmfe_penalty_activate)
  ## Good shot or timer expire: nmfe_no_hold_end restores normal flippers
  ##############################################
  nmfe_bad_shot{current_player.nmfe_complete_flag==0}:
    - nmfe_penalty_activate

  nmfe_penalty_activate{current_player.nmfe_no_hold_active==0}:
    - disable_normal_flippers
    - enable_no_hold_flippers
    - nmfe_show_penalty_slide
    - nmfe_penalty_gi_start

  timer_nmfe_no_hold_timer_complete:
    - nmfe_no_hold_end

  nmfe_good_shot_hit{current_player.nmfe_no_hold_active==1}:
    - nmfe_no_hold_end

  nmfe_no_hold_end:
    - disable_no_hold_flippers
    - enable_normal_flippers

  ##############################################
  ## DRAIN HANDLING
  ##############################################
  nmfe_ball_ending_hold:
    - nmfe_failed
    - nmfe_drain_detected

  timer_nmfe_drain_delay_complete:
    - nmfe_drain_cleanup_complete
    - nmfe_cleanup

  ##############################################
  ## TIMER EXPIRED
  ##############################################
  timer_nmfe_timer_complete:
    - nmfe_failed

  ##############################################
  ## MODE WON — Ball enters left lane at step==11
  ## NOTE: nmfe_cleanup is NOT on nmfe_won — would kill won video same tick
  ## Cleanup fires AFTER 18s won video via timer_nmfe_complete_delay_complete
  ##############################################
  nmfe_won:
    - timer_nmfe_complete_delay_start
    - missiles_perk_unload
    - right_ramp_down

  timer_nmfe_complete_delay_complete:
    - nmfe_cleanup
    - pilot_mode_cleanup_complete

  ##############################################
  ## MODE FAILED
  ##############################################
  nmfe_failed:
    - nmfe_cleanup
    - timer_nmfe_failed_delay_start

  timer_nmfe_failed_delay_complete:
    - pilot_mode_cleanup_complete

  ##############################################
  ## STEP 11 WON-BUT-WAITING SEQUENCE
  ## Good shot at step==10: score, open diverter+post, wait for ball in left lane
  ## s_lane_left at step==11 confirms won, starts video timer
  ## Player re-shoots SP/TL/RO to retry until ball physically enters left lane
  ##############################################

  # Pre-emptive diverter open when right orbit switch fires at step==10
  # (ball already in orbit heading left, need diverter open before it arrives)
  s_orbit_right_active{current_player.nmfe_step==10}:
    - nmfe_preemptive_open_diverter

  # Same pre-emptive for re-shot attempts at step==11
  s_orbit_right_active{current_player.nmfe_step==11}:
    - nmfe_preemptive_open_diverter

  # Step 11 shot confirmed — opens diverter AND raises left lane post
  nmfe_step_11_complete:
    - nmfe_good_shot_hit
    - nmfe_step_11_shot_hit
    - nmfe_activate_won_catch

  # Diverter closes after 3s (timer fires nmfe_close_left_diverter)
  timer_nmfe_left_diverter_timer_complete:
    - nmfe_close_left_diverter

  # Ball confirmed in left lane — won video starts
  s_lane_left_active{current_player.nmfe_step==11}:
    - nmfe_won

  # Re-shots while waiting for ball: reopen diverter without scoring again
  spinner_shot_made{current_player.nmfe_step==11 and not device.timers.spinner_shot_lockout.running}:
    - nmfe_activate_won_catch
  s_orbit_upper_active{current_player.nmfe_step==11}:
    - nmfe_activate_won_catch
  right_orbit_shot_hit{current_player.nmfe_step==11}:
    - nmfe_activate_won_catch

  ##############################################
  ## CLEANUP — Ramps down, flippers restored, coils off
  ## Servo stagger: right_ramp_down fires immediately on nmfe_cleanup
  ##               top_ramp_down fires 500ms later via nmfe_servo_cleanup_delay timer
  ##############################################
  nmfe_cleanup:
    - right_ramp_down
    - enable_normal_flippers
    - disable_no_hold_flippers
    - nmfe_close_left_diverter

  timer_nmfe_servo_cleanup_delay_complete:
    - top_ramp_down

  ##############################################
  ## SERVO EVENTS — Individual step ramp changes
  ##############################################
  nmfe_setup_step_8:
    - top_ramp_up

  nmfe_setup_step_9:
    - top_ramp_down

  nmfe_setup_step_11:
    - right_ramp_up

  ##############################################
  ## STEP 1 — ALL SHOTS LIT
  ## Good shots: LL, LO, LR, SP, CNT, TWR, TL, TO, TR, RO, RR
  ##############################################
  s_lane_left_active{current_player.nmfe_step==0}:
    - nmfe_step_1_complete
    - nmfe_good_shot_hit
    - nmfe_step_1_shot_hit
    - nmfe_setup_step_2
  left_orbit_shot_hit{current_player.nmfe_step==0}:
    - nmfe_step_1_complete
    - nmfe_good_shot_hit
    - nmfe_step_1_shot_hit
    - nmfe_setup_step_2
  s_ramp_left_exit_active{current_player.nmfe_step==0}:
    - nmfe_step_1_complete
    - nmfe_good_shot_hit
    - nmfe_step_1_shot_hit
    - nmfe_setup_step_2
  spinner_shot_made{current_player.nmfe_step==0 and not device.timers.spinner_shot_lockout.running}:
    - nmfe_step_1_complete
    - nmfe_good_shot_hit
    - nmfe_step_1_shot_hit
    - nmfe_setup_step_2
  s_barrier_target_active{current_player.nmfe_step==0}:
    - nmfe_step_1_complete
    - nmfe_good_shot_hit
    - nmfe_step_1_shot_hit
    - nmfe_setup_step_2
  s_ramp_tower_exit_active{current_player.nmfe_step==0}:
    - nmfe_step_1_complete
    - nmfe_good_shot_hit
    - nmfe_step_1_shot_hit
    - nmfe_setup_step_2
  s_orbit_upper_active{current_player.nmfe_step==0}:
    - nmfe_step_1_complete
    - nmfe_good_shot_hit
    - nmfe_step_1_shot_hit
    - nmfe_setup_step_2
  s_orbit_lower_active{current_player.nmfe_step==0}:
    - nmfe_step_1_complete
    - nmfe_good_shot_hit
    - nmfe_step_1_shot_hit
    - nmfe_setup_step_2
  s_ramp_inner_exit_active{current_player.nmfe_step==0}:
    - nmfe_step_1_complete
    - nmfe_good_shot_hit
    - nmfe_step_1_shot_hit
    - nmfe_setup_step_2
  right_orbit_shot_hit{current_player.nmfe_step==0}:
    - nmfe_step_1_complete
    - nmfe_good_shot_hit
    - nmfe_step_1_shot_hit
    - nmfe_setup_step_2
  s_ramp_right_exit_active{current_player.nmfe_step==0}:
    - nmfe_step_1_complete
    - nmfe_good_shot_hit
    - nmfe_step_1_shot_hit
    - nmfe_setup_step_2

  ##############################################
  ## STEP 2 — LL bad; LO LR SP CNT TWR TL TR RR lit
  ##############################################
  left_orbit_shot_hit{current_player.nmfe_step==1}:
    - nmfe_step_2_complete
    - nmfe_good_shot_hit
    - nmfe_step_2_shot_hit
    - nmfe_setup_step_3
  s_ramp_left_exit_active{current_player.nmfe_step==1}:
    - nmfe_step_2_complete
    - nmfe_good_shot_hit
    - nmfe_step_2_shot_hit
    - nmfe_setup_step_3
  spinner_shot_made{current_player.nmfe_step==1 and not device.timers.spinner_shot_lockout.running}:
    - nmfe_step_2_complete
    - nmfe_good_shot_hit
    - nmfe_step_2_shot_hit
    - nmfe_setup_step_3
  s_barrier_target_active{current_player.nmfe_step==1}:
    - nmfe_step_2_complete
    - nmfe_good_shot_hit
    - nmfe_step_2_shot_hit
    - nmfe_setup_step_3
  s_ramp_tower_exit_active{current_player.nmfe_step==1}:
    - nmfe_step_2_complete
    - nmfe_good_shot_hit
    - nmfe_step_2_shot_hit
    - nmfe_setup_step_3
  s_orbit_upper_active{current_player.nmfe_step==1}:
    - nmfe_step_2_complete
    - nmfe_good_shot_hit
    - nmfe_step_2_shot_hit
    - nmfe_setup_step_3
  s_ramp_inner_exit_active{current_player.nmfe_step==1}:
    - nmfe_step_2_complete
    - nmfe_good_shot_hit
    - nmfe_step_2_shot_hit
    - nmfe_setup_step_3
  s_ramp_right_exit_active{current_player.nmfe_step==1}:
    - nmfe_step_2_complete
    - nmfe_good_shot_hit
    - nmfe_step_2_shot_hit
    - nmfe_setup_step_3
  # BAD
  s_lane_left_active{current_player.nmfe_step==1}:
    - nmfe_bad_shot

  ##############################################
  ## STEP 3 — LL LO bad; LR SP CNT TWR TL TR RR lit
  ##############################################
