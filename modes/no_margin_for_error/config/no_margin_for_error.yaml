####################################################################################
# SHOW PLAYER
####################################################################################
# Shot lights: Yellow flash (sync_flash_mode) for lit shots, solid red for bad shots
# At each step setup ALL previous shows are explicitly stopped then new ones started.
# This clean-slate approach handles shots going bad then good again (e.g. LO at step 7)
#
# Show keys used:
#   nmfe_y_ll, nmfe_y_lo, nmfe_y_lr, nmfe_y_sp, nmfe_y_cnt, nmfe_y_twr
#   nmfe_y_tl, nmfe_y_to_tr, nmfe_y_ro_rr
#   nmfe_r_ll, nmfe_r_lo, nmfe_r_lr, nmfe_r_sp, nmfe_r_cnt, nmfe_r_twr
#   nmfe_r_tl, nmfe_r_to_tr, nmfe_r_ro_rr
####################################################################################

show_player:

  ##############################################
  ## SHOT FEEDBACK SHOWS
  ##############################################
  nmfe_good_shot_hit:
    nmfe_made_show:
      show: no_margin_for_error_made
      speed: 30
      loops: 0

  nmfe_bad_shot:
    nmfe_miss_show:
      show: no_margin_for_error_miss
      speed: 30
      loops: 0

  ##############################################
  ## GI — Yellow at mode start
  ##############################################
  nmfe_set_gi_yellow:
    nmfe_gi_mode:
      show: nmfe_gi_yellow
      key: nmfe_gi_mode
      loops: -1

  ##############################################
  ## PENALTY GI STROBE — Red flash on penalty lights
  ##############################################
  nmfe_penalty_gi_start:
    nmfe_penalty_gi:
      show: nmfe_gi_penalty_strobe
      key: nmfe_penalty_gi_effect
      loops: -1

  nmfe_no_hold_end:
    stop_penalty_gi:
      show: nmfe_gi_penalty_strobe
      action: stop
      key: nmfe_penalty_gi_effect
    restore_gi_yellow:
      show: nmfe_gi_yellow
      key: nmfe_gi_mode
      loops: -1

  ##############################################
  ## STEP 1 SETUP — All 9 shots yellow flash
  ##############################################
  nmfe_setup_step_1:
    nmfe_y_ll:
      show: sync_flash_mode
      key: nmfe_y_ll
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_left_lane, color: FFFF00 }
    nmfe_y_lo:
      show: sync_flash_mode
      key: nmfe_y_lo
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_left_orbit, color: FFFF00 }
    nmfe_y_lr:
      show: sync_flash_mode
      key: nmfe_y_lr
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_left_ramp, color: FFFF00 }
    nmfe_y_sp:
      show: sync_flash_mode
      key: nmfe_y_sp
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_spinner, color: FFFF00 }
    nmfe_y_cnt:
      show: sync_flash_mode
      key: nmfe_y_cnt
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_barrier, color: FFFF00 }
    nmfe_y_twr:
      show: sync_flash_mode
      key: nmfe_y_twr
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_tower_ramp, color: FFFF00 }
    nmfe_y_tl:
      show: sync_flash_mode
      key: nmfe_y_tl
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_upper_orbit, color: FFFF00 }
    nmfe_y_to_tr:
      show: sync_flash_mode
      key: nmfe_y_to_tr
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_middle_ramp, color: FFFF00 }
    nmfe_y_ro_rr:
      show: sync_flash_mode
      key: nmfe_y_ro_rr
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_right_orbit, color: FFFF00 }

  ##############################################
  ## STEP 2 SETUP — LL goes red; rest stays yellow
  ##############################################
  nmfe_setup_step_2:
    stop_y_ll:
      show: sync_flash_mode
      action: stop
      key: nmfe_y_ll
    nmfe_r_ll:
      show: nmfe_solid_red
      key: nmfe_r_ll
      loops: -1
      show_tokens: { led: l_shot_left_lane }

  ##############################################
  ## STEP 3 SETUP — LO goes red (LL already red)
  ##############################################
  nmfe_setup_step_3:
    stop_y_lo:
      show: sync_flash_mode
      action: stop
      key: nmfe_y_lo
    nmfe_r_lo:
      show: nmfe_solid_red
      key: nmfe_r_lo
      loops: -1
      show_tokens: { led: l_shot_left_orbit }

  ##############################################
  ## STEP 4 SETUP — RO/RR goes red (LL, LO already red)
  ##############################################
  nmfe_setup_step_4:
    stop_y_ro_rr:
      show: sync_flash_mode
      action: stop
      key: nmfe_y_ro_rr
    nmfe_r_ro_rr:
      show: nmfe_solid_red
      key: nmfe_r_ro_rr
      loops: -1
      show_tokens: { led: l_shot_right_orbit }

  ##############################################
  ## STEP 5 SETUP — CNT goes red (LL, LO, RO/RR already red)
  ##############################################
  nmfe_setup_step_5:
    stop_y_cnt:
      show: sync_flash_mode
      action: stop
      key: nmfe_y_cnt
    nmfe_r_cnt:
      show: nmfe_solid_red
      key: nmfe_r_cnt
      loops: -1
      show_tokens: { led: l_shot_barrier }

  ##############################################
  ## STEP 6 SETUP — TWR goes red (LL, LO, CNT, RO/RR already red)
  ##############################################
  nmfe_setup_step_6:
    stop_y_twr:
      show: sync_flash_mode
      action: stop
      key: nmfe_y_twr
    nmfe_r_twr:
      show: nmfe_solid_red
      key: nmfe_r_twr
      loops: -1
      show_tokens: { led: l_shot_tower_ramp }

  ##############################################
  ## STEP 7 SETUP — LR, SP, LO lit; rest bad
  ## CLEAN SLATE: LO was red (steps 3-6), now comes back yellow
  ## TL and TO/TR were yellow, now go red
  ##############################################
  nmfe_setup_step_7:
    # Stop any yellow shows still running (LR, SP, TL, TO/TR)
    stop_y_lr_s7:
      show: sync_flash_mode
      action: stop
      key: nmfe_y_lr
    stop_y_sp_s7:
      show: sync_flash_mode
      action: stop
      key: nmfe_y_sp
    stop_y_tl_s7:
      show: sync_flash_mode
      action: stop
      key: nmfe_y_tl
    stop_y_to_tr_s7:
      show: sync_flash_mode
      action: stop
      key: nmfe_y_to_tr
    # Stop LO red show (it's coming back as a lit shot)
    stop_r_lo_s7:
      show: nmfe_solid_red
      action: stop
      key: nmfe_r_lo
    # Start new yellow shows for LR, SP, LO
    nmfe_y_lr_s7:
      show: sync_flash_mode
      key: nmfe_y_lr
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_left_ramp, color: FFFF00 }
    nmfe_y_sp_s7:
      show: sync_flash_mode
      key: nmfe_y_sp
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_spinner, color: FFFF00 }
    nmfe_y_lo_s7:
      show: sync_flash_mode
      key: nmfe_y_lo
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_left_orbit, color: FFFF00 }
    # TL and TO/TR go red
    nmfe_r_tl_s7:
      show: nmfe_solid_red
      key: nmfe_r_tl
      loops: -1
      show_tokens: { led: l_shot_upper_orbit }
    nmfe_r_to_tr_s7:
      show: nmfe_solid_red
      key: nmfe_r_to_tr
      loops: -1
      show_tokens: { led: l_shot_middle_ramp }

  ##############################################
  ## STEP 8 SETUP — TWR TL TO RR lit; TOP RAMP UP
  ## CLEAN SLATE: Many shots changing state
  ## LR, SP, LO were yellow — all go red
  ## TWR, TL, RO/RR were red — TWR, TL go yellow
  ## TO/TR: TO (s_orbit_lower) goes yellow; RR (s_ramp_right_exit) uses RO/RR light yellow
  ##############################################
  nmfe_setup_step_8:
    # Stop yellow shows from step 7
    stop_y_lr_s8:
      show: sync_flash_mode
      action: stop
      key: nmfe_y_lr
    stop_y_sp_s8:
      show: sync_flash_mode
      action: stop
      key: nmfe_y_sp
    stop_y_lo_s8:
      show: sync_flash_mode
      action: stop
      key: nmfe_y_lo
    # Stop red shows that are now lit
    stop_r_twr_s8:
      show: nmfe_solid_red
      action: stop
      key: nmfe_r_twr
    stop_r_tl_s8:
      show: nmfe_solid_red
      action: stop
      key: nmfe_r_tl
    stop_r_to_tr_s8:
      show: nmfe_solid_red
      action: stop
      key: nmfe_r_to_tr
    stop_r_ro_rr_s8:
      show: nmfe_solid_red
      action: stop
      key: nmfe_r_ro_rr
    # Start yellow for lit shots
    nmfe_y_twr_s8:
      show: sync_flash_mode
      key: nmfe_y_twr
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_tower_ramp, color: FFFF00 }
    nmfe_y_tl_s8:
      show: sync_flash_mode
      key: nmfe_y_tl
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_upper_orbit, color: FFFF00 }
    nmfe_y_to_tr_s8:
      show: sync_flash_mode
      key: nmfe_y_to_tr
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_middle_ramp, color: FFFF00 }
    nmfe_y_ro_rr_s8:
      show: sync_flash_mode
      key: nmfe_y_ro_rr
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_right_orbit, color: FFFF00 }
    # Red shots: LL, LO, LR, SP, CNT
    nmfe_r_lr_s8:
      show: nmfe_solid_red
      key: nmfe_r_lr
      loops: -1
      show_tokens: { led: l_shot_left_ramp }
    nmfe_r_sp_s8:
      show: nmfe_solid_red
      key: nmfe_r_sp
      loops: -1
      show_tokens: { led: l_shot_spinner }
    nmfe_r_lo_s8:
      show: nmfe_solid_red
      key: nmfe_r_lo
      loops: -1
      show_tokens: { led: l_shot_left_orbit }

  ##############################################
  ## STEP 9 SETUP — SP CNT TWR lit; TOP RAMP DOWN
  ## CLEAN SLATE
  ## SP, CNT, TWR were all red — go yellow
  ## TL, TO/TR, RO/RR were yellow — go red
  ## LR, LO, LL stay red
  ##############################################
  nmfe_setup_step_9:
    # Stop yellow shows
    stop_y_twr_s9:
      show: sync_flash_mode
      action: stop
      key: nmfe_y_twr
    stop_y_tl_s9:
      show: sync_flash_mode
      action: stop
      key: nmfe_y_tl
    stop_y_to_tr_s9:
      show: sync_flash_mode
      action: stop
      key: nmfe_y_to_tr
    stop_y_ro_rr_s9:
      show: sync_flash_mode
      action: stop
      key: nmfe_y_ro_rr
    # Stop red shows for newly lit shots
    stop_r_sp_s9:
      show: nmfe_solid_red
      action: stop
      key: nmfe_r_sp
    stop_r_cnt_s9:
      show: nmfe_solid_red
      action: stop
      key: nmfe_r_cnt
    # TWR was yellow — stop yellow, it will restart below
    # (Note: nmfe_r_twr was stopped at step 8 setup; nmfe_y_twr is running)
    # Start yellow for SP, CNT, TWR
    nmfe_y_sp_s9:
      show: sync_flash_mode
      key: nmfe_y_sp
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_spinner, color: FFFF00 }
    nmfe_y_cnt_s9:
      show: sync_flash_mode
      key: nmfe_y_cnt
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_barrier, color: FFFF00 }
    # TWR already yellow (started in step 8 setup), no restart needed
    # Red shots: TL, TO/TR, RO/RR (LL, LO, LR already red)
    nmfe_r_tl_s9:
      show: nmfe_solid_red
      key: nmfe_r_tl
      loops: -1
      show_tokens: { led: l_shot_upper_orbit }
    nmfe_r_to_tr_s9:
      show: nmfe_solid_red
      key: nmfe_r_to_tr
      loops: -1
      show_tokens: { led: l_shot_middle_ramp }
    nmfe_r_ro_rr_s9:
      show: nmfe_solid_red
      key: nmfe_r_ro_rr
      loops: -1
      show_tokens: { led: l_shot_right_orbit }

  ##############################################
  ## STEP 10 SETUP — LO LR lit only; rest bad
  ## CLEAN SLATE
  ## LO, LR were red — go yellow
  ## SP, CNT, TWR were yellow — go red
  ##############################################
  nmfe_setup_step_10:
    # Stop yellow shows
    stop_y_sp_s10:
      show: sync_flash_mode
      action: stop
      key: nmfe_y_sp
    stop_y_cnt_s10:
      show: sync_flash_mode
      action: stop
      key: nmfe_y_cnt
    stop_y_twr_s10:
      show: sync_flash_mode
      action: stop
      key: nmfe_y_twr
    # Stop red shows for newly lit shots
    stop_r_lo_s10:
      show: nmfe_solid_red
      action: stop
      key: nmfe_r_lo
    stop_r_lr_s10:
      show: nmfe_solid_red
      action: stop
      key: nmfe_r_lr
    # Start yellow for LO, LR
    nmfe_y_lo_s10:
      show: sync_flash_mode
      key: nmfe_y_lo
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_left_orbit, color: FFFF00 }
    nmfe_y_lr_s10:
      show: sync_flash_mode
      key: nmfe_y_lr
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_left_ramp, color: FFFF00 }
    # Red shots: SP, CNT, TWR (LL already red; TL, TO/TR, RO/RR already red)
    nmfe_r_sp_s10:
      show: nmfe_solid_red
      key: nmfe_r_sp
      loops: -1
      show_tokens: { led: l_shot_spinner }
    nmfe_r_cnt_s10:
      show: nmfe_solid_red
      key: nmfe_r_cnt
      loops: -1
      show_tokens: { led: l_shot_barrier }
    nmfe_r_twr_s10:
      show: nmfe_solid_red
      key: nmfe_r_twr
      loops: -1
      show_tokens: { led: l_shot_tower_ramp }

  ##############################################
  ## STEP 11 SETUP — SP TL RO lit; RIGHT RAMP UP; rest bad
  ## CLEAN SLATE
  ## SP, TL were red — go yellow; RO/RR light — RO is lit so yellow
  ## LO, LR were yellow — go red
  ##############################################
  nmfe_setup_step_11:
    # Stop yellow shows
    stop_y_lo_s11:
      show: sync_flash_mode
      action: stop
      key: nmfe_y_lo
    stop_y_lr_s11:
      show: sync_flash_mode
      action: stop
      key: nmfe_y_lr
    # Stop red shows for newly lit shots
    stop_r_sp_s11:
      show: nmfe_solid_red
      action: stop
      key: nmfe_r_sp
    stop_r_tl_s11:
      show: nmfe_solid_red
      action: stop
      key: nmfe_r_tl
    stop_r_ro_rr_s11:
      show: nmfe_solid_red
      action: stop
      key: nmfe_r_ro_rr
    # Start yellow for SP, TL, RO (l_shot_right_orbit)
    nmfe_y_sp_s11:
      show: sync_flash_mode
      key: nmfe_y_sp
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_spinner, color: FFFF00 }
    nmfe_y_tl_s11:
      show: sync_flash_mode
      key: nmfe_y_tl
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_upper_orbit, color: FFFF00 }
    nmfe_y_ro_s11:
      show: sync_flash_mode
      key: nmfe_y_ro_rr
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_right_orbit, color: FFFF00 }
    # LL lights up to indicate left lane is now the target
    nmfe_y_ll_s11:
      show: sync_flash_mode
      key: nmfe_y_ll
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_left_lane, color: FFFF00 }
    # Red shots: LO, LR, CNT, TWR, TO/TR (LL already lit yellow above)
    nmfe_r_lo_s11:
      show: nmfe_solid_red
      key: nmfe_r_lo
      loops: -1
      show_tokens: { led: l_shot_left_orbit }
    nmfe_r_lr_s11:
      show: nmfe_solid_red
      key: nmfe_r_lr
      loops: -1
      show_tokens: { led: l_shot_left_ramp }

  ##############################################
  ## CLEANUP — Stop all shot shows
  ##############################################
  nmfe_cleanup:
    stop_all_y_ll:
      show: sync_flash_mode
      action: stop
      key: nmfe_y_ll
    stop_all_y_lo:
      show: sync_flash_mode
      action: stop
      key: nmfe_y_lo
    stop_all_y_lr:
      show: sync_flash_mode
      action: stop
      key: nmfe_y_lr
    stop_all_y_sp:
      show: sync_flash_mode
      action: stop
      key: nmfe_y_sp
    stop_all_y_cnt:
      show: sync_flash_mode
      action: stop
      key: nmfe_y_cnt
    stop_all_y_twr:
      show: sync_flash_mode
      action: stop
      key: nmfe_y_twr
    stop_all_y_tl:
      show: sync_flash_mode
      action: stop
      key: nmfe_y_tl
    stop_all_y_to_tr:
      show: sync_flash_mode
      action: stop
      key: nmfe_y_to_tr
    stop_all_y_ro_rr:
      show: sync_flash_mode
      action: stop
      key: nmfe_y_ro_rr
    stop_all_r_ll:
      show: nmfe_solid_red
      action: stop
      key: nmfe_r_ll
    stop_all_r_lo:
      show: nmfe_solid_red
      action: stop
      key: nmfe_r_lo
    stop_all_r_lr:
      show: nmfe_solid_red
      action: stop
      key: nmfe_r_lr
    stop_all_r_sp:
      show: nmfe_solid_red
      action: stop
      key: nmfe_r_sp
    stop_all_r_cnt:
      show: nmfe_solid_red
      action: stop
      key: nmfe_r_cnt
    stop_all_r_twr:
      show: nmfe_solid_red
      action: stop
      key: nmfe_r_twr
    stop_all_r_tl:
      show: nmfe_solid_red
      action: stop
      key: nmfe_r_tl
    stop_all_r_to_tr:
      show: nmfe_solid_red
      action: stop
      key: nmfe_r_to_tr
    stop_all_r_ro_rr:
      show: nmfe_solid_red
      action: stop
      key: nmfe_r_ro_rr
    stop_gi_mode:
      show: nmfe_gi_yellow
      action: stop
      key: nmfe_gi_mode
    stop_gi_penalty:
      show: nmfe_gi_penalty_strobe
      action: stop
      key: nmfe_penalty_gi_effect


####################################################################################
# SOUND PLAYER — Voice callouts only (music handled in base.yaml)
####################################################################################

sound_player:
  nmfe_ball_released:
    no_margin_for_error_intro_callout:
      bus: voice
      loops: 0

####################################################################################
# SHOWS
# GI lights are type: grb — using hex codes per MPF bug workaround (same as battle_jester)
# FFFF00 = yellow (works on both rgb and grb since both R and G channels are FF)
# FF0000 = red (following battle_jester pattern for grb lights)
####################################################################################

shows:

  ##############################################
  ## FLASH YELLOW — Lit shot indicator (synced)
  ## Uses sync_flash_mode from base config (referenced via show_player)
  ##############################################

  ##############################################
  ## SOLID RED — Bad shot indicator
  ##############################################
  nmfe_solid_red:
    - duration: 1s
      lights:
        (led):
          color: FF0000

  ##############################################
  ## GI YELLOW — Mode GI color (all GI lights)
  ##############################################
  nmfe_gi_yellow:
    - duration: 1s
      lights:
        l_gi_light_1:
          color: FFFF00
        l_gi_light_2:
          color: FFFF00
        l_gi_light_3:
          color: FFFF00
        l_gi_light_4:
          color: FFFF00
        l_gi_light_5:
          color: FFFF00
        l_gi_light_6:
          color: FFFF00
        l_gi_light_7:
          color: FFFF00
        l_gi_light_8:
          color: FFFF00
        l_gi_light_9:
          color: FFFF00
        l_gi_light_10:
          color: FFFF00
        l_gi_light_11:
          color: FFFF00
        l_gi_light_12:
          color: FFFF00
        l_gi_light_13:
          color: FFFF00
        l_gi_light_14:
          color: FFFF00
        l_gi_light_15:
          color: FFFF00
        l_gi_light_16:
          color: FFFF00
        l_gi_light_17:
          color: FFFF00
        l_gi_light_18:
          color: FFFF00
        l_gi_light_19:
          color: FFFF00
        l_gi_light_20:
          color: FFFF00
        l_gi_light_21:
          color: FFFF00
        l_apron_light_1:
          color: FFFF00
        l_apron_light_2:
          color: FFFF00
        l_apron_light_3:
          color: FFFF00
        l_apron_light_4:
          color: FFFF00

  ##############################################
  ## GI PENALTY STROBE — Red fade in/out, never fully off, slow pulse
  ## Fades between dim red (20%) and full red over 200ms each direction
  ## loops: -1 in show_player keeps it running until nmfe_no_hold_end stops it
  ##############################################
  nmfe_gi_penalty_strobe:
    - duration: 200ms
      lights:
        l_gi_light_1:
          color: FF0000
          fade: 200ms
        l_gi_light_2:
          color: FF0000
          fade: 200ms
        l_gi_light_3:
          color: FF0000
          fade: 200ms
        l_gi_light_4:
          color: FF0000
          fade: 200ms
        l_gi_light_18:
          color: FF0000
          fade: 200ms
        l_gi_light_19:
          color: FF0000
          fade: 200ms
        l_gi_light_20:
          color: FF0000
          fade: 200ms
        l_gi_light_21:
          color: FF0000
          fade: 200ms
    - duration: 200ms
      lights:
        l_gi_light_1:
          color: 330000
          fade: 200ms
        l_gi_light_2:
          color: 330000
          fade: 200ms
        l_gi_light_3:
          color: 330000
          fade: 200ms
        l_gi_light_4:
          color: 330000
          fade: 200ms
        l_gi_light_18:
          color: 330000
          fade: 200ms
        l_gi_light_19:
          color: 330000
          fade: 200ms
        l_gi_light_20:
          color: 330000
          fade: 200ms
        l_gi_light_21:
          color: 330000
          fade: 200ms