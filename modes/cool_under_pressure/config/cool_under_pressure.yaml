      action: set
      int: 0

  # ─── CONDITIONAL SCORING: Step 1 (200K base × crystals) ──────────────────────
  cup_step_1_score{current_player.cup_crystals==3}:
    score:
      action: add
      int: 600000 * current_player.total_scoring_multiplier
