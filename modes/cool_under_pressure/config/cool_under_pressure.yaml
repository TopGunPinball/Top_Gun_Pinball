####################################################################################
# Good shots: handled by show_player (sync_flash_mode, 00AAFF vivid ice blue)
# Bad shots:  FF0000 solid red | Unlit shots: off
# LL (l_shot_left_lane) and 2X (l_shot_pilot_gear) never used — left off.
# TO and TR share l_shot_middle_ramp. RO and RR share l_shot_right_orbit.

