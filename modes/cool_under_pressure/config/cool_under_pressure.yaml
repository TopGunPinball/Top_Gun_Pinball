####################################################################################
# EVENT PLAYER
####################################################################################

event_player:

  # ─── INTRO SKIP (BOTH FLIPPERS) ──────────────────────────────────────────────
  # Works during BOTH the intro video AND the voice callout delay
  s_flipper_left_active{current_player.cup_step==0 and (device.timers.cup_intro_video_delay.running or device.timers.cup_voice_callout_delay.running)}:
    - cup_check_skip_intro
  s_flipper_right_active{current_player.cup_step==0 and (device.timers.cup_intro_video_delay.running or device.timers.cup_voice_callout_delay.running)}:
    - cup_check_skip_intro
  cup_check_skip_intro{device.switches.s_flipper_left.state and device.switches.s_flipper_right.state}:
    - cup_skip_intro

  # Raise barrier on mode start (ball held in scoop during intro)
  # scoop_ball_release (fired on skip/complete) handles the drop before eject
  mode_cool_under_pressure_started:
    - barrier_raise

  # Intro complete → voice callout plays (timer auto-starts via control_events)
  # No ball release here — that happens after the callout timer completes.
  # (slide swap handled in slide_player, sound in sound_player)

  # Callout complete → release ball and start gameplay
  timer_cup_voice_callout_delay_complete:
    - scoop_ball_release
    - cup_ball_released|400ms
    - cup_setup_step_1|400ms

  # Skip path (both flippers during intro OR callout) → release immediately
  # cup_skip_intro stops both timers via their control_events
  cup_skip_intro:
    - scoop_ball_release
    - cup_ball_released|400ms
    - cup_setup_step_1|400ms

  # ─── AFTERBURNER PERK ────────────────────────────────────────────────────────
  # 500ms delay ensures shot timer has already started before jump to 9999
  cup_ball_released{current_player.afterburner_perk_active==1}:
    - afterburner_extend_cup_shot_timer|500ms

  # ─── STEP SETUP — TIMER + SERVOS (combined, no duplicate keys) ───────────────
  # Steps 1-3: no servo changes needed
  cup_setup_step_1:
    - cup_start_shot_timer_30

  cup_setup_step_2:
    - cup_start_shot_timer_30

  cup_setup_step_3:
    - cup_start_shot_timer_30

  # Step 4: top ramp UP first, right ramp UP 500ms later (staggered)
  cup_setup_step_4:
    - cup_start_shot_timer_25
    - top_ramp_up
    - right_ramp_up|500ms

  # Step 5: lower top ramp (right ramp stays UP from step 4)
  cup_setup_step_5:
    - cup_start_shot_timer_25
    - top_ramp_down

  # Step 6: top ramp UP first, lower right ramp 500ms later
  cup_setup_step_6:
    - cup_start_shot_timer_40
    - top_ramp_up
    - right_ramp_down|500ms

  # Step 7: lower top ramp
  cup_setup_step_7:
    - cup_start_shot_timer_30
    - top_ramp_down

  # Step 8: drop barrier to expose scoop
  cup_setup_step_8:
    - cup_start_shot_timer_25
    - barrier_drop

  # ─── STEP PROGRESSION (good shot made → score → next setup) ──────────────────
  # NOTE: cup_stop_step_lights clears all shot lights before next step activates.
  # Step videos play as brief overlays (slide_player handles them).
  # Setup delay is longer on servo steps (700ms) to avoid motor overlap on crystal relight.
  cup_step_1_complete:
    - shaker_soft
    - cup_step_1_score
    - cup_show_step_1_points
    - cup_stop_step_lights
    - cup_play_step_1_video
    - cup_setup_step_2|200ms

  cup_step_2_complete:
    - shaker_soft
    - cup_step_2_score
    - cup_show_step_2_points
    - cup_stop_step_lights
    - cup_play_step_2_video
    - cup_setup_step_3|200ms

  cup_step_3_complete:
    - shaker_soft
    - cup_step_3_score
    - cup_show_step_3_points
    - cup_stop_step_lights
    - cup_play_step_3_video
    - cup_setup_step_4|700ms

  cup_step_4_complete:
    - shaker_soft
    - cup_step_4_score
    - cup_show_step_4_points
    - cup_stop_step_lights
    - cup_play_step_4_video
    - cup_setup_step_5|700ms

  cup_step_5_complete:
    - shaker_soft
    - cup_step_5_score
    - cup_show_step_5_points
    - cup_stop_step_lights
    - cup_play_step_5_video
    - cup_setup_step_6|700ms

  cup_step_6_complete:
    - shaker_soft
    - cup_step_6_score
    - cup_show_step_6_points
    - cup_stop_step_lights
    - cup_play_step_6_video
    - cup_setup_step_7|700ms

  cup_step_7_complete:
    - shaker_soft
    - cup_step_7_score
    - cup_show_step_7_points
    - cup_stop_step_lights
    - cup_play_step_7_video
    - cup_setup_step_8|700ms

  # Step 8: score, clear lights, trigger victory (no next setup)
  cup_step_8_complete:
    - shaker_soft
    - cup_step_8_score
    - cup_show_step_8_points
    - cup_stop_step_lights
    - cup_complete

  # ─── GOOD SHOT DETECTION ─────────────────────────────────────────────────────
  # Step 1: LR, LO, Spinner
  s_ramp_left_exit_active{current_player.cup_step==1 and device.timers.cup_step_complete_lockout.running==False}:
    - cup_left_shot_hit
    - cup_step_1_complete
  left_orbit_shot_hit{current_player.cup_step==1 and device.timers.cup_step_complete_lockout.running==False}:
    - cup_left_shot_hit
    - cup_step_1_complete
  spinner_shot_made{current_player.cup_step==1 and device.timers.cup_spinner_lockout.running==False and device.timers.cup_step_complete_lockout.running==False}:
    - cup_center_shot_hit
    - cup_step_1_complete

  # Step 2: TWR, RR, TR
  s_ramp_tower_exit_active{current_player.cup_step==2 and device.timers.cup_step_complete_lockout.running==False}:
    - cup_center_shot_hit
    - cup_step_2_complete
  s_ramp_right_exit_active{current_player.cup_step==2 and device.timers.cup_step_complete_lockout.running==False}:
    - cup_right_shot_hit
    - cup_step_2_complete
  s_ramp_inner_exit_active{current_player.cup_step==2 and device.timers.cup_step_complete_lockout.running==False}:
    - cup_right_shot_hit
    - cup_step_2_complete

  # Step 3: Spinner, TWR
  spinner_shot_made{current_player.cup_step==3 and device.timers.cup_spinner_lockout.running==False and device.timers.cup_step_complete_lockout.running==False}:
    - cup_center_shot_hit
    - cup_step_3_complete
  s_ramp_tower_exit_active{current_player.cup_step==3 and device.timers.cup_step_complete_lockout.running==False}:
    - cup_center_shot_hit
    - cup_step_3_complete

  # Step 4: TL, TO (top ramp is UP)
  s_orbit_upper_active{current_player.cup_step==4 and device.timers.cup_step_complete_lockout.running==False}:
    - cup_right_shot_hit
    - cup_step_4_complete
  s_orbit_lower_active{current_player.cup_step==4 and device.timers.cup_step_complete_lockout.running==False}:
    - cup_right_shot_hit
    - cup_step_4_complete

  # Step 5: RO (right orbit; right ramp is UP)
  right_orbit_shot_hit{current_player.cup_step==5 and device.timers.cup_step_complete_lockout.running==False}:
    - cup_right_shot_hit
    - cup_step_5_complete

  # Step 6: TO (top ramp is UP)
  s_orbit_lower_active{current_player.cup_step==6 and device.timers.cup_step_complete_lockout.running==False}:
    - cup_right_shot_hit
    - cup_step_6_complete

  # Step 7: LO
  left_orbit_shot_hit{current_player.cup_step==7 and device.timers.cup_step_complete_lockout.running==False}:
    - cup_left_shot_hit
    - cup_step_7_complete

  # Step 8: Scoop (barrier is DOWN)
  s_mode_start_active{current_player.cup_step==8 and device.timers.cup_step_complete_lockout.running==False}:
    - cup_center_shot_hit
    - cup_step_8_complete

  # ─── MISSILES PERK — auto-collect current step ────────────────────────────────
  # Event: missiles_perk_complete_shot (matches all other pilot modes)
  # complete_flag==0 guard prevents firing after mode is already won.
  # Step 8 (scoop) intentionally omitted — ball must physically enter scoop.
  missiles_perk_complete_shot{current_player.cup_step==1 and current_player.cup_complete_flag==0}:
    - cup_left_shot_hit
    - cup_step_1_complete
  missiles_perk_complete_shot{current_player.cup_step==2 and current_player.cup_complete_flag==0}:
    - cup_right_shot_hit
    - cup_step_2_complete
  missiles_perk_complete_shot{current_player.cup_step==3 and current_player.cup_complete_flag==0}:
    - cup_center_shot_hit
    - cup_step_3_complete
  missiles_perk_complete_shot{current_player.cup_step==4 and current_player.cup_complete_flag==0}:
    - cup_right_shot_hit
    - cup_step_4_complete
  missiles_perk_complete_shot{current_player.cup_step==5 and current_player.cup_complete_flag==0}:
    - cup_right_shot_hit
    - cup_step_5_complete
  missiles_perk_complete_shot{current_player.cup_step==6 and current_player.cup_complete_flag==0}:
    - cup_right_shot_hit
    - cup_step_6_complete
  missiles_perk_complete_shot{current_player.cup_step==7 and current_player.cup_complete_flag==0}:
    - cup_left_shot_hit
    - cup_step_7_complete

  # ─── BAD SHOT DETECTION ──────────────────────────────────────────────────────
  # Only registers if the shot is LIT (conditions match crystal count).
  # Unlit shots (not good, not bad) do nothing.

  # STEP 1 bad shots:
  # TL always bad (3,2,1,0)
  s_orbit_upper_active{current_player.cup_step==1}:
    - cup_bad_shot_hit
  # TWR bad at 2,1,0 crystals
  s_ramp_tower_exit_active{current_player.cup_step==1 and current_player.cup_crystals<=2}:
    - cup_bad_shot_hit
  # TR bad at 1,0 crystals
  s_ramp_inner_exit_active{current_player.cup_step==1 and current_player.cup_crystals<=1}:
    - cup_bad_shot_hit
  # RR bad at 0 crystals
  s_ramp_right_exit_active{current_player.cup_step==1 and current_player.cup_crystals==0}:
    - cup_bad_shot_hit

  # STEP 2 bad shots:
  # LR always bad
  s_ramp_left_exit_active{current_player.cup_step==2}:
    - cup_bad_shot_hit
  # LO bad at 2,1,0
  left_orbit_shot_hit{current_player.cup_step==2 and current_player.cup_crystals<=2}:
    - cup_bad_shot_hit
  # Spinner bad at 1,0
  spinner_shot_made{current_player.cup_step==2 and current_player.cup_crystals<=1 and device.timers.cup_spinner_lockout.running==False}:
    - cup_bad_shot_hit
  # Barrier bad at 0
  s_barrier_target_active{current_player.cup_step==2 and current_player.cup_crystals==0}:
    - cup_bad_shot_hit

  # STEP 3 bad shots:
  # RR always bad
  s_ramp_right_exit_active{current_player.cup_step==3}:
    - cup_bad_shot_hit
  # LR bad at 2,1,0
  s_ramp_left_exit_active{current_player.cup_step==3 and current_player.cup_crystals<=2}:
    - cup_bad_shot_hit
  # LO bad at 1,0
  left_orbit_shot_hit{current_player.cup_step==3 and current_player.cup_crystals<=1}:
    - cup_bad_shot_hit
  # TR bad at 0
  s_ramp_inner_exit_active{current_player.cup_step==3 and current_player.cup_crystals==0}:
    - cup_bad_shot_hit

  # STEP 4 bad shots:
  # LR always bad
  s_ramp_left_exit_active{current_player.cup_step==4}:
    - cup_bad_shot_hit
  # Spinner bad at 2,1,0
  spinner_shot_made{current_player.cup_step==4 and current_player.cup_crystals<=2 and device.timers.cup_spinner_lockout.running==False}:
    - cup_bad_shot_hit
  # TWR bad at 1,0
  s_ramp_tower_exit_active{current_player.cup_step==4 and current_player.cup_crystals<=1}:
    - cup_bad_shot_hit
  # Barrier bad at 0
  s_barrier_target_active{current_player.cup_step==4 and current_player.cup_crystals==0}:
    - cup_bad_shot_hit

  # STEP 5 bad shots:
  # Barrier always bad
  s_barrier_target_active{current_player.cup_step==5}:
    - cup_bad_shot_hit
  # Spinner bad at 2,1,0
  spinner_shot_made{current_player.cup_step==5 and current_player.cup_crystals<=2 and device.timers.cup_spinner_lockout.running==False}:
    - cup_bad_shot_hit
  # TWR bad at 1,0
  s_ramp_tower_exit_active{current_player.cup_step==5 and current_player.cup_crystals<=1}:
    - cup_bad_shot_hit
  # LR bad at 0
  s_ramp_left_exit_active{current_player.cup_step==5 and current_player.cup_crystals==0}:
    - cup_bad_shot_hit

  # STEP 6 bad shots:
  # TL always bad
  s_orbit_upper_active{current_player.cup_step==6}:
    - cup_bad_shot_hit
  # Barrier bad at 2,1,0
  s_barrier_target_active{current_player.cup_step==6 and current_player.cup_crystals<=2}:
    - cup_bad_shot_hit
  # LR bad at 1,0
  s_ramp_left_exit_active{current_player.cup_step==6 and current_player.cup_crystals<=1}:
    - cup_bad_shot_hit
  # LO bad at 0
  left_orbit_shot_hit{current_player.cup_step==6 and current_player.cup_crystals==0}:
    - cup_bad_shot_hit

  # STEP 7 bad shots:
  # RR always bad
  s_ramp_right_exit_active{current_player.cup_step==7}:
    - cup_bad_shot_hit
  # Spinner bad at 2,1,0
  spinner_shot_made{current_player.cup_step==7 and current_player.cup_crystals<=2 and device.timers.cup_spinner_lockout.running==False}:
    - cup_bad_shot_hit
  # TWR bad at 1,0
  s_ramp_tower_exit_active{current_player.cup_step==7 and current_player.cup_crystals<=1}:
    - cup_bad_shot_hit
  # LR bad at 0 (corrected per user: 0 crystals = RR, Spinner, LR, TWR)
  s_ramp_left_exit_active{current_player.cup_step==7 and current_player.cup_crystals==0}:
    - cup_bad_shot_hit

  # STEP 8 bad shots:
  # LR always bad
  s_ramp_left_exit_active{current_player.cup_step==8}:
    - cup_bad_shot_hit
  # RR bad at 2,1,0
  s_ramp_right_exit_active{current_player.cup_step==8 and current_player.cup_crystals<=2}:
    - cup_bad_shot_hit
  # Spinner bad at 1,0
  spinner_shot_made{current_player.cup_step==8 and current_player.cup_crystals<=1 and device.timers.cup_spinner_lockout.running==False}:
    - cup_bad_shot_hit
  # TWR bad at 0
  s_ramp_tower_exit_active{current_player.cup_step==8 and current_player.cup_crystals==0}:
    - cup_bad_shot_hit

  # ─── CRYSTAL LOSS CHAIN ───────────────────────────────────────────────────────
  # Bad shot hit: check crystal count, fire appropriate loss event.
  # Lockout guard prevents coasting switches (e.g. spinner) from scoring
  # a second bad event immediately after the first crystal is lost.
  cup_bad_shot_hit{current_player.cup_crystals==3 and device.timers.cup_bad_shot_lockout.running==False}:
    - cup_crystal_lost
    - cup_lost_crystal_now_2
  cup_bad_shot_hit{current_player.cup_crystals==2 and device.timers.cup_bad_shot_lockout.running==False}:
    - cup_crystal_lost
    - cup_lost_crystal_now_1
  cup_bad_shot_hit{current_player.cup_crystals==1 and device.timers.cup_bad_shot_lockout.running==False}:
    - cup_crystal_lost
    - cup_lost_crystal_now_0
  cup_bad_shot_hit{current_player.cup_crystals==0 and device.timers.cup_bad_shot_lockout.running==False}:
    - cup_failed

  # Timer expiry: same chain as bad shot hit
  timer_cup_shot_timer_complete{current_player.cup_crystals==3}:
    - cup_crystal_lost
    - cup_lost_crystal_now_2
  timer_cup_shot_timer_complete{current_player.cup_crystals==2}:
    - cup_crystal_lost
    - cup_lost_crystal_now_1
  timer_cup_shot_timer_complete{current_player.cup_crystals==1}:
    - cup_crystal_lost
    - cup_lost_crystal_now_0
  timer_cup_shot_timer_complete{current_player.cup_crystals==0}:
    - cup_failed

  # After crystal loss: re-setup current step lights + restart shot timer.
  # 100ms delay ensures variable_player has updated cup_crystals first.
  # NOTE: For servo steps (4-7), refiring setup re-sends servo position — this is safe
  # (idempotent) but will cause a brief motor pulse on crystal loss during those steps.
  cup_crystal_lost{current_player.cup_step==1}:
    - cup_setup_step_1|100ms
  cup_crystal_lost{current_player.cup_step==2}:
    - cup_setup_step_2|100ms
  cup_crystal_lost{current_player.cup_step==3}:
    - cup_setup_step_3|100ms
  cup_crystal_lost{current_player.cup_step==4}:
    - cup_setup_step_4|100ms
  cup_crystal_lost{current_player.cup_step==5}:
    - cup_setup_step_5|100ms
  cup_crystal_lost{current_player.cup_step==6}:
    - cup_setup_step_6|100ms
  cup_crystal_lost{current_player.cup_step==7}:
    - cup_setup_step_7|100ms
  cup_crystal_lost{current_player.cup_step==8}:
    - cup_setup_step_8|100ms

  # ─── VICTORY FLOW ────────────────────────────────────────────────────────────
  cup_complete:
    - barrier_raise
    - cup_stop_step_lights    # Clear all inserts immediately — player is done shooting
    - timer_cup_complete_delay_start
    - missiles_perk_unload

  timer_cup_complete_delay_complete:
    - cup_cleanup
    - scoop_ball_release
    - pilot_mode_cleanup_complete

  # Won video skip (both flippers)
  s_flipper_left_active{mode.cool_under_pressure.active and device.timers.cup_complete_delay.running}:
    - cup_check_skip_won
  s_flipper_right_active{mode.cool_under_pressure.active and device.timers.cup_complete_delay.running}:
    - cup_check_skip_won
  cup_check_skip_won{device.switches.s_flipper_left.state and device.switches.s_flipper_right.state}:
    - cup_skip_won_video

  # Skip: drop barrier first, release ball 400ms later via delayed exit event
  cup_skip_won_video:
    - scoop_ball_release
    - cup_victory_ball_exit|400ms

  # ─── DRAIN / FAILED FLOW ─────────────────────────────────────────────────────
  cup_failed:
    - cup_stop_step_lights    # Clear all inserts immediately — mode is ending

  cup_ball_ending_hold:
    - cup_failed
    - cup_drain_detected
    - missiles_perk_unload

  timer_cup_drain_delay_complete:
    - cup_drain_cleanup_complete
    - cup_cleanup

  timer_cup_failed_delay_complete:
    - cup_cleanup
    - pilot_mode_cleanup_complete

  # Lost video skip (both flippers)
  s_flipper_left_active{mode.cool_under_pressure.active and device.timers.cup_failed_delay.running}:
    - cup_check_skip_lost
  s_flipper_right_active{mode.cool_under_pressure.active and device.timers.cup_failed_delay.running}:
    - cup_check_skip_lost
  cup_check_skip_lost{device.switches.s_flipper_left.state and device.switches.s_flipper_right.state}:
    - cup_skip_failed_video

  # Drain video skip (both flippers during drain delay)
  s_flipper_left_active{mode.cool_under_pressure.active and device.timers.cup_drain_delay.running}:
    - cup_check_skip_drain
  s_flipper_right_active{mode.cool_under_pressure.active and device.timers.cup_drain_delay.running}:
    - cup_check_skip_drain
  cup_check_skip_drain{device.switches.s_flipper_left.state and device.switches.s_flipper_right.state}:
    - cup_skip_drain_video

  # ─── CLEANUP ─────────────────────────────────────────────────────────────────
  cup_cleanup:
    - barrier_raise
    - top_ramp_down|500ms
    - right_ramp_down|1000ms


####################################################################################
# SOUND PLAYER
####################################################################################

sound_player:

  # Voice callout plays immediately after intro video ends (13s)
  timer_cup_intro_video_delay_complete:
    cool_under_pressure_voice_instructions:
      bus: voice
      loops: 0

  # ─── BAD SHOT CALLOUTS ───────────────────────────────────────────────────────
  # Fires at cup_crystals value BEFORE the crystal is deducted.
  # cup_crystals==3 → 0 planes iced → first offence
  # cup_crystals==2 → 1 plane iced → second offence
  # cup_crystals==1 → 2 planes iced → third offence
  # cup_crystals==0 → mode fails immediately, no callout needed

  cup_bad_shot_hit{current_player.cup_crystals==3}:
    cool_under_pressure_voice_shot_missed_first_time:
      bus: voice
      loops: 0

  cup_bad_shot_hit{current_player.cup_crystals==2}:
    cool_under_pressure_voice_shot_missed_second_time:
      bus: voice
      loops: 0

  cup_bad_shot_hit{current_player.cup_crystals==1}:
    cool_under_pressure_voice_shot_missed_third_time:
      bus: voice
      loops: 0

  # ─── TIMER EXPIRY CALLOUTS ───────────────────────────────────────────────────

  timer_cup_shot_timer_complete{current_player.cup_crystals==3}:
    cool_under_pressure_voice_timer_expired_first_time:
      bus: voice
      loops: 0

  timer_cup_shot_timer_complete{current_player.cup_crystals==2}:
    cool_under_pressure_voice_timer_expired_second_time:
      bus: voice
      loops: 0

  timer_cup_shot_timer_complete{current_player.cup_crystals==1}:
    cool_under_pressure_voice_timer_expired_third_time:
      bus: voice
      loops: 0

####################################################################################
# SHOW PLAYER
####################################################################################
# Good shots: sync_flash_mode (vivid ice blue, 00AAFF) — synchronized 1s flash cycle
# Bad shots: solid red via light_player (no show needed)
# GI: ice blue ambient throughout mode

show_player:

  # ─── GI AMBIENT ───────────────────────────────────────────────────────────
  mode_cool_under_pressure_started:
    cup_gi_ice_blue_ambient:
      show: cup_gi_ice_blue
      loops: -1
      priority: 5
  # ─── GOOD SHOT SHOWS ─────────────────────────────────────────────────────────
  # Played once at speed 20 (~450ms) when a good shot is made.
  # Shows are in modes/cool_under_pressure/shows/
  cup_left_shot_hit:
    left_show:
      show: left_shot_hit
      speed: 20
      loops: 0

  cup_center_shot_hit:
    center_show:
      show: center_shot_hit
      speed: 20
      loops: 0

  cup_right_shot_hit:
    right_show:
      show: right_shot_hit
      speed: 20
      loops: 0

  cup_bad_shot_hit:
    cup_gi_bad_shot_strobe_play:
      show: cup_gi_bad_shot_strobe
      loops: 0
      priority: 15

  cup_crystal_lost:
    cup_gi_crystal_crack:
      show: cup_gi_crystal_crack
      loops: 1
      priority: 10

  cup_complete:
    cup_gi_ice_blue:
      show: cup_gi_ice_blue
      loops: -1
      priority: 5

  cup_failed:
    cup_gi_failed:
      show: cup_gi_failed
      loops: 1
      priority: 5

  mode_cool_under_pressure_stopped:
    cup_gi_ice_blue:
      show: cup_gi_ice_blue
      action: stop
    cup_gi_failed:
      show: cup_gi_failed
      action: stop

  # ─── STEP 1: Flash LR, LO, SP (good shots unchanged across crystal levels) ─
  cup_setup_step_1:
    cup_s1_lr:
      show: sync_flash_mode
      key: cup_good_lr
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_left_ramp, color: 00AAFF }
    cup_s1_lo:
      show: sync_flash_mode
      key: cup_good_lo
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_left_orbit, color: 00AAFF }
    cup_s1_sp:
      show: sync_flash_mode
      key: cup_good_sp
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_spinner, color: 00AAFF }

  # ─── STEP 2: Flash TWR, RR, TR ────────────────────────────────────────────
  cup_setup_step_2:
    cup_s2_twr:
      show: sync_flash_mode
      key: cup_good_twr
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_tower_ramp, color: 00AAFF }
    cup_s2_rr:
      show: sync_flash_mode
      key: cup_good_rr
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_right_orbit, color: 00AAFF }
    cup_s2_tr:
      show: sync_flash_mode
      key: cup_good_tr
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_middle_ramp, color: 00AAFF }

  # ─── STEP 3: Flash SP, TWR ────────────────────────────────────────────────
  cup_setup_step_3:
    cup_s3_sp:
      show: sync_flash_mode
      key: cup_good_sp
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_spinner, color: 00AAFF }
    cup_s3_twr:
      show: sync_flash_mode
      key: cup_good_twr
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_tower_ramp, color: 00AAFF }

  # ─── STEP 4: Flash TL, TO ─────────────────────────────────────────────────
  cup_setup_step_4:
    cup_s4_tl:
      show: sync_flash_mode
      key: cup_good_tl
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_upper_orbit, color: 00AAFF }
    cup_s4_to:
      show: sync_flash_mode
      key: cup_good_to
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_middle_ramp, color: 00AAFF }

  # ─── STEP 5: Flash RO ─────────────────────────────────────────────────────
  cup_setup_step_5:
    cup_s5_ro:
      show: sync_flash_mode
      key: cup_good_ro
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_right_orbit, color: 00AAFF }

  # ─── STEP 6: Flash TO ─────────────────────────────────────────────────────
  cup_setup_step_6:
    cup_s6_to:
      show: sync_flash_mode
      key: cup_good_to
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_middle_ramp, color: 00AAFF }

  # ─── STEP 7: Flash LO ─────────────────────────────────────────────────────
  cup_setup_step_7:
    cup_s7_lo:
      show: sync_flash_mode
      key: cup_good_lo
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_left_orbit, color: 00AAFF }

  # ─── STEP 8: Flash Barrier ────────────────────────────────────────────────
  cup_setup_step_8:
    cup_s8_barrier:
      show: sync_flash_mode
      key: cup_good_barrier
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_barrier, color: 00AAFF }

  # ─── STOP ALL GOOD SHOT FLASH SHOWS ──────────────────────────────────────
  # Fires on step complete (before next step starts) and on cleanup.
  # Covers every key used across all steps — safe to stop even if not running.
  cup_stop_step_lights:
    stop_cup_good_lr:
      show: sync_flash_mode
      action: stop
      key: cup_good_lr
    stop_cup_good_lo:
      show: sync_flash_mode
      action: stop
      key: cup_good_lo
    stop_cup_good_sp:
      show: sync_flash_mode
      action: stop
      key: cup_good_sp
    stop_cup_good_twr:
      show: sync_flash_mode
      action: stop
      key: cup_good_twr
    stop_cup_good_rr:
      show: sync_flash_mode
      action: stop
      key: cup_good_rr
    stop_cup_good_tr:
      show: sync_flash_mode
      action: stop
      key: cup_good_tr
    stop_cup_good_tl:
      show: sync_flash_mode
      action: stop
      key: cup_good_tl
    stop_cup_good_to:
      show: sync_flash_mode
      action: stop
      key: cup_good_to
    stop_cup_good_ro:
      show: sync_flash_mode
      action: stop
      key: cup_good_ro
    stop_cup_good_barrier:
      show: sync_flash_mode
      action: stop
      key: cup_good_barrier

####################################################################################
# SLIDE PLAYER
####################################################################################
# Background and crystal overlays are persistent throughout the mode.
# Step videos play as brief overlays; previous step removed when next fires.
# Won/Lost/Intro slides play while ball is held or mode is ending.
# NOTE: mode_points_scored slides must be caught in base.yaml (see base.yaml additions).

slide_player:

  # Mode start: background (always on) + intro video
  mode_cool_under_pressure_started:
    cool_under_pressure_background:
      action: play
      priority: 800
    cool_under_pressure_intro:
      action: play
      priority: 810

  # Intro complete → remove intro slide (voice callout plays via sound_player only)
  timer_cup_intro_video_delay_complete:
    cool_under_pressure_intro:
      action: remove

  # Skip → remove intro slide (voice callout is audio only, nothing to remove)
  cup_skip_intro:
    cool_under_pressure_intro:
      action: remove

  # Ball released: shots remaining and timer shown; no crystal slide at start.
  # Crystal slides appear only after a crystal is lost (cup_lost_crystal_now_2 etc).
  cup_ball_released{current_player.afterburner_perk_active==0}:
    cool_under_pressure_timer:
      action: play
      priority: 805
    cool_under_pressure_shots_remaining:
      action: play
      priority: 805

  cup_ball_released{current_player.afterburner_perk_active==1}:
    cool_under_pressure_timer_afterburner:
      action: play
      priority: 805
    cool_under_pressure_shots_remaining:
      action: play
      priority: 805

  # Crystal damage layers — slides ACCUMULATE, each bad event adds one more.
  # 1_crystals = 1st jet iced over (1 bad event)
  # 2_crystals = 2nd jet iced over (2 bad events) — 1_crystals stays
  # 3_crystals = 3rd jet iced over (3 bad events) — 1_crystals and 2_crystals stay
  # 4th bad event at 0 crystals = immediate fail via event_player, no new slide.
  cup_lost_crystal_now_2:
    cool_under_pressure_1_crystals:
      action: play
      priority: 820

  cup_lost_crystal_now_1:
    cool_under_pressure_2_crystals:
      action: play
      priority: 821

  cup_lost_crystal_now_0:
    cool_under_pressure_3_crystals:
      action: play
      priority: 822

  # Step videos — remove previous, play next (brief overlays)
  cup_play_step_1_video:
    cool_under_pressure_step_1:
      action: play
      priority: 830

  cup_play_step_2_video:
    cool_under_pressure_step_1:
      action: remove
    cool_under_pressure_step_2:
      action: play
      priority: 830

  cup_play_step_3_video:
    cool_under_pressure_step_2:
      action: remove
    cool_under_pressure_step_3:
      action: play
      priority: 830

  cup_play_step_4_video:
    cool_under_pressure_step_3:
      action: remove
    cool_under_pressure_step_4:
      action: play
      priority: 830

  cup_play_step_5_video:
    cool_under_pressure_step_4:
      action: remove
    cool_under_pressure_step_5:
      action: play
      priority: 830

  cup_play_step_6_video:
    cool_under_pressure_step_5:
      action: remove
    cool_under_pressure_step_6:
      action: play
      priority: 830

  cup_play_step_7_video:
    cool_under_pressure_step_6:
      action: remove
    cool_under_pressure_step_7:
      action: play
      priority: 830

  # Points scored slide — shown on each good shot (2s expire)
  # cup_show_step_N_points fires AFTER cup_step_N_score in the event queue,
  # so mode_points_scored variable is already updated when this slide displays.
  cup_show_step_1_points:
    mode_points_scored:
      action: play
      priority: 840
      expire: 2s

  cup_show_step_2_points:
    mode_points_scored:
      action: play
      priority: 840
      expire: 2s

  cup_show_step_3_points:
    mode_points_scored:
      action: play
      priority: 840
      expire: 2s

  cup_show_step_4_points:
    mode_points_scored:
      action: play
      priority: 840
      expire: 2s

  cup_show_step_5_points:
    mode_points_scored:
      action: play
      priority: 840
      expire: 2s

  cup_show_step_6_points:
    mode_points_scored:
      action: play
      priority: 840
      expire: 2s

  cup_show_step_7_points:
    mode_points_scored:
      action: play
      priority: 840
      expire: 2s

  cup_show_step_8_points:
    mode_points_scored:
      action: play
      priority: 840
      expire: 2s

  # Won video (step 8 complete — ball held in scoop)
  # Remove HUD slides so -1 shots_remaining and stale timer don't show on won screen
  cup_complete:
    cool_under_pressure_step_7:
      action: remove
    cool_under_pressure_timer:
      action: remove
    cool_under_pressure_timer_afterburner:
      action: remove
    cool_under_pressure_shots_remaining:
      action: remove
    cool_under_pressure_won:
      action: play
      priority: 850

  # Lost video — remove HUD slides too
  cup_failed:
    cool_under_pressure_timer:
      action: remove
    cool_under_pressure_timer_afterburner:
      action: remove
    cool_under_pressure_shots_remaining:
      action: remove
    cool_under_pressure_lost:
      action: play
      priority: 850


