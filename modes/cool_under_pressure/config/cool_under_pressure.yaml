#config_version=6

####################################################################################
# COOL UNDER PRESSURE - PILOT MISSION MODE
# Based on Iceman (Top Gun 1986 / Top Gun: Maverick)
# Priority: 600 | No global timer | Steps: 8 | No multiball | Cannot stack
# GI Color: Ice Blue (4DB8D4) | Good shot inserts: 00AAFF
#
# ICE CRYSTAL SYSTEM (composure mechanic):
#   Start: 3 crystals | Lose on: bad shot hit OR shot timer expiry
#   3 crystals = 3x points, 1 bad shot lit
#   2 crystals = 2x points, 2 bad shots lit
#   1 crystal  = 1x points, 3 bad shots lit
#   0 crystals = 1x points (floor), max bad shots — next mistake = immediate fail
#
# SHOT SEQUENCE:
#   Step 1:  LR/LO/SP good | TL+(more) bad | 50K×crystals  | 30s
#   Step 2:  TWR/RR/TR good | LR+(more) bad | 75K×crystals  | 30s
#   Step 3:  SP/TWR good   | RR+(more) bad | 100K×crystals | 30s
#   Step 4:  TL/TO good    | LR+(more) bad | 125K×crystals | 25s [top+right ramp UP]
#   Step 5:  RO good       | Barrier+(more) bad | 150K×crystals | 25s [right UP, top DOWN]
#   Step 6:  TO good       | TL+(more) bad | 175K×crystals | 40s [top UP, right DOWN]
#   Step 7:  LO good       | RR+(more) bad | 200K×crystals | 30s [top ramp DOWN]
#   Step 8:  Scoop good    | LR+(more) bad | 250K×crystals | 25s [barrier DOWN]
#
# PERKS:
#   Afterburner: Shot timer jumps to 9999 (effectively infinite) for entire mode
#   Missiles:    Auto-collects current step's good shot
#
# SLIDES (all defined in Godot):
#   cool_under_pressure_background         - Always present
#   cool_under_pressure_1_crystals         - 1st jet iced (shown after 1st bad event)
#   cool_under_pressure_2_crystals         - 2nd jet iced (adds on top after 2nd bad event)
#   cool_under_pressure_3_crystals         - 3rd jet iced (adds on top after 3rd bad event)
#   cool_under_pressure_2_crystals         - 2 crystal overlay
#   cool_under_pressure_1_crystal          - 1 crystal overlay
#   cool_under_pressure_intro              - Intro video (15s, skippable)
#   cool_under_pressure_won                - Won video (15s, skippable)
#   cool_under_pressure_lost               - Lost video (15s, skippable)
#   cool_under_pressure_step_1 .. step_7   - Shot completion videos (brief overlays)
#   cool_under_pressure_timer              - Var: cool_under_pressure_timer_tick
#   cool_under_pressure_timer_afterburner  - Replaces timer slide when perk active
#   cool_under_pressure_shots_remaining    - Var: cup_shots_remaining
#
# TIMING:
#   Intro video: 17s | Won video: 25s | Lost video: 20s | Barrier delay: 1s | Drain delay: 5s
#   Shot timers: Steps 1-3,7: 30s | Steps 4-5,8: 25s | Step 6: 40s
#
# LIGHT COLORS:
#   Good shots: 00AAFF (vivid ice blue) | Bad shots: FF0000 (red, solid)
#   Unlit shots: off | GI: ice blue ambient
#
# BASE.YAML ADDITIONS REQUIRED:
#   sound_player: cup_ball_released → cup_music (bus: music, loops: -1)
#                 cup_complete     → silence (bus: music)
#                 cup_failed       → silence (bus: music)
#                 mode_cool_under_pressure_stopped → music_danger_zone (bus: music, loops: -1)
#   slide_player: cup_show_step_X_points → mode_points_scored (priority: 840, expire: 2s)
#
# PILOT_MISSION_QUALIFIER.YAML ADDITIONS REQUIRED:
#   variable_player: mode_cool_under_pressure_stopped → clear letter_collection_paused,
#                    pilot_mode_active, missiles_perk, topgun letters
#   event_player:    mode_cool_under_pressure_stopped{pilot_mode_drain_pending==1}
#                    → pilot_mission_bonus_ready + pilot_mission_drain_complete
#   light_player:    mode_cool_under_pressure_started → l_pilot_mission_lit off, mode light white
####################################################################################

mode:
  start_events: start_mode_cool_under_pressure
  stop_events:
    - timer_cup_complete_delay_complete
    - timer_cup_failed_delay_complete
    - cup_drain_cleanup_complete
  priority: 600
  game_mode: true
  use_wait_queue: true

mode_settings:
  can_stack_with_multiball: false

####################################################################################
# BALL HOLDS
####################################################################################

ball_holds:
  cup_scoop_hold:
    balls_to_hold: 1
    hold_devices: bd_mode_scoop
    enable_events:
      - mode_cool_under_pressure_started
      - cup_setup_step_8            # Re-enable for final shot hold
    release_one_events:
      - cup_ball_released           # Post-intro release
      - cup_victory_ball_exit       # Delayed version - barrier raises first
    release_all_events:
      - mode_cool_under_pressure_will_stop

####################################################################################
# QUEUE RELAY PLAYER
####################################################################################

queue_relay_player:
  ball_ending{mode.cool_under_pressure.active==True}:
    post: cup_ball_ending_hold
    wait_for: cup_drain_cleanup_complete
    priority: 1000


####################################################################################
# TIMERS
####################################################################################

timers:

  # Per-shot countdown timer — duration set via jump on each setup event
  # No global mode timer; this is the only timer the player races
  cup_shot_timer:
    start_value: 30
    end_value: 0
    direction: down
    tick_interval: 1s
    control_events:
      # Stop on mode start — doesn't run until ball released
      - event: mode_cool_under_pressure_started
        action: stop
      # Stop on crystal loss — restarts when cup_setup_step_X re-fires
      - event: cup_crystal_lost
        action: stop
      # Stop on any good shot made
      - event: cup_step_1_complete
        action: stop
      - event: cup_step_2_complete
        action: stop
      - event: cup_step_3_complete
        action: stop
      - event: cup_step_4_complete
        action: stop
      - event: cup_step_5_complete
        action: stop
      - event: cup_step_6_complete
        action: stop
      - event: cup_step_7_complete
        action: stop
      - event: cup_step_8_complete
        action: stop
      # Stop on mode end
      - event: cup_complete
        action: stop
      - event: cup_failed
        action: stop
      # Jump + start for 30s steps (1,2,3,7)
      - event: cup_start_shot_timer_30
        action: jump
        value: 30
      - event: cup_start_shot_timer_30
        action: start
      # Jump + start for 25s steps (4,5,8)
      - event: cup_start_shot_timer_25
        action: jump
        value: 25
      - event: cup_start_shot_timer_25
        action: start
      # Jump + start for 40s step (6)
      - event: cup_start_shot_timer_40
        action: jump
        value: 40
      - event: cup_start_shot_timer_40
        action: start
      # Afterburner perk — effectively infinite time
      - event: afterburner_extend_cup_shot_timer
        action: jump
        value: 9999
      # Pause/resume for lock sequence
      - event: lock_sequence_timer_pause
        action: pause
      - event: lock_sequence_timer_resume
        action: start

  # Intro video delay — 18 seconds
  cup_intro_video_delay:
    start_value: 0
    end_value: 18
    direction: up
    tick_interval: 1s
    control_events:
      - event: mode_cool_under_pressure_started
        action: start
      - event: cup_skip_intro
        action: stop

  # Voice callout delay — 13 seconds after intro video ends
  cup_voice_callout_delay:
    start_value: 0
    end_value: 13
    direction: up
    tick_interval: 1s
    control_events:
      - event: timer_cup_intro_video_delay_complete
        action: start
      - event: cup_skip_intro
        action: stop

  # Bad shot lockout — 3 seconds after any crystal loss.
  # Prevents coasting switches (especially spinner) from registering
  # a second bad shot immediately after the first one.
  cup_bad_shot_lockout:
    start_value: 0
    end_value: 3
    direction: up
    tick_interval: 1s
    start_running: false
    control_events:
      - event: cup_crystal_lost
        action: restart
      - event: cup_failed
        action: stop
      - event: cup_complete
        action: stop

  # Step complete lockout — 500ms after any step completes.
  # Prevents two ramp exit switches (e.g. TWR + TR on the same physical shot)
  # from each firing step_N_complete and double-decrementing shots_remaining.
  cup_step_complete_lockout:
    start_value: 0
    end_value: 1
    direction: up
    tick_interval: 500ms
    start_running: false
    control_events:
      - event: cup_step_1_complete
        action: restart
      - event: cup_step_2_complete
        action: restart
      - event: cup_step_3_complete
        action: restart
      - event: cup_step_4_complete
        action: restart
      - event: cup_step_5_complete
        action: restart
      - event: cup_step_6_complete
        action: restart
      - event: cup_step_7_complete
        action: restart
      - event: cup_step_8_complete
        action: restart
      - event: cup_failed
        action: stop
      - event: cup_complete
        action: stop

  # Spinner lockout — restarts on every spinner_shot_made.
  # Prevents coasting spinner from scoring a good shot then immediately a bad shot,
  # or double-completing the same step. Fixes shots_remaining off-by-one caused by
  # double step completion.
  cup_spinner_lockout:
    start_value: 0
    end_value: 3
    direction: up
    tick_interval: 1s
    start_running: false
    control_events:
      - event: spinner_shot_made
        action: restart
      - event: mode_cool_under_pressure_will_stop
        action: stop

  # Barrier release debounce — 1 second after scoop eject
  cup_barrier_delay:
    start_value: 0
    end_value: 1
    direction: up
    tick_interval: 1s
    control_events:
      - event: cup_ball_released
        action: restart

  # Drain delay — holds ball_ending process while lost video plays
  # MUST match cup_failed_delay end_value so bonus doesn't start before video ends
  cup_drain_delay:
    start_value: 0
    end_value: 20
    direction: up
    tick_interval: 1s
    control_events:
      - event: cup_drain_detected
        action: start
      - event: cup_skip_drain_video
        action: jump
        value: 20

  # Won video delay — 25 seconds
  cup_complete_delay:
    start_value: 0
    end_value: 25
    direction: up
    tick_interval: 1s
    control_events:
      - event: cup_complete
        action: start
      - event: cup_skip_won_video
        action: jump
        value: 25

  # Lost video delay — 20 seconds
  cup_failed_delay:
    start_value: 0
    end_value: 20
    direction: up
    tick_interval: 1s
    control_events:
      - event: cup_failed
        action: start
      - event: cup_skip_failed_video
        action: jump
        value: 20


####################################################################################
# VARIABLE PLAYER
####################################################################################

variable_player:

  # ─── MODE INIT ───────────────────────────────────────────────────────────────
  mode_cool_under_pressure_started:
    pilot_mode_active:
      action: set
      int: 1
    letter_collection_paused:
      action: set
      int: 1
    mode_cool_under_pressure_played:
