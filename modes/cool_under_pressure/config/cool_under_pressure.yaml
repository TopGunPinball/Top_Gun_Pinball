      int: 1
    pilot_missions_played:
      action: add
      int: 1
    cup_step:
      action: set
      int: 0
    cup_crystals:
      action: set
      int: 3
    cup_complete_flag:
      action: set
      int: 0
    cup_shots_remaining:
      action: set
      int: 8
    mode_points_scored:
      action: set
      int: 0
    cool_under_pressure_timer_tick:
      action: set
      int: 0

  # ─── DRAIN PENDING ───────────────────────────────────────────────────────────
  ball_will_end{mode.cool_under_pressure.active==True}:
    pilot_mode_drain_pending:
      action: set
      int: 1

  # ─── STEP TRACKING ───────────────────────────────────────────────────────────
  cup_setup_step_1:
    cup_step:
      action: set
      int: 1

  cup_setup_step_2:
    cup_step:
      action: set
      int: 2

  cup_setup_step_3:
    cup_step:
      action: set
      int: 3

  cup_setup_step_4:
    cup_step:
      action: set
      int: 4

  cup_setup_step_5:
    cup_step:
      action: set
      int: 5

  cup_setup_step_6:
    cup_step:
      action: set
      int: 6

  cup_setup_step_7:
    cup_step:
      action: set
      int: 7

  cup_setup_step_8:
    cup_step:
      action: set
      int: 8

  # ─── TIMER TICK DISPLAY VARIABLE ─────────────────────────────────────────────
  # Initialize display variable immediately when each shot timer starts
  # (before first tick fires) so slide shows correct value from the start
  cup_start_shot_timer_30:
    cool_under_pressure_timer_tick:
      action: set
      int: 30

  cup_start_shot_timer_25:
    cool_under_pressure_timer_tick:
      action: set
      int: 25

  cup_start_shot_timer_40:
    cool_under_pressure_timer_tick:
      action: set
      int: 40

  timer_cup_shot_timer_tick:
    cool_under_pressure_timer_tick:
      action: set
      int: device.timers.cup_shot_timer.ticks

  # ─── SHOTS REMAINING ─────────────────────────────────────────────────────────
  cup_step_1_complete:
    cup_shots_remaining:
      action: add
      int: -1

  cup_step_2_complete:
    cup_shots_remaining:
      action: add
      int: -1

  cup_step_3_complete:
    cup_shots_remaining:
      action: add
      int: -1

  cup_step_4_complete:
    cup_shots_remaining:
      action: add
      int: -1

  cup_step_5_complete:
    cup_shots_remaining:
      action: add
      int: -1

  cup_step_6_complete:
    cup_shots_remaining:
      action: add
      int: -1

  cup_step_7_complete:
    cup_shots_remaining:
      action: add
      int: -1

  # Step 8 complete: shots remaining + victory tracking
  cup_step_8_complete:
    cup_shots_remaining:
      action: add
      int: -1
    cup_complete_flag:
      action: set
      int: 1
    pilot_missions_won:
      action: add
      int: 1
    missiles_perk_saved:
      action: set
      int: current_player.missiles_perk_active
    missiles_perk_active:
      action: set
      int: 0
    mode_cool_under_pressure_won:
      action: set
      int: 1

  mode_cool_under_pressure_stopped:
    mode_cool_under_pressure_complete:
      action: set
      int: current_player.cup_complete_flag

  # ─── CRYSTAL STATE ───────────────────────────────────────────────────────────
  cup_lost_crystal_now_2:
    cup_crystals:
      action: set
      int: 2

  cup_lost_crystal_now_1:
    cup_crystals:
      action: set
      int: 1

  cup_lost_crystal_now_0:
