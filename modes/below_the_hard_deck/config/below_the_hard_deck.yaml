####################################################################################
# SLIDE PLAYER
####################################################################################

slide_player:

  # Intro video — plays from mode start until ball released
  mode_below_the_hard_deck_started:
    below_the_hard_deck_intro:
      action: play
      priority: 900

  # Ball released — remove intro, start HUD
  bthd_ball_released:
    below_the_hard_deck_intro:
      action: remove
    below_the_hard_deck_timer:
      action: play
      priority: 800
    below_the_hard_deck_shots_remaining:
      action: play
      priority: 800
    below_the_hard_deck_instructions:
      action: play
      priority: 800

  # Step videos — each removes the previous step's slide
  bthd_show_step_1_video:
    below_the_hard_deck_step_1:
      action: play
      priority: 810
    mode_points_scored:
      action: play
      priority: 840
      expire: 2s

  bthd_show_step_2_video:
    below_the_hard_deck_step_1:
      action: remove
    below_the_hard_deck_step_2:
      action: play
      priority: 810
    mode_points_scored:
      action: play
      priority: 840
      expire: 2s

  bthd_show_step_3_video:
    below_the_hard_deck_step_2:
      action: remove
    below_the_hard_deck_step_3:
      action: play
      priority: 810
    mode_points_scored:
      action: play
      priority: 840
      expire: 2s

  bthd_show_step_4_video:
    below_the_hard_deck_step_3:
      action: remove
    below_the_hard_deck_step_4:
      action: play
      priority: 810
    mode_points_scored:
      action: play
      priority: 840
      expire: 2s

  bthd_show_step_5_video:
    below_the_hard_deck_step_4:
      action: remove
    below_the_hard_deck_step_5:
      action: play
      priority: 810
    mode_points_scored:
      action: play
      priority: 840
      expire: 2s

  bthd_show_step_6_video:
    below_the_hard_deck_step_5:
      action: remove
    below_the_hard_deck_step_6:
      action: play
      priority: 810
    mode_points_scored:
      action: play
      priority: 840
      expire: 2s

  bthd_show_step_7_video:
    below_the_hard_deck_step_6:
      action: remove
    below_the_hard_deck_step_7:
      action: play
      priority: 810
    mode_points_scored:
      action: play
      priority: 840
      expire: 2s

  bthd_show_step_8_video:
    below_the_hard_deck_step_7:
      action: remove
    below_the_hard_deck_step_8:
      action: play
      priority: 810
    mode_points_scored:
      action: play
      priority: 840
      expire: 2s

  # Step 9 shot — remove step 8 slide, show points, remove HUD
  # (HUD removed here since no step_9 video — won video plays when ball enters scoop)
  bthd_complete:
    below_the_hard_deck_step_8:
      action: remove
    below_the_hard_deck_timer:
      action: remove
    below_the_hard_deck_shots_remaining:
      action: remove
    below_the_hard_deck_instructions:
      action: remove
    mode_points_scored:
      action: play
      priority: 840
      expire: 2s

  # Won video — ball enters scoop after 9th shot
  bthd_won:
    below_the_hard_deck_won:
      action: play
      priority: 900

  # Failed — timer expired or drain
  bthd_failed:
    below_the_hard_deck_timer:
      action: remove
    below_the_hard_deck_shots_remaining:
      action: remove
    below_the_hard_deck_instructions:
      action: remove
    below_the_hard_deck_lost:
      action: play
      priority: 900

  # Safety cleanup
  mode_below_the_hard_deck_stopped:
    below_the_hard_deck_timer:
      action: remove
    below_the_hard_deck_shots_remaining:
      action: remove
    below_the_hard_deck_instructions:
      action: remove
    below_the_hard_deck_intro:
      action: remove

####################################################################################
# SOUND PLAYER
####################################################################################

sound_player:
  bthd_ball_released:
    below_the_hard_deck_intro_callout:
      bus: voice
      loops: 0


####################################################################################
# COIL PLAYER — Left lane post holds ball for won video
####################################################################################

coil_player:
  # Enable left lane post when 9th shot is made — ball comes from RO/ramp
  bthd_complete:
    c_left_lane_up_post:
      action: enable

  # Release left lane post after won video plays (via bthd_cleanup)
  bthd_cleanup:
    c_left_lane_up_post:
      action: disable

  # Safety: ensure post is released if mode stops unexpectedly
  mode_below_the_hard_deck_will_stop:
    c_left_lane_up_post:
      action: disable

####################################################################################
# SHOW PLAYER
# Good shot: yellow flash (sync_flash_mode, FFFF00), key: bthd_good_shot_key
# Warning:   orange flash (sync_flash_mode, FFA500), replaces yellow using same key
# Bad shot 1: solid red, key: bthd_bad_1_key
# Bad shot 2: solid red, key: bthd_bad_2_key
# All other shots: off
# Each position setup stops ALL previous shows (clean slate) then starts new ones
#
# Show feedback: no_margin_for_error_made / no_margin_for_error_miss (speed 30)
####################################################################################

show_player:

  ##############################################
  ## GI — Red at mode start
  ##############################################
  bthd_set_gi_red:
    bthd_gi_mode:
      show: bthd_gi_red
      key: bthd_gi_key
      loops: -1

  ##############################################
  ## SHOT FEEDBACK
  ##############################################
  bthd_show_made:
    bthd_made_show:
      show: bthd_made
      speed: 30
      loops: 0

  bthd_show_miss:
    bthd_miss_show:
      show: bthd_miss
      speed: 30
      loops: 0

  ##############################################
  ## POSITION 0 — LO yellow, LL+LR red, rest off
  ##############################################
  bthd_setup_pos_0:
    # Stop all previous shows
    stop_good:
      show: sync_flash_mode
      action: stop
      key: bthd_good_shot_key
    stop_bad1:
      show: bthd_solid_red
      action: stop
      key: bthd_bad_1_key
    stop_bad2:
      show: bthd_solid_red
      action: stop
      key: bthd_bad_2_key
    # Clear all shots to off
    off_ll:
      show: bthd_shot_off
      key: bthd_off_ll
      loops: 0
      show_tokens: { led: l_shot_left_lane }
    off_lr:
      show: bthd_shot_off
      key: bthd_off_lr
      loops: 0
      show_tokens: { led: l_shot_left_ramp }
    off_sp:
      show: bthd_shot_off
      key: bthd_off_sp
      loops: 0
      show_tokens: { led: l_shot_spinner }
    off_cnt:
      show: bthd_shot_off
      key: bthd_off_cnt
      loops: 0
      show_tokens: { led: l_shot_barrier }
    off_twr:
      show: bthd_shot_off
      key: bthd_off_twr
      loops: 0
      show_tokens: { led: l_shot_tower_ramp }
    off_rr:
      show: bthd_shot_off
      key: bthd_off_rr
      loops: 0
      show_tokens: { led: l_shot_right_orbit }
    # Good: LO yellow
    bthd_good:
      show: sync_flash_mode
      key: bthd_good_shot_key
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_left_orbit, color: FFFF00 }
    # Bad: LL red, LR red
    bthd_bad1:
      show: bthd_solid_red
      key: bthd_bad_1_key
      loops: -1
      show_tokens: { led: l_shot_left_lane }
    bthd_bad2:
      show: bthd_solid_red
      key: bthd_bad_2_key
