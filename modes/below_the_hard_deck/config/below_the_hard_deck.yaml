####################################################################################
# SHOWS
####################################################################################

shows:

  # Solid red — bad shot indicator
  bthd_solid_red:
    - duration: 1s
      lights:
        (led):
          color: FF0000

  # Turn shot off
  bthd_shot_off:
    - duration: 1s
      lights:
        (led):
          color: off

  # GI deep red — entire GI for mode atmosphere
  # NOTE: GI lights use type: grb (ports 3/4) — hex values map correctly per config
  bthd_gi_red:
