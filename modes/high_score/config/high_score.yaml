#config_version=6

##############################################################################
## HIGH SCORE MODE
##############################################################################
##
## One category (score), 15 entries split across two attract slides:
##   Positions 1–5  → high_score_top_5.tscn   (name + score)
##   Positions 6–15 → high_score_alternates.tscn (name only)
##
## MACHINE VARIABLES created automatically by MPF (use in Godot MPFVariable nodes):
##   score1_name   … score15_name    — player name strings
##   score1_value  … score15_value   — score integers
##   score1_label  … score15_label   — rank label strings
##
## FLOW:
##   high_score_enter_initials fires → high_score_entry slide plays
##     MPF also sets hs_player_num, hs_score_value, hs_award_text machine vars
##     Godot drives letter selection via hs_letter_index machine var
##     20s Godot timer → posts text_input_high_score_complete{text: "NAME"}
##   high_score_award_display fires → high_score_award slide plays 4s
##   Repeat for each qualifying player, then mode stops
##
## TO RESET DEFAULTS (e.g. after each show):
##   Delete: <machine>/data/high_scores.yaml  and restart MPF
##   OR post: reset_high_scores event (service mode / remote)
##
## TO UPDATE DEFAULT SCORES:
##   Edit the defaults: section below. Scores must be in descending order.
##   Names can be up to 20 characters.
##############################################################################

mode:
  code: mpf.modes.high_score.code.high_score.HighScore
  priority: 1500
  start_events: game_ending
  game_mode: false
  use_wait_queue: true

high_score:
  _overwrite: true
  # MPF's internal timeout — always longer than our 20s Godot timer.
  # Godot always fires text_input_high_score_complete before this.
  enter_initials_timeout: 60
  # Award display time after name entered (milliseconds)
  award_slide_display_time: 4000
  # Safety filler if MPF timeout somehow fires before Godot does
  filler_initials:
    - LFS
  reset_high_scores_events: reset_high_scores

  categories:
    score:
      # ── TOP 5 — shown on high_score_top_5 slide ────────────────────────
      - You're the new top gun!
      - Almost at the top!
      - Never Leave your Wingman!
      - Are you a good Pilot?
      - It's the Cargo Plane for you!
      # ── ALTERNATES 6–15 — shown on high_score_alternates slide ─────────
      - 6th Place
      - 7th Place
      - 8th Place
      - 9th Place
      - 10th Place
      - 11th Place
      - 12th Place
      - 13th Place
      - 14th Place
      - 15th Place

  defaults:
    score:
      ##------------------------------------------------------------------
      ## EDIT BEFORE EACH SHOW — update names and scores as desired.
      ## Must stay in descending score order.
      ## Names max 20 characters, uppercase only.
      ##------------------------------------------------------------------
      # ── TOP 5 ──────────────────────────────────────────────────────────
      - MAVERICK: 25000000
      - ICEMAN: 20000000
      - ROOSTER: 15000000
      - PENNY: 10000000
      - GOOSE: 7500000
      # ── ALTERNATES 6–15 ────────────────────────────────────────────────
      - VIPER: 6000000
      - MERLIN: 5000000
      - SLIDER: 4500000
      - WOLFMAN: 4000000
      - SUNDOWN: 3500000
      - HOLLYWOOD: 3000000
      - EINSTEIN: 2500000
      - LFS: 2000000
      - LFS: 1500000
      - LFS: 1000000

##############################################################################
## EVENT PLAYER
##############################################################################

event_player:
  # Route flipper and start inputs to named nav events.
  # Conditions ensure they ONLY fire during high score entry.
  # Start button is blocked from triggering game_starting by
  # high_score mode's priority 1500 (higher than attract at 10).
  s_flipper_left_active{mode.high_score.active}:
    - hs_nav_prev
  s_flipper_right_active{mode.high_score.active}:
    - hs_nav_next
  s_start_active{mode.high_score.active}:
    - hs_nav_select

  # When Godot detects name is at max length, it posts hs_name_full.
  # MPF jumps letter cursor to FINISH position (index 28).
  hs_name_full:
    - hs_set_finish

##############################################################################
## VARIABLE PLAYER
## - Manages hs_letter_index machine var (drives carousel in Godot)
## - Manages hs_select_trigger machine var (signals Godot to process a select)
## - Captures high_score_enter_initials event kwargs into machine vars for display
##############################################################################

variable_player:

  ##------------------------------------------------------------------------
  ## Reset on each new entry prompt (not just mode start, since multiple
  ## players may qualify and entry fires multiple times)
  ##------------------------------------------------------------------------
  high_score_enter_initials:
    hs_entry_made:
      action: set_machine
      int: 1
    hs_letter_index:
      action: set_machine
      int: 0
    hs_select_trigger:
      action: set_machine
      int: 0
    # Capture event kwargs directly — player_num, value, award are event args
    hs_player_num:
      action: set_machine
      int: player_num
    hs_score_value:
      action: set_machine
      int: value
    hs_award_text:
      action: set_machine
      string: award

  ##------------------------------------------------------------------------
  ## Letter carousel navigation — wraps at both ends
  ##------------------------------------------------------------------------
  hs_nav_prev{machine.hs_letter_index > 0}:
    hs_letter_index:
      action: add_machine
      int: -1
  hs_nav_prev{machine.hs_letter_index == 0}:
    hs_letter_index:
      action: set_machine
      int: 28    # wrap A → FINISH

  hs_nav_next{machine.hs_letter_index < 28}:
    hs_letter_index:
      action: add_machine
      int: 1
  hs_nav_next{machine.hs_letter_index == 28}:
    hs_letter_index:
      action: set_machine
      int: 0     # wrap FINISH → A

  ##------------------------------------------------------------------------
  ## Select trigger — increments so Godot detects the change event
  ##------------------------------------------------------------------------
  hs_nav_select:
    hs_select_trigger:
      action: add_machine
      int: 1

  ##------------------------------------------------------------------------
  ## Jump to FINISH (index 28) when name is full
  ##------------------------------------------------------------------------
  hs_set_finish:
    hs_letter_index:
      action: set_machine
      int: 28

##############################################################################
## SLIDE PLAYER
##############################################################################

slide_player:
  # Name entry: show entry UI, clear any award slide
  high_score_enter_initials:
    high_score_entry:
      action: play
      priority: 1600
    high_score_award:
      action: remove

  # Award display: brief congratulations slide
  high_score_award_display:
    high_score_award:
      action: play
      priority: 1600
    high_score_entry:
      action: remove

  # Cleanup when mode ends
  mode_high_score_stopped:
    high_score_entry:
      action: remove
    high_score_award:
      action: remove

##############################################################################
## SOUND PLAYER
##############################################################################

sound_player:
  # Music starts on name entry — end_of_game_attract restarts it on hs_display_start
  # so it continues through the leaderboard slides.
  high_score_enter_initials:
    music_high_score:
      bus: music
      loops: -1

  # Voice congrats fires when award slide displays (after name submitted)

  # Voice congrats fires when award slide displays (after name submitted)
  high_score_award_display:
    voice_high_score_congrats:
      bus: voice
      loops: 0

##############################################################################
## SHOW PLAYER
##############################################################################

show_player:
  high_score_enter_initials:
    high_score_entry_lights:
      loops: -1
      speed: 1
      priority: 1500

  high_score_award_display:
    high_score_award_lights:
      loops: 3
      speed: 1
      priority: 1500

  mode_high_score_stopped:
    high_score_entry_lights:
      action: stop
    high_score_award_lights:
      action: stop