      show_tokens: { led: l_shot_middle_ramp, color: white }
    qual_rr_d:
      show: sync_flash_mode
      key: qual_rr
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_right_orbit, color: white }

  ##############################################
  ## UPDATE_TRAINING_QUAL_LIGHTS
  ## Evaluates both pilot mission tier and training/HD qualification
  ## to determine the correct show for LL and TL.
  ##
  ## LL rules (missions 1-2 only — not in qual set at mission 3+):
  ##   qual set + no training/HD  → white (sync_flash_mode)
  ##   qual set + training/HD lit → combined white/blue (qual_combined)
  ##   not in qual set + training/HD lit → blue (sync_flash_mb)
  ##   not in qual set + no training/HD  → stop (off)
  ##
  ## TL rules (always in qual set):
  ##   no training/HD  → white (sync_flash_mode)
  ##   training/HD lit → combined white/blue (qual_combined)
  ##############################################

  # ── LL: missions 1-2, no training/HD ──────────────────────────────
  update_training_qual_lights{current_player.pilot_missions_played<=1 and current_player.training_mission_qualified==0 and current_player.hard_deck_qualified_mode==0 and current_player.letter_collection_paused==0 and current_player.pilot_qualifier_paused==0 and current_player.qualified_mode_number==0}:
    qual_ll_white:
      show: sync_flash_mode
      key: qual_ll
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_left_lane, color: white }

  # ── LL: missions 1-2, no training/HD, pilot qualified — off ────────
  update_training_qual_lights{current_player.pilot_missions_played<=1 and current_player.training_mission_qualified==0 and current_player.hard_deck_qualified_mode==0 and current_player.qualified_mode_number>0}:
    qual_ll_qualified_off:
      show: sync_flash_mode
      action: stop
      key: qual_ll

  # ── LL: missions 1-2, training qualified, pilot not yet qualified ───
  # Combined — shot lit for both letter collecting AND training/HD
  update_training_qual_lights{current_player.pilot_missions_played<=1 and current_player.training_mission_qualified>0 and current_player.letter_collection_paused==0 and current_player.pilot_qualifier_paused==0 and current_player.qualified_mode_number==0}:
    qual_ll_combined_t:
      show: qual_combined
      key: qual_ll
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_left_lane }

  # ── LL: missions 1-2, hard deck qualified, pilot not yet qualified ──
  # Combined — shot lit for both letter collecting AND HD
  update_training_qual_lights{current_player.pilot_missions_played<=1 and current_player.training_mission_qualified==0 and current_player.hard_deck_qualified_mode>0 and current_player.letter_collection_paused==0 and current_player.pilot_qualifier_paused==0 and current_player.qualified_mode_number==0}:
    qual_ll_combined_hd:
      show: qual_combined
      key: qual_ll
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_left_lane }

  # ── LL: missions 1-2, training qualified, pilot mission qualified ───
  # Blue only — qualifying flash is off so no double duty
  update_training_qual_lights{current_player.pilot_missions_played<=1 and current_player.training_mission_qualified>0 and current_player.letter_collection_paused==0 and current_player.pilot_qualifier_paused==0 and current_player.qualified_mode_number>0}:
    qual_ll_blue_t_qd:
      show: sync_flash_mode
