  # ── LL: missions 1-2, hard deck qualified, pilot mission qualified ──
  # Blue only — qualifying flash is off so no double duty
  update_training_qual_lights{current_player.pilot_missions_played<=1 and current_player.training_mission_qualified==0 and current_player.hard_deck_qualified_mode>0 and current_player.letter_collection_paused==0 and current_player.pilot_qualifier_paused==0 and current_player.qualified_mode_number>0}:
    qual_ll_blue_hd_qd:
      show: sync_flash_mode
      key: qual_ll
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_left_lane, color: 80A2DF }

  # ── LL: missions 3+, training qualified ────────────────────────────
  update_training_qual_lights{current_player.pilot_missions_played>=2 and current_player.training_mission_qualified>0 and current_player.letter_collection_paused==0 and current_player.pilot_qualifier_paused==0}:
    qual_ll_blue_t:
      show: sync_flash_mode
      key: qual_ll
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_left_lane, color: 80A2DF }

  # ── LL: missions 3+, hard deck qualified (training not qualified) ───
  update_training_qual_lights{current_player.pilot_missions_played>=2 and current_player.training_mission_qualified==0 and current_player.hard_deck_qualified_mode>0 and current_player.letter_collection_paused==0 and current_player.pilot_qualifier_paused==0}:
    qual_ll_blue_hd:
      show: sync_flash_mode
      key: qual_ll
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_left_lane, color: 80A2DF }

  # ── LL: missions 3+, nothing qualified — stop ──────────────────────
  update_training_qual_lights{current_player.pilot_missions_played>=2 and current_player.training_mission_qualified==0 and current_player.hard_deck_qualified_mode==0}:
    qual_ll_off:
      show: sync_flash_mode
      action: stop
      key: qual_ll

  # ── LL + TL: letter_collection_paused — stop both ─────────────────
  update_training_qual_lights{current_player.letter_collection_paused==1}:
    qual_ll_paused_lcp:
      show: sync_flash_mode
      action: stop
      key: qual_ll
    qual_tl_paused_lcp:
      show: sync_flash_mode
      action: stop
      key: qual_tl

  # ── LL + TL: pilot_qualifier_paused — stop both ────────────────────
  update_training_qual_lights{current_player.pilot_qualifier_paused==1}:
    qual_ll_paused_pqp:
      show: sync_flash_mode
      action: stop
      key: qual_ll
    qual_tl_paused_pqp:
      show: sync_flash_mode
      action: stop
      key: qual_tl

  # ── TL: no training/HD, pilot not yet qualified — white ────────────
  update_training_qual_lights{current_player.training_mission_qualified==0 and current_player.hard_deck_qualified_mode==0 and current_player.letter_collection_paused==0 and current_player.pilot_qualifier_paused==0 and current_player.qualified_mode_number==0}:
    qual_tl_white:
      show: sync_flash_mode
      key: qual_tl
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_upper_orbit, color: white }

  # ── TL: no training/HD, pilot qualified — stop (qual show handles TL separately) ─
  update_training_qual_lights{current_player.training_mission_qualified==0 and current_player.hard_deck_qualified_mode==0 and current_player.letter_collection_paused==0 and current_player.pilot_qualifier_paused==0 and current_player.qualified_mode_number>0}:
    qual_tl_qualified_off:
      show: sync_flash_mode
      action: stop
      key: qual_tl

  # ── TL: training qualified, pilot not yet qualified — combined ──────
  # Combined — TL lit for both letter collecting AND training/HD
  update_training_qual_lights{current_player.training_mission_qualified>0 and current_player.letter_collection_paused==0 and current_player.pilot_qualifier_paused==0 and current_player.qualified_mode_number==0}:
    qual_tl_combined_t:
      show: qual_combined
      key: qual_tl
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_upper_orbit }

  # ── TL: training qualified, pilot already qualified — blue only ─────
  # Blue only — qualifying flash is off so no double duty
  update_training_qual_lights{current_player.training_mission_qualified>0 and current_player.letter_collection_paused==0 and current_player.pilot_qualifier_paused==0 and current_player.qualified_mode_number>0}:
    qual_tl_blue_t_qd:
      show: sync_flash_mode
      key: qual_tl
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_upper_orbit, color: 80A2DF }

  # ── TL: hard deck qualified (training not), pilot not yet qualified — combined ─
  # Combined — TL lit for both letter collecting AND HD
  update_training_qual_lights{current_player.training_mission_qualified==0 and current_player.hard_deck_qualified_mode>0 and current_player.letter_collection_paused==0 and current_player.pilot_qualifier_paused==0 and current_player.qualified_mode_number==0}:
    qual_tl_combined_hd:
      show: qual_combined
      key: qual_tl
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_upper_orbit }

  # ── TL: hard deck qualified (training not), pilot already qualified — blue only ─
  # Blue only — qualifying flash is off so no double duty
  update_training_qual_lights{current_player.training_mission_qualified==0 and current_player.hard_deck_qualified_mode>0 and current_player.letter_collection_paused==0 and current_player.pilot_qualifier_paused==0 and current_player.qualified_mode_number>0}:
    qual_tl_blue_hd_qd:
      show: sync_flash_mode
      key: qual_tl
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_upper_orbit, color: 80A2DF }

  # Stop all pulse shows so new one can start
  stop_all_mode_pulse_shows:
    rescue_cougar_pulse:
      action: stop
    balls_of_fire_pulse:
      action: stop
    cool_under_pressure_pulse:
      action: stop
    battle_jester_pulse:
      action: stop
    no_points_pulse:
      action: stop
    edge_of_space_pulse:
      action: stop
    below_hard_deck_pulse:
      action: stop
