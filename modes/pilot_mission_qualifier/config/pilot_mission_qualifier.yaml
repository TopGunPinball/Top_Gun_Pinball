    qualify_balls_of_fire
  
  rotate_qualified_mode_backwards{current_player.qualified_mode_number==3 and current_player.mode_balls_of_fire_played==1 and current_player.mode_rescue_cougar_played==0}:
    qualify_rescue_cougar
  
  rotate_qualified_mode_backwards{current_player.qualified_mode_number==2 and current_player.mode_rescue_cougar_played==0}:
    qualify_rescue_cougar
  
  # If at mode 2 and mode 1 is played, wrap to mode 10
  rotate_qualified_mode_backwards{current_player.qualified_mode_number==2 and current_player.mode_rescue_cougar_played==1 and current_player.mode_edge_of_space_played==0}:
    qualify_edge_of_space
  
  rotate_qualified_mode_backwards{current_player.qualified_mode_number==2 and current_player.mode_rescue_cougar_played==1 and current_player.mode_edge_of_space_played==1 and current_player.mode_below_the_hard_deck_played==0}:
    qualify_below_the_hard_deck
  
  rotate_qualified_mode_backwards{current_player.qualified_mode_number==2 and current_player.mode_rescue_cougar_played==1 and current_player.mode_no_margin_for_error_played==1 and current_player.mode_rise_of_phoenix_played==1 and current_player.mode_canyon_run_played==0}:
    qualify_canyon_run
  
  rotate_qualified_mode_backwards{current_player.qualified_mode_number==2 and current_player.mode_rescue_cougar_played==1 and current_player.mode_no_margin_for_error_played==1 and current_player.mode_rise_of_phoenix_played==1 and current_player.mode_canyon_run_played==1 and current_player.mode_below_the_hard_deck_played==0}:
    qualify_rise_of_phoenix
  
  rotate_qualified_mode_backwards{current_player.qualified_mode_number==2 and current_player.mode_rescue_cougar_played==1 and current_player.mode_edge_of_space_played==1 and current_player.mode_below_the_hard_deck_played==1 and current_player.mode_canyon_run_played==1 and current_player.mode_rise_of_phoenix_played==1 and current_player.mode_no_margin_for_error_played==0}:
    qualify_no_margin_for_error
  
  rotate_qualified_mode_backwards{current_player.qualified_mode_number==2 and current_player.mode_rescue_cougar_played==1 and current_player.mode_no_margin_for_error_played==1 and current_player.mode_rise_of_phoenix_played==1 and current_player.mode_canyon_run_played==1 and current_player.mode_below_the_hard_deck_played==1 and current_player.mode_edge_of_space_played==1 and current_player.mode_no_points_for_second_place_played==0}:
    qualify_no_points_for_second_place
  
  rotate_qualified_mode_backwards{current_player.qualified_mode_number==2 and current_player.mode_rescue_cougar_played==1 and current_player.mode_no_margin_for_error_played==1 and current_player.mode_rise_of_phoenix_played==1 and current_player.mode_canyon_run_played==1 and current_player.mode_below_the_hard_deck_played==1 and current_player.mode_edge_of_space_played==1 and current_player.mode_no_points_for_second_place_played==1 and current_player.mode_battle_jester_played==0}:
    qualify_battle_jester
  
  rotate_qualified_mode_backwards{current_player.qualified_mode_number==2 and current_player.mode_rescue_cougar_played==1 and current_player.mode_no_margin_for_error_played==1 and current_player.mode_rise_of_phoenix_played==1 and current_player.mode_canyon_run_played==1 and current_player.mode_below_the_hard_deck_played==1 and current_player.mode_edge_of_space_played==1 and current_player.mode_no_points_for_second_place_played==1 and current_player.mode_battle_jester_played==1 and current_player.mode_cool_under_pressure_played==0}:
    qualify_cool_under_pressure
  
  
  # Mode 1 wraps back to mode 10 (edge_of_space) when rotating backward
  rotate_qualified_mode_backwards{current_player.qualified_mode_number==1 and current_player.mode_edge_of_space_played==0}:
    qualify_edge_of_space
  
  rotate_qualified_mode_backwards{current_player.qualified_mode_number==1 and current_player.mode_edge_of_space_played==1 and current_player.mode_below_the_hard_deck_played==0}:
    qualify_below_the_hard_deck
  
  rotate_qualified_mode_backwards{current_player.qualified_mode_number==1 and current_player.mode_no_margin_for_error_played==1 and current_player.mode_rise_of_phoenix_played==1 and current_player.mode_canyon_run_played==0}:
    qualify_canyon_run
  
  rotate_qualified_mode_backwards{current_player.qualified_mode_number==1 and current_player.mode_no_margin_for_error_played==1 and current_player.mode_rise_of_phoenix_played==1 and current_player.mode_canyon_run_played==1 and current_player.mode_below_the_hard_deck_played==0}:
    qualify_rise_of_phoenix
  
  rotate_qualified_mode_backwards{current_player.qualified_mode_number==1 and current_player.mode_edge_of_space_played==1 and current_player.mode_below_the_hard_deck_played==1 and current_player.mode_canyon_run_played==1 and current_player.mode_rise_of_phoenix_played==1 and current_player.mode_no_margin_for_error_played==0}:
    qualify_no_margin_for_error
  
  rotate_qualified_mode_backwards{current_player.qualified_mode_number==1 and current_player.mode_no_margin_for_error_played==1 and current_player.mode_rise_of_phoenix_played==1 and current_player.mode_canyon_run_played==1 and current_player.mode_below_the_hard_deck_played==1 and current_player.mode_edge_of_space_played==1 and current_player.mode_no_points_for_second_place_played==0}:
    qualify_no_points_for_second_place
  
  rotate_qualified_mode_backwards{current_player.qualified_mode_number==1 and current_player.mode_no_margin_for_error_played==1 and current_player.mode_rise_of_phoenix_played==1 and current_player.mode_canyon_run_played==1 and current_player.mode_below_the_hard_deck_played==1 and current_player.mode_edge_of_space_played==1 and current_player.mode_no_points_for_second_place_played==1 and current_player.mode_battle_jester_played==0}:
    qualify_battle_jester
  
  rotate_qualified_mode_backwards{current_player.qualified_mode_number==1 and current_player.mode_no_margin_for_error_played==1 and current_player.mode_rise_of_phoenix_played==1 and current_player.mode_canyon_run_played==1 and current_player.mode_below_the_hard_deck_played==1 and current_player.mode_edge_of_space_played==1 and current_player.mode_no_points_for_second_place_played==1 and current_player.mode_battle_jester_played==1 and current_player.mode_cool_under_pressure_played==0}:
    qualify_cool_under_pressure
  
  rotate_qualified_mode_backwards{current_player.qualified_mode_number==1 and current_player.mode_no_margin_for_error_played==1 and current_player.mode_rise_of_phoenix_played==1 and current_player.mode_canyon_run_played==1 and current_player.mode_below_the_hard_deck_played==1 and current_player.mode_edge_of_space_played==1 and current_player.mode_no_points_for_second_place_played==1 and current_player.mode_battle_jester_played==1 and current_player.mode_cool_under_pressure_played==1 and current_player.mode_balls_of_fire_played==0}:
    qualify_balls_of_fire

  ##############################################
  ## Mode Selection - Start Mode on Scoop Hit
  ##############################################
  
  # Mode selection based on qualified mode when scoop is hit
  # Training mission must not be active
  # multiball_qualified must be 0 (if both qualified, choice system handles it)
  s_mode_start_active{current_player.qualified_mode_number==1 and current_player.mode_rescue_cougar_played==0 and current_player.training_mission_active==0 and current_player.hard_deck_active==0 and current_player.multiball_qualified==0 and current_player.mystery_qualified==0}:
    - start_mode_rescue_cougar
  
  s_mode_start_active{current_player.qualified_mode_number==2 and current_player.mode_balls_of_fire_played==0 and current_player.training_mission_active==0 and current_player.hard_deck_active==0 and current_player.multiball_qualified==0 and current_player.mystery_qualified==0}:
    - start_mode_balls_of_fire
  
  s_mode_start_active{current_player.qualified_mode_number==3 and current_player.mode_cool_under_pressure_played==0 and current_player.training_mission_active==0 and current_player.hard_deck_active==0 and current_player.multiball_qualified==0 and current_player.mystery_qualified==0}:
    - start_mode_cool_under_pressure
  
  s_mode_start_active{current_player.qualified_mode_number==4 and current_player.mode_battle_jester_played==0 and current_player.training_mission_active==0 and current_player.hard_deck_active==0 and current_player.multiball_qualified==0 and current_player.mystery_qualified==0}:
    - start_mode_battle_jester
  
  s_mode_start_active{current_player.qualified_mode_number==5 and current_player.mode_no_points_for_second_place_played==0 and current_player.training_mission_active==0 and current_player.hard_deck_active==0 and current_player.multiball_qualified==0 and current_player.mystery_qualified==0}:
    - start_mode_no_points_for_second_place
  
  s_mode_start_active{current_player.qualified_mode_number==6 and current_player.mode_no_margin_for_error_played==0 and current_player.training_mission_active==0 and current_player.hard_deck_active==0 and current_player.multiball_qualified==0 and current_player.mystery_qualified==0}:
    - start_mode_no_margin_for_error
  
  s_mode_start_active{current_player.qualified_mode_number==7 and current_player.mode_rise_of_phoenix_played==0 and current_player.training_mission_active==0 and current_player.hard_deck_active==0 and current_player.multiball_qualified==0 and current_player.mystery_qualified==0}:
    - start_mode_rise_of_phoenix
  
  s_mode_start_active{current_player.qualified_mode_number==8 and current_player.mode_canyon_run_played==0 and current_player.training_mission_active==0 and current_player.hard_deck_active==0 and current_player.multiball_qualified==0 and current_player.mystery_qualified==0}:
    - start_mode_canyon_run
  
  s_mode_start_active{current_player.qualified_mode_number==9 and current_player.mode_below_the_hard_deck_played==0 and current_player.training_mission_active==0 and current_player.hard_deck_active==0 and current_player.multiball_qualified==0 and current_player.mystery_qualified==0}:
    - start_mode_below_the_hard_deck
  
  s_mode_start_active{current_player.qualified_mode_number==10 and current_player.mode_edge_of_space_played==0 and current_player.training_mission_active==0 and current_player.hard_deck_active==0 and current_player.multiball_qualified==0 and current_player.mystery_qualified==0}:
    - start_mode_edge_of_space

  ##############################################
  ## MYSTERY AWARD - Scoop Routing
  ## Mystery fires FIRST even when pilot mission or TGMB is also qualified.
  ## pilot/MB scoop entries all have mystery_qualified==0 added so they
  ## cannot fire when mystery is pending. After mystery stops, the
  ## mode_mystery_award_stopped handlers below restart whatever was waiting.
  ##############################################
  s_mode_start_active{current_player.mystery_qualified==1 and current_player.pilot_mode_active==0 and current_player.training_mission_active==0 and current_player.hard_deck_active==0 and current_player.multiball_active==0}:
    - start_mode_mystery_award

  ##############################################
  ## MYSTERY AWARD - Auto-start pending mode after mystery stops
  ## The player already "paid" the scoop hit; after mystery completes
  ## the pending mode/MB fires automatically without re-hitting the scoop.
  ##
  ## HANDOFF FLOW (pilot pending, no MB):
  ##   - Barrier stayed UP throughout mystery (never dropped)
  ##   - Ball was ejected into barrier wall, bounced back, captured by pilot mode's hold
  ##   - mystery stopped 150ms after ball left (via s_mode_start_inactive conditional)
  ##   - mode_mystery_award_stopped fires → start_mode_xxx (NO barrier_drop — already UP)
  ##   - Intro video plays with barrier UP (coil stays cool — desired behavior)
  ##   - Intro ends → xxx_setup_step_1 fires → barrier_drop → ball ejects normally
  ##
  ## NORMAL FLOW (MB + pilot both, or no mode pending):
  ##   - Barrier dropped/raised normally during mystery eject
  ##   - barrier_drop fired here to restore scoop access
  ##
  ## Three cases:
  ##   Pilot only → here, no barrier_drop
  ##   Both qualified → here, barrier_drop + choice screen
  ##   TGMB only → top_gun_multiball_locks.yaml
  ##############################################

  ## Pilot only — barrier already UP, just start the mode
  mode_mystery_award_stopped{current_player.qualified_mode_number==1 and current_player.multiball_qualified==0 and current_player.pilot_mode_active==0 and current_player.training_mission_active==0 and current_player.hard_deck_active==0 and current_player.mystery_just_lit_pilot==0}:
    - start_mode_rescue_cougar
  mode_mystery_award_stopped{current_player.qualified_mode_number==2 and current_player.multiball_qualified==0 and current_player.pilot_mode_active==0 and current_player.training_mission_active==0 and current_player.hard_deck_active==0 and current_player.mystery_just_lit_pilot==0}:
    - start_mode_balls_of_fire
  mode_mystery_award_stopped{current_player.qualified_mode_number==3 and current_player.multiball_qualified==0 and current_player.pilot_mode_active==0 and current_player.training_mission_active==0 and current_player.hard_deck_active==0 and current_player.mystery_just_lit_pilot==0}:
    - start_mode_cool_under_pressure
  mode_mystery_award_stopped{current_player.qualified_mode_number==4 and current_player.multiball_qualified==0 and current_player.pilot_mode_active==0 and current_player.training_mission_active==0 and current_player.hard_deck_active==0 and current_player.mystery_just_lit_pilot==0}:
    - start_mode_battle_jester
  mode_mystery_award_stopped{current_player.qualified_mode_number==5 and current_player.multiball_qualified==0 and current_player.pilot_mode_active==0 and current_player.training_mission_active==0 and current_player.hard_deck_active==0 and current_player.mystery_just_lit_pilot==0}:
    - start_mode_no_points_for_second_place
  mode_mystery_award_stopped{current_player.qualified_mode_number==6 and current_player.multiball_qualified==0 and current_player.pilot_mode_active==0 and current_player.training_mission_active==0 and current_player.hard_deck_active==0 and current_player.mystery_just_lit_pilot==0}:
    - start_mode_no_margin_for_error
  mode_mystery_award_stopped{current_player.qualified_mode_number==7 and current_player.multiball_qualified==0 and current_player.pilot_mode_active==0 and current_player.training_mission_active==0 and current_player.hard_deck_active==0 and current_player.mystery_just_lit_pilot==0}:
    - start_mode_rise_of_phoenix
  mode_mystery_award_stopped{current_player.qualified_mode_number==8 and current_player.multiball_qualified==0 and current_player.pilot_mode_active==0 and current_player.training_mission_active==0 and current_player.hard_deck_active==0 and current_player.mystery_just_lit_pilot==0}:
    - start_mode_canyon_run
  mode_mystery_award_stopped{current_player.qualified_mode_number==9 and current_player.multiball_qualified==0 and current_player.pilot_mode_active==0 and current_player.training_mission_active==0 and current_player.hard_deck_active==0 and current_player.mystery_just_lit_pilot==0}:
    - start_mode_below_the_hard_deck
  mode_mystery_award_stopped{current_player.qualified_mode_number==10 and current_player.multiball_qualified==0 and current_player.pilot_mode_active==0 and current_player.training_mission_active==0 and current_player.hard_deck_active==0 and current_player.mystery_just_lit_pilot==0}:
    - start_mode_edge_of_space

  ## Both pilot mode AND TGMB qualified → choice screen.
  ## Normal eject path: barrier dropped + raised by mystery, so drop it again for scoop access.
  mode_mystery_award_stopped{current_player.qualified_mode_number>0 and current_player.multiball_qualified==1 and current_player.pilot_mode_active==0 and current_player.training_mission_active==0 and current_player.hard_deck_active==0}:
    - barrier_drop
    - mb_mode_choice_start

  ##############################################
  ## MYSTERY AWARD - Barrier Control
  ## Drop barrier when mystery qualifies, restore on ball start.
  ## Guarded: don't drop mid-mode (barrier is up for mode, would confuse)
  ##############################################
  player_mystery_qualified{value==1 and current_player.multiball_active==0 and current_player.pilot_mode_active==0 and current_player.training_mission_active==0 and current_player.hard_deck_active==0}:
    - barrier_drop

  # Restore barrier-down state on ball start when mystery is qualified
  # (only if no pilot mission is also qualified, which handles its own barrier)
  mode_pilot_mission_qualifier_started{current_player.mystery_qualified==1 and current_player.qualified_mode_number==0}:
    - barrier_drop

  # Restore barrier for mystery when modes end (mystery qualified during mode)
  # Only if no pilot mode or multiball is also qualified (they handle their own barrier)
  player_pilot_mode_active{value==0 and current_player.mystery_qualified==1 and current_player.qualified_mode_number==0 and current_player.multiball_qualified==0}:
    - barrier_drop

  player_training_mission_active{value==0 and current_player.mystery_qualified==1 and current_player.qualified_mode_number==0 and current_player.multiball_qualified==0 and current_player.pilot_mode_active==0 and current_player.hard_deck_active==0}:
    - barrier_drop

  player_hard_deck_active{value==0 and current_player.mystery_qualified==1 and current_player.qualified_mode_number==0 and current_player.multiball_qualified==0 and current_player.pilot_mode_active==0 and current_player.training_mission_active==0}:
    - barrier_drop

  ##############################################
  ## MULTIBALL + MODE CHOICE - Start Qualified Mode
  ## Fired by mb_mode_choice_stack in locks mode when player picks "stack"
  ##############################################
  mb_choice_start_qualified_mode{current_player.qualified_mode_number==1}:
    - start_mode_rescue_cougar
  mb_choice_start_qualified_mode{current_player.qualified_mode_number==2 and current_player.mode_balls_of_fire_played==0}:
    - start_mode_balls_of_fire
  mb_choice_start_qualified_mode{current_player.qualified_mode_number==3}:
    - start_mode_cool_under_pressure
  mb_choice_start_qualified_mode{current_player.qualified_mode_number==4}:
    - start_mode_battle_jester
  mb_choice_start_qualified_mode{current_player.qualified_mode_number==5}:
    - start_mode_no_points_for_second_place
  mb_choice_start_qualified_mode{current_player.qualified_mode_number==6}:
    - start_mode_no_margin_for_error
  mb_choice_start_qualified_mode{current_player.qualified_mode_number==7}:
    - start_mode_rise_of_phoenix
  mb_choice_start_qualified_mode{current_player.qualified_mode_number==8}:
    - start_mode_canyon_run
  mb_choice_start_qualified_mode{current_player.qualified_mode_number==9}:
    - start_mode_below_the_hard_deck
  mb_choice_start_qualified_mode{current_player.qualified_mode_number==10}:
    - start_mode_edge_of_space

  ##############################################
  ## RESTORE MODE-LIT STATE AFTER MULTIBALL ENDS
  ## If player chose "MB only" and mode is still qualified,
  ## drop barrier so scoop is available for mode start.
  ## Uses delayed event to fire AFTER locks mode's barrier_raise.
  ##############################################
  mode_top_gun_multiball_stopped{current_player.qualified_mode_number>0}:
    - restore_qualified_mode_light
  
  # Also restore barrier for mystery award after multiball (uses same delayed drop)
  mode_top_gun_multiball_stopped{current_player.mystery_qualified==1 and current_player.qualified_mode_number==0}:
    - restore_qualified_mode_light

  timer_post_mb_barrier_restore_complete:
    - barrier_drop
  
  ##############################################
  ##############################################
  ## SLIDE RESTORE AFTER TRAINING MISSIONS
  ## GMC doesn't re-activate covered slides, so we remove and re-play
  ##############################################
  mode_pilot_training_mission_wingman_stopped{current_player.qualified_mode_number>0}:
    - restore_qualifier_slide_after_wingman|100ms

  # GMC stale-slide fix: fire delayed restore for topgun progress slides on ball start
  mode_pilot_mission_qualifier_started{current_player.topgun_shots_collected==1 and current_player.qualified_mode_number==0}:
    - restore_topgun_progress_slide_1|200ms
  mode_pilot_mission_qualifier_started{current_player.topgun_shots_collected==2 and current_player.qualified_mode_number==0}:
    - restore_topgun_progress_slide_2|200ms
  mode_pilot_mission_qualifier_started{current_player.topgun_shots_collected==3 and current_player.qualified_mode_number==0}:
    - restore_topgun_progress_slide_3|200ms
  mode_pilot_mission_qualifier_started{current_player.topgun_shots_collected==4 and current_player.qualified_mode_number==0}:
    - restore_topgun_progress_slide_4|200ms
  mode_pilot_mission_qualifier_started{current_player.topgun_shots_collected==5 and current_player.qualified_mode_number==0}:
    - restore_topgun_progress_slide_5|200ms

  ## TOPGUN Reset Handler
  ##############################################
  
  # TOPGUN Letter Reset - triggered by any pilot mission mode starting
  reset_topgun_letters:
    - topgun_letters_reset
  
  # TOPGUN reset when any pilot mission mode starts
  # Also check if all pilot modes have now been played (for mystery award)
  # ball_search_reset + ball_search_block: prevents ball search from firing
  # during the scoop hold intro video (block alone doesn't reset the countdown)
  mode_rescue_cougar_started:
    - reset_topgun_letters
    - check_all_pilot_modes_played
    - ball_search_reset
    - ball_search_block
  
  mode_great_balls_of_fire_started:
    - reset_topgun_letters
    - check_all_pilot_modes_played
    - ball_search_reset
    - ball_search_block
  
  mode_cool_under_pressure_started:
    - reset_topgun_letters
    - check_all_pilot_modes_played
    - ball_search_reset
    - ball_search_block
  
  mode_battle_jester_started:
    - reset_topgun_letters
    - check_all_pilot_modes_played
    - ball_search_reset
    - ball_search_block
  
  mode_no_points_for_second_place_started:
    - reset_topgun_letters
    - check_all_pilot_modes_played
    - ball_search_reset
    - ball_search_block
  
  mode_edge_of_space_started:
    - reset_topgun_letters
    - check_all_pilot_modes_played
    - ball_search_reset
    - ball_search_block
  
  mode_below_the_hard_deck_started:
    - reset_topgun_letters
    - check_all_pilot_modes_played
    - ball_search_reset
    - ball_search_block
  
  mode_canyon_run_started:
    - reset_topgun_letters
    - check_all_pilot_modes_played
    - ball_search_reset
    - ball_search_block
  
  mode_rise_of_phoenix_started:
    - reset_topgun_letters
    - check_all_pilot_modes_played
    - ball_search_reset
    - ball_search_block
  
  mode_no_margin_for_error_started:
    - reset_topgun_letters
    - check_all_pilot_modes_played
    - ball_search_reset
    - ball_search_block

  # Ball search reset + block for hard deck modes (ball held in left lane post)
  mode_hard_deck_maverick_and_charlie_started:
    - ball_search_reset
    - ball_search_block
  mode_hard_deck_playing_with_the_boys_started:
    - ball_search_reset
    - ball_search_block
  mode_hard_deck_maverick_and_penny_started:
    - ball_search_reset
    - ball_search_block
  mode_hard_deck_honoring_iceman_started:
    - ball_search_reset
    - ball_search_block

  # Ball search reset + block for training missions (ball held in left lane post)
  mode_pilot_training_mission_inverted_started:
    - ball_search_reset
    - ball_search_block
  mode_pilot_training_mission_missiles_started:
    - ball_search_reset
    - ball_search_block
  mode_pilot_training_mission_afterburner_started:
    - ball_search_reset
    - ball_search_block
  mode_pilot_training_mission_wingman_started:
    - ball_search_reset
    - ball_search_block

  # Reset letters when new ball starts
  ball_will_end:
    topgun_letters_reset

  ##############################################
  ## ALL PILOT MODES PLAYED TRACKING
  ## Sets all_pilot_modes_played=1 when every pilot mission has been played.
  ## Used by mystery award to exclude "Light Pilot Mission" from award pool.
  ## Also checks on qualifier start since uncoded modes are force-marked played there.
  ##############################################

  check_all_pilot_modes_played{current_player.mode_rescue_cougar_played==1 and current_player.mode_balls_of_fire_played==1 and current_player.mode_cool_under_pressure_played==1 and current_player.mode_battle_jester_played==1 and current_player.mode_no_points_for_second_place_played==1 and current_player.mode_no_margin_for_error_played==1 and current_player.mode_rise_of_phoenix_played==1 and current_player.mode_canyon_run_played==1 and current_player.mode_below_the_hard_deck_played==1 and current_player.mode_edge_of_space_played==1}:
    - all_pilot_modes_played_set

  ##############################################
  ## QUALIFYING SHOW UPDATE TRIGGERS
  ## Posts update_qualifying_show to refresh insert flashing
  ## based on current tier, lock state, and letter progress
  ##############################################

  mode_pilot_mission_qualifier_started{current_player.qualified_mode_number==0 and current_player.letter_collection_paused==0 and current_player.pilot_qualifier_paused==0}:
    - update_qualifying_show
    - update_training_qual_lights

  player_letter_collection_paused{value==0 and current_player.qualified_mode_number==0 and current_player.pilot_qualifier_paused==0}:
    - update_qualifying_show
    - update_training_qual_lights

  player_pilot_qualifier_paused{value==0 and current_player.qualified_mode_number==0 and current_player.letter_collection_paused==0}:
    - update_qualifying_show
    - update_training_qual_lights

  player_lock_collection_paused{current_player.qualified_mode_number==0 and current_player.letter_collection_paused==0 and current_player.pilot_qualifier_paused==0}:
    - update_qualifying_show
    - update_training_qual_lights

  # (Tier D per-letter show update removed - no longer applicable)

  ##############################################
  ## INVERTED PERK: Bonus TOPGUN Letter (Tiered)
  ## Uses same tier rules as normal letter collection.
  ## TR lock gate removed. RO never gives letters.
  ##############################################

  # Left Lane (LL) - missions 1-2
  s_lane_left_active{current_player.pilot_qualifier_paused==0 and current_player.letter_collection_paused==0 and current_player.qualified_mode_number==0 and current_player.inverted_perk_active==1 and current_player.pilot_missions_played<=1}:
    - inverted_bonus_topgun_pending

  # Left Orbit (LO) - missions 1-5
  left_orbit_shot_hit{current_player.pilot_qualifier_paused==0 and current_player.letter_collection_paused==0 and current_player.qualified_mode_number==0 and current_player.inverted_perk_active==1 and current_player.pilot_missions_played<=4}:
    - inverted_bonus_topgun_pending

  # Left Ramp (LR) - always lit
  s_ramp_left_exit_active{current_player.pilot_qualifier_paused==0 and current_player.letter_collection_paused==0 and current_player.qualified_mode_number==0 and current_player.inverted_perk_active==1}:
    - inverted_bonus_topgun_pending

  # Spinner (SP) - missions 1-4, lock gate removed
  spinner_shot_made{current_player.pilot_qualifier_paused==0 and current_player.letter_collection_paused==0 and current_player.qualified_mode_number==0 and current_player.inverted_perk_active==1 and current_player.pilot_missions_played<=3}:
    - inverted_bonus_topgun_pending

  # Tower Ramp (TWR) - missions 1-5
  s_ramp_tower_exit_active{current_player.pilot_qualifier_paused==0 and current_player.letter_collection_paused==0 and current_player.qualified_mode_number==0 and current_player.inverted_perk_active==1 and current_player.pilot_missions_played<=4}:
    - inverted_bonus_topgun_pending

  # Top Loop (TL) - always lit
  s_orbit_upper_active{current_player.pilot_qualifier_paused==0 and current_player.letter_collection_paused==0 and current_player.qualified_mode_number==0 and current_player.inverted_perk_active==1}:
    - inverted_bonus_topgun_pending

  # Top Ramp (TR) - always lit, lock gate removed
  s_ramp_inner_exit_active{current_player.pilot_qualifier_paused==0 and current_player.letter_collection_paused==0 and current_player.qualified_mode_number==0 and current_player.inverted_perk_active==1}:
    - inverted_bonus_topgun_pending

  # Right Ramp (RR) - always lit
  s_ramp_right_exit_active{current_player.pilot_qualifier_paused==0 and current_player.letter_collection_paused==0 and current_player.qualified_mode_number==0 and current_player.inverted_perk_active==1}:
    - inverted_bonus_topgun_pending

  # Delayed bonus letter fires after 500ms timer
  timer_inverted_bonus_topgun_delay_complete:
    - inverted_bonus_topgun_letter

##############################################
## Show Player
##############################################

show_player:
  ##############################################
  ## QUALIFYING SHOT INSERT SHOWS (Tiered)
  ## Each lit shot runs its own sync_flash_mode instance with a unique key.
  ## All use sync_ms: 1000 so they flash in unison and don't conflict
  ## with other shows using different keys on the same lights.
  ## Stop driven by topgun_qualified and pause events.
  ##############################################

  # Stop all qualifying lights when TOPGUN complete
  topgun_qualified:
    qual_stop_ll_q:
      show: sync_flash_mode
      action: stop
      key: qual_ll
    qual_stop_lo_q:
      show: sync_flash_mode
      action: stop
      key: qual_lo
    qual_stop_lr_q:
      show: sync_flash_mode
      action: stop
