    qual_stop_tr_lcp:
      show: sync_flash_mode
      action: stop
      key: qual_tr
    qual_stop_rr_lcp:
      show: sync_flash_mode
      action: stop
      key: qual_rr

  # Stop all qualifying lights when pilot qualifier paused
  player_pilot_qualifier_paused{value==1 and current_player.qualified_mode_number==0}:
    qual_stop_ll_pqp:
      show: sync_flash_mode
      action: stop
      key: qual_ll
    qual_stop_lo_pqp:
      show: sync_flash_mode
      action: stop
      key: qual_lo
    qual_stop_lr_pqp:
      show: sync_flash_mode
      action: stop
      key: qual_lr
    qual_stop_sp_pqp:
      show: sync_flash_mode
      action: stop
      key: qual_sp
    qual_stop_twr_pqp:
