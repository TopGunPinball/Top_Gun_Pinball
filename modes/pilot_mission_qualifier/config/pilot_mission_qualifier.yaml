      show_tokens: { led: l_shot_spinner, color: white }
    qual_twr_a:
      show: sync_flash_mode
      key: qual_twr
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_tower_ramp, color: white }
    qual_tr_a:
      show: sync_flash_mode
      key: qual_tr
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_middle_ramp, color: white }
    qual_rr_a:
      show: sync_flash_mode
      key: qual_rr
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_right_orbit, color: white }

  # Missions 3-4 (played 2-3): LO, LR, SP, TWR, TL, TR, RR (no LL)
  update_qualifying_show{current_player.pilot_missions_played>=2 and current_player.pilot_missions_played<=3}:
    qual_stop_ll_b:
      show: sync_flash_mode
      action: stop
      key: qual_ll
    qual_stop_lo_b:
      show: sync_flash_mode
      action: stop
      key: qual_lo
    qual_stop_lr_b:
      show: sync_flash_mode
      action: stop
      key: qual_lr
    qual_stop_sp_b:
      show: sync_flash_mode
      action: stop
      key: qual_sp
    qual_stop_twr_b:
      show: sync_flash_mode
      action: stop
      key: qual_twr
    qual_stop_tl_b:
      show: sync_flash_mode
      action: stop
      key: qual_tl
    qual_stop_tr_b:
      show: sync_flash_mode
      action: stop
      key: qual_tr
    qual_stop_rr_b:
      show: sync_flash_mode
      action: stop
      key: qual_rr
    qual_lo_b:
      show: sync_flash_mode
      key: qual_lo
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_left_orbit, color: white }
    qual_lr_b:
      show: sync_flash_mode
      key: qual_lr
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_left_ramp, color: white }
    qual_sp_b:
      show: sync_flash_mode
      key: qual_sp
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_spinner, color: white }
    qual_twr_b:
      show: sync_flash_mode
      key: qual_twr
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_tower_ramp, color: white }
    qual_tr_b:
      show: sync_flash_mode
      key: qual_tr
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_middle_ramp, color: white }
    qual_rr_b:
      show: sync_flash_mode
      key: qual_rr
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_right_orbit, color: white }

  # Mission 5 (played 4): LO, LR, TWR, TL, TR, RR (no LL, no SP)
  update_qualifying_show{current_player.pilot_missions_played==4}:
    qual_stop_ll_c:
      show: sync_flash_mode
      action: stop
      key: qual_ll
    qual_stop_lo_c:
      show: sync_flash_mode
      action: stop
      key: qual_lo
    qual_stop_lr_c:
      show: sync_flash_mode
      action: stop
      key: qual_lr
    qual_stop_sp_c:
      show: sync_flash_mode
      action: stop
      key: qual_sp
    qual_stop_twr_c:
      show: sync_flash_mode
      action: stop
      key: qual_twr
    qual_stop_tl_c:
      show: sync_flash_mode
      action: stop
      key: qual_tl
    qual_stop_tr_c:
      show: sync_flash_mode
      action: stop
      key: qual_tr
    qual_stop_rr_c:
      show: sync_flash_mode
      action: stop
      key: qual_rr
    qual_lo_c:
      show: sync_flash_mode
      key: qual_lo
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_left_orbit, color: white }
    qual_lr_c:
      show: sync_flash_mode
      key: qual_lr
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_left_ramp, color: white }
    qual_twr_c:
      show: sync_flash_mode
      key: qual_twr
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_tower_ramp, color: white }
    qual_tr_c:
      show: sync_flash_mode
      key: qual_tr
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_middle_ramp, color: white }
    qual_rr_c:
      show: sync_flash_mode
      key: qual_rr
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_right_orbit, color: white }

  # Mission 6+ (played 5+): LR, TL, TR, RR only
  update_qualifying_show{current_player.pilot_missions_played>=5}:
    qual_stop_ll_d:
      show: sync_flash_mode
      action: stop
      key: qual_ll
    qual_stop_lo_d:
      show: sync_flash_mode
      action: stop
      key: qual_lo
    qual_stop_lr_d:
      show: sync_flash_mode
      action: stop
      key: qual_lr
    qual_stop_sp_d:
      show: sync_flash_mode
      action: stop
      key: qual_sp
    qual_stop_twr_d:
      show: sync_flash_mode
      action: stop
      key: qual_twr
    qual_stop_tl_d:
      show: sync_flash_mode
      action: stop
      key: qual_tl
    qual_stop_tr_d:
      show: sync_flash_mode
      action: stop
      key: qual_tr
    qual_stop_rr_d:
      show: sync_flash_mode
      action: stop
      key: qual_rr
    qual_lr_d:
      show: sync_flash_mode
      key: qual_lr
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_left_ramp, color: white }
    qual_tr_d:
      show: sync_flash_mode
      key: qual_tr
      sync_ms: 1000
