#config_version=6

##
## Pilot Mission Modes - Pure YAML
## Letters display based on shot COUNT, not specific shots
## Mode tracking with pulsing for available, solid for completed
## Mode rotation on spinner or flight_gear_target switch hits
##
## IMPORTANT: This mode stops when base mode stops (mode_base_stopped).
## Since base mode now stops on ball_ending (held by pilot mode queue_relay_player),
## this mode stays alive long enough to receive mode_xxx_stopped events from
## pilot missions and properly clear the letter_collection_paused flag.
##

mode:
  start_events: mode_base_started
  stop_events: mode_base_stopped
  priority: 200
  game_mode: true

##############################################
## SPINNER SHOT LOGIC
## A "spinner shot" requires 3 spins within 2 seconds.
## This prevents single weak spins from counting as shots,
## while still allowing fast spinning to progress modes.
##############################################

timers:
  spinner_shot_timeout:
    start_value: 0
    end_value: 2
    direction: up
    tick_interval: 1s
    control_events:
      - action: restart
        event: s_spinner_active
  
  # Spinner lockout - prevents rapid re-triggering after shot fires
  spinner_shot_lockout:
    start_value: 0
    end_value: 2
    direction: up
    tick_interval: 1s
    control_events:
      - action: restart
        event: spinner_shot_made

  ##############################################
  ## ORBIT SHOT TIMERS
  ## Orbit shots require entry switch then exit switch within 3 seconds
  ## Left orbit: s_orbit_left -> s_orbit_right
  ## Right orbit: s_orbit_right -> s_orbit_left
  ## NOTE: No orbit_pending variable - just use timer.running checks
  ## IMPORTANT: Use 'restart' action so timer resets each time!
  ##############################################
  
  left_orbit_shot_timeout:
    start_value: 0
    end_value: 3
    direction: up
    tick_interval: 1s
    control_events:
      - action: restart
        event: s_orbit_left_active
  
  right_orbit_shot_timeout:
    start_value: 0
    end_value: 3
    direction: up
    tick_interval: 1s
    control_events:
      - action: restart
        event: s_orbit_right_active

  ##############################################
  ## INVERTED PERK: Delay bonus TOPGUN letter by 500ms
  ## This prevents race condition where both normal and bonus letters
  ## fire in the same tick, causing slides to process in reversed order
  ##############################################
  inverted_bonus_topgun_delay:
    start_value: 0
    end_value: 1
    direction: up
    tick_interval: 500ms
    control_events:
      - action: restart
        event: inverted_bonus_topgun_pending

  ##############################################
  ## ORBIT SHOT LOCKOUT TIMER
  ## Prevents fast orbit pass from double-triggering composite shots
  ## When either orbit completes, lockout is set; timer clears it after 500ms
  ##############################################
  orbit_shot_lockout_timer:
    start_value: 0
    end_value: 1
    direction: up
    tick_interval: 500ms
    control_events:
      - action: restart
        event: left_orbit_shot_hit
      - action: restart
        event: right_orbit_shot_hit

  ##############################################
  ## POST-PLUNGE ORBIT LOCKOUT TIMER
  ## Prevents a plunged ball from immediately scoring a composite
  ## orbit shot (right or left) for 3 seconds after the ball
  ## leaves the shooter lane. The orbit switches still fire for
  ## all other purposes (scoring, sw_playfield_active, diverter
  ## restore, etc.) — only the composite mode shot is blocked.
  ##############################################
  post_plunge_orbit_lockout:
    start_value: 0
    end_value: 3
    direction: up
    tick_interval: 1s
    control_events:
      - action: restart
        event: s_shooter_lane_inactive

  ##############################################
  ## POST-MB BARRIER RESTORE
  ## Short delay after multiball stops so barrier_drop fires
  ## AFTER the locks mode's barrier_raise on the same event.
  ## Only starts if mode is still qualified (qualified_mode_number>0).
  ##############################################
  post_mb_barrier_restore:
    start_value: 0
    end_value: 1
    direction: up
    tick_interval: 500ms
    start_running: false
    control_events:
      - event: mode_top_gun_multiball_stopped{current_player.qualified_mode_number>0}
        action: restart

  ##############################################
  ## LEFT DIVERTER TL HOLD
  ## When hard deck or training mission is lit, hitting TL (s_orbit_upper)
  ## opens the left diverter for 2 seconds to feed ball to left lane.
  ## Shared event tl_open_left_diverter fired from both qualifiers.
  ##############################################
  left_diverter_tl_hold:
    start_value: 0
    end_value: 2
    direction: up
    tick_interval: 1s
    control_events:
      - event: tl_open_left_diverter
        action: restart
      - event: ball_ending
        action: stop

  ##############################################
  ## GLOBAL SCOOP BALL RELEASE HANDLER
  ## Modes post 'scoop_ball_release' instead of managing barrier_drop/raise
  ## themselves. This timer waits for the ball to fully exit the scoop
  ## then fires barrier_raise automatically.
  ##
  ## Usage pattern in any mode:
  ##   my_mode_ball_released: [scoop_ball_release]   (drops barrier, starts tracking)
  ##   my_mode_victory_ball_released: [scoop_ball_release]
  ##
  ## Flow: scoop_ball_release → barrier_drop + set scoop_release_pending=1
  ##       s_mode_start_inactive (while pending) → global_scoop_eject_start
  ##       s_mode_start_active  (ball bounced back) → global_scoop_eject_cancel
  ##       timer completes → barrier_raise + clear scoop_release_pending
  ##############################################
  global_scoop_eject_delay:
    start_value: 0
    end_value: 1
    direction: up
    tick_interval: 1s
    start_running: false
    control_events:
      - event: global_scoop_eject_start
        action: restart
      - event: global_scoop_eject_cancel
        action: stop
      - event: barrier_raise
        action: stop


slide_player:
  # Show initial slide when mode starts - ONLY if not qualified
  mode_pilot_mission_qualifier_started{current_player.topgun_shots_collected==0 and current_player.qualified_mode_number==0}:
    topgun_0:
      action: play
      priority: 200
  
  # Show slide for pre-lit letters - ONLY if not qualified
  # GMC stale-slide fix: mode_pilot_mission_qualifier_stopped removes these slides
  # milliseconds before ball-start re-fires this same event. GMC silently ignores
  # immediate re-plays of recently removed slides. Pattern: remove first here,
  # then event_player fires a 200ms delayed restore event to re-play it fresh.
  mode_pilot_mission_qualifier_started{current_player.topgun_shots_collected==3 and current_player.qualified_mode_number==0}:
    topgun_3:
      action: remove

  mode_pilot_mission_qualifier_started{current_player.topgun_shots_collected==4 and current_player.qualified_mode_number==0}:
    topgun_4:
      action: remove

  mode_pilot_mission_qualifier_started{current_player.topgun_shots_collected==5 and current_player.qualified_mode_number==0}:
    topgun_5:
      action: remove

  mode_pilot_mission_qualifier_started{current_player.topgun_shots_collected==2 and current_player.qualified_mode_number==0}:
    topgun_2:
      action: remove

  mode_pilot_mission_qualifier_started{current_player.topgun_shots_collected==1 and current_player.qualified_mode_number==0}:
    topgun_1:
      action: remove
  
  # If qualified and have completed all 6 letters, show topgun_6 on ball start
  mode_pilot_mission_qualifier_started{current_player.topgun_shots_collected==0 and current_player.qualified_mode_number>0}:
    topgun_6:
      action: play
      priority: 200
  
  # Update slides as letters light up - remove old slide first
  topgun_letter_t_lit:
    topgun_0:
      action: remove
    topgun_1:
      action: play
      priority: 200
  
  topgun_letter_o_lit:
    topgun_1:
      action: remove
    topgun_2:
      action: play
      priority: 200
  
  topgun_letter_p_lit:
    topgun_2:
      action: remove
    topgun_3:
      action: play
      priority: 200
  
  topgun_letter_g_lit:
    topgun_3:
      action: remove
    topgun_4:
      action: play
      priority: 200
  
  topgun_letter_u_lit:
    topgun_4:
      action: remove
    topgun_5:
      action: play
      priority: 200
  
  topgun_letter_n_lit:
    topgun_5:
      action: remove
    topgun_6:
      action: play
      priority: 200
  
  # Play completion video based on modes_completed_count
  # 2 second delay applied via event_player (topgun_show_complete_N events)
  topgun_show_complete_1:
    topgun_letters_complete_1:
      action: play
      priority: 300
  
  topgun_show_complete_2:
    topgun_letters_complete_2:
      action: play
      priority: 300
  
  topgun_show_complete_3:
    topgun_letters_complete_3:
      action: play
      priority: 300
  
  topgun_show_complete_4:
    topgun_letters_complete_4:
      action: play
      priority: 300
  
  # For 5th+ qualification, random videos are triggered via event_player -> random_event_player
  # See event_player and random_event_player sections below
  
  # Random video player entries (triggered by random_event_player, 2s delay applied upstream)
  play_topgun_complete_random_1:
    topgun_letters_complete_1:
      action: play
      priority: 300
  
  play_topgun_complete_random_2:
    topgun_letters_complete_2:
      action: play
      priority: 300
  
  play_topgun_complete_random_3:
    topgun_letters_complete_3:
      action: play
      priority: 300
  
  play_topgun_complete_random_4:
    topgun_letters_complete_4:
      action: play
      priority: 300
  
  # Reset to no letters - only show topgun_0 if NOT qualified (still collecting)
  topgun_letters_reset{current_player.qualified_mode_number==0}:
    topgun_6:
      action: remove
    topgun_0:
      action: play
      priority: 200
  
  # If qualified, just remove topgun_6 without showing anything
  topgun_letters_reset{current_player.qualified_mode_number>0}:
    topgun_6:
      action: remove
  
  # After wingman stops, remove stale topgun_6 so it can be re-played fresh
  # (GMC doesn't re-activate slides that were covered by higher-priority slides)
  mode_pilot_training_mission_wingman_stopped{current_player.qualified_mode_number>0}:
    topgun_6:
      action: remove
  
  # Re-play topgun_6 after brief delay (fired from event_player)
  restore_qualifier_slide_after_wingman:
    topgun_6:
      action: play
      priority: 200

  # Re-play topgun progress slides after 200ms delay on ball start (GMC stale-slide fix)
  restore_topgun_progress_slide_1:
    topgun_1:
      action: play
      priority: 200
  restore_topgun_progress_slide_2:
    topgun_2:
      action: play
      priority: 200
  restore_topgun_progress_slide_3:
    topgun_3:
      action: play
      priority: 200
  restore_topgun_progress_slide_4:
    topgun_4:
      action: play
      priority: 200
  restore_topgun_progress_slide_5:
    topgun_5:
      action: play
      priority: 200
  
  # Remove all slides when mode stops
  mode_pilot_mission_qualifier_stopped:
    topgun_0:
      action: remove
    topgun_1:
      action: remove
    topgun_2:
      action: remove
    topgun_3:
      action: remove
    topgun_4:
      action: remove
    topgun_5:
      action: remove
    topgun_6:
      action: remove

  ##############################################
  ## AFTERBURNER PERK INDICATOR
  ## Shown when afterburner perk is earned, persists until ball ends
  ## (managed here because the training mission mode stops after winning)
  ##############################################
  player_afterburner_perk_active{value==1}:
    afterburner_perk_active:
      action: play
      priority: 850

  player_afterburner_perk_active{value==0}:
    afterburner_perk_active:
      action: remove

  # Restore afterburner slide at ball start if perk is still active
  ball_started{current_player.afterburner_perk_active==1}:
    afterburner_perk_active:
      action: play
      priority: 850

  ##############################################
  ## WINGMAN PERK INDICATOR
  ## Shown when wingman perk is earned, persists until tilt or multiball extender used
  ## (managed here because the training mission mode stops after winning)
  ##############################################
  player_wingman_perk_active{value==1}:
    wingman_perk_active:
      action: play
      priority: 850

  player_wingman_perk_active{value==0}:
    wingman_perk_active:
      action: remove

  # Restore wingman slide at ball start if perk is still active
  ball_started{current_player.wingman_perk_active==1}:
    wingman_perk_active:
      action: play
      priority: 850

##############################################
## Player Variables - Track Progress
##############################################

variable_player:
  ##############################################
  ## GLOBAL SCOOP RELEASE TRACKING
  ##############################################
  scoop_ball_release:
    scoop_release_pending:
      action: set
      int: 1

  # Clear when barrier raises (either via global timer or direct barrier_raise call)
  barrier_raise:
    scoop_release_pending:
      action: set
      int: 0

  # Safety clear on ball end
  # (scoop_release_pending merged into the ball_will_end block below)

  player_added:
    ##########################################################################
    # NOTE: All pilot mission qualifier variables have been moved OUT of
    # player_added. They are initialized by their respective modes on
    # mode_started events (or auto-created with default 0 by MPF).
    #
    # REASON: player_added fires when ANY player joins, including mid-game.
    # If Player 2 joins during Player 1's multiball or pilot mode, these
    # resets would overwrite Player 1's live game state (e.g., resetting
    # letter_collection_paused=0 causes qualifying shot lights to flash
    # during multiball, topgun_shots_collected=0 loses letter progress).
    #
    # MPF auto-creates player variables with default 0 when first set/read,
    # which is the correct initial value for all these variables.
    ##########################################################################
    # Placeholder variable to prevent empty player_added section
    _pmq_initialized:
      action: set
      int: 1

  ##############################################
  ## ALL PILOT MODES PLAYED FLAG
  ## Set to 1 when every pilot mission's played flag is 1.
  ## Cleared automatically on new game (new player objects default all vars to 0).
  ##############################################
  all_pilot_modes_played_set:
    all_pilot_modes_played:
      action: set
      int: 1

  ##############################################
  ## MYSTERY AWARD QUALIFICATION
  ## Set mystery_qualified=1 when GOOSE milestone fires light_mystery_award.
  ## Lives here (not goose_letters) because qualifier is always running.
  ##############################################
  light_mystery_award:
    mystery_qualified:
      action: set
      int: 1

  ##########################################################################
  # SHOW BUILD: Mark uncoded modes as played so they are skipped in
  # qualification, rotation, and scoop start logic. Their inserts show
  # solid YELLOW instead of white. Fires each ball (idempotent set to 1).
  # player_added fires BEFORE this mode starts, so we use mode_started.
  # To re-enable a mode: remove its entry here AND change light to white.
  ##########################################################################
  mode_pilot_mission_qualifier_started:
    mode_cool_under_pressure_played:
      action: set
      int: 1

  mode_rescue_cougar_stopped:
    letter_collection_paused:
      action: set
      int: 0
    # Clear pilot mode active flag
    pilot_mode_active:
      action: set
      int: 0
    # Restore missiles perk (was disabled on mode complete to stop visual firing)
    missiles_perk_active:
      action: set
      int: current_player.missiles_perk_saved
    # Letter display tracking (based on count, not specific shots)
    topgun_letter_t:
      action: set
      int: 0
    topgun_letter_o:
      action: set
      int: 0
    topgun_letter_p:
      action: set
      int: 0
    topgun_letter_g:
      action: set
      int: 0
    topgun_letter_u:
      action: set
      int: 0
    topgun_letter_n:
      action: set
      int: 0

  # Clear pause flag when rise_of_phoenix stops
