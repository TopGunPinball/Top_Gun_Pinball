      action: stop
      key: qual_tl
    qual_stop_tr_pqp:
      show: sync_flash_mode
      action: stop
      key: qual_tr
    qual_stop_rr_pqp:
      show: sync_flash_mode
      action: stop
      key: qual_rr

  # Missions 1-2 (played 0-1): LL, LO, LR, SP, TWR, TL, TR, RR
  # NOTE: qual_ll and qual_tl NOT started here — update_training_qual_lights owns them
  update_qualifying_show{current_player.pilot_missions_played<=1}:
    qual_stop_ll_a:
      show: sync_flash_mode
      action: stop
      key: qual_ll
    qual_stop_lo_a:
      show: sync_flash_mode
      action: stop
      key: qual_lo
    qual_stop_lr_a:
      show: sync_flash_mode
      action: stop
      key: qual_lr
    qual_stop_sp_a:
      show: sync_flash_mode
      action: stop
      key: qual_sp
    qual_stop_twr_a:
      show: sync_flash_mode
      action: stop
      key: qual_twr
    qual_stop_tl_a:
      show: sync_flash_mode
      action: stop
      key: qual_tl
    qual_stop_tr_a:
      show: sync_flash_mode
      action: stop
      key: qual_tr
    qual_stop_rr_a:
      show: sync_flash_mode
      action: stop
      key: qual_rr
    qual_lo_a:
      show: sync_flash_mode
      key: qual_lo
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_left_orbit, color: white }
    qual_lr_a:
      show: sync_flash_mode
      key: qual_lr
      sync_ms: 1000
      loops: -1
