  ## SPOTTED LETTERS - Spot free letters at game start and after missions
  ## Mission 1 (played==0): 3 letters spotted (need 3 more)
  ## Mission 2 (played==1): 2 letters spotted (need 4 more)
  ## Mission 3 (played==2): 1 letter spotted  (need 5 more)
  ## Same cap as skillshot: won't overshoot qualification
  ##############################################
  spot_topgun_letter{current_player.topgun_shots_collected<6}:
    topgun_shots_collected:
      action: add
      int: 1


##############################################
## Coil Player - Mode Barrier Control
##############################################
# BARRIER SEMANTICS:
#   barrier_drop → action: enable → coil ON → barrier physically drops → path OPEN
#   barrier_raise → action: disable → coil OFF → barrier springs up → path BLOCKED
#
# All modes should use barrier_drop/barrier_raise events for consistency.
# Power settings defined in config_coils.yaml (default_hold_power: 0.375)

coil_player:
  # UNIVERSAL BARRIER EVENTS - All modes use these
  barrier_drop:
    c_mode_barrier:
      action: enable
  
  barrier_raise:
    c_mode_barrier:
      action: disable

  ##############################################
  ## PLUNGER AUTO-FIRE (eject_coil removed from bd_plunger)
  ## Pulse c_plunger directly when auto-launch is needed
  ##############################################
  do_auto_plunge:
    c_plunger:
      action: pulse

  # Safety: clear shooter lane on tilt and game ending
  tilt:
    c_plunger:
      action: pulse

  game_ending:
    c_plunger:
      action: pulse

  ##############################################
  ## LEFT ORBIT DIVERTER CONTROL
  ## All modes should use left_orbit_diverter_open/closed events.
  ## This ensures tracking works for under_flipper_shot detection.
  ## OPEN = coil active (ball diverted to left lane)
  ## CLOSED = coil inactive (ball continues through orbit)
  ##############################################
  
  # Open diverter (coil active - diverts ball to left lane)
  left_orbit_diverter_open:
    c_left_orbit_diverter:
      action: enable
  
  # Close diverter (coil inactive - ball continues through)
  left_orbit_diverter_closed:
    c_left_orbit_diverter:
      action: disable
  
  # Right orbit diverter control
  right_orbit_diverter_open:
    c_right_orbit_diverter:
      action: enable
  
  right_orbit_diverter_closed:
    c_right_orbit_diverter:
      action: disable

  # DROP barrier when TOPGUN qualified - ONLY if not in multiball
  topgun_qualified{current_player.multiball_active==0}:
    c_mode_barrier:
      action: enable

  # RAISE barrier and close diverters when ball ends
  ball_ending:
    c_mode_barrier:
      action: disable
    c_left_orbit_diverter:
      action: disable
    c_right_orbit_diverter:
      action: disable

  # LEGACY EVENT - Keep for backwards compatibility, maps to barrier_raise
  pilot_mission_raise_barrier:
    c_mode_barrier:
      action: disable

  # RAISE barrier when any multiball starts
  multiball_started:
    c_mode_barrier:
      action: disable

  # RAISE barrier when any hard deck mode starts (prevent scoop access)
  mode_hard_deck_maverick_and_charlie_started:
    c_mode_barrier:
      action: disable
  mode_hard_deck_playing_with_the_boys_started:
    c_mode_barrier:
      action: disable
  mode_hard_deck_maverick_and_penny_started:
    c_mode_barrier:
      action: disable
  mode_hard_deck_honoring_iceman_started:
    c_mode_barrier:
      action: disable

  # RAISE barrier when any training mission starts (prevent scoop access)
  mode_pilot_training_mission_inverted_started:
    c_mode_barrier:
      action: disable
  mode_pilot_training_mission_missiles_started:
    c_mode_barrier:
      action: disable
  mode_pilot_training_mission_afterburner_started:
    c_mode_barrier:
      action: disable
  mode_pilot_training_mission_wingman_started:
    c_mode_barrier:
      action: disable

  # DROP barrier when multiball ends - ONLY if qualified and not in a mode
  multiball_ended{current_player.qualified_mode_number>0}:
    c_mode_barrier:
      action: enable

  # DROP barrier on ball start if qualified and NOT in multiball
  mode_pilot_mission_qualifier_started{current_player.qualified_mode_number>0 and current_player.multiball_active==0}:
    c_mode_barrier:
      action: enable

  # DROP barrier when training mission ends - if pilot mission is qualified
  # Note: multiball_active condition removed - if training mission just stopped,
  # multiball is definitively over (race condition caused stale value check)
  mode_pilot_training_mission_missiles_stopped{current_player.qualified_mode_number>0}:
    c_mode_barrier:
      action: enable

  mode_pilot_training_mission_inverted_stopped{current_player.qualified_mode_number>0}:
    c_mode_barrier:
      action: enable

  mode_pilot_training_mission_wingman_stopped{current_player.qualified_mode_number>0}:
    c_mode_barrier:
      action: enable

  # DROP barrier when hard deck mode ends - if pilot mission is qualified
  mode_hard_deck_maverick_and_charlie_stopped{current_player.qualified_mode_number>0}:
    c_mode_barrier:
      action: enable
  mode_hard_deck_playing_with_the_boys_stopped{current_player.qualified_mode_number>0}:
    c_mode_barrier:
      action: enable
  mode_hard_deck_maverick_and_penny_stopped{current_player.qualified_mode_number>0}:
    c_mode_barrier:
      action: enable
  mode_hard_deck_honoring_iceman_stopped{current_player.qualified_mode_number>0}:
    c_mode_barrier:
      action: enable

event_player:
  ##############################################
  ## GLOBAL SCOOP BALL RELEASE HANDLER
  ## Modes post 'scoop_ball_release' to trigger this. Do NOT use
  ## barrier_drop directly for scoop releases — use scoop_ball_release.
  ##############################################
  scoop_ball_release:
    - barrier_drop

  # Ball has left scoop — start the restore delay
  s_mode_start_inactive{current_player.scoop_release_pending==1}:
    - global_scoop_eject_start

  # Ball bounced back in — cancel restore, wait again
  s_mode_start_active{current_player.scoop_release_pending==1}:
    - global_scoop_eject_cancel

  # Restore complete — raise barrier
  timer_global_scoop_eject_delay_complete:
    - barrier_raise
  ## eject_coil removed from bd_plunger so it never auto-fires.
  ## Ball save already sets ball_just_saved=1 (in ball_save.yaml)
  ## for BOTH new_ball_save and mode_ball_save.
  ## We detect ball arrival at shooter lane and pulse c_plunger.
  ##
  ## Auto-fire scenarios:
  ##   - Ball save serves replacement (ball_just_saved==1)
  ## Manual plunge scenarios:
  ##   - Game start (ball_just_saved==0)
  ##   - Lock replacement (ball_just_saved==0)
  ##############################################
  # Auto-plunge for saved balls is handled by ball_save.yaml timer (2s delay)
  # Removed immediate do_auto_plunge here to allow ball to settle
  # s_shooter_lane_active{current_player.ball_just_saved==1}:
  #   - do_auto_plunge

  ##############################################
  ## SHOW BUILD: Delayed light set for uncoded modes
  ## variable_player and light_player both fire on mode_started,
  ## causing a race condition on ball 1. This delayed event ensures
  ## the mode_xxx_played flags are set BEFORE lights evaluate.
  ##############################################
  mode_pilot_mission_qualifier_started:
    - set_uncoded_mode_lights|200ms
    - check_all_pilot_modes_played
    - update_training_qual_lights

  ##############################################
  ## TRAINING/HD QUALIFICATION CHANGES — retrigger LL/TL light evaluation
  ##############################################
  player_training_mission_qualified:
    - update_training_qual_lights

  player_hard_deck_qualified_mode:
    - update_training_qual_lights

  ##############################################
  ## SPOTTED LETTERS ON BALL START
  ## Fire staggered so each player_topgun_shots_collected event fires
  ## individually, lighting slides one letter at a time (same as skillshot).
  ## Guard: topgun_shots_collected==0 prevents re-spotting if player carried
  ## partial progress from a previous ball.
  ## Guard: qualified_mode_number==0 prevents spotting when mode already lit.
  ##############################################
  mode_pilot_mission_qualifier_started{current_player.pilot_missions_played==0 and current_player.topgun_shots_collected==0 and current_player.qualified_mode_number==0}:
    - spot_topgun_letter
    - spot_topgun_letter|200ms
    - spot_topgun_letter|400ms

  mode_pilot_mission_qualifier_started{current_player.pilot_missions_played==1 and current_player.topgun_shots_collected==0 and current_player.qualified_mode_number==0}:
    - spot_topgun_letter
    - spot_topgun_letter|200ms

  mode_pilot_mission_qualifier_started{current_player.pilot_missions_played==2 and current_player.topgun_shots_collected==0 and current_player.qualified_mode_number==0}:
    - spot_topgun_letter

  ##############################################
  ## SPOTTED LETTERS AFTER MODE STOPS (mid-ball)
  ## Fires with 300ms delay so variable_player resets on mode_stopped
  ## complete before spot letters start incrementing.
  ## Any real pilot mission could be mission 1 or 2 depending on rotation,
  ## so ALL real modes are listed. pilot_missions_played is incremented on
  ## mode START so by the time the mode stops the value is already updated.
  ##############################################

  # After 1st mission stops (any mode): spot 2 letters
  mode_rescue_cougar_stopped{current_player.pilot_missions_played==1}:
    - spot_topgun_letter|300ms
    - spot_topgun_letter|500ms
  mode_battle_jester_stopped{current_player.pilot_missions_played==1}:
    - spot_topgun_letter|300ms
    - spot_topgun_letter|500ms
  mode_edge_of_space_stopped{current_player.pilot_missions_played==1}:
    - spot_topgun_letter|300ms
    - spot_topgun_letter|500ms
  mode_below_the_hard_deck_stopped{current_player.pilot_missions_played==1}:
    - spot_topgun_letter|300ms
    - spot_topgun_letter|500ms
  mode_canyon_run_stopped{current_player.pilot_missions_played==1}:
    - spot_topgun_letter|300ms
    - spot_topgun_letter|500ms
  mode_rise_of_phoenix_stopped{current_player.pilot_missions_played==1}:
    - spot_topgun_letter|300ms
    - spot_topgun_letter|500ms
  mode_no_margin_for_error_stopped{current_player.pilot_missions_played==1}:
    - spot_topgun_letter|300ms
    - spot_topgun_letter|500ms
  mode_great_balls_of_fire_stopped{current_player.pilot_missions_played==1}:
    - spot_topgun_letter|300ms
    - spot_topgun_letter|500ms

  # After 2nd mission stops (any mode): spot 1 letter
  mode_rescue_cougar_stopped{current_player.pilot_missions_played==2}:
    - spot_topgun_letter|300ms
  mode_battle_jester_stopped{current_player.pilot_missions_played==2}:
    - spot_topgun_letter|300ms
  mode_edge_of_space_stopped{current_player.pilot_missions_played==2}:
    - spot_topgun_letter|300ms
  mode_below_the_hard_deck_stopped{current_player.pilot_missions_played==2}:
    - spot_topgun_letter|300ms
  mode_canyon_run_stopped{current_player.pilot_missions_played==2}:
    - spot_topgun_letter|300ms
  mode_rise_of_phoenix_stopped{current_player.pilot_missions_played==2}:
    - spot_topgun_letter|300ms
  mode_no_margin_for_error_stopped{current_player.pilot_missions_played==2}:
    - spot_topgun_letter|300ms
  mode_great_balls_of_fire_stopped{current_player.pilot_missions_played==2}:
    - spot_topgun_letter|300ms

  ##############################################
  ## 5th+ QUALIFICATION - RANDOM VIDEO SELECTION
  ## For modes_completed_count >= 4, trigger random video selection
  ##############################################

  # 2s delay before topgun complete video plays (modes 1-4)
  topgun_qualified{current_player.modes_completed_count==0}:
    - topgun_show_complete_1|2000ms
  topgun_qualified{current_player.modes_completed_count==1}:
    - topgun_show_complete_2|2000ms
  topgun_qualified{current_player.modes_completed_count==2}:
    - topgun_show_complete_3|2000ms
  topgun_qualified{current_player.modes_completed_count==3}:
    - topgun_show_complete_4|2000ms

  topgun_qualified{current_player.modes_completed_count>=4}:
    - play_random_topgun_complete|2000ms

  # After qualifying, re-evaluate LL/TL training/HD shows
  # (topgun_qualified stops qual keys; this restarts training/HD if appropriate)
  topgun_qualified:
    - update_training_qual_lights

  # Mode rotation changes qualified_mode_number — re-evaluate LL/TL
  player_qualified_mode_number:
    - update_training_qual_lights

  ##############################################
  ## SPINNER SHOT DETECTION
  ## Fire spinner_shot_made when 3+ spins occur within 2 seconds
  ## AND lockout timer is not running (prevents rapid re-triggering)
  ##############################################
  
  s_spinner_active{current_player.spinner_spin_count>=2 and device.timers.spinner_shot_lockout.running==False}:
    - spinner_shot_made
    - spinner_shot_reset_count
  
  # Reset count after shot is made (separate event to ensure it happens after shot fires)
  spinner_shot_reset_count:
    - timer_spinner_shot_timeout_stop

  ##############################################
  ## ORBIT SHOT DETECTION
  ## Left orbit: s_orbit_left -> s_orbit_right (fires left_orbit_shot_hit)
  ## Right orbit: s_orbit_right -> s_orbit_left (fires right_orbit_shot_hit)
  ## Uses ONLY timer.running checks - no orbit_pending variable
  ## This avoids race conditions between variable_player and event_player
  ##############################################
  
  # Left orbit complete: s_orbit_right hit while left orbit timer running
  # orbit_shot_lockout prevents exit switch from immediately triggering a new orbit
  # post_plunge_orbit_lockout prevents scoring on a plunged ball for 3 seconds
  s_orbit_right_active{device.timers.left_orbit_shot_timeout.running and current_player.orbit_shot_lockout==0 and device.timers.post_plunge_orbit_lockout.running==False}:
    - left_orbit_shot_hit
    - timer_left_orbit_shot_timeout_stop
  
  # Right orbit complete: s_orbit_left hit while right orbit timer running
  s_orbit_left_active{device.timers.right_orbit_shot_timeout.running and current_player.orbit_shot_lockout==0 and device.timers.post_plunge_orbit_lockout.running==False}:
    - right_orbit_shot_hit
    - timer_right_orbit_shot_timeout_stop

  ##############################################
  ## LEFT DIVERTER ON TL HIT
  ## When hard deck or training mission is lit, hitting TL (s_orbit_upper)
  ## opens the left diverter for 2 seconds to feed ball to left lane.
  ## Hard deck qualifier also posts tl_open_left_diverter for its condition.
  ## Timer left_diverter_tl_hold manages the 2-second hold.
  ##############################################

  # Training mission lit + TL hit → open left diverter
  s_orbit_upper_active{current_player.training_mission_qualified>0 and current_player.training_mission_active==0 and current_player.pilot_mode_active==0 and current_player.hard_deck_active==0 and current_player.multiball_active==0}:
    - tl_open_left_diverter

  # Open diverter and start/restart 3s hold timer
  tl_open_left_diverter:
    - left_orbit_diverter_open

  # Close diverter when 3s timer expires
  timer_left_diverter_tl_hold_complete:
    - left_orbit_diverter_closed

  ##############################################
  ## SNEAKY SHOT DETECTION
  ## Fires when s_lane_left is hit AND the previous switch was NOT:
  ## - s_orbit_left (previous_switch_type=1)
  ## - s_flipper_left_upper_eos (previous_switch_type=2)
  ## This means the ball snuck into the left lane without coming from
  ## the left orbit or being flipped by the upper left flipper.
  ##############################################
  
  s_lane_left_active{current_player.previous_switch_type!=1 and current_player.previous_switch_type!=2}:
    - sneaky_shot_hit
  
  ##############################################
  ## UNDER FLIPPER SHOT DETECTION
  ## Fires when s_lane_left is hit AND:
  ## - The upper left flipper EOS was the previous switch (previous_switch_type=2)
  ##   OR the upper left flipper EOS is still active
  ## - AND the left orbit diverter is NOT active (ball wasn't diverted)
  ## This means the ball went under the upper left flipper into the lane.
  ##############################################
  
  s_lane_left_active{(current_player.previous_switch_type==2 or device.switches.s_flipper_left_upper_eos.state) and current_player.left_orbit_diverter_active==0}:
    - under_flipper_shot_hit

  ##############################################
  ## Pilot Mission Bonus Ready - Post when drain cleanup completes
  ## Only posts if pilot_mode_drain_pending==1 (set by pilot mode on drain)
  ##############################################
  
  # Battle Jester - post bonus ready only if drain is pending
  mode_battle_jester_stopped{current_player.pilot_mode_drain_pending==1}:
    - pilot_mission_bonus_ready
    - pilot_mission_drain_complete
  
  # Rescue Cougar
  mode_rescue_cougar_stopped{current_player.pilot_mode_drain_pending==1}:
    - pilot_mission_bonus_ready
    - pilot_mission_drain_complete
  
  # Rise of Phoenix
  mode_rise_of_phoenix_stopped{current_player.pilot_mode_drain_pending==1}:
    - pilot_mission_bonus_ready
    - pilot_mission_drain_complete

  # Canyon Run
  mode_canyon_run_stopped{current_player.pilot_mode_drain_pending==1}:
    - pilot_mission_bonus_ready
    - pilot_mission_drain_complete

  # Below The Hard Deck
  mode_below_the_hard_deck_stopped{current_player.pilot_mode_drain_pending==1}:
    - pilot_mission_bonus_ready
    - pilot_mission_drain_complete

  # No Margin For Error
  mode_no_margin_for_error_stopped{current_player.pilot_mode_drain_pending==1}:
    - pilot_mission_bonus_ready
    - pilot_mission_drain_complete

  # Edge of Space
  mode_edge_of_space_stopped{current_player.pilot_mode_drain_pending==1}:
    - pilot_mission_bonus_ready
    - pilot_mission_drain_complete

  # Great Balls of Fire
  mode_great_balls_of_fire_stopped{current_player.pilot_mode_drain_pending==1}:
    - pilot_mission_bonus_ready
    - pilot_mission_drain_complete

  # No Points For Second Place
  mode_no_points_for_second_place_stopped{current_player.pilot_mode_drain_pending==1}:
    - pilot_mission_bonus_ready
    - pilot_mission_drain_complete

  # Restore lock position lights after NPFSP — wave 2 overrides them at priority 600.
  # Check both: positions already lit before mode (lock_goose_lit==1), AND
  # positions lit during the mode (lock_completions increased from saved value).
  mode_no_points_for_second_place_stopped{current_player.lock_goose_lit==1 and current_player.lock_goose_locked==0}:
    - lock_restore_goose_lit
    - lock_restore_goose_lock_enabled
  mode_no_points_for_second_place_stopped{current_player.lock_mav_lit==1 and current_player.lock_mav_locked==0}:
    - lock_restore_mav_lit
    - lock_restore_mav_lock_enabled
  mode_no_points_for_second_place_stopped{current_player.lock_goose_locked==1}:
    - lock_restore_goose_locked
  mode_no_points_for_second_place_stopped{current_player.lock_mav_locked==1}:
    - lock_restore_mav_locked
  mode_no_points_for_second_place_stopped{(current_player.lock_goose_lit==1 and current_player.lock_goose_locked==0) or (current_player.lock_mav_lit==1 and current_player.lock_mav_locked==0)}:
    - lock_restore_lock_lit
    - lock_servo_to_held

  # Missiles Training Mission
  mode_pilot_training_mission_missiles_stopped{current_player.pilot_mode_drain_pending==1}:
    - pilot_mission_bonus_ready
    - pilot_mission_drain_complete

  # Wingman Training Mission
  mode_pilot_training_mission_wingman_stopped{current_player.pilot_mode_drain_pending==1}:
    - pilot_mission_bonus_ready
    - pilot_mission_drain_complete

  # Randomly select the starting mode when TOPGUN completes.
  # topgun_pick_start fires via random_event_player (see bottom of file),
  # which chooses one of the 8 real modes at random.
  # Each topgun_start_XXX handler fires qualify_XXX + topgun_qualified.
  # If the randomly-chosen mode was already played, topgun_qualified's
  # condition handlers (below) fire rotate_qualified_mode once,
  # which uses the existing rotation chain to advance to the next unplayed mode.

  topgun_start_rescue_cougar:
    - qualify_rescue_cougar
    - topgun_qualified

  topgun_start_battle_jester:
    - qualify_battle_jester
    - topgun_qualified

  topgun_start_no_points_for_second_place:
    - qualify_no_points_for_second_place
    - topgun_qualified

  topgun_start_edge_of_space:
    - qualify_edge_of_space
    - topgun_qualified

  topgun_start_below_the_hard_deck:
    - qualify_below_the_hard_deck
    - topgun_qualified

  topgun_start_canyon_run:
    - qualify_canyon_run
    - topgun_qualified

  topgun_start_rise_of_phoenix:
    - qualify_rise_of_phoenix
    - topgun_qualified

  topgun_start_no_margin_for_error:
    - qualify_no_margin_for_error
    - topgun_qualified

  # If the randomly-selected mode was already played, rotate to next available.
  # The rotate_qualified_mode chain from each slot already skips all played modes
  # in one call and lands on the first unplayed one.
  topgun_qualified{current_player.qualified_mode_number==1 and current_player.mode_rescue_cougar_played==1}:
    - rotate_qualified_mode
  topgun_qualified{current_player.qualified_mode_number==2 and current_player.mode_balls_of_fire_played==1}:
    - rotate_qualified_mode
  topgun_qualified{current_player.qualified_mode_number==4 and current_player.mode_battle_jester_played==1}:
    - rotate_qualified_mode
  topgun_qualified{current_player.qualified_mode_number==5 and current_player.mode_no_points_for_second_place_played==1}:
    - rotate_qualified_mode
  topgun_qualified{current_player.qualified_mode_number==10 and current_player.mode_edge_of_space_played==1}:
    - rotate_qualified_mode
  topgun_qualified{current_player.qualified_mode_number==9 and current_player.mode_below_the_hard_deck_played==1}:
    - rotate_qualified_mode
  topgun_qualified{current_player.qualified_mode_number==8 and current_player.mode_canyon_run_played==1}:
    - rotate_qualified_mode
  topgun_qualified{current_player.qualified_mode_number==7 and current_player.mode_rise_of_phoenix_played==1}:
    - rotate_qualified_mode
  topgun_qualified{current_player.qualified_mode_number==6 and current_player.mode_no_margin_for_error_played==1}:
    - rotate_qualified_mode

  # Restore qualified mode light on ball start (each ball)
  mode_pilot_mission_qualifier_started{current_player.qualified_mode_number==1}:
    - restore_qualified_mode_light
  mode_pilot_mission_qualifier_started{current_player.qualified_mode_number==2}:
    - restore_qualified_mode_light
  mode_pilot_mission_qualifier_started{current_player.qualified_mode_number==3}:
    - restore_qualified_mode_light
  mode_pilot_mission_qualifier_started{current_player.qualified_mode_number==4}:
    - restore_qualified_mode_light
  mode_pilot_mission_qualifier_started{current_player.qualified_mode_number==5}:
    - restore_qualified_mode_light
  mode_pilot_mission_qualifier_started{current_player.qualified_mode_number==6}:
    - restore_qualified_mode_light
  mode_pilot_mission_qualifier_started{current_player.qualified_mode_number==7}:
    - restore_qualified_mode_light
  mode_pilot_mission_qualifier_started{current_player.qualified_mode_number==8}:
    - restore_qualified_mode_light
  mode_pilot_mission_qualifier_started{current_player.qualified_mode_number==9}:
    - restore_qualified_mode_light
  mode_pilot_mission_qualifier_started{current_player.qualified_mode_number==10}:
    - restore_qualified_mode_light

  ##############################################
  ## BARRIER FLASH PAUSE — Stop l_shot_barrier flash during
  ## training missions, hard deck modes, and multiball.
  ## Restore when returning to base game.
  ##############################################

  # Stop when training mission starts
  player_training_mission_active{value==1}:
    - stop_all_mode_pulse_shows

  # Stop when hard deck mode starts
  player_hard_deck_active{value==1}:
    - stop_all_mode_pulse_shows

  # Stop when multiball starts
  player_multiball_active{value==1}:
    - stop_all_mode_pulse_shows

  # Restore when training mission ends (if a pilot mission is still qualified)
  player_training_mission_active{value==0 and current_player.qualified_mode_number>0}:
    - restore_qualified_mode_light

  # Restore when hard deck ends (if a pilot mission is still qualified)
  player_hard_deck_active{value==0 and current_player.qualified_mode_number>0}:
    - restore_qualified_mode_light

  # Restore when multiball ends (if a pilot mission is still qualified)
  player_multiball_active{value==0 and current_player.qualified_mode_number>0}:
    - restore_qualified_mode_light
  
  ##############################################
  ## Mode Rotation - Spinner and Flight Gear Hits
  ##############################################
  
  # Rotate qualified mode on spinner or flight_gear_target hit (only when qualified and no mode active)
  s_spinner_active{current_player.qualified_mode_number>0 and current_player.training_mission_active==0 and current_player.hard_deck_active==0 and current_player.pilot_mode_active==0}:
