      action: set
      int: 0

##############################################
## TIERED TOPGUN LETTER COLLECTION
## Missions 1-2  (played 0-1): All shots lit (LL, LO, LR, SP, TWR, TL, TR, RR)
## Missions 3-4  (played 2-3): No LL, No SP  (LO, LR,     TWR, TL, TR, RR)
## Mission 5     (played 4):   No LL, No SP  (LO, LR,     TWR, TL, TR, RR) — same as 3-4
## Mission 6     (played 5):   No LL/SP/LO/TWR (LR,          TL, TR, RR)
## Mission 7+    (played 6+):  LR, TL, TR, RR only
## SP lock gate removed (SP active whenever it's in the lit set)
## TR lock gate removed (TR active whenever it's in the lit set)
## RO (right orbit) NEVER gives letters
##############################################

  # Left Lane (LL) letter collection
  # Missions 1-2 (played 0-1)
  s_lane_left_active{current_player.pilot_qualifier_paused==0 and current_player.letter_collection_paused==0 and current_player.qualified_mode_number==0 and current_player.pilot_missions_played<=1}:
    topgun_shots_collected:
      action: add
      int: 1

  # Orbit shot lockout - set by either orbit completion, prevents double-trigger on fast orbits
  left_orbit_shot_hit:
    orbit_shot_lockout:
      action: set
      int: 1
  right_orbit_shot_hit:
    orbit_shot_lockout:
      action: set
      int: 1
  timer_orbit_shot_lockout_timer_complete:
    orbit_shot_lockout:
      action: set
      int: 0

  # Left Orbit (LO) letter collection
  # Missions 1-5 (played 0-4)
  left_orbit_shot_hit{current_player.pilot_qualifier_paused==0 and current_player.letter_collection_paused==0 and current_player.qualified_mode_number==0 and current_player.pilot_missions_played<=4}:
    topgun_shots_collected:
      action: add
      int: 1

  # NOTE: Right Orbit (RO) NEVER gives TOPGUN letters - intentionally removed

  # Left Ramp (LR) letter collection
  # All missions (always lit)
  s_ramp_left_exit_active{current_player.pilot_qualifier_paused==0 and current_player.letter_collection_paused==0 and current_player.qualified_mode_number==0}:
    topgun_shots_collected:
      action: add
      int: 1

  # Spinner (SP) letter collection - lock gate removed
  # 3 spinner switch hits = 1 spinner_shot_made = 1 TOPGUN letter
  spinner_shot_made{current_player.pilot_qualifier_paused==0 and current_player.letter_collection_paused==0 and current_player.qualified_mode_number==0 and current_player.pilot_missions_played<=3}:
    topgun_shots_collected:
      action: add
      int: 1

  # Track each spinner activation for shot detection and reset previous_switch_type
  s_spinner_active:
    spinner_spin_count:
      action: add
      int: 1
    previous_switch_type:
      action: set
      int: 0

  # Reset spin count when timer completes (2 seconds of no spins)
  timer_spinner_shot_timeout_complete:
    spinner_spin_count:
      action: set
      int: 0

  # Reset spin count after spinner_shot_made fires (prevents rapid re-triggering)
  spinner_shot_reset_count:
    spinner_spin_count:
      action: set
      int: 0

  ##############################################
  ## SWITCH TRACKING FOR SNEAKY SHOT DETECTION
  ## Tracks previous switch to determine shot type when s_lane_left is hit
  ## 0=other/reset, 1=orbit_left, 2=upper_flipper_eos
  ## NOTE: Orbit shot detection uses timer.running checks only, not orbit_pending
  ##############################################
  
  # Left orbit entry - track for sneaky shot (ball came from left orbit)
  s_orbit_left_active:
    previous_switch_type:
      action: set
      int: 1
  
  # Right orbit entry - reset sneaky shot tracking
  s_orbit_right_active:
    previous_switch_type:
      action: set
      int: 0

  # Tower Ramp (TWR) letter collection
  # Missions 1-5 (played 0-4)
  s_ramp_tower_exit_active{current_player.pilot_qualifier_paused==0 and current_player.letter_collection_paused==0 and current_player.qualified_mode_number==0 and current_player.pilot_missions_played<=4}:
    topgun_shots_collected:
      action: add
      int: 1

  # Top Loop (TL) letter collection
  # All missions (always lit)
  s_orbit_upper_active{current_player.pilot_qualifier_paused==0 and current_player.letter_collection_paused==0 and current_player.qualified_mode_number==0}:
    topgun_shots_collected:
      action: add
      int: 1

  # Top Ramp (TR) letter collection
  # All missions (always lit, lock gate removed)
  s_ramp_inner_exit_active{current_player.pilot_qualifier_paused==0 and current_player.letter_collection_paused==0 and current_player.qualified_mode_number==0}:
    topgun_shots_collected:
      action: add
      int: 1

  # Right Ramp (RR) letter collection
  # All missions (always lit)
  s_ramp_right_exit_active{current_player.pilot_qualifier_paused==0 and current_player.letter_collection_paused==0 and current_player.qualified_mode_number==0}:
    topgun_shots_collected:
      action: add
      int: 1

  ##############################################
  ## SWITCH TRACKING FOR SNEAKY SHOT DETECTION
  ## Tracks previous switch to determine shot type when s_lane_left is hit
  ## 0=other/reset, 1=orbit_left, 2=upper_flipper_eos
  ## NOTE: s_orbit_left_active and s_orbit_right_active tracking is merged
  ## into the ORBIT SHOT TRACKING section above
  ##############################################
  
  # Set previous_switch_type=2 when upper flipper EOS is triggered
  s_flipper_left_upper_eos_active:
    previous_switch_type:
      action: set
      int: 2
  
  # Reset previous_switch_type when other key switches are hit
  # (these would indicate a different ball path)
  s_orbit_upper_active:
    previous_switch_type:
      action: set
      int: 0
  
  s_orbit_lower_active:
    previous_switch_type:
      action: set
      int: 0
  
  s_ramp_left_exit_active:
    previous_switch_type:
      action: set
      int: 0
  
  s_ramp_right_exit_active:
    previous_switch_type:
      action: set
      int: 0
  
  s_ramp_tower_exit_active:
    previous_switch_type:
      action: set
      int: 0
  
  s_ramp_inner_exit_active:
    previous_switch_type:
      action: set
      int: 0
  
  # Reset after lane_left is processed
  s_lane_left_active:
    previous_switch_type:
      action: set
      int: 0

  ##############################################
  ## LEFT ORBIT DIVERTER TRACKING
  ## Tracks when diverter is enabled/disabled for under flipper shot detection
  ## OPEN = coil active (ball diverted), CLOSED = coil inactive (ball continues)
  ##############################################
  
  # Diverter opened (coil active) - diverts ball
  left_orbit_diverter_open:
    left_orbit_diverter_active:
      action: set
      int: 1
  
  # Diverter closed (coil inactive) - ball continues through
  left_orbit_diverter_closed:
    left_orbit_diverter_active:
      action: set
      int: 0
  
