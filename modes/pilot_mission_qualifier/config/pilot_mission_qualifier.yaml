##############################################
## RANDOM EVENT PLAYER
## For 5th+ qualification, randomly select one of 4 completion videos
##############################################

random_event_player:
  ##############################################
  ## RANDOM STARTING MODE SELECTION
  ## Picks a random starting mode when TOPGUN completes.
  ## If the chosen mode is already played, topgun_qualified's rotate
  ## conditions advance to the next available one automatically.
  ## bof and cup are excluded (always force-played/uncoded).
  ##############################################
  topgun_pick_start:
    force_all: false
    events:
      - topgun_start_rescue_cougar
      - topgun_start_battle_jester
      - topgun_start_no_points_for_second_place
      - topgun_start_edge_of_space
      - topgun_start_below_the_hard_deck
      - topgun_start_canyon_run
      - topgun_start_rise_of_phoenix
      - topgun_start_no_margin_for_error

  play_random_topgun_complete:
    force_all: false
    events:
      - play_topgun_complete_random_1
      - play_topgun_complete_random_2
      - play_topgun_complete_random_3
      - play_topgun_complete_random_4