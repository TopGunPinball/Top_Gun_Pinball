    qual_stop_tr_q:
      show: sync_flash_mode
      action: stop
      key: qual_tr
    qual_stop_rr_q:
      show: sync_flash_mode
      action: stop
      key: qual_rr

  # Stop all qualifying lights when letter collection paused
  player_letter_collection_paused{value==1 and current_player.qualified_mode_number==0}:
    qual_stop_ll_lcp:
      show: sync_flash_mode
      action: stop
      key: qual_ll
    qual_stop_lo_lcp:
      show: sync_flash_mode
      action: stop
      key: qual_lo
    qual_stop_lr_lcp:
