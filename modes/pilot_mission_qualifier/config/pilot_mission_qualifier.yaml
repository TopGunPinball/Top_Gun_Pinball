##############################################
## Shows
##############################################

shows:
  ##############################################
  ## QUAL_COMBINED — white/blue alternating for LL and TL
  ## Used when both pilot mission qualifier AND training/HD are lit on the same insert.
  ## White phase (500ms): syncs with other qual lights being ON
  ## Blue phase (500ms): shows training/HD color when other lights would be OFF
  ## Fades: 150ms crossfade to avoid harsh cuts
  ## sync_ms: 1000 locks it to the same clock as sync_flash_mode and sync_flash_mb
  ##############################################
  qual_combined:
    - duration: 350ms
      lights:
        (led):
          color: white
          fade: 150ms
    - duration: 350ms
      lights:
        (led):
          color: 80A2DF
          fade: 150ms

##############################################
## Light Player
##############################################

light_player:
  ##############################################
  ## SHOW BUILD: Set uncoded mode lights to yellow
  ## Fired 200ms after mode_started to avoid race with variable_player
  ##############################################
  set_uncoded_mode_lights:
    l_mode_cool_under_pressure:
      color: yellow
      fade: 0ms

  # Turn off pilot_mission_lit and set mode light white when great_balls_of_fire starts
  mode_great_balls_of_fire_started:
    l_pilot_mission_lit:
      color: off
    l_mode_balls_of_fire:
      color: white
      fade: 0ms
  ##############################################
  ## MYSTERY AWARD - Light Control
  ## Turn on l_mystery_lit when qualified, off when consumed.
  ##############################################
  player_mystery_qualified{value==1}:
    l_mystery_lit:
      color: green
      fade: 0ms

  player_mystery_qualified{value==0}:
    l_mystery_lit:
      color: off
      fade: 0ms

  # Turn on pilot mission lit indicator AND turn off all shot lights when qualified
  topgun_qualified:
    l_pilot_mission_lit:
