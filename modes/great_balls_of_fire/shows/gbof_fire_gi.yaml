#show_version=6
# Great Balls of Fire — backpanel and apron fire animation
# Covers: l_gi_light_22 to l_gi_light_27, l_apron_light_1 to l_apron_light_4
# Run at speed: 30 — each duration:1 step = ~33ms for rapid flame flicker.
# All 10 lights staggered at different phases so no two blink in sync.
# Colors are standard RGB hex — MPF handles the grb channel swap for port 3 LEDs.
#
# Fire palette:
#   FF0000 = red (base)
#   FF2200 = dark orange-red
#   FF4400 = orange-red
#   FF6600 = orange
#   FF8800 = bright orange
#   FFAA00 = amber
#   FFCC00 = yellow-orange
#   FF1100 = deep red

- duration: 1
  lights:
    l_gi_light_22: {color: FF4400, fade: 0ms}
    l_gi_light_23: {color: FF0000, fade: 0ms}
    l_gi_light_24: {color: FFAA00, fade: 0ms}
    l_gi_light_25: {color: FF2200, fade: 0ms}
    l_gi_light_26: {color: FF6600, fade: 0ms}
    l_gi_light_27: {color: FF0000, fade: 0ms}
    l_apron_light_1: {color: FF0000, fade: 0ms}
    l_apron_light_2: {color: FF4400, fade: 0ms}
    l_apron_light_3: {color: FF8800, fade: 0ms}
    l_apron_light_4: {color: FF0000, fade: 0ms}

