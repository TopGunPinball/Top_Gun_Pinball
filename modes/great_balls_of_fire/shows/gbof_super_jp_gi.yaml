#show_version=6
# Great Balls of Fire — Super Jackpot GI animation
# Covers l_gi_light_1 through l_gi_light_21 (playfield GI).
# The backpanel and apron (22-27, apron 1-4) continue their gbof_fire_gi show.
# Run at speed: 30 — duration:1 = ~33ms, duration:2 = ~66ms.
# All 21 lights staggered so they never all flash the same color simultaneously.
# Start on gbof_super_jackpot_collected, stop after 3s timer.

