####################################################################################
# SHOW PLAYER
####################################################################################

show_player:

  # ── GI: starts immediately at mode start ─────────────────────────────────────
  mode_great_balls_of_fire_started:
    gbof_playfield_gi_show:
      show: gbof_playfield_gi
      key: gbof_gi_playfield_key
      loops: -1
    gbof_fire_gi_show:
      show: gbof_fire_gi
      key: gbof_gi_fire_key
      speed: 20
      loops: -1

  # ── GI SHOT FLASH: 3 rapid all-GI pulses on any hit ──────────────────────────
  gbof_any_shot_hit:
    gbof_gi_flash_show:
      show: gbof_gi_shot_flash
      key: gbof_gi_hit_key
      speed: 1
      loops: 0

  # ── INSERT FLASHES: all 4 shots start green when collection phase begins ───────
  gbof_setup_collection_phase:
    gbof_lo_init:
      show: sync_flash_mode
      key: gbof_lo_flash
      sync_ms: 1000
      loops: -1
      show_tokens:
        led: l_shot_left_orbit
        color: '00FF00'
    gbof_lr_init:
      show: sync_flash_mode
      key: gbof_lr_flash
      sync_ms: 1000
      loops: -1
      show_tokens:
        led: l_shot_left_ramp
        color: '00FF00'
    gbof_twr_init:
      show: sync_flash_mode
      key: gbof_twr_flash
      sync_ms: 1000
      loops: -1
      show_tokens:
        led: l_shot_tower_ramp
        color: '00FF00'
    gbof_rr_init:
      show: sync_flash_mode
      key: gbof_rr_flash
      sync_ms: 1000
      loops: -1
      show_tokens:
        led: l_shot_right_orbit
        color: '00FF00'

  # ── LO INSERT PROGRESSION ─────────────────────────────────────────────────────
  # Reusing the same key stops the previous show automatically in MPF.
  gbof_lo_hit_1:
    gbof_lo_to_yellow:
      show: sync_flash_mode
      key: gbof_lo_flash
      sync_ms: 1000
      loops: -1
      show_tokens:
        led: l_shot_left_orbit
        color: 'FFFF00'

  gbof_lo_hit_2:
    gbof_lo_to_orange:
      show: sync_flash_mode
      key: gbof_lo_flash
      sync_ms: 1000
      loops: -1
      show_tokens:
        led: l_shot_left_orbit
        color: 'FF4400'

  gbof_lo_forged:
    gbof_lo_flash_stop:
      show: sync_flash_mode
      action: stop
      key: gbof_lo_flash
    gbof_lo_fire_start:
      show: gbof_insert_fire
      key: gbof_lo_fire_key
      speed: 20
      loops: -1
      show_tokens:
        led: l_shot_left_orbit

  # ── LR INSERT PROGRESSION ─────────────────────────────────────────────────────
  gbof_lr_hit_1:
    gbof_lr_to_yellow:
      show: sync_flash_mode
      key: gbof_lr_flash
      sync_ms: 1000
      loops: -1
      show_tokens:
        led: l_shot_left_ramp
        color: 'FFFF00'

  gbof_lr_hit_2:
    gbof_lr_to_orange:
      show: sync_flash_mode
      key: gbof_lr_flash
      sync_ms: 1000
      loops: -1
      show_tokens:
        led: l_shot_left_ramp
        color: 'FF4400'

  gbof_lr_forged:
    gbof_lr_flash_stop:
      show: sync_flash_mode
      action: stop
      key: gbof_lr_flash
    gbof_lr_fire_start:
      show: gbof_insert_fire
      key: gbof_lr_fire_key
      speed: 20
      loops: -1
      show_tokens:
        led: l_shot_left_ramp

  # ── TWR INSERT PROGRESSION ────────────────────────────────────────────────────
  gbof_twr_hit_1:
    gbof_twr_to_yellow:
      show: sync_flash_mode
      key: gbof_twr_flash
      sync_ms: 1000
      loops: -1
      show_tokens:
        led: l_shot_tower_ramp
        color: 'FFFF00'

  gbof_twr_hit_2:
    gbof_twr_to_orange:
      show: sync_flash_mode
      key: gbof_twr_flash
      sync_ms: 1000
      loops: -1
      show_tokens:
        led: l_shot_tower_ramp
        color: 'FF4400'

  gbof_twr_forged:
    gbof_twr_flash_stop:
      show: sync_flash_mode
      action: stop
      key: gbof_twr_flash
    gbof_twr_fire_start:
      show: gbof_insert_fire
      key: gbof_twr_fire_key
      speed: 20
      loops: -1
      show_tokens:
        led: l_shot_tower_ramp

  # ── RR INSERT PROGRESSION ─────────────────────────────────────────────────────
  gbof_rr_hit_1:
    gbof_rr_to_yellow:
      show: sync_flash_mode
      key: gbof_rr_flash
      sync_ms: 1000
