  # ── INSERT FIRE: duration-based fire flicker matching eos_engine_fire style ──
  # At speed: 30, each duration:1 = ~33ms, duration:2 = ~66ms.
  # Cycle: 13 steps × 33ms ≈ 430ms → ~2.3Hz flicker.
  # show_token (led) = the specific insert light, e.g. l_shot_left_orbit
  gbof_insert_fire:
    - duration: 1
      lights:
        (led): {color: FF4400, fade: 0ms}
    - duration: 1
      lights:
        (led): {color: FF0000, fade: 0ms}
    - duration: 2
      lights:
        (led): {color: FFAA00, fade: 0ms}
    - duration: 1
      lights:
        (led): {color: FF2200, fade: 0ms}
    - duration: 1
      lights:
        (led): {color: FF6600, fade: 0ms}
    - duration: 2
      lights:
        (led): {color: FF0000, fade: 0ms}
    - duration: 1
      lights:
        (led): {color: FFCC00, fade: 0ms}
    - duration: 1
      lights:
        (led): {color: FF4400, fade: 0ms}
    - duration: 2
      lights:
        (led): {color: FF8800, fade: 0ms}
    - duration: 1
      lights:
        (led): {color: FF1100, fade: 0ms}

####################################################################################
# COIL PLAYER
# During Phase 2 MB, fire the plunger at full power so balls reach the top of the
# game. This overrides the normal do_auto_plunge handler (which uses default power)
# by catching the same timer event directly at mode priority 600.
####################################################################################

coil_player:
  timer_gbof_auto_plunger_delay_complete:
    c_plunger:
      pulse_ms: 28
      pulse_power: 0.75

####################################################################################
# SOUND PLAYER
####################################################################################

sound_player:
  # Phase 2 intro: callout plays when player shoots scoop to start MB countdown
  gbof_scoop_hit_for_mb:
    gbof_mb_instructions:
      bus: voice
      loops: 0

  # Super jackpot collected: play celebration callout
  gbof_super_jackpot_collected:
    great_balls_of_fire_super_jackpot_callout:
      bus: voice
      loops: 0

