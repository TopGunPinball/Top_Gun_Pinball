#config_version=6

####################################################################################
# GREAT BALLS OF FIRE - PILOT MISSION MODE
# Priority: 600
#
# PHASE 1 (this file): 60s collection phase.
#   Hit LO, LR, TWR, or RR 3x to forge a multiball ball.
#   Insert colors:  0 hits=green flash | 1 hit=yellow flash
#                   2 hits=orange flash | 3 hits=fire anim (stays lit)
#   Timer expires with 0 balls → LOST (42s video, skippable).
#   Timer expires with 1-4 balls → TRANSITION to Phase 2 multiball.
#
# PHASE 2 (next session): Multiball using gbof_mb_ball_count balls.
#   Ball count: balls_collected+1, capped at 4 if 2 in TGMB lock, else 5.
#   Jackpot shots = whichever inserts are lit fire (forged shots).
#
# GI: Odd playfield lights = red, even = orange.
#     l_gi_light_24/25 (engine_fire) + apron lights = fire animation.
#
# SHOT MAP:
#   LO  = left_orbit_shot_hit  (composite from pilot_mission_qualifier)
#   LR  = s_ramp_left_exit_active
#   TWR = s_ramp_tower_exit_active
#   RR  = s_ramp_right_exit_active
#
# INTERMEDIATE HIT EVENTS (posted from event_player, used by show_player + base.yaml):
#   gbof_lo_hit_1 / gbof_lo_hit_2 / gbof_lo_forged
#   gbof_lr_hit_1 / gbof_lr_hit_2 / gbof_lr_forged
#   gbof_twr_hit_1 / gbof_twr_hit_2 / gbof_twr_forged
#   gbof_rr_hit_1 / gbof_rr_hit_2 / gbof_rr_forged
#   (hit_1 = 1st hit to yellow, hit_2 = 2nd hit to orange, forged = 3rd hit to fire)
####################################################################################

mode:
  start_events: start_mode_balls_of_fire
  stop_events:
    - timer_gbof_complete_delay_complete      # Phase 2 victory (placeholder)
    - timer_gbof_failed_delay_complete        # Timer expired, 0 balls
    - gbof_drain_cleanup_complete             # Ball drain
  priority: 600
  game_mode: true
  use_wait_queue: true

mode_settings:
  can_stack_with_multiball: true

####################################################################################
# BALL HOLDS
####################################################################################

ball_holds:
  gbof_scoop_hold:
    balls_to_hold: 1
    hold_devices: bd_mode_scoop
    enable_events:
      - mode_great_balls_of_fire_started
    release_one_events:
      - gbof_ball_released          # Intro normal/skip path
      - gbof_victory_ball_exit      # Phase 2 victory (400ms delayed event)
    release_all_events:
      - mode_great_balls_of_fire_will_stop

####################################################################################
# QUEUE RELAY PLAYER
####################################################################################

queue_relay_player:
  ball_ending{mode.great_balls_of_fire.active==True}:
    post: gbof_ball_ending_hold
    wait_for: gbof_drain_cleanup_complete
    priority: 1000

####################################################################################
# TIMERS
####################################################################################

timers:

  # Intro video: 24s. Stopped by gbof_skip_intro.
  gbof_intro_video_delay:
    start_value: 0
    end_value: 24
    direction: up
    tick_interval: 1s
    control_events:
      - event: mode_great_balls_of_fire_started
        action: start
      - event: gbof_skip_intro
        action: stop

  # Main 60s collection timer.
  # CRITICAL: starts on gbof_ball_released, NOT mode_started or scoop switch.
  gbof_collection_timer:
    start_value: 60
    end_value: 0
    direction: down
    tick_interval: 1s
    start_running: false
    control_events:
      - event: gbof_ball_released
        action: start
      - event: gbof_collection_complete
        action: stop
      - event: gbof_failed
        action: stop
      - event: gbof_drain_detected
        action: stop
      - event: afterburner_extend_gbof_collection_timer
        action: jump
        value: 9999

  # Barrier delay: 2s after ball launches so barrier can raise safely.
  gbof_barrier_delay:
    start_value: 0
    end_value: 2
    direction: up
    tick_interval: 1s
    control_events:
      - event: gbof_ball_released
        action: restart

  # Lost video: 42s, skippable.
  gbof_failed_delay:
    start_value: 0
    end_value: 42
    direction: up
    tick_interval: 1s
    start_running: false
    control_events:
      - event: gbof_failed
        action: start
      - event: gbof_skip_end_video
        action: jump
        value: 42

  # Won video: 30s, skippable (Phase 2 placeholder).
  gbof_complete_delay:
    start_value: 0
    end_value: 30
    direction: up
    tick_interval: 1s
    start_running: false
    control_events:
      - event: gbof_complete
        action: start
      - event: gbof_skip_end_video
        action: jump
        value: 30

  # Drain cleanup delay: 5s.
  gbof_drain_delay:
    start_value: 0
    end_value: 5
    direction: up
    tick_interval: 1s
    start_running: false
    control_events:
      - event: gbof_drain_detected
        action: start
      - event: gbof_skip_end_video
        action: jump
        value: 5

  # Shot lockout: 1500ms prevents double-counting on same switch.
  gbof_shot_lockout:
    start_value: 0
    end_value: 1500
    direction: up
    tick_interval: 1ms
    start_running: false
    control_events:
      - event: gbof_lo_hit
        action: restart
      - event: gbof_lr_hit
        action: restart
      - event: gbof_twr_hit
        action: restart
      - event: gbof_rr_hit
        action: restart

####################################################################################
# VARIABLE PLAYER
####################################################################################

variable_player:

  # ── INIT ───────────────────────────────────────────────────────────────────────
  mode_great_balls_of_fire_started:
    pilot_mode_active:
      action: set
      int: 1
    letter_collection_paused:
      action: set
      int: 1
    pilot_missions_played:
      action: add
      int: 1
    mode_balls_of_fire_played:
      action: set
      int: 1
    gbof_step:
      action: set
      int: 0
    gbof_complete_flag:
      action: set
      int: 0
    gbof_balls_collected:
      action: set
      int: 0
    gbof_lo_hits:
      action: set
      int: 0
    gbof_lr_hits:
      action: set
      int: 0
    gbof_twr_hits:
      action: set
      int: 0
    gbof_rr_hits:
      action: set
      int: 0
    gbof_lo_complete:
      action: set
      int: 0
    gbof_lr_complete:
      action: set
      int: 0
    gbof_twr_complete:
      action: set
      int: 0
    gbof_rr_complete:
      action: set
      int: 0
    gbof_mb_ball_count:
      action: set
      int: 2
    gbof_timer_display:
      action: set
      int: 60
    mode_points_scored:
      action: set
      int: 0

  # Step 1 = collection phase active (set when ball releases)
  gbof_setup_collection_phase:
    gbof_step:
      action: set
      int: 1

  # Timer display variable for Godot slide
  timer_gbof_collection_timer_tick:
    gbof_timer_display:
      action: set
      int: device.timers.gbof_collection_timer.ticks

  # Drain pending flag
  ball_will_end{mode.great_balls_of_fire.active==True}:
    pilot_mode_drain_pending:
      action: set
      int: 1

  # ── LEFT ORBIT PROGRESSION ─────────────────────────────────────────────────────
  # Conditions evaluate at event time (snapshot of variables when event fires),
  # BEFORE variable_player updates them for this event tick.
  # So hits==0 on the event means "the player has 0 previous hits; this is hit 1."
  gbof_lo_hit{current_player.gbof_lo_hits==0 and current_player.gbof_lo_complete==0}:
    gbof_lo_hits:
      action: set
      int: 1
    score:
      action: add
      int: 50000 * current_player.total_scoring_multiplier
    mode_points_scored:
      action: set
      int: 50000 * current_player.total_scoring_multiplier

  gbof_lo_hit{current_player.gbof_lo_hits==1 and current_player.gbof_lo_complete==0}:
    gbof_lo_hits:
      action: set
      int: 2
    score:
      action: add
      int: 100000 * current_player.total_scoring_multiplier
    mode_points_scored:
      action: set
      int: 100000 * current_player.total_scoring_multiplier

  gbof_lo_hit{current_player.gbof_lo_hits==2 and current_player.gbof_lo_complete==0}:
    gbof_lo_hits:
      action: set
      int: 3
    gbof_lo_complete:
      action: set
      int: 1
    gbof_balls_collected:
      action: add
      int: 1
    score:
      action: add
      int: 250000 * current_player.total_scoring_multiplier
    mode_points_scored:
      action: set
      int: 250000 * current_player.total_scoring_multiplier

  # ── LEFT RAMP PROGRESSION ──────────────────────────────────────────────────────
  gbof_lr_hit{current_player.gbof_lr_hits==0 and current_player.gbof_lr_complete==0}:
    gbof_lr_hits:
      action: set
      int: 1
    score:
      action: add
      int: 50000 * current_player.total_scoring_multiplier
    mode_points_scored:
      action: set
      int: 50000 * current_player.total_scoring_multiplier

  gbof_lr_hit{current_player.gbof_lr_hits==1 and current_player.gbof_lr_complete==0}:
    gbof_lr_hits:
      action: set
      int: 2
    score:
      action: add
      int: 100000 * current_player.total_scoring_multiplier
    mode_points_scored:
      action: set
      int: 100000 * current_player.total_scoring_multiplier

  gbof_lr_hit{current_player.gbof_lr_hits==2 and current_player.gbof_lr_complete==0}:
    gbof_lr_hits:
      action: set
      int: 3
    gbof_lr_complete:
      action: set
      int: 1
    gbof_balls_collected:
      action: add
      int: 1
    score:
      action: add
      int: 250000 * current_player.total_scoring_multiplier
    mode_points_scored:
      action: set
      int: 250000 * current_player.total_scoring_multiplier

  # ── TOWER RAMP PROGRESSION ─────────────────────────────────────────────────────
  gbof_twr_hit{current_player.gbof_twr_hits==0 and current_player.gbof_twr_complete==0}:
    gbof_twr_hits:
      action: set
      int: 1
    score:
      action: add
      int: 50000 * current_player.total_scoring_multiplier
    mode_points_scored:
      action: set
      int: 50000 * current_player.total_scoring_multiplier

  gbof_twr_hit{current_player.gbof_twr_hits==1 and current_player.gbof_twr_complete==0}:
    gbof_twr_hits:
      action: set
      int: 2
    score:
      action: add
      int: 100000 * current_player.total_scoring_multiplier
    mode_points_scored:
      action: set
      int: 100000 * current_player.total_scoring_multiplier

  gbof_twr_hit{current_player.gbof_twr_hits==2 and current_player.gbof_twr_complete==0}:
    gbof_twr_hits:
      action: set
      int: 3
    gbof_twr_complete:
      action: set
      int: 1
    gbof_balls_collected:
      action: add
      int: 1
    score:
      action: add
      int: 250000 * current_player.total_scoring_multiplier
    mode_points_scored:
      action: set
      int: 250000 * current_player.total_scoring_multiplier

  # ── RIGHT RAMP PROGRESSION ─────────────────────────────────────────────────────
  gbof_rr_hit{current_player.gbof_rr_hits==0 and current_player.gbof_rr_complete==0}:
    gbof_rr_hits:
      action: set
      int: 1
    score:
      action: add
      int: 50000 * current_player.total_scoring_multiplier
    mode_points_scored:
      action: set
      int: 50000 * current_player.total_scoring_multiplier

  gbof_rr_hit{current_player.gbof_rr_hits==1 and current_player.gbof_rr_complete==0}:
    gbof_rr_hits:
      action: set
      int: 2
    score:
      action: add
      int: 100000 * current_player.total_scoring_multiplier
    mode_points_scored:
      action: set
      int: 100000 * current_player.total_scoring_multiplier

  gbof_rr_hit{current_player.gbof_rr_hits==2 and current_player.gbof_rr_complete==0}:
    gbof_rr_hits:
      action: set
      int: 3
    gbof_rr_complete:
      action: set
      int: 1
    gbof_balls_collected:
      action: add
      int: 1
    score:
      action: add
      int: 250000 * current_player.total_scoring_multiplier
    mode_points_scored:
      action: set
      int: 250000 * current_player.total_scoring_multiplier

  # ── MB BALL COUNT: recalculate when a ball is forged ───────────────────────────
  # gbof_ball_forged fires as a NEW event (queued after current event completes),
  # so gbof_balls_collected is already incremented when this handler runs.
  gbof_ball_forged:
    gbof_mb_ball_count:
      action: set
      int: current_player.gbof_balls_collected + 1

  # Clamp handlers (triggered by event_player after gbof_ball_forged)
  gbof_clamp_mb_to_4:
    gbof_mb_ball_count:
      action: set
      int: 4

  gbof_clamp_mb_to_5:
    gbof_mb_ball_count:
      action: set
      int: 5

  # ── COLLECTION COMPLETE: set won/bonus tracking flags ──────────────────────────
  gbof_collection_complete:
    gbof_complete_flag:
      action: set
      int: 1
    mode_great_balls_of_fire_won:
      action: set
      int: 1
    pilot_missions_won:
      action: add
      int: 1
    modes_completed_count:
      action: add
      int: 1
    missiles_perk_saved:
      action: set
      int: current_player.missiles_perk_active
    missiles_perk_active:
      action: set
      int: 0

####################################################################################
# EVENT PLAYER
####################################################################################

event_player:

  # ── INIT ────────────────────────────────────────────────────────────────────────
  mode_great_balls_of_fire_started:
    - barrier_raise           # Raise barrier to protect scoop during intro video

  # ── AFTERBURNER PERK ────────────────────────────────────────────────────────────
  gbof_ball_released{current_player.afterburner_perk_active==1}:
    - afterburner_extend_gbof_collection_timer|500ms

  # ── INTRO SKIP: both flippers held ──────────────────────────────────────────────
  s_flipper_left_active{current_player.gbof_step==0 and device.timers.gbof_intro_video_delay.running}:
    - gbof_check_skip_intro
  s_flipper_right_active{current_player.gbof_step==0 and device.timers.gbof_intro_video_delay.running}:
    - gbof_check_skip_intro
  gbof_check_skip_intro{device.switches.s_flipper_left.state and device.switches.s_flipper_right.state}:
    - gbof_skip_intro

  # NORMAL intro path: timer completes → drop barrier, release ball 400ms later
  timer_gbof_intro_video_delay_complete:
    - scoop_ball_release
    - gbof_ball_released|400ms
    - gbof_setup_collection_phase|400ms

  # SKIP intro path: same sequence
  gbof_skip_intro:
    - scoop_ball_release
    - gbof_ball_released|400ms
    - gbof_setup_collection_phase|400ms

  # After barrier drop delay completes, raise barrier for gameplay
  timer_gbof_barrier_delay_complete:
    - barrier_raise

  # ── DRAIN HANDLING ──────────────────────────────────────────────────────────────
  gbof_ball_ending_hold:
    - gbof_failed
    - gbof_drain_detected

  timer_gbof_drain_delay_complete:
    - gbof_drain_cleanup_complete
    - gbof_cleanup

  # ── END VIDEO SKIP: both flippers during any end timer ──────────────────────────
  s_flipper_left_active{device.timers.gbof_failed_delay.running}:
    - gbof_check_skip_end
  s_flipper_right_active{device.timers.gbof_failed_delay.running}:
    - gbof_check_skip_end
  s_flipper_left_active{device.timers.gbof_complete_delay.running}:
    - gbof_check_skip_end
  s_flipper_right_active{device.timers.gbof_complete_delay.running}:
    - gbof_check_skip_end
  s_flipper_left_active{device.timers.gbof_drain_delay.running}:
    - gbof_check_skip_end
  s_flipper_right_active{device.timers.gbof_drain_delay.running}:
    - gbof_check_skip_end

  gbof_check_skip_end{device.switches.s_flipper_left.state and device.switches.s_flipper_right.state}:
    - gbof_skip_end_video

  # Skip routes based on which end timer was running
  gbof_skip_end_video{device.timers.gbof_failed_delay.running}:
    - gbof_drain_cleanup_complete
    - gbof_cleanup
  gbof_skip_end_video{device.timers.gbof_drain_delay.running}:
    - gbof_drain_cleanup_complete
    - gbof_cleanup
  gbof_skip_end_video{device.timers.gbof_complete_delay.running}:
    - gbof_cleanup
    - scoop_ball_release
    - gbof_victory_ball_exit|400ms
    - pilot_mode_cleanup_complete

  # ── SHOT DETECTION ──────────────────────────────────────────────────────────────
  # Left Orbit — composite event from pilot_mission_qualifier (already has orbit lockout)
  left_orbit_shot_hit{current_player.gbof_step==1 and current_player.gbof_lo_complete==0 and device.timers.gbof_shot_lockout.running==False}:
    - gbof_lo_hit
    - gbof_any_shot_hit

  # Left Ramp
  s_ramp_left_exit_active{current_player.gbof_step==1 and current_player.gbof_lr_complete==0 and device.timers.gbof_shot_lockout.running==False}:
    - gbof_lr_hit
    - gbof_any_shot_hit

  # Tower Ramp
  s_ramp_tower_exit_active{current_player.gbof_step==1 and current_player.gbof_twr_complete==0 and device.timers.gbof_shot_lockout.running==False}:
    - gbof_twr_hit
    - gbof_any_shot_hit

  # Right Ramp
  s_ramp_right_exit_active{current_player.gbof_step==1 and current_player.gbof_rr_complete==0 and device.timers.gbof_shot_lockout.running==False}:
    - gbof_rr_hit
    - gbof_any_shot_hit

  # ── INTERMEDIATE HIT EVENTS ─────────────────────────────────────────────────────
  # Conditions check variable state AT event time (before variable_player updates).
  # hits==0 → this is the 1st hit → post gbof_xx_hit_1 (drives yellow show + video)
  # hits==1 → this is the 2nd hit → post gbof_xx_hit_2 (drives orange show + video)
  # hits==2 → this is the 3rd hit → post forged events  (drives fire show + video)

  # LO
  gbof_lo_hit{current_player.gbof_lo_hits==0 and current_player.gbof_lo_complete==0}:
    - gbof_lo_hit_1
  gbof_lo_hit{current_player.gbof_lo_hits==1 and current_player.gbof_lo_complete==0}:
    - gbof_lo_hit_2
  gbof_lo_hit{current_player.gbof_lo_hits==2 and current_player.gbof_lo_complete==0}:
    - gbof_lo_hit_3
    - gbof_ball_forged
    - gbof_lo_forged
    - gbof_show_points

  # LR
  gbof_lr_hit{current_player.gbof_lr_hits==0 and current_player.gbof_lr_complete==0}:
    - gbof_lr_hit_1
  gbof_lr_hit{current_player.gbof_lr_hits==1 and current_player.gbof_lr_complete==0}:
    - gbof_lr_hit_2
  gbof_lr_hit{current_player.gbof_lr_hits==2 and current_player.gbof_lr_complete==0}:
    - gbof_lr_hit_3
    - gbof_ball_forged
    - gbof_lr_forged
    - gbof_show_points

  # TWR
  gbof_twr_hit{current_player.gbof_twr_hits==0 and current_player.gbof_twr_complete==0}:
    - gbof_twr_hit_1
  gbof_twr_hit{current_player.gbof_twr_hits==1 and current_player.gbof_twr_complete==0}:
    - gbof_twr_hit_2
  gbof_twr_hit{current_player.gbof_twr_hits==2 and current_player.gbof_twr_complete==0}:
    - gbof_twr_hit_3
    - gbof_ball_forged
    - gbof_twr_forged
    - gbof_show_points

  # RR
  gbof_rr_hit{current_player.gbof_rr_hits==0 and current_player.gbof_rr_complete==0}:
    - gbof_rr_hit_1
  gbof_rr_hit{current_player.gbof_rr_hits==1 and current_player.gbof_rr_complete==0}:
    - gbof_rr_hit_2
  gbof_rr_hit{current_player.gbof_rr_hits==2 and current_player.gbof_rr_complete==0}:
    - gbof_rr_hit_3
    - gbof_ball_forged
    - gbof_rr_forged
    - gbof_show_points

  # ── MB BALL COUNT CLAMP ──────────────────────────────────────────────────────────
  # After gbof_ball_forged fires, variable_player sets mb_ball_count = balls_collected+1.
  # gbof_ball_forged fires as a queued event, so by the time its handlers run,
  # gbof_balls_collected is already updated. Check if count needs capping.
  gbof_ball_forged{current_player.gbof_mb_ball_count > 4 and device.switches.s_lock_goose.state and device.switches.s_lock_mav.state}:
    - gbof_clamp_mb_to_4
  gbof_ball_forged{current_player.gbof_mb_ball_count > 5}:
    - gbof_clamp_mb_to_5

  # ── COLLECTION TIMER EXPIRED ────────────────────────────────────────────────────
  timer_gbof_collection_timer_complete{current_player.gbof_balls_collected==0}:
    - gbof_failed

  timer_gbof_collection_timer_complete{current_player.gbof_balls_collected>=1}:
    - gbof_collection_complete
    # Phase 2 multiball launch will be added here in next coding session

  # ── FAILED FLOW ─────────────────────────────────────────────────────────────────
  # NOTE: gbof_cleanup is deliberately NOT on gbof_failed — only after delay timer.
  # Firing cleanup on gbof_failed would kill the lost video show in the same tick.
  timer_gbof_failed_delay_complete:
    - gbof_cleanup
    - pilot_mode_cleanup_complete

  # ── VICTORY FLOW (Phase 2 placeholder) ──────────────────────────────────────────
  # gbof_complete fires when Phase 2 multiball ends with a win condition.
  gbof_complete:
    - barrier_raise
    - timer_gbof_complete_delay_start
    - missiles_perk_unload

  timer_gbof_complete_delay_complete:
    - gbof_cleanup
    - scoop_ball_release
    - gbof_victory_ball_exit|400ms
    - pilot_mode_cleanup_complete

####################################################################################
# SLIDE PLAYER
# Short hit videos (ball_X_video_1/2/3) play HERE in mode context.
# They auto-expire in 3s, well within the 60s collection phase.
# Forge slides (great_balls_of_fire_ball_1/2/3/4, persistent background layers)
# are played from base.yaml via gbof_lo_forged etc. events — see notes at bottom.
# mode_points_scored slide is played from base.yaml via gbof_show_points event.
####################################################################################

slide_player:

  # Background + intro: both start when mode starts (no duplicate key — merged)
  mode_great_balls_of_fire_started:
    great_balls_of_fire_background:
      action: play
      priority: 600
    great_balls_of_fire_intro:
      action: play
      priority: 700

  # When ball releases: remove intro, show timer
  gbof_ball_released:
    great_balls_of_fire_intro:
      action: remove
    great_balls_of_fire_timer:
      action: play
      priority: 610

  # ── SHORT HIT VIDEOS: each removes predecessor to prevent layering ─────────────
  # LO (ball_1)
  gbof_lo_hit_1:
    great_balls_of_fire_ball_1_video_1:
      action: play
      priority: 650
      expire: 3s
  gbof_lo_hit_2:
    great_balls_of_fire_ball_1_video_1:
      action: remove
