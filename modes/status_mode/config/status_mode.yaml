##############################################################################
## EVENT PLAYER
##############################################################################

event_player:

  ##############################################
  ## Page navigation
  ##############################################

  s_flipper_right_active{mode.status_mode.active==True and device.switches.s_flipper_left.state==1 and current_player.status_mode_page < 5}:
    - status_mode_page_advance
    - status_mode_both_held
  s_flipper_right_active{mode.status_mode.active==True and device.switches.s_flipper_left.state==1 and current_player.status_mode_page == 5}:
    - status_mode_page_wrap_forward
    - status_mode_both_held
  s_flipper_left_active{mode.status_mode.active==True and device.switches.s_flipper_right.state==1 and current_player.status_mode_page > 1}:
    - status_mode_page_retreat
    - status_mode_both_held
  s_flipper_left_active{mode.status_mode.active==True and device.switches.s_flipper_right.state==1 and current_player.status_mode_page == 1}:
    - status_mode_page_wrap_back
    - status_mode_both_held

  # Exit — both flippers released simultaneously
  s_flipper_left_inactive{mode.status_mode.active==True and device.switches.s_flipper_right.state==0}:
    - status_mode_exit
  s_flipper_right_inactive{mode.status_mode.active==True and device.switches.s_flipper_left.state==0}:
    - status_mode_exit

  ##############################################
  ## PAGE 1: Goose award/eject/mystery conditional computations
  ##############################################

  # Award completions: 1 for first completion test EB, then milestone-based
  mode_status_mode_started{current_player.goose_completions>0}:
    - goose_award_compute_from_milestone

  # Eject: if already qualified show 0, else compute from dedicated eject target
  mode_status_mode_started{current_player.eject_mode_qualified==1}:
    - goose_eject_set_qualified
  mode_status_mode_started{current_player.eject_mode_qualified==0}:
    - goose_eject_compute_remaining

  # Mystery: if already qualified show 0, else compute from mystery target
  mode_status_mode_started{current_player.mystery_qualified==1}:
    - goose_mystery_set_qualified
  mode_status_mode_started{current_player.mystery_qualified==0}:
    - goose_mystery_compute_remaining

  ##############################################
  ## PAGE 2: Pilot missions — compute on mode start
  ## Coded missions check played/won directly.
  ## Unimplemented missions use _actually_played guard (never set = always 0).
  ## When coding a new mission: add mode_<n>_actually_played: set: 1 to its mode_started.
  ##############################################

  # Rescue Cougar (CODED)
  mode_status_mode_started{current_player.mode_rescue_cougar_played==0}:
    - status_set_rescue_cougar_not_played
  mode_status_mode_started{current_player.mode_rescue_cougar_played==1 and current_player.mode_rescue_cougar_won==0}:
    - status_set_rescue_cougar_lost
  mode_status_mode_started{current_player.mode_rescue_cougar_played==1 and current_player.mode_rescue_cougar_won==1}:
    - status_set_rescue_cougar_won

  # Great Balls Of Fire (NOT CODED)
  mode_status_mode_started{current_player.mode_balls_of_fire_actually_played==0}:
    - status_set_balls_of_fire_not_coded
  mode_status_mode_started{current_player.mode_balls_of_fire_actually_played==1 and current_player.mode_balls_of_fire_played==0}:
    - status_set_balls_of_fire_not_played
  mode_status_mode_started{current_player.mode_balls_of_fire_actually_played==1 and current_player.mode_balls_of_fire_played==1 and current_player.mode_balls_of_fire_won==0}:
    - status_set_balls_of_fire_lost
  mode_status_mode_started{current_player.mode_balls_of_fire_actually_played==1 and current_player.mode_balls_of_fire_played==1 and current_player.mode_balls_of_fire_won==1}:
    - status_set_balls_of_fire_won

  # Cool Under Pressure (NOT CODED)
  mode_status_mode_started{current_player.mode_cool_under_pressure_actually_played==0}:
    - status_set_cool_under_pressure_not_coded
  mode_status_mode_started{current_player.mode_cool_under_pressure_actually_played==1 and current_player.mode_cool_under_pressure_played==0}:
    - status_set_cool_under_pressure_not_played
  mode_status_mode_started{current_player.mode_cool_under_pressure_actually_played==1 and current_player.mode_cool_under_pressure_played==1 and current_player.mode_cool_under_pressure_won==0}:
    - status_set_cool_under_pressure_lost
  mode_status_mode_started{current_player.mode_cool_under_pressure_actually_played==1 and current_player.mode_cool_under_pressure_played==1 and current_player.mode_cool_under_pressure_won==1}:
    - status_set_cool_under_pressure_won

  # No Points For Second Place (NOT CODED)
  mode_status_mode_started{current_player.mode_no_points_for_second_place_actually_played==0}:
    - status_set_no_points_not_coded
  mode_status_mode_started{current_player.mode_no_points_for_second_place_actually_played==1 and current_player.mode_no_points_for_second_place_played==0}:
    - status_set_no_points_not_played
  mode_status_mode_started{current_player.mode_no_points_for_second_place_actually_played==1 and current_player.mode_no_points_for_second_place_played==1 and current_player.mode_no_points_for_second_place_won==0}:
    - status_set_no_points_lost
  mode_status_mode_started{current_player.mode_no_points_for_second_place_actually_played==1 and current_player.mode_no_points_for_second_place_played==1 and current_player.mode_no_points_for_second_place_won==1}:
    - status_set_no_points_won

  # Edge Of Space (NOT CODED)
  mode_status_mode_started{current_player.mode_edge_of_space_actually_played==0}:
    - status_set_edge_of_space_not_coded
  mode_status_mode_started{current_player.mode_edge_of_space_actually_played==1 and current_player.mode_edge_of_space_played==0}:
    - status_set_edge_of_space_not_played
  mode_status_mode_started{current_player.mode_edge_of_space_actually_played==1 and current_player.mode_edge_of_space_played==1 and current_player.mode_edge_of_space_won==0}:
    - status_set_edge_of_space_lost
  mode_status_mode_started{current_player.mode_edge_of_space_actually_played==1 and current_player.mode_edge_of_space_played==1 and current_player.mode_edge_of_space_won==1}:
    - status_set_edge_of_space_won

  # Below The Hard Deck (NOT CODED)
  mode_status_mode_started{current_player.mode_below_the_hard_deck_actually_played==0}:
    - status_set_below_the_hard_deck_not_coded
  mode_status_mode_started{current_player.mode_below_the_hard_deck_actually_played==1 and current_player.mode_below_the_hard_deck_played==0}:
    - status_set_below_the_hard_deck_not_played
  mode_status_mode_started{current_player.mode_below_the_hard_deck_actually_played==1 and current_player.mode_below_the_hard_deck_played==1 and current_player.mode_below_the_hard_deck_won==0}:
    - status_set_below_the_hard_deck_lost
  mode_status_mode_started{current_player.mode_below_the_hard_deck_actually_played==1 and current_player.mode_below_the_hard_deck_played==1 and current_player.mode_below_the_hard_deck_won==1}:
    - status_set_below_the_hard_deck_won

  # Canyon Run (NOT CODED)
  mode_status_mode_started{current_player.mode_canyon_run_actually_played==0}:
    - status_set_canyon_run_not_coded
  mode_status_mode_started{current_player.mode_canyon_run_actually_played==1 and current_player.mode_canyon_run_played==0}:
    - status_set_canyon_run_not_played
  mode_status_mode_started{current_player.mode_canyon_run_actually_played==1 and current_player.mode_canyon_run_played==1 and current_player.mode_canyon_run_won==0}:
    - status_set_canyon_run_lost
  mode_status_mode_started{current_player.mode_canyon_run_actually_played==1 and current_player.mode_canyon_run_played==1 and current_player.mode_canyon_run_won==1}:
    - status_set_canyon_run_won

  # No Margin For Error (NOT CODED)
  mode_status_mode_started{current_player.mode_no_margin_for_error_actually_played==0}:
    - status_set_no_margin_not_coded
  mode_status_mode_started{current_player.mode_no_margin_for_error_actually_played==1 and current_player.mode_no_margin_for_error_played==0}:
    - status_set_no_margin_not_played
  mode_status_mode_started{current_player.mode_no_margin_for_error_actually_played==1 and current_player.mode_no_margin_for_error_played==1 and current_player.mode_no_margin_for_error_won==0}:
    - status_set_no_margin_lost
  mode_status_mode_started{current_player.mode_no_margin_for_error_actually_played==1 and current_player.mode_no_margin_for_error_played==1 and current_player.mode_no_margin_for_error_won==1}:
    - status_set_no_margin_won

  # Rise Of Phoenix (CODED)
  mode_status_mode_started{current_player.mode_rise_of_phoenix_played==0}:
    - status_set_rise_of_phoenix_not_played
  mode_status_mode_started{current_player.mode_rise_of_phoenix_played==1 and current_player.mode_rise_of_phoenix_won==0}:
    - status_set_rise_of_phoenix_lost
  mode_status_mode_started{current_player.mode_rise_of_phoenix_played==1 and current_player.mode_rise_of_phoenix_won==1}:
    - status_set_rise_of_phoenix_won

  # Battle Jester (CODED)
  mode_status_mode_started{current_player.mode_battle_jester_played==0}:
    - status_set_battle_jester_not_played
  mode_status_mode_started{current_player.mode_battle_jester_played==1 and current_player.mode_battle_jester_won==0}:
    - status_set_battle_jester_lost
  mode_status_mode_started{current_player.mode_battle_jester_played==1 and current_player.mode_battle_jester_won==1}:
    - status_set_battle_jester_won

  ##############################################
  ## PAGE 3: Training missions — compute on mode start
  ## played = training_<n>_complete (set on mode end regardless of outcome)
  ## NOTE: "missles" typo in training_missles_complete is intentional — matches code
  ## inverted won = pilot_training_mission_inverted_won (full prefix unlike others)
  ##############################################

  # Inverted
  mode_status_mode_started{current_player.training_inverted_complete==0}:
    - status_set_inverted_not_played
  mode_status_mode_started{current_player.training_inverted_complete==1 and current_player.pilot_training_mission_inverted_won==0}:
    - status_set_inverted_lost
  mode_status_mode_started{current_player.training_inverted_complete==1 and current_player.pilot_training_mission_inverted_won==1}:
    - status_set_inverted_won

  # Missiles (note: "missles" typo in played var is intentional)
  mode_status_mode_started{current_player.training_missles_complete==0}:
    - status_set_missiles_not_played
  mode_status_mode_started{current_player.training_missles_complete==1 and current_player.training_missiles_won==0}:
    - status_set_missiles_lost
  mode_status_mode_started{current_player.training_missles_complete==1 and current_player.training_missiles_won==1}:
    - status_set_missiles_won

  # Wingman
  mode_status_mode_started{current_player.training_wingman_complete==0}:
    - status_set_wingman_not_played
  mode_status_mode_started{current_player.training_wingman_complete==1 and current_player.training_wingman_won==0}:
    - status_set_wingman_lost
  mode_status_mode_started{current_player.training_wingman_complete==1 and current_player.training_wingman_won==1}:
    - status_set_wingman_won

  # Afterburner
  mode_status_mode_started{current_player.training_afterburner_complete==0}:
    - status_set_afterburner_not_played
  mode_status_mode_started{current_player.training_afterburner_complete==1 and current_player.training_afterburner_won==0}:
    - status_set_afterburner_lost
  mode_status_mode_started{current_player.training_afterburner_complete==1 and current_player.training_afterburner_won==1}:
    - status_set_afterburner_won

  # Dog Fight (NOT CODED)
  mode_status_mode_started{current_player.training_dogfight_actually_played==0}:
    - status_set_dogfight_not_coded
  mode_status_mode_started{current_player.training_dogfight_actually_played==1 and current_player.training_dogfight_complete==0}:
    - status_set_dogfight_not_played
  mode_status_mode_started{current_player.training_dogfight_actually_played==1 and current_player.training_dogfight_complete==1 and current_player.training_dogfight_won==0}:
    - status_set_dogfight_lost
  mode_status_mode_started{current_player.training_dogfight_actually_played==1 and current_player.training_dogfight_complete==1 and current_player.training_dogfight_won==1}:
    - status_set_dogfight_won

  ##############################################
  ## PAGE 3: Perks — compute on mode start
  ##############################################

  mode_status_mode_started{current_player.training_mission_inverted_perk_active==1}:
    - status_set_inverted_perk_active
  mode_status_mode_started{current_player.training_mission_inverted_perk_active==0}:
    - status_set_inverted_perk_inactive
  mode_status_mode_started{current_player.missiles_perk_active==1}:
    - status_set_missiles_perk_active
  mode_status_mode_started{current_player.missiles_perk_active==0}:
    - status_set_missiles_perk_inactive
  mode_status_mode_started{current_player.wingman_perk_active==1}:
    - status_set_wingman_perk_active
  mode_status_mode_started{current_player.wingman_perk_active==0}:
    - status_set_wingman_perk_inactive
  mode_status_mode_started{current_player.afterburner_perk_active==1}:
    - status_set_afterburner_perk_active
  mode_status_mode_started{current_player.afterburner_perk_active==0}:
    - status_set_afterburner_perk_inactive

  ##############################################
  ## PAGE 4: Hard deck modes — compute on mode start
  ## PTB is the only coded hard deck mode.
  ## State priority: Won > Played+Lost > Qualified > Not Qualified
  ## hd_ptb_played set in hard_deck_qualifiers on mode_hard_deck_playing_with_the_boys_started
  ## hard_deck_missions_won increments on ptb_step_7_scoop_entered (PTB only mode coded)
  ## hd_ptb_qualified set in hard_deck_qualifiers, persists after mode plays
  ## Other 3 modes: use _actually_played guard (never set = always 0) → Not Coded Yet
  ##############################################

  # Playing With The Boys
  mode_status_mode_started{current_player.hd_ptb_played==1 and current_player.hard_deck_missions_won>=1}:
    - status_set_ptb_won
  mode_status_mode_started{current_player.hd_ptb_played==1 and current_player.hard_deck_missions_won==0}:
    - status_set_ptb_played_lost
  mode_status_mode_started{current_player.hd_ptb_played==0 and current_player.hd_ptb_qualified==1}:
    - status_set_ptb_qualified
  mode_status_mode_started{current_player.hd_ptb_played==0 and current_player.hd_ptb_qualified==0}:
    - status_set_ptb_not_qualified

  # Remembering ICEMAN (NOT CODED)
  mode_status_mode_started{current_player.hd_iceman_actually_played==0}:
    - status_set_iceman_hd_not_coded

  # Charlie (NOT CODED)
  mode_status_mode_started{current_player.hd_charlie_actually_played==0}:
    - status_set_charlie_hd_not_coded

  # Penny (NOT CODED)
  mode_status_mode_started{current_player.hd_penny_actually_played==0}:
    - status_set_penny_hd_not_coded

  # Goose Hard Deck (NOT CODED)
  mode_status_mode_started{current_player.hd_goose_actually_played==0}:
    - status_set_goose_hd_not_coded

  # Current hard deck lit (hard_deck_qualified_mode: 0=none, 1=Charlie, 2=PTB, 3=Penny, 4=ICEMAN)
  mode_status_mode_started{current_player.hard_deck_qualified_mode==0}:
    - status_set_hd_lit_none
  mode_status_mode_started{current_player.hard_deck_qualified_mode==1}:
    - status_set_hd_lit_charlie
  mode_status_mode_started{current_player.hard_deck_qualified_mode==2}:
    - status_set_hd_lit_ptb
  mode_status_mode_started{current_player.hard_deck_qualified_mode==3}:
    - status_set_hd_lit_penny
  mode_status_mode_started{current_player.hard_deck_qualified_mode==4}:
    - status_set_hd_lit_iceman

  ##############################################
  ## PAGE 5: Final battle — compute on mode start
  ## All conditions needed to unlock the Final Battle wizard mode.
  ## Dog Fight: not coded yet → Not Coded Yet
  ## Super jackpot: super_jackpots_collected tracks total collected (int, no reset)
  ##############################################

  # Dog Fight page 5 status is set via the shared dogfight setters in variable_player
  # (status_set_dogfight_* events set both status_dogfight AND status_final_dogfight)

  # TG Multiball Super Jackpot (super_jackpots_collected increments per collect, no reset)
  mode_status_mode_started{current_player.super_jackpots_collected==0}:
    - status_set_final_super_jackpot_no
  mode_status_mode_started{current_player.super_jackpots_collected>=1}:
    - status_set_final_super_jackpot_yes

##############################################################################
## SLIDE PLAYER
##############################################################################

slide_player:
  mode_status_mode_started:
    status_mode:
      action: play
      priority: 800

  mode_status_mode_stopped:
    status_mode:
      action: remove