#config_version=6

##############################################################################
# STATUS MODE
# Priority: 800 (above pilot modes 600, bonus 500)
#
# ENTRY:  Both flippers held 10 seconds — entry timer in base.yaml fires status_mode_enter
# STAY:   At least one flipper held; inactivity timer resets on any flipper press/release
# PAGES:  Right flipper tap (press while left held) = next page (wraps 1→5→1)
#         Left flipper tap (press while right held) = prev page (wraps 1→5→1)
# EXIT:   Both flippers released simultaneously OR 10s inactivity
#
# VARIABLE NAMING NOTES (confirmed from source files):
#   "missles" typo preserved in training_missles_complete (matches missiles mode code)
#   inverted perk:  training_mission_inverted_perk_active  (longer name than others)
#   inverted won:   pilot_training_mission_inverted_won    (full mode name prefix)
#   PTB played:     hd_ptb_played                          (set in hard_deck_qualifiers)
#   PTB won:        hard_deck_missions_won >= 1             (only PTB coded currently)
#   PTB qualified:  hd_ptb_qualified == 1                  (persists after mode played)
#   Super jackpot:  super_jackpots_collected               (int, increments per collect)
##############################################################################

mode:
  start_events: status_mode_enter
  stop_events:
    - status_mode_exit
    - timer_status_inactivity_complete
  priority: 800
  game_mode: true

##############################################################################
## TIMERS
##############################################################################

timers:

  status_inactivity:
    start_value: 0
    end_value: 10
    direction: up
    tick_interval: 1s
    start_running: false
    control_events:
      - event: mode_status_mode_started
        action: restart
      - event: s_flipper_left_active
        action: restart
      - event: s_flipper_left_inactive
        action: restart
      - event: s_flipper_right_active
        action: restart
      - event: s_flipper_right_inactive
        action: restart
      - event: status_mode_both_held
        action: pause
      - event: s_flipper_left_inactive
        action: restart
      - event: s_flipper_right_inactive
        action: restart

##############################################################################
## VARIABLE PLAYER
##############################################################################

variable_player:

  ##############################################
  ## Init on mode start
  ##############################################

  mode_status_mode_started:
    status_mode_page:
      action: set
      int: 1
    # PAGE 1: Tilt remaining
    status_tilt_remaining:
      action: set
      int: 2 - current_player.tilt_warnings
    # PAGE 1: Bonus preview (matches bonus.yaml formula × multiplier)
    status_bonus_preview:
      action: set
      int: ((current_player.bonus_switches_count * 350) + (current_player.bonus_ramps_count * 2500) + (current_player.bonus_highest_mach * 10000) + (current_player.hard_deck_awards_count * 35000) + (current_player.training_missions_played * 50000) + (current_player.pilot_missions_won * 75000)) * current_player.bonus_multiplier
    # PAGE 1: Next Award completions — handle test EB at completion 1 vs milestone for completions > 0
    goose_award_completions_needed:
      action: set
      int: 1

  ##############################################
  ## Page navigation — routed through event_player to avoid same-event double-fire
  ##############################################

  status_mode_page_advance:
    status_mode_page:
      action: add
      int: 1
  status_mode_page_wrap_forward:
    status_mode_page:
      action: set
      int: 1
  status_mode_page_retreat:
    status_mode_page:
      action: add
      int: -1
  status_mode_page_wrap_back:
    status_mode_page:
      action: set
      int: 5

  ##############################################
  ## PAGE 1: Goose computed remaining responses
  ##############################################

  goose_award_compute_from_milestone:
    goose_award_completions_needed:
      action: set
      int: current_player.goose_milestone - current_player.goose_completions

  goose_eject_set_qualified:
    goose_eject_completions_needed:
      action: set
      int: 0
  goose_eject_compute_remaining:
    goose_eject_completions_needed:
      action: set
      int: current_player.goose_next_eject_target - current_player.goose_completions

  goose_mystery_set_qualified:
