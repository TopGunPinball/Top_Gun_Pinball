      int: 0

  # Safety clear: if wingman mode plunged directly via coil_player while ball was
  # already in shooter lane, s_shooter_lane_active never transitions so the flag
  # never clears via wingman_post_win_plunge_start. Clear it when ball departs.
  s_shooter_lane_inactive{current_player.wingman_post_win_plunge==1}:
    wingman_post_win_plunge:
      action: set
      int: 0

##############################################
## SERVO-LINKED COIL CONTROL
## When servos move, automatically control linked coils
## This ensures ramp lifters and diverters work together
##############################################
coil_player:
  # Right ramp servo UP → Open right orbit diverter
  right_ramp_up:
    c_right_orbit_diverter:
      action: enable
  
  # Right ramp servo DOWN → Close right orbit diverter
  right_ramp_down:
    c_right_orbit_diverter:
      action: disable

  ##############################################
  ## SHOOTER LANE DIVERTER SUPPRESSION
  ## If diverter is active when ball enters shooter lane,
  ## temporarily disable it so the skill shot lane is clear.
  ## Restore when ball physically leaves the shooter lane.
  ##############################################
  s_shooter_lane_active{current_player.right_orbit_diverter_requested==1}:
    c_right_orbit_diverter:
      action: disable

  # Restore when any playfield switch fires EXCEPT s_lane_right (which is pre-diverter)
  sw_playfield_active{current_player.diverter_temporarily_disabled==1 and device.switches.s_lane_right.state==0}:
    c_right_orbit_diverter:
      action: enable

  ##############################################
  ## SHUTDOWN CLEANUP - Turn off all hold coils when MPF exits
  ## This prevents lights/coils from staying on after closing the game
  ##############################################
  shutdown:
    c_left_lane_up_post:
      action: disable
    c_left_mig_up_post:
      action: disable
    c_right_mig_up_post:
      action: disable
    c_left_orbit_diverter:
      action: disable
    c_right_orbit_diverter:
      action: disable
    c_mode_barrier:
      action: disable
    # c_right_ramp_lifter and c_top_ramp_lifter removed - now using servos
    c_coin_door_led:
      action: disable
    c_start_button_led:
      action: disable

  ##############################################
  ## WINGMAN POST-WIN PLUNGE + MIG COIL SEQUENCE
  ##############################################
  
  # Auto-plunge after 1 second delay
  timer_wingman_post_win_plunge_delay_complete:
    c_plunger:
      action: pulse

  # Pilot/training mode auto-plunge after 500ms
  timer_pilot_mode_auto_plunge_delay_complete:
    c_plunger:
      action: pulse

  # Enable left MiG post 1 second after plunge
  timer_wingman_post_win_mig_delay_complete:
    c_left_mig_up_post:
      action: enable

  # Disable left MiG post after 2 second hold
  timer_wingman_post_win_mig_hold_complete:
    c_left_mig_up_post:
      action: disable

