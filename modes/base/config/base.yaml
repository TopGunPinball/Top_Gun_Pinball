slide_player:
  mode_base_started: base_slide
  
  # Handle skillshot videos in base mode so they continue after skillshot mode ends
  # mode_points_scored slide played here so it persists after skillshot mode stops
  skillshot_show_points:
    mode_points_scored:
      action: play
      priority: 840
      expire: 2s

  ##############################################################################
  # Great Balls of Fire — Forge slides (persistent background layers)
  # These stack on top of great_balls_of_fire_background at priority 605.
  # Played from base.yaml so they survive the mode's slide context.
  ##############################################################################
  gbof_lo_forged:
    great_balls_of_fire_ball_1:
      action: play
      priority: 605
  gbof_lr_forged:
    great_balls_of_fire_ball_2:
      action: play
      priority: 605
  gbof_twr_forged:
    great_balls_of_fire_ball_3:
      action: play
      priority: 605
  gbof_rr_forged:
    great_balls_of_fire_ball_4:
      action: play
      priority: 605
  gbof_cleanup:
    great_balls_of_fire_ball_1:
      action: remove
    great_balls_of_fire_ball_2:
      action: remove
    great_balls_of_fire_ball_3:
      action: remove
    great_balls_of_fire_ball_4:
      action: remove

  # Great Balls of Fire — remove forge slides when mode fails (before lost video)
  gbof_failed:
    great_balls_of_fire_ball_1:
      action: remove
    great_balls_of_fire_ball_2:
      action: remove
    great_balls_of_fire_ball_3:
      action: remove
    great_balls_of_fire_ball_4:
      action: remove

  # Great Balls of Fire — mode points scored slide
  gbof_show_points:
    mode_points_scored:
      action: play
      priority: 840
      expire: 2s

  # Edge of Space shot points — played from base so slide persists after mode stops
  edge_of_space_show_points:
    mode_points_scored:
      action: play
      priority: 840
      expire: 2s

  show_skillshot_mig_video:
    skillshot_mig_hit:
      action: play
      expire: 3.5s  # Auto-remove after 5 seconds
  show_skillshot_miramar_video:
    skillshot_miramar:
      action: play
      expire: 3.5s  # Auto-remove after 5 seconds
  show_skillshot_tower_video:
    skillshot_tower:
      action: play
      expire: 5s  # Auto-remove after 5 seconds
  show_skillshot_inverted_video:
    skillshot_inverted:
      action: play
      expire: 8s  # Auto-remove after 5 seconds

####################################################################################
# RANDOM EVENT PLAYER - Randomly selects one of N events to fire
####################################################################################
random_event_player:

  ##############################################
  ## SPINNER - Single gun fire sound on each spin
  ##############################################
  # (random cannon burst removed — replaced with soundfx_spinner_gun_fire in sound_player)

sound_player:
  ##############################################################################
  ## BASE MUSIC
  ##############################################################################
  # Start base music when playfield becomes active (not during any special mode)
  # Uses player variables instead of checking each mode individually:
  # - pilot_mode_active: Set to 1 when any pilot mission is running
  # - training_mission_active: Set to 1 when any training mission is running
  # - hard_deck_active: Set to 1 when any hard deck mode is running
  # - multiball_active: Set to 1 when any multiball is running
  # Add additional variables as needed for future mode types
  playfield_active{current_player.pilot_mode_active==0 and current_player.training_mission_active==0 and current_player.hard_deck_active==0 and current_player.multiball_active==0}:
    music_danger_zone:
      bus: music
      loops: -1
  
  # Restart base music after bonus mode completes (but not when game is ending)
  mode_bonus_stopped{mode.game.active==True}:
    music_danger_zone:
      bus: music
      loops: -1

#################################################################################### 
  # Skillshot Collected Sounds
  # Triggered by same custom events as the video slides (proven to work)
  # Voice bus so compressor ducks the video audio
####################################################################################
  show_skillshot_mig_video:
    skillshot_collected:
      bus: voice
      loops: 0
  show_skillshot_miramar_video:
    miramar_skillshot_collected:
      bus: voice
      loops: 0
  show_skillshot_tower_video:
    tower_skillshot_collected:
      bus: voice
      loops: 0
  show_skillshot_inverted_video:
    inverted_skillshot_collected:
      bus: voice
      loops: 0

####################################################################################
  # SPINNER SOUND
####################################################################################
  s_spinner_active:
    soundfx_spinner_gun_fire_end:
      bus: effects
      loops: 0
      volume: .7


#################################################################################### 
  # CRITICAL: Mode Scoop Silence - Works for ALL pilot mission modes
  # NO CONDITIONAL - This plays silence whenever ball enters mode scoop
  # EXCEPTION: battle_jester step 6 - music keeps playing during that scoop entry
####################################################################################

  # Silence for all modes EXCEPT battle_jester step 6, playing_with_the_boys step 7,
  # and great_balls_of_fire (Phase 2 super jackpot scoop must not cut music)
  s_mode_start_active{(mode.battle_jester.active==False or current_player.battle_jester_step!=5) and (mode.hard_deck_playing_with_the_boys.active==False or current_player.ptb_step!=7) and mode.mystery_award.active==False and mode.no_points_for_second_place.active==False and mode.great_balls_of_fire.active==False}:
    silence:
      bus: music
      loops: 0

#################################################################################### 
  # Mystery Award Mode Music Handler
  # Music starts immediately on mode_started (ball is held — no ball_released event).
  # Danger Zone restarts on mode_stopped. No drain condition needed: mystery
  # always ends via normal eject, the ball is held throughout and cannot drain.
####################################################################################

  mystery_award_selected:
    mystery_music:
      bus: music
      loops: -1

  mode_mystery_award_stopped:
    music_danger_zone:
      bus: music
      loops: -1

#################################################################################### 
  # Rescue Cougar Mode Music Handler
  # PATTERN: Music starts on xxx_ball_released event (like battle_jester)
####################################################################################
  
  # Start music when ball is released from scoop (after intro video or skip)
  rescue_cougar_ball_released:
    music_rescue_cougar_1:
      bus: music
      loops: -1
  
  # Step 7 complete - silence before switching to music_2
  rescue_cougar_step_7_complete:
    silence:
      bus: music
      loops: 0
  
  # Step 8 setup - start music_2
  rescue_cougar_setup_step_8:
    music_rescue_cougar_2:
      bus: music
      loops: -1
  
  # Silence music when failed/complete videos play (before mode stops)
  rescue_cougar_failed:
    silence:
      bus: music
      loops: 0
  
  rescue_cougar_complete:
    silence:
      bus: music
      loops: 0
  
  # Restart base music when rescue_cougar mode stops (but NOT if drain pending - bonus will handle it)
  mode_rescue_cougar_stopped{current_player.pilot_mode_drain_pending==0}:
    music_danger_zone:
      bus: music
      loops: -1

#################################################################################### 
  # Rise of Phoenix Mode Music Handler
  # PATTERN: Music starts on xxx_ball_released event (like battle_jester)
####################################################################################

  # Start music when ball is released from scoop (after intro video or skip)
  rise_of_phoenix_ball_released:
    rise_of_phoenix_music:
      bus: music
      loops: -1
  
  # Silence music when failed/complete videos play (before mode stops)
  rise_of_phoenix_failed:
