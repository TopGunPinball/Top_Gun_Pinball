####################################################################################
# SYNCHRONIZED FLASH SHOWS - For Mode/Multiball Stacking
####################################################################################
# These shows provide synchronized flashing for mode shots and future multiball shots.
# Using sync_ms: 1000 in show_player ensures all shows align to the same global clock.
#
# When a mode shot AND multiball shot light the same insert:
# - First 500ms: Mode color shows (multiball is OFF)
# - Second 500ms: Multiball color shows (mode is OFF)
# This creates a clean alternating pattern so players know BOTH are active.
####################################################################################

shows:
  ##############################################
  ## MODE SHOT FLASH - ON first half of 1-second cycle
  ## Use for ALL pilot mission mode shots
  ##############################################
  sync_flash_mode:
    - duration: 500ms
      lights:
        (led):
          color: (color)
          fade: 0ms
    - duration: 500ms
      lights:
        (led):
          color: off
          fade: 0ms

  ##############################################
  ## MULTIBALL SHOT FLASH - ON second half of 1-second cycle
  ## Use for ALL multiball shots (creates alternating effect when stacked)
  ##############################################
  sync_flash_mb:
    - duration: 500ms
      lights:
        (led):
          color: off
          fade: 0ms
    - duration: 500ms
      lights:
        (led):
          color: (color)
          fade: 0ms

  ##############################################
  ## MODE SHOT PULSE — Breathe in and out, never fully off
  ## Use for shots/inserts that should glow rather than flash.
  ## Total cycle: 2000ms. Use sync_ms: 2000 in show_player for alignment.
  ## Show tokens: { led: l_shot_xxx, color: RRGGBB }
  ## "Off" state is 0D0D0D (~5% white) — maintains a faint glow at minimum.
  ##############################################
  sync_pulse_mode:
    - duration: 1000ms
      lights:
        (led):
          color: (color)
          fade: 800ms
    - duration: 1000ms
      lights:
        (led):
          color: 0D0D0D
          fade: 800ms