  # Restart base music when mode stops (but NOT if drain pending - bonus will handle it)
  mode_edge_of_space_stopped{current_player.pilot_mode_drain_pending==0}:
    music_danger_zone:
      bus: music
      loops: -1

####################################################################################
  # Great Balls of Fire Mode Music Handler
  # Phase 1 music starts on gbof_ball_released (after intro video or skip)
  # Phase 2 music starts on gbof_mb_start (when multiball launches)
####################################################################################

  # Phase 1: start music when ball releases from scoop into gameplay
  gbof_ball_released:
    great_balls_of_fire_music:
      bus: music
      loops: -1

  # Phase 2: switch to rock version when multiball starts
  gbof_mb_start:
    great_balls_of_fire_music_rock:
      bus: music
      loops: -1

  # Silence music only on failed (lost video). Won video keeps rock music playing.
  gbof_failed:
    silence:
      bus: music
      loops: 0

  # Music continues through the 30s won video — silenced when mode stops below.

  # Restart base music when mode stops (but NOT if drain pending — bonus handles it)
  mode_great_balls_of_fire_stopped{current_player.pilot_mode_drain_pending==0}:
    music_danger_zone:
      bus: music
      loops: -1

  # Decision voice callout only after player selects "A Little More" (combo)
  edge_of_space_choice_yes:
    voice_edge_of_space_decision:
      bus: voice
      loops: 0

#################################################################################### 
  # Playing with the Boys (Hard Deck) Music Handler
####################################################################################

  # Start music when mode starts (during intro hold, not after ball release)
  mode_hard_deck_playing_with_the_boys_started:
