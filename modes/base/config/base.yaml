#config_version=6

# Base mode that starts at the beginning of each ball
# and stops at the end of each ball.
# Slides at 50(Video Background) and 0 (no video Playing)

mode:
  start_events: ball_starting
  stop_events: ball_ending
  priority: 100

##############################################
## TIMERS - Post-Win Plunge Sequence
##############################################
timers:

  ##############################################
  ## STATUS MODE ENTRY TIMER
  ## Both flippers held simultaneously for 10 seconds triggers status mode.
  ## Timer lives in base (not status_mode) because it runs before status_mode starts.
  ## Guard conditions: bonus and status_mode must not be active.
  ##############################################
  status_mode_entry:
    start_value: 0
    end_value: 4
    direction: up
    tick_interval: 1s
    start_running: false
    control_events:
      - event: status_mode_entry_both_held
        action: restart
      - event: status_mode_entry_cancel
        action: stop

  # Wingman post-win: 1 second delay before auto-plunge
  wingman_post_win_plunge_delay:
    start_value: 0
    end_value: 1
    direction: up
    tick_interval: 1s
    control_events:
      - event: wingman_post_win_plunge_start
        action: start

  # Wingman post-win: 1 second delay after plunge before MiG fires
  wingman_post_win_mig_delay:
    start_value: 0
    end_value: 1
    direction: up
    tick_interval: 1s
    control_events:
      - event: timer_wingman_post_win_plunge_delay_complete
        action: start

  # Wingman post-win: 2 second MiG hold duration
  wingman_post_win_mig_hold:
    start_value: 0
    end_value: 2
    direction: up
    tick_interval: 1s
    control_events:
      - event: timer_wingman_post_win_mig_delay_complete
        action: start

  ##############################################
  ## COMPOSITE SHOT WINDOWS
  ## Orbit composite detection (left_orbit_shot_hit / right_orbit_shot_hit) is
  ## handled entirely by pilot_mission_qualifier.yaml using its own timers with
  ## lockout and post-plunge guards. Do NOT duplicate it here.
  ## spinner_shot_made    = 3 spins within 2s rolling inactivity window
  ##############################################

  # Rolling inactivity window for spinner — 2s of no spins resets counter
  spinner_inactivity:
    start_value: 2
    end_value: 0
    direction: down
    tick_interval: 1s
    start_running: false
    control_events:
      - event: s_spinner_active
        action: restart

event_player:
  mode_base_started:
    - start_mode_bumpers
    - right_ramp_down
    - top_ramp_down|500ms

  ##############################################
  ## COMPOSITE SHOT EVENTS
  ## left_orbit_shot_hit / right_orbit_shot_hit are fired by pilot_mission_qualifier.yaml
  ## which owns all orbit composite detection with proper lockout guards.
  ## spinner_shot_made: 3 spins detected within inactivity window
  ##############################################

  # spinner_shot_made is fired by pilot_mission_qualifier which owns spinner
  # composite detection with proper lockout guards. Do NOT duplicate here.

  # Release lock servo at ball start ONLY if no balls are physically in locks
  # Uses switch state (not player variables) because balls persist across players
  mode_base_started{not device.switches.s_lock_goose.state and not device.switches.s_lock_mav.state}:
    - lock_released
  mode_base_will_stop:
    - stop_mode_bumpers

  ##############################################
  ## SHUTDOWN CLEANUP - Reset servos when MPF exits (staggered to prevent power contention)
  ##############################################
  shutdown:
    - right_ramp_down
    - top_ramp_down|500ms
    - lock_released

  ##############################################
  ## WINGMAN POST-WIN PLUNGE + MIG SEQUENCE
  ## After wingman win celebration, next ball gets auto-plunged
  ## with left MiG post fired to send ball to pop bumpers
  ##############################################
  s_shooter_lane_active{current_player.wingman_post_win_plunge==1}:
    - wingman_post_win_plunge_start

  # Pilot or training mission active — immediately stop skillshot if it starts
  # This is the correct block: stop the mode as soon as it starts, not after
  mode_skillshot_started{current_player.pilot_mode_active==1 or current_player.training_mission_active==1}:
    - stop_mode_skillshot

  ##############################################
  ## STATUS MODE ENTRY
  ## Both flippers held together for 10 seconds → status_mode_enter
  ## Timer restarts each time both are held; cancels if either releases alone.
  ## Guards: not during bonus, not if status mode already running.
  ##############################################
  s_flipper_left_active{device.switches.s_flipper_right.state==1 and mode.bonus.active==False and mode.status_mode.active==False}:
    - status_mode_entry_both_held
  s_flipper_right_active{device.switches.s_flipper_left.state==1 and mode.bonus.active==False and mode.status_mode.active==False}:
    - status_mode_entry_both_held
  s_flipper_left_inactive{device.timers.status_mode_entry.running==True}:
    - status_mode_entry_cancel
  s_flipper_right_inactive{device.timers.status_mode_entry.running==True}:
    - status_mode_entry_cancel
  timer_status_mode_entry_complete:
    - status_mode_enter

  ##############################################
  ## BALL SEARCH SUPPRESSION
  ## Reset the ball search countdown whenever a flipper is held.
  ## A held flipper means the player is actively engaged -- the ball
  ## is on a flipper, not stuck.
  ## NOTE: ball_search_block only prevents a NEW search; it does NOT
  ## reset the already-running 25s countdown. Modes handle their own
  ## block/unblock; this covers the flipper-held case globally.
  ##############################################
  s_flipper_left_active:
    - ball_search_reset
  s_flipper_right_active:
    - ball_search_reset

variable_player:
  ##############################################
  ## Total Scoring Multiplier - FIXED VERSION
  ## Initialize on BOTH player_added AND mode start
  ##############################################

  # Initialize on player added (in case base mode already running)
  player_added:
    total_scoring_multiplier:
      action: set
      float: 1.0
    bonus_switches_count:
      action: set
      int: 0
    bonus_ramps_count:
      action: set
      int: 0
    bonus_highest_mach:
      action: set
      int: 0
    # Initialize mode-active tracking variables (used for music control)
    # These are set to 1 by respective modes when they start
    training_mission_active:
      action: set
      int: 0
    hard_deck_active:
      action: set
      int: 0
    wingman_post_win_plunge:
      action: set
      int: 0
    ##########################################################################
    # NOTE: Multiball, lock, MIG, evasion, and video tracking variables have
    # been REMOVED from player_added. They are initialized by their respective
    # modes (top_gun_multiball, top_gun_multiball_locks) on mode_started.
    #
    # REASON: player_added fires when ANY player joins, including mid-game.
    # If Player 2 joins during Player 1's multiball, these resets would
    # overwrite Player 1's live game state (e.g., multiball_super_lit=0
    # kills the super jackpot, lock_collection_paused=0 re-enables
    # qualifying lights during multiball).
    #
    # MPF auto-creates player variables with default 0 when first set,
    # so no explicit initialization in player_added is needed.
    ##########################################################################

  # ALSO initialize when base mode starts (this is the key fix!)
  # Reset per-ball bonus counters AND bonus multiplier
  mode_base_started:
    total_scoring_multiplier:
      action: set
      float: current_player.mach_level * (1 + current_player.x2_multiplier)
    bonus_switches_count:
      action: set
      int: 0
    bonus_ramps_count:
      action: set
      int: 0
    bonus_highest_mach:
      action: set
      int: 0
    bonus_multiplier:
      action: set
      int: 1
    ball_tilted:
      action: set
      int: 0
    pilot_mode_drain_pending:
      action: set
      int: 0
    right_orbit_diverter_requested:
      action: set
      int: 0
    diverter_temporarily_disabled:
      action: set
      int: 0
    spinner_sound_toggle:
      action: set
      int: 0

  ##############################################
  ## DIVERTER STATE TRACKING
  ## Track whether a mode has requested the diverter ON
  ## so we can restore it after shooter lane suppression
  ##############################################
  right_ramp_up:
    right_orbit_diverter_requested:
      action: set
      int: 1
    diverter_temporarily_disabled:
      action: set
      int: 0

  right_ramp_down:
    right_orbit_diverter_requested:
      action: set
      int: 0
    diverter_temporarily_disabled:
      action: set
      int: 0

  s_shooter_lane_active{current_player.right_orbit_diverter_requested==1}:
    diverter_temporarily_disabled:
      action: set
      int: 1

  # Restore when any playfield switch fires EXCEPT s_lane_right (which is pre-diverter)
  # If s_lane_right triggered sw_playfield_active its state will be 1 — excluded by condition
  sw_playfield_active{current_player.diverter_temporarily_disabled==1 and device.switches.s_lane_right.state==0}:
    diverter_temporarily_disabled:
      action: set
      int: 0

  ##############################################
  ## COMPOSITE SHOT TRACKING
  ## Pending flags and spinner counter for orbit/spinner detection.
  ## Timer windows are defined in the timers section above.
  ## Composite events fired in event_player above:
  ##   left_orbit_shot_hit  = s_orbit_left → s_orbit_right within 2s
  ##   right_orbit_shot_hit = s_orbit_right → s_orbit_left within 2s
  ##   spinner_shot_made    = 3 spins within 2s inactivity window
  ##############################################

  # Reset on made or inactivity timeout
  spinner_shot_made:
    spinner_count:
      action: set
      int: 0

  timer_spinner_inactivity_complete:
    spinner_count:
      action: set
      int: 0

  # Recalculate whenever mach_level changes
  player_mach_level:
    total_scoring_multiplier:
      action: set
      float: current_player.mach_level * (1 + current_player.x2_multiplier)
  
  # Track highest mach level reached this ball
  player_mach_level{value > current_player.bonus_highest_mach}:
    bonus_highest_mach:
      action: set
      int: current_player.mach_level
  
  # Recalculate whenever x2_multiplier changes
  player_x2_multiplier:
    total_scoring_multiplier:
      action: set
      float: current_player.mach_level * (1 + current_player.x2_multiplier)

## BASE SCORING - Add to your base mode YAML
## Priority: 100 (can be blocked by higher priority modes)
##
## Scoring Philosophy:
## - Basic switches: 500-2,000 points
## - Skill shots (ramps, orbits): 5,000-10,000 points
## - Targets: 1,000-3,000 points
## - Mode shots: 150,000-1,000,000 points (defined in mode files)
##


  ##############################################
  ## SLINGSHOTS - Quick, frequent hits
  ##############################################
  s_slingshot_left_active:
    score:
      action: add
      int: 500 * current_player.total_scoring_multiplier
    bonus_switches_count:
      action: add
      int: 1
  
