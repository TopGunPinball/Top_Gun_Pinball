    win_rr_flash:
      show: sync_flash_mode
      key: mode_window_rr
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_right_orbit, color: 00FF00 }

  ##############################################
  ## MOVING WINDOW - Position change shows
  ## Each fires when missiles_window_pos actually changes value.
  ## Stops the 1 shot that left the window, starts the 1 that entered.
  ## Initial pos 0 display handled by missiles_setup_step_1/4/7 above.
  ##############################################

  # Moving RIGHT: 0→1 stop LL, start SP
  player_missiles_window_pos{value==1 and current_player.missiles_window_dir==0}:
    stop_win_ll: { show: sync_flash_mode, action: stop, key: mode_window_ll }
    win_sp_flash:
      show: sync_flash_mode
