  ##############################################
  missiles_window_hit:
    stop_win_ll:      { show: sync_flash_mode, action: stop, key: mode_window_ll }
    stop_win_lo:      { show: sync_flash_mode, action: stop, key: mode_window_lo }
    stop_win_lr:      { show: sync_flash_mode, action: stop, key: mode_window_lr }
