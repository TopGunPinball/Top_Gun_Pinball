  ## EXPLOSION GI EFFECT - Lock step shot hits (3, 6, 9)
  ##############################################
  missiles_explosion_effect:
    explosion_gi:
      show: missiles_explosion_gi
      key: gi_effect
      loops: -1

  ##############################################
  ## STOP EXPLOSION GI - Restore mode GI after steps 3/6 explosion
  ##############################################
  missiles_stop_explosion_gi:
