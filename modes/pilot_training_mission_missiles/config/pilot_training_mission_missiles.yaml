      show_tokens: { led: l_shot_middle_ramp, color: 00FF00 }

  # Moving RIGHT: 5→6 stop TWR, start RR
  player_missiles_window_pos{value==6 and current_player.missiles_window_dir==0}:
    stop_win_twr: { show: sync_flash_mode, action: stop, key: mode_window_twr }
    win_rr_flash:
      show: sync_flash_mode
      key: mode_window_rr
