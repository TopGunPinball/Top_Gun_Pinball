    stop_lock_on:     { show: sync_flash_mode, action: stop, key: mode_window_lock_on }
    stop_lock_target_3: { show: missiles_lock_target_fade, action: stop, key: mode_lock_target_3 }
    stop_lock_target_6: { show: missiles_lock_target_fade, action: stop, key: mode_lock_target_6 }
