#config_version=6

####################################################################################
# PILOT TRAINING MISSION: MISSILES
# 
# A single-ball timed training mission with lock-on-to-MIG mechanics.
# 
# THEME: Missile lock-on training - hit paired shots then lock targets
# BALLS: 1 (normal flippers)
# TIMER: 90 seconds
# GI: Cyan (odd lights) and White (even lights) - NOTE: cyan is GRB-swapped cyan for WS2812 LEDs
# INSERT COLORS: Green (pair shots) and Red (lock shots)
# PERK: Missiles perk earned when step 9 completed, active for rest of ball
# CANNOT STACK WITH MULTIBALL
#
# MODE PROGRESSION:
# Steps 1-2: LO and LR lit green (hit both, any order) - 500K / 550K
# Step 3:    Random LOCK target lit white (lock on to MIG) - 750K
# Steps 4-5: RO and TL lit green (right ramp UP, hit both, any order) - 650K / 700K
# Step 6:    Random LOCK target lit white (lock on to MIG) - 900K
# Steps 7-8: SP and TWR lit green (hit both, any order) - 800K / 850K
# Step 9:    Random LOCK target lit white (lock on to MIG) -> MODE WON - 1,800K
# TOTAL: 7,500,000 points (before multipliers)
#
# SHOT LIGHTS:
#   LO  = l_shot_left_orbit      LR  = l_shot_left_ramp
#   RO  = l_shot_right_orbit     TL  = l_shot_upper_orbit
#   SP  = l_shot_spinner         TWR = l_shot_tower_ramp
#   Lock L = l_lock_l  Lock O = l_lock_o  Lock C = l_lock_c  Lock K = l_lock_k
####################################################################################

mode:
  start_events: start_mode_pilot_training_mission_missiles
  stop_events: 
    - missiles_video_complete
    - timer_missiles_failed_delay_complete
    - missiles_drain_cleanup_complete
  priority: 600
  game_mode: true
  use_wait_queue: true

mode_settings:
  can_stack_with_multiball: false

####################################################################################
# BALL HOLDS - Prevent auto-eject during intro video
####################################################################################

ball_holds:
  missiles_scoop_hold:
    balls_to_hold: 1
    hold_devices: bd_mode_scoop
    enable_events: 
      - mode_pilot_training_mission_missiles_started
    release_one_events: 
      - missiles_ball_released
    release_all_events:
      - mode_pilot_training_mission_missiles_will_stop

####################################################################################
# QUEUE RELAY PLAYER - Hold ball_ending until mode cleanup completes
####################################################################################

queue_relay_player:
  ball_ending{mode.pilot_training_mission_missiles.active==True}:
    post: missiles_ball_ending_hold
    wait_for: missiles_drain_cleanup_complete
    priority: 1000

####################################################################################
# TIMERS
####################################################################################

timers:
  missiles_timer:
    start_value: 90
    end_value: 0
    direction: down
    tick_interval: 1s
    start_running: false
    control_events:
      - event: missiles_ball_released
        action: start
      - event: missiles_complete
        action: stop
      - event: timer_missiles_failed_delay_start
        action: stop
      - event: missiles_drain_detected
        action: stop
      - event: lock_sequence_timer_pause
        action: pause
      - event: lock_sequence_timer_resume
        action: start

  missiles_intro_video_delay:
    start_value: 0
    end_value: 10
    direction: up
    tick_interval: 1s
    control_events:
      - event: mode_pilot_training_mission_missiles_started
        action: start
      - event: missiles_skip_intro
        action: stop

  # Pair frustration timer - 30 seconds without a successful pair shot hit
  # Starts when pair steps begin, restarts on each successful hit, stops on pair completion
  missiles_pair_frustration_timer:
    start_value: 0
    end_value: 30
    direction: up
    tick_interval: 1s
    control_events:
      - event: missiles_setup_step_1
        action: start
      - event: missiles_step_1_complete
        action: restart
      - event: missiles_setup_step_3
        action: stop
      - event: missiles_setup_step_4
        action: restart
      - event: missiles_step_4_complete
        action: restart
      - event: missiles_setup_step_6
        action: stop
      - event: missiles_setup_step_7
        action: restart
      - event: missiles_step_7_complete
        action: restart
      - event: missiles_setup_step_9
        action: stop
      - event: timer_missiles_pair_frustration_timer_complete
        action: restart
      - event: missiles_failed
        action: stop
      - event: missiles_complete
        action: stop
      - event: missiles_drain_detected
        action: stop
      - event: lock_sequence_timer_pause
        action: pause
      - event: lock_sequence_timer_resume
        action: start

  ##############################################
  ## MISSILE FLYING DELAY TIMERS - GI strobe during flight
  ##############################################
  missiles_step_3_flying_delay:
    start_value: 0
    end_value: 16
    direction: up
    tick_interval: 250ms
    control_events:
      - event: missiles_step_3_flying_start
        action: start
      - event: missiles_cleanup
        action: stop
      - event: missiles_drain_detected
        action: stop
      - event: missiles_step_4_shot_hit
        action: stop
      - event: missiles_step_5_shot_hit
        action: stop

  missiles_step_6_flying_delay:
    start_value: 0
    end_value: 18
    direction: up
    tick_interval: 250ms
    control_events:
      - event: missiles_step_6_flying_start
        action: start
      - event: missiles_cleanup
        action: stop
      - event: missiles_drain_detected
        action: stop
      - event: missiles_step_7_shot_hit
        action: stop
      - event: missiles_step_8_shot_hit
        action: stop

  missiles_step_9_flying_delay:
    start_value: 0
    end_value: 16
    direction: up
    tick_interval: 250ms
    control_events:
      - event: missiles_step_9_flying_start
        action: start
      - event: missiles_cleanup
        action: stop
      - event: missiles_drain_detected
        action: stop

  ##############################################
  ## MISSILE EXPLOSION DELAY TIMERS - Extra time for explosion animation
  ##############################################
  missiles_step_3_explosion_delay:
    start_value: 0
    end_value: 10
    direction: up
    tick_interval: 250ms
    control_events:
      - event: missiles_step_3_explosion_start
        action: start
      - event: missiles_cleanup
        action: stop
      - event: missiles_drain_detected
        action: stop
      - event: missiles_step_4_shot_hit
        action: stop
      - event: missiles_step_5_shot_hit
        action: stop

  missiles_step_6_explosion_delay:
    start_value: 0
    end_value: 11
    direction: up
    tick_interval: 250ms
    control_events:
      - event: missiles_step_6_explosion_start
        action: start
      - event: missiles_cleanup
        action: stop
      - event: missiles_drain_detected
        action: stop
      - event: missiles_step_7_shot_hit
        action: stop
      - event: missiles_step_8_shot_hit
        action: stop

  missiles_step_9_explosion_delay:
    start_value: 0
    end_value: 14
    direction: up
    tick_interval: 250ms
    control_events:
      - event: missiles_step_9_explosion_start
        action: start
      - event: missiles_cleanup
        action: stop
      - event: missiles_drain_detected
        action: stop



  missiles_window_timer:
    start_value: 0
    end_value: 1
    direction: up
    tick_interval: 1500ms
    start_running: false
    control_events:
      - event: missiles_window_advance
        action: restart
      - event: missiles_setup_step_1
        action: start
      - event: missiles_setup_step_4
        action: start
      - event: missiles_setup_step_7
        action: start
      - event: missiles_step_1_complete
        action: stop
      - event: missiles_step_4_complete
        action: stop
      - event: missiles_step_7_complete
        action: stop
      - event: missiles_cleanup
        action: stop
      - event: missiles_drain_detected
        action: stop
      - event: missiles_failed
        action: stop

  missiles_complete_delay:
    start_value: 0
    end_value: 4
    direction: up
    tick_interval: 250ms
    start_running: false
    control_events:
      - event: timer_missiles_complete_delay_start
        action: start

  missiles_failed_delay:
    start_value: 0
    end_value: 1
    direction: up
    tick_interval: 3300ms
    start_running: false
    control_events:
      - event: timer_missiles_failed_delay_start
        action: start

  missiles_drain_delay:
    start_value: 0
    end_value: 1
    direction: up
    tick_interval: 3300ms
    control_events:
      - event: missiles_drain_detected
        action: start

####################################################################################
# VARIABLE PLAYER
####################################################################################

variable_player:
  mode_pilot_training_mission_missiles_started:
    training_mission_active:
      action: set
      int: 1
    letter_collection_paused:
      action: set
      int: 1
    missiles_step:
      action: set
      int: 0
    missiles_complete_flag:
      action: set
      int: 0
    missiles_shots_remaining:
      action: set
      int: 9
    missiles_window_pos:
      action: set
      int: 0
    missiles_window_dir:
      action: set
      int: 0
    missiles_window_lock_shot:
      action: set
      int: 0
    missiles_step_3_target:
      action: set
      int: 0
    missiles_step_6_target:
      action: set
      int: 0
    missiles_step_9_target:
      action: set
      int: 0
    mode_points_scored:
      action: set
      int: 0
    missiles_pair_miss_count:
      action: set
      int: 0
    missiles_lock_miss_count:
      action: set
      int: 0
    training_missions_played:
      action: add
      int: 1
    training_missles_complete:
      action: set
      int: 1

  ball_will_end{mode.pilot_training_mission_missiles.active==True}:
    pilot_mode_drain_pending:
      action: set
      int: 1

  ##############################################
  ## Step scoring - 500K -> 550K -> 750K -> 650K -> 700K -> 900K -> 800K -> 850K -> 1.8M
  ##############################################

  # Step 1: 500,000
  missiles_step_1_complete:
    missiles_step:
      action: set
      int: 1
    score: 500000 * current_player.total_scoring_multiplier
    mode_points_scored:
      action: set
      int: 500000 * current_player.total_scoring_multiplier
    missiles_shots_remaining:
      action: add
      int: -1
    missiles_pair_miss_count:
      action: set
      int: 0

  # Step 2: 550,000
  missiles_step_2_complete:
    missiles_step:
      action: set
      int: 2
    score: 550000 * current_player.total_scoring_multiplier
    mode_points_scored:
      action: set
      int: 550000 * current_player.total_scoring_multiplier
    missiles_shots_remaining:
      action: add
      int: -1

  # Step 3: Lock C - 750,000
  # Lock target selection variables (set by random_event_player)
  # Spinner lockout flag — set when a shot registers, cleared 2s after the
  # spinner stops (timer_spinner_shot_timeout_complete lives in pilot_mission_qualifier
  # and already restarts on every s_spinner_active; completes 2s after last spin).
  spinner_shot_made:
    missiles_spinner_locked:
      action: set
      int: 1

  timer_spinner_shot_timeout_complete:
    missiles_spinner_locked:
      action: set
      int: 0

  # 1=LR  2=RR  3=SP  4=TWR  5=TL
  missiles_step_3_target_lr: { missiles_step_3_target: { action: set, int: 1 } }
  missiles_step_3_target_rr: { missiles_step_3_target: { action: set, int: 2 } }
  missiles_step_3_target_sp: { missiles_step_3_target: { action: set, int: 3 } }
  missiles_step_3_target_twr: { missiles_step_3_target: { action: set, int: 4 } }
  missiles_step_3_target_tl: { missiles_step_3_target: { action: set, int: 5 } }
  missiles_step_6_target_lr: { missiles_step_6_target: { action: set, int: 1 } }
  missiles_step_6_target_rr: { missiles_step_6_target: { action: set, int: 2 } }
  missiles_step_6_target_sp: { missiles_step_6_target: { action: set, int: 3 } }
  missiles_step_6_target_twr: { missiles_step_6_target: { action: set, int: 4 } }
  missiles_step_6_target_tl: { missiles_step_6_target: { action: set, int: 5 } }
  missiles_step_9_target_lr: { missiles_step_9_target: { action: set, int: 1 } }
  missiles_step_9_target_rr: { missiles_step_9_target: { action: set, int: 2 } }
  missiles_step_9_target_sp: { missiles_step_9_target: { action: set, int: 3 } }
  missiles_step_9_target_twr: { missiles_step_9_target: { action: set, int: 4 } }
  missiles_step_9_target_tl: { missiles_step_9_target: { action: set, int: 5 } }

  missiles_step_3_complete:
    missiles_step:
      action: set
      int: 3
    score: 750000 * current_player.total_scoring_multiplier
    mode_points_scored:
      action: set
      int: 750000 * current_player.total_scoring_multiplier
    missiles_shots_remaining:
      action: add
      int: -1

  # Step 4: 650,000
  missiles_step_4_complete:
    missiles_step:
      action: set
      int: 4
    score: 650000 * current_player.total_scoring_multiplier
    mode_points_scored:
      action: set
      int: 650000 * current_player.total_scoring_multiplier
    missiles_shots_remaining:
      action: add
      int: -1
    missiles_pair_miss_count:
      action: set
      int: 0

  # Step 5: 700,000
  missiles_step_5_complete:
    missiles_step:
      action: set
      int: 5
    score: 700000 * current_player.total_scoring_multiplier
    mode_points_scored:
      action: set
      int: 700000 * current_player.total_scoring_multiplier
    missiles_shots_remaining:
      action: add
      int: -1

  # Step 6: Lock L - 900,000
  missiles_step_6_complete:
    missiles_step:
      action: set
      int: 6
    score: 900000 * current_player.total_scoring_multiplier
    mode_points_scored:
      action: set
      int: 900000 * current_player.total_scoring_multiplier
    missiles_shots_remaining:
      action: add
      int: -1

  # Step 7: 800,000
  missiles_step_7_complete:
    missiles_step:
      action: set
      int: 7
    score: 800000 * current_player.total_scoring_multiplier
    mode_points_scored:
      action: set
      int: 800000 * current_player.total_scoring_multiplier
    missiles_shots_remaining:
      action: add
      int: -1
    missiles_pair_miss_count:
      action: set
      int: 0

  # Step 8: 850,000
  missiles_step_8_complete:
    missiles_step:
      action: set
      int: 8
    score: 850000 * current_player.total_scoring_multiplier
    mode_points_scored:
      action: set
      int: 850000 * current_player.total_scoring_multiplier
    missiles_shots_remaining:
      action: add
      int: -1

  # Step 9: Lock K - 1,800,000 - MODE WON + perk
  missiles_step_9_complete:
    missiles_step:
      action: set
      int: 9
    missiles_complete_flag:
      action: set
      int: 1
    score: 1800000 * current_player.total_scoring_multiplier
    mode_points_scored:
      action: set
      int: 1800000 * current_player.total_scoring_multiplier
    missiles_shots_remaining:
      action: add
      int: -1
    training_missiles_won:
      action: set
      int: 1
    training_missions_won:
      action: add
      int: 1
    missiles_perk_active:
      action: set
      int: 1

  ##############################################
  ## Moving window - position/direction and lock shot
  ##############################################

  # Position advance only — direction reversals handled via separate boundary events
  # (Moving all conditions on missiles_window_advance caused MPF to cascade through
  #  pos-advance, dir-flip, and pos-retreat in a single tick, skipping pos==6.)
  missiles_window_advance{current_player.missiles_window_dir==0 and current_player.missiles_window_pos<6}:
    missiles_window_pos: { action: add, int: 1 }
  missiles_window_advance{current_player.missiles_window_dir==1 and current_player.missiles_window_pos>0}:
    missiles_window_pos: { action: add, int: -1 }
  # Boundary events (fired from event_player on player_missiles_window_pos) flip direction
  missiles_window_at_right_boundary:
    missiles_window_dir: { action: set, int: 1 }
  missiles_window_at_left_boundary:
    missiles_window_dir: { action: set, int: 0 }

  # Store chosen shot: 1=LL 2=LO 3=LR 4=SP 5=Barrier 6=TWR 7=TL 8=TR 9=RR
  missiles_window_hit_ll:      { missiles_window_lock_shot: { action: set, int: 1 } }
  missiles_window_hit_lo:      { missiles_window_lock_shot: { action: set, int: 2 } }
  missiles_window_hit_lr:      { missiles_window_lock_shot: { action: set, int: 3 } }
  missiles_window_hit_sp:      { missiles_window_lock_shot: { action: set, int: 4 } }
  missiles_window_hit_barrier: { missiles_window_lock_shot: { action: set, int: 5 } }
  missiles_window_hit_twr:     { missiles_window_lock_shot: { action: set, int: 6 } }
  missiles_window_hit_tl:      { missiles_window_lock_shot: { action: set, int: 7 } }
  missiles_window_hit_tr:      { missiles_window_lock_shot: { action: set, int: 8 } }
  missiles_window_hit_rr:      { missiles_window_lock_shot: { action: set, int: 9 } }

  # Random start position (setup_step_4 and _7): set pos to the randomly chosen value
  missiles_window_init_pos_0:  { missiles_window_pos: { action: set, int: 0 } }
  missiles_window_init_pos_1:  { missiles_window_pos: { action: set, int: 1 } }
  missiles_window_init_pos_2:  { missiles_window_pos: { action: set, int: 2 } }
  missiles_window_init_pos_3:  { missiles_window_pos: { action: set, int: 3 } }
  missiles_window_init_pos_4:  { missiles_window_pos: { action: set, int: 4 } }
  missiles_window_init_pos_5:  { missiles_window_pos: { action: set, int: 5 } }
  missiles_window_init_pos_6:  { missiles_window_pos: { action: set, int: 6 } }

  ##############################################
  ## FRUSTRATION CALLOUT COUNTERS
  ##############################################

  # Pair miss counter - increments on non-scoring shot hits during pair steps
  missiles_pair_miss:
    missiles_pair_miss_count:
      action: add
      int: 1

  # Lock miss counter - increments on wrong LOCK target hits during lock steps
  missiles_lock_miss:
    missiles_lock_miss_count:
      action: add
      int: 1

  # Reset window state at each window phase; also reset pair miss counter
  missiles_setup_step_1:
    missiles_window_pos: { action: set, int: 0 }
    missiles_window_dir: { action: set, int: 0 }
    missiles_window_lock_shot: { action: set, int: 0 }
  missiles_setup_step_4:
    missiles_pair_miss_count: { action: set, int: 0 }
    missiles_window_dir: { action: set, int: 0 }
    missiles_window_lock_shot: { action: set, int: 0 }
  missiles_setup_step_7:
    missiles_pair_miss_count: { action: set, int: 0 }
    missiles_window_dir: { action: set, int: 0 }
    missiles_window_lock_shot: { action: set, int: 0 }

  # Reset lock miss counter on each lock step setup
  missiles_setup_step_3:
    missiles_lock_miss_count:
      action: set
      int: 0
  missiles_setup_step_6:
    missiles_lock_miss_count:
      action: set
      int: 0
  missiles_setup_step_9:
    missiles_lock_miss_count:
      action: set
      int: 0

  # Reset pair miss counter after frustration callout fires (allows re-trigger)
  missiles_pair_frustration_trigger:
    missiles_pair_miss_count:
      action: set
      int: 0

  # Reset lock miss counter after frustration callout fires (allows re-trigger)
  missiles_reset_lock_miss_count:
    missiles_lock_miss_count:
      action: set
      int: 0


####################################################################################
# EVENT PLAYER - Mode flow and shot detection
####################################################################################

event_player:
  ##############################################
  ## MODE START SEQUENCE
  ##############################################
  mode_pilot_training_mission_missiles_started:
    - missiles_set_gi|200ms
    - missiles_play_instructions_voice

  ##############################################
  ## SKIP INTRO - Both flippers pressed during intro
  ##############################################
  s_flipper_left_active{current_player.missiles_step==0 and device.timers.missiles_intro_video_delay.running}:
    - missiles_check_skip_intro
  s_flipper_right_active{current_player.missiles_step==0 and device.timers.missiles_intro_video_delay.running}:
    - missiles_check_skip_intro

  missiles_check_skip_intro{device.switches.s_flipper_left.state and device.switches.s_flipper_right.state}:
    - missiles_skip_intro

  # SKIP PATH: Stop intro timer, release ball, setup shots
  missiles_skip_intro:
    - missiles_ball_released
    - missiles_setup_step_1

  # NORMAL PATH: Timer completes -> release ball AND setup shots
  timer_missiles_intro_video_delay_complete:
    - missiles_ball_released
    - missiles_setup_step_1

  ##############################################
  ## DRAIN HANDLING
  ##############################################
  missiles_ball_ending_hold:
    - missiles_failed
    - missiles_drain_detected

  timer_missiles_drain_delay_complete:
    - missiles_drain_cleanup_complete
    - missiles_cleanup

  # Steps 1-2 replaced by moving window mechanic (see window section below)

  ##############################################
  ## STEP 3: RANDOM SHOT (green-red fade) — 1=LR 2=RR 3=SP 4=TWR 5=TL
  ##############################################
  s_ramp_left_exit_active{current_player.missiles_step==2 and current_player.missiles_step_3_target==1}:
    - missiles_step_3_complete
    - missiles_step_3_shot_hit
    - missiles_step_3_flying_start
  s_ramp_right_exit_active{current_player.missiles_step==2 and current_player.missiles_step_3_target==2}:
    - missiles_step_3_complete
    - missiles_step_3_shot_hit
    - missiles_step_3_flying_start
  spinner_shot_made{current_player.missiles_step==2 and current_player.missiles_step_3_target==3 and current_player.missiles_spinner_locked==0}:
    - missiles_step_3_complete
    - missiles_step_3_shot_hit
    - missiles_step_3_flying_start
  s_ramp_tower_exit_active{current_player.missiles_step==2 and current_player.missiles_step_3_target==4}:
    - missiles_step_3_complete
    - missiles_step_3_shot_hit
    - missiles_step_3_flying_start
  s_orbit_upper_active{current_player.missiles_step==2 and current_player.missiles_step_3_target==5}:
    - missiles_step_3_complete
    - missiles_step_3_shot_hit
    - missiles_step_3_flying_start

  # Steps 4-5 replaced by moving window mechanic (see window section below)

  ##############################################
  ## STEP 6: RANDOM SHOT (green-red fade) — 1=LR 2=RR 3=SP 4=TWR 5=TL
  ##############################################
  s_ramp_left_exit_active{current_player.missiles_step==5 and current_player.missiles_step_6_target==1}:
    - missiles_step_6_complete
    - missiles_step_6_shot_hit
    - missiles_step_6_flying_start
  s_ramp_right_exit_active{current_player.missiles_step==5 and current_player.missiles_step_6_target==2}:
    - missiles_step_6_complete
    - missiles_step_6_shot_hit
    - missiles_step_6_flying_start
  spinner_shot_made{current_player.missiles_step==5 and current_player.missiles_step_6_target==3 and current_player.missiles_spinner_locked==0}:
    - missiles_step_6_complete
    - missiles_step_6_shot_hit
    - missiles_step_6_flying_start
  s_ramp_tower_exit_active{current_player.missiles_step==5 and current_player.missiles_step_6_target==4}:
    - missiles_step_6_complete
    - missiles_step_6_shot_hit
    - missiles_step_6_flying_start
  s_orbit_upper_active{current_player.missiles_step==5 and current_player.missiles_step_6_target==5}:
    - missiles_step_6_complete
    - missiles_step_6_shot_hit
    - missiles_step_6_flying_start

  # Steps 7-8 replaced by moving window mechanic (see window section below)

  ##############################################
  ## STEP 9: RANDOM SHOT (green-red fade) — 1=LR 2=RR 3=SP 4=TWR 5=TL
  ##############################################
  s_ramp_left_exit_active{current_player.missiles_step==8 and current_player.missiles_step_9_target==1}:
    - missiles_step_9_complete
    - missiles_step_9_shot_hit
    - missiles_step_9_flying_start
  s_ramp_right_exit_active{current_player.missiles_step==8 and current_player.missiles_step_9_target==2}:
    - missiles_step_9_complete
    - missiles_step_9_shot_hit
    - missiles_step_9_flying_start
  spinner_shot_made{current_player.missiles_step==8 and current_player.missiles_step_9_target==3 and current_player.missiles_spinner_locked==0}:
    - missiles_step_9_complete
    - missiles_step_9_shot_hit
    - missiles_step_9_flying_start
  s_ramp_tower_exit_active{current_player.missiles_step==8 and current_player.missiles_step_9_target==4}:
    - missiles_step_9_complete
    - missiles_step_9_shot_hit
    - missiles_step_9_flying_start
  s_orbit_upper_active{current_player.missiles_step==8 and current_player.missiles_step_9_target==5}:
    - missiles_step_9_complete
    - missiles_step_9_shot_hit
    - missiles_step_9_flying_start

  ##############################################
  ## IMMEDIATE STEP SETUP ON LOCK COMPLETION
  ## Next pair shots light immediately - don't wait for flying/explosion animation
  ## Player can shoot during the animation; if they hit, animation stops
  ##############################################
  # steps 3/6/9 complete handled in servo section above

  ##############################################
  ## ANIMATION CLEANUP - Stop GI animation and restore normal GI
  ## when player hits a pair shot during the flying/explosion animation
  ##############################################
  missiles_step_4_shot_hit:
    - missiles_stop_explosion_gi
    - missiles_set_gi|200ms
    - missiles_show_locking_on|3s

  missiles_step_5_shot_hit:
    - missiles_stop_explosion_gi
    - missiles_set_gi|200ms
    - missiles_show_locked|4s

  missiles_step_7_shot_hit:
    - missiles_stop_explosion_gi
    - missiles_set_gi|200ms
    - missiles_show_locking_on|2s

  missiles_step_8_shot_hit:
    - missiles_stop_explosion_gi
    - missiles_set_gi|200ms
    - missiles_show_locked|3s

  ##############################################
  ## MISSILE FLYING → EXPLOSION → NEXT STEP CHAINS
  ## Flying delay → explosion effect → explosion delay → GI restore
  ##############################################
  timer_missiles_step_3_flying_delay_complete:
    - missiles_step_3_explosion_start
    - missiles_explosion_effect
    - shaker_rumble

  timer_missiles_step_3_explosion_delay_complete:
    - missiles_stop_explosion_gi
    - missiles_set_gi

  timer_missiles_step_6_flying_delay_complete:
    - missiles_step_6_explosion_start
    - missiles_explosion_effect
    - shaker_rumble

  timer_missiles_step_6_explosion_delay_complete:
    - missiles_stop_explosion_gi
    - missiles_set_gi

  timer_missiles_step_9_flying_delay_complete:
    - missiles_step_9_explosion_start
    - missiles_explosion_effect
    - shaker_rumble

  timer_missiles_step_9_explosion_delay_complete:
    - missiles_complete

  ##############################################
  ## MOVING WINDOW - Timer advance and boundary direction reversals
  ##############################################
  timer_missiles_window_timer_complete:
    - missiles_window_advance

  # When pos reaches 6, fire a SEPARATE event to flip direction.
  # Keeping this separate from missiles_window_advance prevents MPF from
  # cascading (advance→flip→retreat) all in one variable_player tick.
  player_missiles_window_pos{value==6}:
    - missiles_window_at_right_boundary

  # When pos reaches 0 during gameplay (dir==1), flip direction.
  # Condition guards against firing on setup resets (where dir==0).
  player_missiles_window_pos{value==0 and current_player.missiles_window_dir==1}:
    - missiles_window_at_left_boundary

  ##############################################
  ## MOVING WINDOW - Shot detection (active at steps 0, 3, 6)
  ## Sequence: LL(0) LO(1) LR(2) SP(3) Barrier(4) TWR(5) TL(6) TR(7) RR(8)
  ## Window left-edge = missiles_window_pos (0-6); covers indices pos/pos+1/pos+2
  ##############################################

  # LL: only at pos 0
  s_lane_left_active{(current_player.missiles_step==0 or current_player.missiles_step==3 or current_player.missiles_step==6) and current_player.missiles_window_pos==0}:
    - missiles_window_hit
    - missiles_window_hit_ll

  # LO: at pos 0 or 1
  left_orbit_shot_hit{(current_player.missiles_step==0 or current_player.missiles_step==3 or current_player.missiles_step==6) and current_player.missiles_window_pos<=1}:
    - missiles_window_hit
    - missiles_window_hit_lo

  # LR: at pos 0, 1, or 2
  s_ramp_left_exit_active{(current_player.missiles_step==0 or current_player.missiles_step==3 or current_player.missiles_step==6) and current_player.missiles_window_pos<=2}:
    - missiles_window_hit
    - missiles_window_hit_lr

  # SP: at pos 1, 2, or 3
  spinner_shot_made{(current_player.missiles_step==0 or current_player.missiles_step==3 or current_player.missiles_step==6) and current_player.missiles_window_pos>=1 and current_player.missiles_window_pos<=3 and current_player.missiles_spinner_locked==0}:
    - missiles_window_hit
    - missiles_window_hit_sp

  # Barrier: at pos 2, 3, or 4
  s_barrier_target_active{(current_player.missiles_step==0 or current_player.missiles_step==3 or current_player.missiles_step==6) and current_player.missiles_window_pos>=2 and current_player.missiles_window_pos<=4}:
    - missiles_window_hit
    - missiles_window_hit_barrier

  # TWR: at pos 3, 4, or 5
  s_ramp_tower_exit_active{(current_player.missiles_step==0 or current_player.missiles_step==3 or current_player.missiles_step==6) and current_player.missiles_window_pos>=3 and current_player.missiles_window_pos<=5}:
    - missiles_window_hit
    - missiles_window_hit_twr

  # TL: at pos 4, 5, or 6
  s_orbit_upper_active{(current_player.missiles_step==0 or current_player.missiles_step==3 or current_player.missiles_step==6) and current_player.missiles_window_pos>=4}:
    - missiles_window_hit
    - missiles_window_hit_tl

  # TR: at pos 5 or 6
  s_ramp_inner_exit_active{(current_player.missiles_step==0 or current_player.missiles_step==3 or current_player.missiles_step==6) and current_player.missiles_window_pos>=5}:
    - missiles_window_hit
    - missiles_window_hit_tr

  # RR: only at pos 6
  s_ramp_right_exit_active{(current_player.missiles_step==0 or current_player.missiles_step==3 or current_player.missiles_step==6) and current_player.missiles_window_pos==6}:
    - missiles_window_hit
    - missiles_window_hit_rr

  ##############################################
  ## MOVING WINDOW - Route hit to correct step completion
  ##############################################
  ##############################################
  ## SLIDE SWAP EVENTS - Delayed triggers for background slide transitions
  ## Step videos play at priority 800, new slides at 750.
  ## Delays allow the step video to play before the next background slide appears.
  ##############################################
  missiles_step_1_shot_hit:
    - missiles_show_locking_on|2s
  missiles_step_2_shot_hit:
    - missiles_show_locked|3s
  missiles_step_3_shot_hit:
    - shaker_soft
    - missiles_show_locating_jet|4s
  missiles_step_6_shot_hit:
    - shaker_soft
    - missiles_show_locating_jet|5s
  missiles_step_9_shot_hit:
    - shaker_soft

  missiles_window_hit{current_player.missiles_step==0}:
    - missiles_step_1_complete
    - missiles_step_1_shot_hit

  missiles_window_hit{current_player.missiles_step==3}:
    - missiles_step_4_complete
    - missiles_step_4_shot_hit

  missiles_window_hit{current_player.missiles_step==6}:
    - missiles_step_7_complete
    - missiles_step_7_shot_hit

  ##############################################
  ## LOCK-ON SHOT DETECTION (steps 1, 4, 7)
  ## Player hits the single shot chosen from the window.
  ## missiles_window_lock_shot: 1=LL 2=LO 3=LR 4=SP 5=Barrier 6=TWR 7=TL 8=TR 9=RR
  ##############################################

  # Step 1 (missiles_step==1) → step 2 complete + setup step 3
  s_lane_left_active{current_player.missiles_step==1 and current_player.missiles_window_lock_shot==1}:
    - missiles_step_2_complete
    - missiles_step_2_shot_hit
    - missiles_setup_step_3
  left_orbit_shot_hit{current_player.missiles_step==1 and current_player.missiles_window_lock_shot==2}:
    - missiles_step_2_complete
    - missiles_step_2_shot_hit
    - missiles_setup_step_3
  s_ramp_left_exit_active{current_player.missiles_step==1 and current_player.missiles_window_lock_shot==3}:
    - missiles_step_2_complete
    - missiles_step_2_shot_hit
    - missiles_setup_step_3
  spinner_shot_made{current_player.missiles_step==1 and current_player.missiles_window_lock_shot==4 and current_player.missiles_spinner_locked==0}:
    - missiles_step_2_complete
    - missiles_step_2_shot_hit
    - missiles_setup_step_3
  s_barrier_target_active{current_player.missiles_step==1 and current_player.missiles_window_lock_shot==5}:
    - missiles_step_2_complete
    - missiles_step_2_shot_hit
    - missiles_setup_step_3
  s_ramp_tower_exit_active{current_player.missiles_step==1 and current_player.missiles_window_lock_shot==6}:
    - missiles_step_2_complete
    - missiles_step_2_shot_hit
    - missiles_setup_step_3
  s_orbit_upper_active{current_player.missiles_step==1 and current_player.missiles_window_lock_shot==7}:
    - missiles_step_2_complete
    - missiles_step_2_shot_hit
    - missiles_setup_step_3
  s_ramp_inner_exit_active{current_player.missiles_step==1 and current_player.missiles_window_lock_shot==8}:
    - missiles_step_2_complete
    - missiles_step_2_shot_hit
    - missiles_setup_step_3
  s_ramp_right_exit_active{current_player.missiles_step==1 and current_player.missiles_window_lock_shot==9}:
    - missiles_step_2_complete
    - missiles_step_2_shot_hit
    - missiles_setup_step_3

  # Step 4 (missiles_step==4) → step 5 complete + setup step 6
  s_lane_left_active{current_player.missiles_step==4 and current_player.missiles_window_lock_shot==1}:
    - missiles_step_5_complete
    - missiles_step_5_shot_hit
    - missiles_setup_step_6
  left_orbit_shot_hit{current_player.missiles_step==4 and current_player.missiles_window_lock_shot==2}:
    - missiles_step_5_complete
    - missiles_step_5_shot_hit
    - missiles_setup_step_6
  s_ramp_left_exit_active{current_player.missiles_step==4 and current_player.missiles_window_lock_shot==3}:
    - missiles_step_5_complete
    - missiles_step_5_shot_hit
    - missiles_setup_step_6
  spinner_shot_made{current_player.missiles_step==4 and current_player.missiles_window_lock_shot==4 and current_player.missiles_spinner_locked==0}:
    - missiles_step_5_complete
    - missiles_step_5_shot_hit
    - missiles_setup_step_6
  s_barrier_target_active{current_player.missiles_step==4 and current_player.missiles_window_lock_shot==5}:
    - missiles_step_5_complete
    - missiles_step_5_shot_hit
    - missiles_setup_step_6
  s_ramp_tower_exit_active{current_player.missiles_step==4 and current_player.missiles_window_lock_shot==6}:
    - missiles_step_5_complete
    - missiles_step_5_shot_hit
    - missiles_setup_step_6
  s_orbit_upper_active{current_player.missiles_step==4 and current_player.missiles_window_lock_shot==7}:
    - missiles_step_5_complete
    - missiles_step_5_shot_hit
    - missiles_setup_step_6
  s_ramp_inner_exit_active{current_player.missiles_step==4 and current_player.missiles_window_lock_shot==8}:
    - missiles_step_5_complete
    - missiles_step_5_shot_hit
    - missiles_setup_step_6
  s_ramp_right_exit_active{current_player.missiles_step==4 and current_player.missiles_window_lock_shot==9}:
    - missiles_step_5_complete
    - missiles_step_5_shot_hit
    - missiles_setup_step_6

  # Step 7 (missiles_step==7) → step 8 complete + setup step 9
  s_lane_left_active{current_player.missiles_step==7 and current_player.missiles_window_lock_shot==1}:
    - missiles_step_8_complete
    - missiles_step_8_shot_hit
    - missiles_setup_step_9
  left_orbit_shot_hit{current_player.missiles_step==7 and current_player.missiles_window_lock_shot==2}:
    - missiles_step_8_complete
    - missiles_step_8_shot_hit
    - missiles_setup_step_9
  s_ramp_left_exit_active{current_player.missiles_step==7 and current_player.missiles_window_lock_shot==3}:
    - missiles_step_8_complete
    - missiles_step_8_shot_hit
    - missiles_setup_step_9
  spinner_shot_made{current_player.missiles_step==7 and current_player.missiles_window_lock_shot==4 and current_player.missiles_spinner_locked==0}:
    - missiles_step_8_complete
    - missiles_step_8_shot_hit
    - missiles_setup_step_9
  s_barrier_target_active{current_player.missiles_step==7 and current_player.missiles_window_lock_shot==5}:
    - missiles_step_8_complete
    - missiles_step_8_shot_hit
    - missiles_setup_step_9
  s_ramp_tower_exit_active{current_player.missiles_step==7 and current_player.missiles_window_lock_shot==6}:
    - missiles_step_8_complete
    - missiles_step_8_shot_hit
    - missiles_setup_step_9
  s_orbit_upper_active{current_player.missiles_step==7 and current_player.missiles_window_lock_shot==7}:
    - missiles_step_8_complete
    - missiles_step_8_shot_hit
    - missiles_setup_step_9
  s_ramp_inner_exit_active{current_player.missiles_step==7 and current_player.missiles_window_lock_shot==8}:
    - missiles_step_8_complete
    - missiles_step_8_shot_hit
    - missiles_setup_step_9
  s_ramp_right_exit_active{current_player.missiles_step==7 and current_player.missiles_window_lock_shot==9}:
    - missiles_step_8_complete
    - missiles_step_8_shot_hit
    - missiles_setup_step_9

  ##############################################
  ## FRUSTRATION CALLOUT SYSTEM
  ##############################################

  # PAIR FRUSTRATION: 5 wrong shots OR 30 second timeout during pair steps
  # Score thousands digit even → getting_away, odd → take_the_shot
  player_missiles_pair_miss_count{value>=5}:
    - missiles_pair_frustration_trigger

  timer_missiles_pair_frustration_timer_complete:
    - missiles_pair_frustration_trigger

  # missiles_pair_frustration_trigger{current_player.score // 1000 % 2 == 0}:
  #   - missiles_play_callout_getting_away

  # missiles_pair_frustration_trigger{current_player.score // 1000 % 2 == 1}:
  #   - missiles_play_callout_take_the_shot

  # LOCK FRUSTRATION: 3 wrong LOCK target hits during lock steps
  # player_missiles_lock_miss_count{value>=3}:
  #   - missiles_play_callout_aim_first
  #   - missiles_reset_lock_miss_count

  # Pair miss detection removed — any of 9 shots can be valid in the window

  # Lock miss detection removed

  ##############################################
  ## STEP CALLOUT DELAYS (5s delay before voice callouts)
  ##############################################
  # missiles_step_1_complete:
  #   - missiles_callout_almost_1|5s
  # missiles_setup_step_3:
  #   - missiles_callout_strobing_1|5s
  # missiles_step_4_complete:
  #   - missiles_callout_almost_2|5s
  # missiles_setup_step_6:
  #   - missiles_callout_strobing_2|5s
  # missiles_setup_step_7:
  #   - missiles_callout_green_2|5s
  # missiles_step_7_complete:
  #   - missiles_callout_almost_3|5s
  # missiles_setup_step_9:
  #   - missiles_callout_strobing_3|5s

  # TL lock target: raise right ramp
  missiles_step_3_target_tl:
    - right_ramp_up
  missiles_step_6_target_tl:
    - right_ramp_up
  missiles_step_9_target_tl:
    - right_ramp_up

  # Right ramp down after each lock step (cleans up if TL was target)
  missiles_step_3_complete:
    - missiles_setup_step_4
    - right_ramp_down
  missiles_step_6_complete:
    - missiles_setup_step_7
    - right_ramp_down
  missiles_step_9_complete:
    - right_ramp_down

  # Servo: right ramp stays DOWN for window mechanic (TR/RR use ramp-down switches)

  ##############################################
  ## TIMER EXPIRED - Mode failed
  ##############################################
  timer_missiles_timer_complete:
    - missiles_failed

  ##############################################
  ## MODE COMPLETION AND FAILURE
  ##############################################
  missiles_complete:
    - missiles_cleanup
    - timer_missiles_complete_delay_start
    - missiles_mode_ended

  timer_missiles_complete_delay_complete:
    - missiles_video_complete
    - pilot_mode_cleanup_complete

  missiles_failed:
    - missiles_cleanup
    - timer_missiles_failed_delay_start
    - missiles_mode_ended

  timer_missiles_failed_delay_complete:
    - missiles_video_complete
    - pilot_mode_cleanup_complete

  ##############################################
  ## MODE CLEANUP
  ##############################################
  missiles_cleanup:
    - right_ramp_down

