  missiles_step_7_shot_hit:
    missiles_step_6:
      action: remove
    missiles_locating_jet:
      action: remove
    missiles_step_7:
      action: play
      priority: 800
    mode_points_scored:
      action: play
      priority: 840
      expire: 2s

  missiles_step_8_shot_hit:
    missiles_step_7:
      action: remove
    missiles_locking_on:
      action: remove
    missiles_step_8:
      action: play
      priority: 800
    mode_points_scored:
      action: play
      priority: 840
      expire: 2s

  missiles_step_9_shot_hit:
    missiles_step_8:
      action: remove
    missiles_locked:
      action: remove
    missiles_step_9:
      action: play
      priority: 800
    missiles_timer:
      action: remove
    missiles_shots_remaining:
      action: remove
    missiles_mode_won:
      action: play
      priority: 900
    missiles_perk_active:
      action: play
      priority: 850
    mode_points_scored:
      action: play
      priority: 840
      expire: 2s

  ##############################################
  ## SLIDE SWAPS - Background slide transitions (caught from event_player delays)
  ## Priority 750 keeps these under step videos (800) so videos always show on top.
  ##############################################
  missiles_show_locking_on:
    missiles_locating_jet:
      action: remove
    missiles_locking_on:
      action: play
      priority: 750

  missiles_show_locked:
    missiles_locking_on:
      action: remove
    missiles_locked:
      action: play
      priority: 750

  missiles_show_locating_jet:
    missiles_locked:
      action: remove
    missiles_locating_jet:
      action: play
      priority: 750

  ##############################################
  ## Failure - remove HUD slides (no lost slide for now)
  ##############################################
  missiles_failed:
    missiles_timer:
      action: remove
    missiles_locating_jet:
      action: remove
    missiles_locking_on:
      action: remove
    missiles_locked:
      action: remove
    missiles_shots_remaining:
      action: remove

  # Safety cleanup on mode stop
  mode_pilot_training_mission_missiles_stopped:
    missiles_timer:
      action: remove
    missiles_locating_jet:
      action: remove
    missiles_locking_on:
      action: remove
    missiles_locked:
      action: remove
    missiles_shots_remaining:
      action: remove
    missiles_perk_active:
      action: remove

####################################################################################
# SHOW PLAYER - Flashing shot lights and GI effects
####################################################################################

show_player:
  ##############################################
  ## MISSILES INSERT - White pulse during mode play
  ##############################################
  missiles_ball_released:
    missles_insert_pulse:
      show: missles_pulse
      loops: -1
      speed: 1
      show_tokens:
        led: l_mode_missles
        color: white
      key: missles_pulse

  ##############################################
  ## STEPS 1-2: Moving window initial display (pos 0 = LL, LO, LR)
  ## Position advance shows are handled by player_missiles_window_pos events below.
  ##############################################
  missiles_setup_step_1:
    stop_win_sp:      { show: sync_flash_mode, action: stop, key: mode_window_sp }
    stop_win_barrier: { show: sync_flash_mode, action: stop, key: mode_window_barrier }
    stop_win_twr:     { show: sync_flash_mode, action: stop, key: mode_window_twr }
    stop_win_tl:      { show: sync_flash_mode, action: stop, key: mode_window_tl }
    stop_win_tr:      { show: sync_flash_mode, action: stop, key: mode_window_tr }
    stop_win_rr:      { show: sync_flash_mode, action: stop, key: mode_window_rr }
    win_ll_flash:
      show: sync_flash_mode
      key: mode_window_ll
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_left_lane, color: 00FF00 }
    win_lo_flash:
      show: sync_flash_mode
      key: mode_window_lo
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_left_orbit, color: 00FF00 }
    win_lr_flash:
      show: sync_flash_mode
      key: mode_window_lr
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_left_ramp, color: 00FF00 }

  ##############################################
  ## RANDOM START POSITION SHOWS (for setup_step_4 and setup_step_7)
  ## Fired by random_event_player. Starts the 3 correct flashes for pos N.
  ## All 9 shows were already stopped by missiles_setup_step_4/7 above.
  ##############################################
  missiles_window_init_pos_0:  # LL, LO, LR
    win_ll_flash:
      show: sync_flash_mode
      key: mode_window_ll
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_left_lane, color: 00FF00 }
    win_lo_flash:
      show: sync_flash_mode
      key: mode_window_lo
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_left_orbit, color: 00FF00 }
    win_lr_flash:
      show: sync_flash_mode
      key: mode_window_lr
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_left_ramp, color: 00FF00 }

  missiles_window_init_pos_1:  # LO, LR, SP
    win_lo_flash:
      show: sync_flash_mode
      key: mode_window_lo
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_left_orbit, color: 00FF00 }
    win_lr_flash:
      show: sync_flash_mode
      key: mode_window_lr
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_left_ramp, color: 00FF00 }
    win_sp_flash:
      show: sync_flash_mode
      key: mode_window_sp
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_spinner, color: 00FF00 }

  missiles_window_init_pos_2:  # LR, SP, Barrier
    win_lr_flash:
      show: sync_flash_mode
      key: mode_window_lr
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_left_ramp, color: 00FF00 }
    win_sp_flash:
      show: sync_flash_mode
      key: mode_window_sp
      sync_ms: 1000
      loops: -1
      show_tokens: { led: l_shot_spinner, color: 00FF00 }
    win_barrier_flash:
      show: sync_flash_mode
      key: mode_window_barrier
      sync_ms: 1000
      loops: -1
