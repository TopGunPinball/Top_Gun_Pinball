  # Dogfight - only show if ALL 4 standard missions are complete
  player_training_mission_qualified{value==5 and current_player.training_inverted_complete==1 and current_player.training_missles_complete==1 and current_player.training_afterburner_complete==1 and current_player.training_wingman_complete==1 and current_player.pilot_mode_active==0 and current_player.hard_deck_active==0 and current_player.multiball_active==0 and current_player.training_mission_active==0}:
    iceman_inverted_pulse:
