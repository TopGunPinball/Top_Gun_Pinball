  player_training_mission_qualified{value==3 and current_player.training_afterburner_complete==0 and current_player.pilot_mode_active==0 and current_player.hard_deck_active==0 and current_player.multiball_active==0 and current_player.training_mission_active==0}:
    iceman_inverted_pulse:
