#config_version=6

##
## ICEMAN Letters Mode - Pure YAML
## Lights letters via standup targets to qualify pilot training missions
## Cycles qualified missions with pop bumpers
## Persists progress across balls
##

mode:
  start_events: mode_base_started
  stop_events: mode_base_stopped
  priority: 200
  game_mode: true

##############################################
## Player Variables - Track Progress
##############################################

variable_player:
  player_added:
    # Individual ICEMAN letter states (0=off, 1=lit)
    iceman_letter_i:
      action: set
      int: 0
    iceman_letter_c:
      action: set
      int: 0
    iceman_letter_e:
      action: set
      int: 0
    iceman_letter_m:
      action: set
      int: 0
    iceman_letter_a:
      action: set
      int: 0
    iceman_letter_n:
      action: set
      int: 0
    # Flag to block target hits during completion
    iceman_completing:
      action: set
      int: 0
    # Track which training missions are complete (0 or 1)
    training_inverted_complete:
      action: set
      int: 0
    training_missles_complete:
      action: set
      int: 0
    training_afterburner_complete:
      action: set
      int: 0
    training_wingman_complete:
      action: set
      int: 0
    training_dogfight_complete:
      action: set
      int: 0
    # MIG post lockout tracking
    right_post_locked_out:
      action: set
      int: 0

  ##############################################
  ## Light Letters When Standup Targets Hit
  ##############################################

  # I target
  s_i_iceman_target_active{current_player.iceman_letter_i==0 and current_player.iceman_completing==0 and current_player.letter_collection_paused==0}:
    iceman_letter_i:
      action: set
      int: 1

  # C target
  s_c_iceman_target_active{current_player.iceman_letter_c==0 and current_player.iceman_completing==0 and current_player.letter_collection_paused==0}:
    iceman_letter_c:
      action: set
      int: 1

  # E target
  s_e_iceman_target_active{current_player.iceman_letter_e==0 and current_player.iceman_completing==0 and current_player.letter_collection_paused==0}:
    iceman_letter_e:
      action: set
      int: 1

  # M target
  s_m_iceman_target_active{current_player.iceman_letter_m==0 and current_player.iceman_completing==0 and current_player.letter_collection_paused==0}:
    iceman_letter_m:
      action: set
      int: 1

  # A target
  s_a_iceman_target_active{current_player.iceman_letter_a==0 and current_player.iceman_completing==0 and current_player.letter_collection_paused==0}:
    iceman_letter_a:
      action: set
      int: 1

  # N target
  s_n_iceman_target_active{current_player.iceman_letter_n==0 and current_player.iceman_completing==0 and current_player.letter_collection_paused==0}:
    iceman_letter_n:
      action: set
      int: 1

  ##############################################
  ## Qualify Training Missions on ICEMAN Complete
  ## Only qualify if no mission is currently qualified
  ##############################################

  # Default: qualify mission 1 (Inverted) if nothing qualified yet
  qualify_training_mission:
    training_mission_qualified:
      action: set
      int: 1

  # Override based on what's been completed
  # Mission 2 if mission 1 is complete
  qualify_training_mission{current_player.training_inverted_complete==1 and current_player.training_missles_complete==0}:
    training_mission_qualified:
      action: set
      int: 2

  # Mission 3 if missions 1-2 are complete
  qualify_training_mission{current_player.training_inverted_complete==1 and current_player.training_missles_complete==1 and current_player.training_afterburner_complete==0}:
    training_mission_qualified:
      action: set
      int: 3

  # Mission 4 if missions 1-3 are complete
  qualify_training_mission{current_player.training_inverted_complete==1 and current_player.training_missles_complete==1 and current_player.training_afterburner_complete==1 and current_player.training_wingman_complete==0}:
    training_mission_qualified:
      action: set
      int: 4

  # Mission 5 (Dogfight) if missions 1-4 are all complete
  qualify_training_mission{current_player.training_inverted_complete==1 and current_player.training_missles_complete==1 and current_player.training_afterburner_complete==1 and current_player.training_wingman_complete==1 and current_player.training_dogfight_complete==0}:
    training_mission_qualified:
      action: set
      int: 5

  ##############################################
  ## Handle ICEMAN Completion
  ##############################################

  iceman_complete:
    iceman_completing:
      action: set
      int: 1
    iceman_total_completions:
      action: add
      int: 1
    score:
      action: add
      int: 73000 * current_player.total_scoring_multiplier
      block: true

  ##############################################
  ## Reset Letters After Completion
  ##############################################

  iceman_reset_letters:
    iceman_letter_i:
      action: set
      int: 0
    iceman_letter_c:
      action: set
      int: 0
    iceman_letter_e:
      action: set
      int: 0
    iceman_letter_m:
      action: set
      int: 0
    iceman_letter_a:
      action: set
      int: 0
    iceman_letter_n:
      action: set
      int: 0
    iceman_completing:
      action: set
      int: 0

  ##############################################
  ## Clear Qualified Mission When Started
  ##############################################

  mode_pilot_training_mission_inverted_started:
    training_mission_qualified:
      action: set
      int: 0

  mode_pilot_training_mission_missiles_started:
    training_mission_qualified:
      action: set
      int: 0

  mode_pilot_training_mission_afterburner_started:
    training_mission_qualified:
      action: set
      int: 0

  mode_pilot_training_mission_wingman_started:
    training_mission_qualified:
      action: set
      int: 0

  mode_training_dogfight_started:
    training_mission_qualified:
      action: set
      int: 0

  ##############################################
  ## Rotate Qualified Mission on Pop Bumper Hits
  ##############################################

  # Rotate mission forward: 1->2->3->4->5 via bumpers
  # When value reaches 5, wrap_mission_to_one handlers (below) wrap back to 1
  # Using <5 instead of <4 so value==4 (wingman) persists until next bumper hit
  s_bumper_left_active{current_player.training_mission_qualified>0 and current_player.training_mission_qualified<5 and current_player.training_mission_active==0 and current_player.pilot_mode_active==0 and current_player.hard_deck_active==0 and current_player.multiball_active==0}:
    training_mission_qualified:
      action: add
      int: 1

  s_bumper_center_active{current_player.training_mission_qualified>0 and current_player.training_mission_qualified<5 and current_player.training_mission_active==0 and current_player.pilot_mode_active==0 and current_player.hard_deck_active==0 and current_player.multiball_active==0}:
    training_mission_qualified:
      action: add
      int: 1

  s_bumper_right_active{current_player.training_mission_qualified>0 and current_player.training_mission_qualified<5 and current_player.training_mission_active==0 and current_player.pilot_mode_active==0 and current_player.hard_deck_active==0 and current_player.multiball_active==0}:
    training_mission_qualified:
      action: add
      int: 1

  # Wrap mission value back to 1 if missions 1-4 aren't complete
  wrap_mission_to_one:
    training_mission_qualified:
      action: set
      int: 1

  ##############################################
  ## MIG Post Lockout Logic
  ##############################################

  # Set lockout flag when ball comes from right side
  s_orbit_right_active:
    right_post_locked_out:
      action: set
      int: 1

  s_ramp_inner_exit_active:
    right_post_locked_out:
      action: set
      int: 1

  s_orbit_upper_active:
    right_post_locked_out:
      action: set
      int: 1

  s_spinner_active:
    right_post_locked_out:
      action: set
      int: 1

  # Clear lockout when timer expires
  timer_right_orbit_lockout_timer_complete:
    right_post_locked_out:
      action: set
      int: 0

  ##############################################
  ## INVERTED PERK: Set inverted_perk_active on mode win
  ## training_inverted_mode_over fires 500ms after mode stops
  ## Only sets perk if training mission was won
  ##############################################
  training_inverted_mode_over{current_player.training_mission_inverted_perk_active==1}:
    inverted_perk_active:
      action: set
      int: 1

  ##############################################
  ## ALL TRAINING MISSIONS COMPLETE FLAG
  ## Set to 1 when all 5 training missions are complete.
  ## Cleared automatically on new game (new player objects default all vars to 0).
  ##############################################
  all_training_missions_complete_set:
    all_training_missions_complete:
      action: set
      int: 1

  ##############################################
  ## INVERTED PERK: Double ICEMAN Letters
  ## Awards the next uncollected letter in I→C→E→M→A→N chain
  ## Each target that sets a letter also triggers the bonus chain
  ##############################################
  inverted_award_iceman_i:
    iceman_letter_i:
      action: set
      int: 1
  inverted_award_iceman_c:
    iceman_letter_c:
      action: set
      int: 1
  inverted_award_iceman_e:
    iceman_letter_e:
      action: set
      int: 1
  inverted_award_iceman_m:
    iceman_letter_m:
      action: set
      int: 1
  inverted_award_iceman_a:
    iceman_letter_a:
      action: set
      int: 1
  inverted_award_iceman_n:
    iceman_letter_n:
      action: set
      int: 1

##############################################
## Timers
##############################################

timers:
  iceman_reset:
    start_value: 0
    end_value: 1
    tick_interval: 500ms
    direction: up
    control_events:
      - event: iceman_complete
        action: restart
  
  # Left MIG post - holds for 2 seconds after spinner hit
  left_mig_post_timer:
    start_value: 0
    end_value: 2000  # 2000ms = 2 seconds (adjust as needed during testing)
    direction: up
    tick_interval: 100ms
    start_running: false
  
  # Right MIG post - holds for 2 seconds after left orbit hit
  right_mig_post_timer:
    start_value: 0
    end_value: 2000  # 2000ms = 2 seconds (adjust as needed during testing)
    direction: up
    tick_interval: 100ms
    start_running: false
  
  # Lockout timer - prevents right post activation if ball came from right side
  right_orbit_lockout_timer:
    start_value: 0
    end_value: 3000  # 3 seconds lockout
    direction: up
    tick_interval: 100ms
    start_running: false

##############################################
## Event Player - Check for Completion & Handle Logic
##############################################

event_player:
  ##############################################
  ## Training Mode Insert Light + Perk Slide (Delayed to Survive Clear)
  ##############################################

  # Fire delayed event to set insert light and show perk slide after mode stops
  # MUST be delayed 500ms to survive the 'clear' event that fires right after mode_stopped
  mode_pilot_training_mission_inverted_stopped:
    - training_inverted_mode_over|500ms

  mode_pilot_training_mission_missiles_stopped:
    - training_missiles_mode_over|500ms

  mode_pilot_training_mission_afterburner_stopped:
    - training_afterburner_mode_over|500ms

  mode_pilot_training_mission_wingman_stopped:
    - training_wingman_mode_over|500ms

  ##############################################
  ## INVERTED PERK: Double ICEMAN Letters
  ## When inverted_perk_active==1, each ICEMAN target hit also awards
  ## the next uncollected letter in I→C→E→M→A→N order
  ##############################################
  
  # Each target hit triggers the bonus chain (same conditions as normal collection)
  s_i_iceman_target_active{current_player.iceman_letter_i==0 and current_player.iceman_completing==0 and current_player.letter_collection_paused==0 and current_player.inverted_perk_active==1}:
    - inverted_bonus_iceman_letter
  s_c_iceman_target_active{current_player.iceman_letter_c==0 and current_player.iceman_completing==0 and current_player.letter_collection_paused==0 and current_player.inverted_perk_active==1}:
    - inverted_bonus_iceman_letter
  s_e_iceman_target_active{current_player.iceman_letter_e==0 and current_player.iceman_completing==0 and current_player.letter_collection_paused==0 and current_player.inverted_perk_active==1}:
    - inverted_bonus_iceman_letter
  s_m_iceman_target_active{current_player.iceman_letter_m==0 and current_player.iceman_completing==0 and current_player.letter_collection_paused==0 and current_player.inverted_perk_active==1}:
    - inverted_bonus_iceman_letter
  s_a_iceman_target_active{current_player.iceman_letter_a==0 and current_player.iceman_completing==0 and current_player.letter_collection_paused==0 and current_player.inverted_perk_active==1}:
    - inverted_bonus_iceman_letter
  s_n_iceman_target_active{current_player.iceman_letter_n==0 and current_player.iceman_completing==0 and current_player.letter_collection_paused==0 and current_player.inverted_perk_active==1}:
    - inverted_bonus_iceman_letter

  # Chain logic: award first uncollected letter in I→C→E→M→A→N order
  inverted_bonus_iceman_letter{current_player.iceman_letter_i==0}:
    - inverted_award_iceman_i
  inverted_bonus_iceman_letter{current_player.iceman_letter_i==1 and current_player.iceman_letter_c==0}:
    - inverted_award_iceman_c
  inverted_bonus_iceman_letter{current_player.iceman_letter_i==1 and current_player.iceman_letter_c==1 and current_player.iceman_letter_e==0}:
    - inverted_award_iceman_e
  inverted_bonus_iceman_letter{current_player.iceman_letter_i==1 and current_player.iceman_letter_c==1 and current_player.iceman_letter_e==1 and current_player.iceman_letter_m==0}:
    - inverted_award_iceman_m
  inverted_bonus_iceman_letter{current_player.iceman_letter_i==1 and current_player.iceman_letter_c==1 and current_player.iceman_letter_e==1 and current_player.iceman_letter_m==1 and current_player.iceman_letter_a==0}:
    - inverted_award_iceman_a
  inverted_bonus_iceman_letter{current_player.iceman_letter_i==1 and current_player.iceman_letter_c==1 and current_player.iceman_letter_e==1 and current_player.iceman_letter_m==1 and current_player.iceman_letter_a==1 and current_player.iceman_letter_n==0}:
    - inverted_award_iceman_n

  # After each bonus award, check if ICEMAN is now complete
  inverted_award_iceman_i: check_ice_man_complete
  inverted_award_iceman_c: check_ice_man_complete
  inverted_award_iceman_e: check_ice_man_complete
  inverted_award_iceman_m: check_ice_man_complete
  inverted_award_iceman_a: check_ice_man_complete
  inverted_award_iceman_n: check_ice_man_complete

  ##############################################
  ## TIER 1: training_missions_played==0
  ## Any target hit scores its letter normally (existing logic).
  ## If the hit target is ALREADY LIT, award the next unlit letter
  ## in I->C->E->M->A->N order instead.
  ##############################################

  # Triggers: hit a lit letter with 0 missions played
  s_i_iceman_target_active{current_player.iceman_letter_i==1 and current_player.iceman_completing==0 and current_player.letter_collection_paused==0 and current_player.training_missions_played==0}:
    - tier1_bonus_iceman_letter
  s_c_iceman_target_active{current_player.iceman_letter_c==1 and current_player.iceman_completing==0 and current_player.letter_collection_paused==0 and current_player.training_missions_played==0}:
    - tier1_bonus_iceman_letter
  s_e_iceman_target_active{current_player.iceman_letter_e==1 and current_player.iceman_completing==0 and current_player.letter_collection_paused==0 and current_player.training_missions_played==0}:
    - tier1_bonus_iceman_letter
  s_m_iceman_target_active{current_player.iceman_letter_m==1 and current_player.iceman_completing==0 and current_player.letter_collection_paused==0 and current_player.training_missions_played==0}:
    - tier1_bonus_iceman_letter
  s_a_iceman_target_active{current_player.iceman_letter_a==1 and current_player.iceman_completing==0 and current_player.letter_collection_paused==0 and current_player.training_missions_played==0}:
    - tier1_bonus_iceman_letter
  s_n_iceman_target_active{current_player.iceman_letter_n==1 and current_player.iceman_completing==0 and current_player.letter_collection_paused==0 and current_player.training_missions_played==0}:
    - tier1_bonus_iceman_letter

  # Dispatch: award first unlit letter in I->C->E->M->A->N order
  tier1_bonus_iceman_letter{current_player.iceman_letter_i==0}:
    - inverted_award_iceman_i
  tier1_bonus_iceman_letter{current_player.iceman_letter_i==1 and current_player.iceman_letter_c==0}:
    - inverted_award_iceman_c
  tier1_bonus_iceman_letter{current_player.iceman_letter_i==1 and current_player.iceman_letter_c==1 and current_player.iceman_letter_e==0}:
    - inverted_award_iceman_e
  tier1_bonus_iceman_letter{current_player.iceman_letter_i==1 and current_player.iceman_letter_c==1 and current_player.iceman_letter_e==1 and current_player.iceman_letter_m==0}:
    - inverted_award_iceman_m
  tier1_bonus_iceman_letter{current_player.iceman_letter_i==1 and current_player.iceman_letter_c==1 and current_player.iceman_letter_e==1 and current_player.iceman_letter_m==1 and current_player.iceman_letter_a==0}:
    - inverted_award_iceman_a
  tier1_bonus_iceman_letter{current_player.iceman_letter_i==1 and current_player.iceman_letter_c==1 and current_player.iceman_letter_e==1 and current_player.iceman_letter_m==1 and current_player.iceman_letter_a==1 and current_player.iceman_letter_n==0}:
    - inverted_award_iceman_n

  # Perk bonus: inverted perk active -> award one additional letter after the tier1 award
  tier1_bonus_iceman_letter{current_player.inverted_perk_active==1}:
    - inverted_bonus_iceman_letter

  ##############################################
  ## TIER 2: training_missions_played==1
  ## Hit unlit letter -> that letter (existing logic).
  ## Hit LIT letter -> award the neighbor with priority:
  ##   I -> C
  ##   C -> I, else E
  ##   E -> C, else M
  ##   M -> E, else A
  ##   A -> M, else N
  ##   N -> A
  ## If neighbors already lit, nothing awarded (silent).
  ##############################################

  # Triggers: hit a lit letter with 1 mission played
  s_i_iceman_target_active{current_player.iceman_letter_i==1 and current_player.iceman_completing==0 and current_player.letter_collection_paused==0 and current_player.training_missions_played==1}:
    - tier2_bonus_iceman_i
  s_c_iceman_target_active{current_player.iceman_letter_c==1 and current_player.iceman_completing==0 and current_player.letter_collection_paused==0 and current_player.training_missions_played==1}:
    - tier2_bonus_iceman_c
  s_e_iceman_target_active{current_player.iceman_letter_e==1 and current_player.iceman_completing==0 and current_player.letter_collection_paused==0 and current_player.training_missions_played==1}:
    - tier2_bonus_iceman_e
  s_m_iceman_target_active{current_player.iceman_letter_m==1 and current_player.iceman_completing==0 and current_player.letter_collection_paused==0 and current_player.training_missions_played==1}:
    - tier2_bonus_iceman_m
  s_a_iceman_target_active{current_player.iceman_letter_a==1 and current_player.iceman_completing==0 and current_player.letter_collection_paused==0 and current_player.training_missions_played==1}:
    - tier2_bonus_iceman_a
  s_n_iceman_target_active{current_player.iceman_letter_n==1 and current_player.iceman_completing==0 and current_player.letter_collection_paused==0 and current_player.training_missions_played==1}:
    - tier2_bonus_iceman_n

  # I lit: give C if unlit
  tier2_bonus_iceman_i{current_player.iceman_letter_c==0}:
    - inverted_award_iceman_c

  # C lit: give I first, else E
  tier2_bonus_iceman_c{current_player.iceman_letter_i==0}:
    - inverted_award_iceman_i
  tier2_bonus_iceman_c{current_player.iceman_letter_i==1 and current_player.iceman_letter_e==0}:
    - inverted_award_iceman_e

  # E lit: give C first, else M
  tier2_bonus_iceman_e{current_player.iceman_letter_c==0}:
    - inverted_award_iceman_c
  tier2_bonus_iceman_e{current_player.iceman_letter_c==1 and current_player.iceman_letter_m==0}:
    - inverted_award_iceman_m

  # M lit: give E first, else A
  tier2_bonus_iceman_m{current_player.iceman_letter_e==0}:
    - inverted_award_iceman_e
  tier2_bonus_iceman_m{current_player.iceman_letter_e==1 and current_player.iceman_letter_a==0}:
    - inverted_award_iceman_a

  # A lit: give M first, else N
  tier2_bonus_iceman_a{current_player.iceman_letter_m==0}:
    - inverted_award_iceman_m
  tier2_bonus_iceman_a{current_player.iceman_letter_m==1 and current_player.iceman_letter_n==0}:
    - inverted_award_iceman_n

  # N lit: give A if unlit
  tier2_bonus_iceman_n{current_player.iceman_letter_a==0}:
    - inverted_award_iceman_a

  # Perk bonus: inverted perk active -> award one additional letter after each tier2 neighbor award
  tier2_bonus_iceman_i{current_player.inverted_perk_active==1}:
    - inverted_bonus_iceman_letter
  tier2_bonus_iceman_c{current_player.inverted_perk_active==1}:
    - inverted_bonus_iceman_letter
  tier2_bonus_iceman_e{current_player.inverted_perk_active==1}:
    - inverted_bonus_iceman_letter
  tier2_bonus_iceman_m{current_player.inverted_perk_active==1}:
    - inverted_bonus_iceman_letter
  tier2_bonus_iceman_a{current_player.inverted_perk_active==1}:
    - inverted_bonus_iceman_letter
  tier2_bonus_iceman_n{current_player.inverted_perk_active==1}:
    - inverted_bonus_iceman_letter

  ##############################################
  ## Start Training Missions via Left Lane
  ##############################################
  
  # Start Inverted training mission when left lane hit with mission 1 qualified
  # Only start if not already completed and no pilot mode active
  # Guard: extra_ball_lit==0 prevents firing while extra ball collect sequence runs
  s_lane_left_active{current_player.training_mission_qualified==1 and current_player.training_inverted_complete==0 and current_player.pilot_mode_active==0 and current_player.hard_deck_qualified_mode==0 and current_player.extra_ball_lit==0}:
    - start_mode_pilot_training_mission_inverted
  
  # Start Missiles training mission when left lane hit with mission 2 qualified
  # Only start if not already completed and no pilot mode active
  s_lane_left_active{current_player.training_mission_qualified==2 and current_player.training_missles_complete==0 and current_player.pilot_mode_active==0 and current_player.hard_deck_qualified_mode==0 and current_player.extra_ball_lit==0}:
    - start_mode_pilot_training_mission_missiles
  
  # Start Afterburner training mission when left lane hit with mission 3 qualified
  # Only start if not already completed and no pilot mode active
  s_lane_left_active{current_player.training_mission_qualified==3 and current_player.training_afterburner_complete==0 and current_player.pilot_mode_active==0 and current_player.hard_deck_qualified_mode==0 and current_player.extra_ball_lit==0}:
    - start_mode_pilot_training_mission_afterburner
  
  # Start Wingman training mission when left lane hit with mission 4 qualified
  s_lane_left_active{current_player.training_mission_qualified==4 and current_player.training_wingman_complete==0 and current_player.pilot_mode_active==0 and current_player.hard_deck_qualified_mode==0 and current_player.extra_ball_lit==0}:
    - start_mode_training_wingman
  
  # Start Dogfight training mission when left lane hit with mission 5 qualified
  s_lane_left_active{current_player.training_mission_qualified==5 and current_player.pilot_mode_active==0 and current_player.hard_deck_qualified_mode==0 and current_player.extra_ball_lit==0}:
    - start_mode_training_dogfight

  ##############################################
  ## ALL TRAINING MISSIONS COMPLETE TRACKING
  ## Sets all_training_missions_complete=1 when all 5 training missions are done.
  ## Used by mystery award to exclude "Light Training Mission" from award pool.
  ## Checks whenever any training_xxx_complete flag changes to 1.
  ##############################################

  player_training_inverted_complete{value==1}: check_all_training_complete
  player_training_missles_complete{value==1}: check_all_training_complete
  player_training_afterburner_complete{value==1}: check_all_training_complete
  player_training_wingman_complete{value==1}: check_all_training_complete
  player_training_dogfight_complete{value==1}: check_all_training_complete

  check_all_training_complete{current_player.training_inverted_complete==1 and current_player.training_missles_complete==1 and current_player.training_afterburner_complete==1 and current_player.training_wingman_complete==1 and current_player.training_dogfight_complete==1}:
    - all_training_missions_complete_set

  # Timer completion triggers the reset
  timer_iceman_reset_complete:
    iceman_reset_letters

  # Check if ICE or MAN is complete after any letter lights
  s_i_iceman_target_active{current_player.iceman_letter_i==0 and current_player.iceman_completing==0}: check_ice_man_complete
  s_c_iceman_target_active{current_player.iceman_letter_c==0 and current_player.iceman_completing==0}: check_ice_man_complete
  s_e_iceman_target_active{current_player.iceman_letter_e==0 and current_player.iceman_completing==0}: check_ice_man_complete
  s_m_iceman_target_active{current_player.iceman_letter_m==0 and current_player.iceman_completing==0}: check_ice_man_complete
  s_a_iceman_target_active{current_player.iceman_letter_a==0 and current_player.iceman_completing==0}: check_ice_man_complete
  s_n_iceman_target_active{current_player.iceman_letter_n==0 and current_player.iceman_completing==0}: check_ice_man_complete

  # Post ICE complete if I-C-E are lit
  check_ice_man_complete{current_player.iceman_letter_i==1 and current_player.iceman_letter_c==1 and current_player.iceman_letter_e==1}:
    ice_complete:
      priority: 100

  # Post MAN complete if M-A-N are lit
  check_ice_man_complete{current_player.iceman_letter_m==1 and current_player.iceman_letter_a==1 and current_player.iceman_letter_n==1}:
    man_complete:
      priority: 100

  # Post ICEMAN complete if all 6 letters are lit
  check_ice_man_complete{current_player.iceman_letter_i==1 and current_player.iceman_letter_c==1 and current_player.iceman_letter_e==1 and current_player.iceman_letter_m==1 and current_player.iceman_letter_a==1 and current_player.iceman_letter_n==1}:
    iceman_complete:
      priority: 110

  # Qualify training mission ONLY if not already qualified (prevents double qualification)
  iceman_complete{current_player.training_mission_qualified==0}:
    qualify_training_mission

  # Restore qualified mission state on ball start
  mode_iceman_letters_started:
    - restore_training_mission_light

  # Wrap mission back to 1 if it somehow reaches 5 during rotation
  player_training_mission_qualified{value==5 and current_player.training_inverted_complete==0}:
    wrap_mission_to_one
  player_training_mission_qualified{value==5 and current_player.training_missles_complete==0}:
    wrap_mission_to_one
  player_training_mission_qualified{value==5 and current_player.training_afterburner_complete==0}:
    wrap_mission_to_one
  player_training_mission_qualified{value==5 and current_player.training_wingman_complete==0}:
    wrap_mission_to_one

  # Auto-skip completed missions during pop bumper rotation
  # Sets directly to the next UNCOMPLETED mission value so the variable
  # always stays in sync with what's actually lit on the playfield.
  # Conditions are ordered most-specific first so MPF matches correctly.

  # Skip value==1 (inverted complete) — find next uncompleted
  player_training_mission_qualified{value==1 and current_player.training_inverted_complete==1 and current_player.training_missles_complete==0}:
    training_mission_qualified:
      action: set
      int: 2
  player_training_mission_qualified{value==1 and current_player.training_inverted_complete==1 and current_player.training_missles_complete==1 and current_player.training_afterburner_complete==0}:
    training_mission_qualified:
      action: set
      int: 3
  player_training_mission_qualified{value==1 and current_player.training_inverted_complete==1 and current_player.training_missles_complete==1 and current_player.training_afterburner_complete==1 and current_player.training_wingman_complete==0}:
    training_mission_qualified:
      action: set
      int: 4
  player_training_mission_qualified{value==1 and current_player.training_inverted_complete==1 and current_player.training_missles_complete==1 and current_player.training_afterburner_complete==1 and current_player.training_wingman_complete==1}:
    training_mission_qualified:
      action: set
      int: 5

  # Skip value==2 (missiles complete) — find next uncompleted
  player_training_mission_qualified{value==2 and current_player.training_missles_complete==1 and current_player.training_afterburner_complete==0}:
    training_mission_qualified:
      action: set
      int: 3
  player_training_mission_qualified{value==2 and current_player.training_missles_complete==1 and current_player.training_afterburner_complete==1 and current_player.training_wingman_complete==0}:
    training_mission_qualified:
      action: set
      int: 4
  player_training_mission_qualified{value==2 and current_player.training_missles_complete==1 and current_player.training_afterburner_complete==1 and current_player.training_wingman_complete==1}:
    training_mission_qualified:
      action: set
      int: 5

  # Skip value==3 (afterburner complete) — find next uncompleted
  player_training_mission_qualified{value==3 and current_player.training_afterburner_complete==1 and current_player.training_wingman_complete==0}:
    training_mission_qualified:
      action: set
      int: 4
  player_training_mission_qualified{value==3 and current_player.training_afterburner_complete==1 and current_player.training_wingman_complete==1}:
    training_mission_qualified:
      action: set
      int: 5

  # Skip value==4 (wingman complete) — jump to dogfight
  player_training_mission_qualified{value==4 and current_player.training_wingman_complete==1}:
    training_mission_qualified:
      action: set
      int: 5

  # Stop all pulse shows when any training mission starts
  mode_pilot_training_mission_inverted_started:
    stop_all_training_pulse_shows
  mode_pilot_training_mission_missiles_started:
    stop_all_training_pulse_shows
  mode_pilot_training_mission_afterburner_started:
    stop_all_training_pulse_shows
  mode_pilot_training_mission_wingman_started:
    stop_all_training_pulse_shows
  mode_training_dogfight_started:
    stop_all_training_pulse_shows

  # Stop pulse shows when any pilot mission starts
  mode_edge_of_space_started:
    stop_all_training_pulse_shows
  mode_battle_jester_started:
    stop_all_training_pulse_shows
  mode_canyon_run_started:
    stop_all_training_pulse_shows
  mode_rise_of_phoenix_started:
    stop_all_training_pulse_shows
  mode_rescue_cougar_started:
    stop_all_training_pulse_shows
  mode_balls_of_fire_started:
    stop_all_training_pulse_shows
  mode_cool_under_pressure_started:
    stop_all_training_pulse_shows
  mode_no_points_for_second_place_started:
    stop_all_training_pulse_shows
  mode_below_the_hard_deck_started:
    stop_all_training_pulse_shows
  mode_no_margin_for_error_started:
    stop_all_training_pulse_shows

  # Stop pulse shows when any hard deck mission starts
  mode_hard_deck_playing_with_the_boys_started:
    stop_all_training_pulse_shows
  mode_hard_deck_maverick_and_charlie_started:
    stop_all_training_pulse_shows
  mode_hard_deck_maverick_and_penny_started:
    stop_all_training_pulse_shows
  mode_hard_deck_honoring_iceman_started:
    stop_all_training_pulse_shows

  # Stop pulse shows when multiball starts
  mode_top_gun_multiball_started:
    stop_all_training_pulse_shows

  # Restore pulse shows when pilot missions stop
  mode_edge_of_space_stopped{current_player.training_mission_qualified>0}:
    restore_training_mission_light
  mode_battle_jester_stopped{current_player.training_mission_qualified>0}:
    restore_training_mission_light
  mode_canyon_run_stopped{current_player.training_mission_qualified>0}:
    restore_training_mission_light
  mode_rise_of_phoenix_stopped{current_player.training_mission_qualified>0}:
    restore_training_mission_light
  mode_rescue_cougar_stopped{current_player.training_mission_qualified>0}:
    restore_training_mission_light
  mode_balls_of_fire_stopped{current_player.training_mission_qualified>0}:
    restore_training_mission_light
  mode_cool_under_pressure_stopped{current_player.training_mission_qualified>0}:
    restore_training_mission_light
  mode_no_points_for_second_place_stopped{current_player.training_mission_qualified>0}:
    restore_training_mission_light
  mode_below_the_hard_deck_stopped{current_player.training_mission_qualified>0}:
    restore_training_mission_light
  mode_no_margin_for_error_stopped{current_player.training_mission_qualified>0}:
    restore_training_mission_light

  # Restore pulse shows when hard deck missions stop
  mode_hard_deck_playing_with_the_boys_stopped{current_player.training_mission_qualified>0}:
    restore_training_mission_light
  mode_hard_deck_maverick_and_charlie_stopped{current_player.training_mission_qualified>0}:
    restore_training_mission_light
  mode_hard_deck_maverick_and_penny_stopped{current_player.training_mission_qualified>0}:
    restore_training_mission_light
  mode_hard_deck_honoring_iceman_stopped{current_player.training_mission_qualified>0}:
    restore_training_mission_light

  # Restore pulse shows when multiball stops
  mode_top_gun_multiball_stopped{current_player.training_mission_qualified>0}:
    restore_training_mission_light

  ##############################################
  ## MIG Post Timer Control Events
  ##############################################

  # Start left post timer when spinner hit (if training qualified and no training mission running)
  s_spinner_active{current_player.training_mission_qualified>0 and current_player.training_mission_active==0}:
    - restart_left_mig_post_timer

  # Start right post timer when left orbit hit (if training qualified, NOT locked out, and no training mission running)
  s_orbit_left_active{current_player.training_mission_qualified>0 and current_player.right_post_locked_out==0 and current_player.training_mission_active==0}:
    - restart_right_mig_post_timer

  # Start lockout timer when right-side switches hit
  s_orbit_right_active:
    - restart_right_orbit_lockout_timer

  s_ramp_inner_exit_active:
    - restart_right_orbit_lockout_timer

  s_orbit_upper_active:
    - restart_right_orbit_lockout_timer

  # Custom events to restart timers
  restart_left_mig_post_timer:
    - timer_left_mig_post_timer_stop
    - timer_left_mig_post_timer_start

  restart_right_mig_post_timer:
    - timer_right_mig_post_timer_stop
    - timer_right_mig_post_timer_start

  restart_right_orbit_lockout_timer:
    - timer_right_orbit_lockout_timer_stop
    - timer_right_orbit_lockout_timer_start

##############################################
## Coil Player - Control Barrier Target & MIG Posts
##############################################

coil_player:
  # Training missions do NOT use the barrier - removed barrier pulse from qualification
  # Barrier is only used for pilot mission modes (rescue_cougar, etc.)

  # Safety: release barrier when training mission starts (ensure barrier is down)
  mode_pilot_training_mission_inverted_started:
    c_mode_barrier:
      action: off
  mode_pilot_training_mission_missiles_started:
    c_mode_barrier:
      action: off
  mode_pilot_training_mission_afterburner_started:
    c_mode_barrier:
      action: off
  mode_pilot_training_mission_wingman_started:
    c_mode_barrier:
      action: off
  mode_training_dogfight_started:
    c_mode_barrier:
      action: off

  ##############################################
  ## MIG Post Control
  ##############################################

  # LEFT MIG POST - Activate when spinner hit and training mission qualified (not during active training)
  s_spinner_active{current_player.training_mission_qualified>0 and current_player.training_mission_active==0}:
    c_left_mig_up_post:
      action: pulse
      hold_power: 0.125

  # Hold left post while timer is running
  timer_left_mig_post_timer_started:
    c_left_mig_up_post:
      action: enable
      hold_power: 0.125

  # Release left post when timer completes
  timer_left_mig_post_timer_complete:
    c_left_mig_up_post:
      action: disable

  # RIGHT MIG POST - Activate when left orbit hit, NOT locked out, training qualified, and not during active training
  s_orbit_left_active{current_player.training_mission_qualified>0 and current_player.right_post_locked_out==0 and current_player.training_mission_active==0}:
    c_right_mig_up_post:
      action: pulse
      hold_power: 0.125

  # Hold right post while timer is running
  timer_right_mig_post_timer_started:
    c_right_mig_up_post:
      action: enable
      hold_power: 0.125

  # Release right post when timer completes
  timer_right_mig_post_timer_complete:
    c_right_mig_up_post:
      action: disable

