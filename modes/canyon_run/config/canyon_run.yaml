#config_version=6

####################################################################################
# CANYON RUN - PILOT MISSION MODE
# Timer: 135 seconds | Steps: 9 | Stacks with multiball: Yes
# GI: Odd lights orange (FF6600), Even lights yellow (FFFF00)
# Scoring: 250k/350k/450k/550k/600k/700k/800k/1.6M/3.2M = 8.5M total
####################################################################################

mode:
  start_events: start_mode_canyon_run
  stop_events:
    - timer_canyon_run_complete_delay_complete
    - timer_canyon_run_failed_delay_complete
    - canyon_run_drain_cleanup_complete
  priority: 600
  game_mode: true
  use_wait_queue: true

mode_settings:
  can_stack_with_multiball: true

####################################################################################
# BALL HOLDS
####################################################################################

ball_holds:
  canyon_run_scoop_hold:
    balls_to_hold: 1
    hold_devices: bd_mode_scoop
    enable_events:
      - mode_canyon_run_started
      - canyon_run_setup_step_9
    disable_events:
      - canyon_run_ball_released
    release_one_events:
      - canyon_run_ball_released
      - canyon_run_victory_ball_exit      # Delayed version - barrier drops first
    release_all_events:
      - mode_canyon_run_will_stop

####################################################################################
# QUEUE RELAY PLAYER
####################################################################################

queue_relay_player:
  ball_ending{mode.canyon_run.active==True}:
    post: canyon_run_ball_ending_hold
    wait_for: canyon_run_drain_cleanup_complete
    priority: 1000

####################################################################################
# VARIABLE PLAYER
####################################################################################

variable_player:
  mode_canyon_run_started:
    pilot_mode_active:
      action: set
      int: 1
    letter_collection_paused:
      action: set
      int: 1
    mode_canyon_run_actually_played:
      action: set
      int: 1
    canyon_run_step:
      action: set
      int: 0
    canyon_run_complete_flag:
      action: set
      int: 0
    missiles_perk_blocked:
      action: set
      int: 0
    mode_canyon_run_played:
      action: set
      int: 1
    canyon_run_skip_won_fired:
      action: set
      int: 0
    pilot_missions_played:
      action: add
      int: 1
    canyon_run_shots_remaining:
      action: set
      int: 9
    mode_points_scored:
      action: set
      int: 0
    canyon_run_step8_position:
      action: set
      int: 0

  ball_will_end{mode.canyon_run.active==True}:
    pilot_mode_drain_pending:
      action: set
      int: 1

  canyon_run_step_1_complete:
    canyon_run_step:
      action: set
      int: 1
    score: 250000 * current_player.total_scoring_multiplier
    mode_points_scored:
      action: set
      int: 250000 * current_player.total_scoring_multiplier
    canyon_run_shots_remaining:
      action: add
      int: -1

  canyon_run_step_2_complete:
    canyon_run_step:
      action: set
      int: 2
    score: 350000 * current_player.total_scoring_multiplier
    mode_points_scored:
      action: set
      int: 350000 * current_player.total_scoring_multiplier
    canyon_run_shots_remaining:
      action: add
      int: -1

  canyon_run_step_3_complete:
    canyon_run_step:
      action: set
      int: 3
    score: 450000 * current_player.total_scoring_multiplier
    mode_points_scored:
      action: set
      int: 450000 * current_player.total_scoring_multiplier
    canyon_run_shots_remaining:
      action: add
      int: -1

  canyon_run_step_4_complete:
    canyon_run_step:
      action: set
      int: 4
    score: 550000 * current_player.total_scoring_multiplier
    mode_points_scored:
      action: set
      int: 550000 * current_player.total_scoring_multiplier
    canyon_run_shots_remaining:
      action: add
      int: -1

  canyon_run_step_5_complete:
    canyon_run_step:
      action: set
      int: 5
    score: 600000 * current_player.total_scoring_multiplier
    mode_points_scored:
      action: set
      int: 600000 * current_player.total_scoring_multiplier
    canyon_run_shots_remaining:
      action: add
      int: -1

  canyon_run_step_6_complete:
    canyon_run_step:
      action: set
      int: 6
    score: 700000 * current_player.total_scoring_multiplier
    mode_points_scored:
      action: set
      int: 700000 * current_player.total_scoring_multiplier
    canyon_run_shots_remaining:
      action: add
      int: -1

  canyon_run_step_7_complete:
    canyon_run_step:
      action: set
      int: 7
    score: 800000 * current_player.total_scoring_multiplier
    mode_points_scored:
      action: set
      int: 800000 * current_player.total_scoring_multiplier
    canyon_run_shots_remaining:
      action: add
      int: -1

  canyon_run_step_8_complete:
    canyon_run_step:
      action: set
      int: 8
    missiles_perk_blocked:
      action: set
      int: 1
    score: 1600000 * current_player.total_scoring_multiplier
    mode_points_scored:
      action: set
      int: 1600000 * current_player.total_scoring_multiplier
    canyon_run_shots_remaining:
      action: add
      int: -1

  canyon_run_step_9_complete:
    canyon_run_step:
      action: set
      int: 9
    canyon_run_complete_flag:
      action: set
      int: 1
    score: 3200000 * current_player.total_scoring_multiplier
    mode_points_scored:
      action: set
      int: 3200000 * current_player.total_scoring_multiplier
    pilot_missions_won:
      action: add
      int: 1
    mode_canyon_run_won:
      action: set
      int: 1
    canyon_run_shots_remaining:
      action: add
      int: -1
    missiles_perk_saved:
      action: set
      int: current_player.missiles_perk_active
    missiles_perk_active:
      action: set
      int: 0

  # Set flag to prevent double-fire on victory skip
  canyon_run_set_skip_won_fired:
    canyon_run_skip_won_fired:
      action: set
      int: 1

  # Step 8 moving target position tracking
  canyon_run_step8_goto_1:
    canyon_run_step8_position:
      action: set
      int: 1
  canyon_run_step8_goto_2:
    canyon_run_step8_position:
      action: set
      int: 2
  canyon_run_step8_goto_3:
    canyon_run_step8_position:
      action: set
      int: 3
  canyon_run_step8_goto_4:
    canyon_run_step8_position:
      action: set
      int: 4
  canyon_run_step8_goto_5:
    canyon_run_step8_position:
      action: set
      int: 5
  canyon_run_step8_goto_6:
    canyon_run_step8_position:
      action: set
      int: 6

####################################################################################
# SLIDE PLAYER
####################################################################################

slide_player:
  mode_canyon_run_started:
    canyon_run_shots_remaining:
      action: play
      priority: 1000
    canyon_run_intro:
      action: play
      priority: 900
    canyon_run_instructions:
      action: play
      priority: 850

  # Show 240 static slide during intro when no perk active
  mode_canyon_run_started{current_player.afterburner_perk_active==0}:
    canyon_run_timer_240:
      action: play
      priority: 1000

  mode_canyon_run_started{current_player.afterburner_perk_active==1}:
    afterburner_perk_active:
      action: play
      priority: 850
    timer_perk_activated:
      action: play
      priority: 1000

  # Swap 240 static slide for real timer on skip
  canyon_run_skip_intro:
    canyon_run_intro:
      action: remove
    canyon_run_timer_240:
      action: remove
    canyon_run_timer:
      action: play
      priority: 1000

  # Swap 240 for real timer at 24s (mid-intro, matches movie scene change)
  timer_canyon_run_slide_swap_complete:
    canyon_run_timer_240:
      action: remove
    canyon_run_timer:
      action: play
      priority: 1000

  # Remove intro video when full 29s expires
  timer_canyon_run_intro_video_delay_complete:
    canyon_run_intro:
      action: remove

  canyon_run_complete:
    canyon_run_timer:
      action: remove
    canyon_run_shots_remaining:
      action: remove
    canyon_run_instructions:
      action: remove
    canyon_run_step_8:
      action: remove
    canyon_run_won:
      action: play
      priority: 900
      expire: 24s

  canyon_run_failed:
    canyon_run_timer:
      action: remove
    canyon_run_shots_remaining:
      action: remove
    canyon_run_instructions:
      action: remove
    canyon_run_step_1:
      action: remove
    canyon_run_step_2:
      action: remove
    canyon_run_step_3:
      action: remove
    canyon_run_step_4:
      action: remove
    canyon_run_step_5:
      action: remove
    canyon_run_step_6:
      action: remove
    canyon_run_step_7:
      action: remove
    canyon_run_step_8:
      action: remove
    canyon_run_lost:
      action: play
      priority: 900
      expire: 12s

  mode_canyon_run_stopped:
    canyon_run_timer:
      action: remove
    canyon_run_timer_240:
      action: remove
    canyon_run_shots_remaining:
      action: remove
    canyon_run_intro:
      action: remove
    canyon_run_instructions:
      action: remove
    timer_perk_activated:
      action: remove
    canyon_run_step_1:
      action: remove
    canyon_run_step_2:
      action: remove
    canyon_run_step_3:
      action: remove
    canyon_run_step_4:
      action: remove
    canyon_run_step_5:
      action: remove
    canyon_run_step_6:
      action: remove
    canyon_run_step_7:
      action: remove
    canyon_run_step_8:
      action: remove
    canyon_run_won:
      action: remove
    canyon_run_lost:
      action: remove

  # Step videos - remove previous before playing next
  canyon_run_step_1_shot_hit:
    canyon_run_step_1:
      action: play
      priority: 800
    mode_points_scored:
      action: play
      priority: 840
      expire: 2s

  canyon_run_step_2_shot_hit:
    canyon_run_step_1:
      action: remove
    canyon_run_step_2:
      action: play
      priority: 800
    mode_points_scored:
      action: play
      priority: 840
      expire: 2s

  canyon_run_step_3_shot_hit:
    canyon_run_step_2:
      action: remove
    canyon_run_step_3:
      action: play
      priority: 800
    mode_points_scored:
      action: play
      priority: 840
      expire: 2s

  canyon_run_step_4_shot_hit:
    canyon_run_step_3:
      action: remove
    canyon_run_step_4:
      action: play
      priority: 800
    mode_points_scored:
      action: play
      priority: 840
      expire: 2s

  canyon_run_step_5_shot_hit:
    canyon_run_step_4:
      action: remove
    canyon_run_step_5:
      action: play
      priority: 800
    mode_points_scored:
      action: play
      priority: 840
      expire: 2s

  canyon_run_step_6_shot_hit:
    canyon_run_step_5:
      action: remove
    canyon_run_step_6:
      action: play
      priority: 800
    mode_points_scored:
      action: play
      priority: 840
      expire: 2s

  canyon_run_step_7_shot_hit:
    canyon_run_step_6:
      action: remove
    canyon_run_step_7:
      action: play
      priority: 800
    mode_points_scored:
      action: play
      priority: 840
      expire: 2s

  canyon_run_step_8_shot_hit:
    canyon_run_step_7:
      action: remove
    canyon_run_step_8:
      action: play
      priority: 800
    mode_points_scored:
      action: play
      priority: 840
      expire: 2s

  canyon_run_step_9_shot_hit:
    canyon_run_step_8:
      action: remove
    mode_points_scored:
      action: play
      priority: 840
      expire: 2s

####################################################################################
# TIMERS
####################################################################################

timers:
  # Won GI show explosion trigger - fires at 20s into won video to start explosion GI
  canyon_run_won_gi_explosion:
    start_value: 0
    end_value: 20
    direction: up
    tick_interval: 1s
    start_running: false
    control_events:
      - event: canyon_run_complete
        action: start
      - event: mode_canyon_run_will_stop
        action: stop

  # Main mode countdown - starts on ball leaving scoop
  canyon_run_timer:
    start_value: 135
    end_value: 0
    direction: down
    tick_interval: 1s
    start_running: false
    control_events:
      - event: canyon_run_ball_released
        action: start
      - event: timer_canyon_run_complete_delay_start
        action: stop
      - event: timer_canyon_run_failed_delay_start
        action: stop
      - event: afterburner_extend_canyon_run_timer
        action: jump
        value: 9999
      - event: lock_sequence_timer_pause
        action: pause
      - event: lock_sequence_timer_resume
        action: start

  # Intro video delay - 29 seconds, auto-starts on mode start
  canyon_run_intro_video_delay:
    start_value: 0
    end_value: 29
    direction: up
    tick_interval: 1s
    control_events:
      - event: mode_canyon_run_started
        action: start
      - event: canyon_run_skip_intro
        action: stop

  # Slide swap timer - swaps 240 static for real timer at 24s (mid-intro)
  canyon_run_slide_swap:
    start_value: 0
    end_value: 24
    direction: up
    tick_interval: 1s
    control_events:
      - event: mode_canyon_run_started
        action: start
      - event: canyon_run_skip_intro
        action: stop

  # Victory video hold - 24s (canyon_run_won video length)
  canyon_run_complete_delay:
    start_value: 24
    end_value: 0
    direction: down
    tick_interval: 1s
    start_running: false
    control_events:
      - event: timer_canyon_run_complete_delay_start
        action: start

  # Failure video hold - 12s (canyon_run_lost video length)
  canyon_run_failed_delay:
    start_value: 12
    end_value: 0
    direction: down
    tick_interval: 1s
    start_running: false
    control_events:
      - event: timer_canyon_run_failed_delay_start
        action: start

  # Drain delay - holds ball_ending until lost video plays (12s)
  canyon_run_drain_delay:
    start_value: 0
    end_value: 12
    direction: up
    tick_interval: 1s
    control_events:
      - event: canyon_run_drain_detected
        action: start

  # Step 8 - first position holds for 7 seconds
  canyon_run_step8_initial:
    start_value: 0
    end_value: 7
    direction: up
    tick_interval: 1s
    start_running: false
    control_events:
      - event: canyon_run_setup_step_8
        action: start
      - event: canyon_run_step_8_complete
        action: stop

  # Step 8 - subsequent positions cycle every 5 seconds
  canyon_run_step8_cycle:
    start_value: 0
    end_value: 5
    direction: up
    tick_interval: 1s
    start_running: false
    control_events:
      - event: canyon_run_step8_target_advance
        action: restart
      - event: canyon_run_step_8_complete
        action: stop

####################################################################################
# EVENT PLAYER
####################################################################################

event_player:

  # Afterburner perk - jump timer to effectively infinite
  canyon_run_ball_released{current_player.afterburner_perk_active==1}:
    - afterburner_extend_canyon_run_timer|500ms

  # Drain handling
  canyon_run_ball_ending_hold:
    - canyon_run_failed
    - canyon_run_drain_detected

  timer_canyon_run_drain_delay_complete:
    - canyon_run_drain_cleanup_complete
    - canyon_run_cleanup

  # Mode started: barrier up for intro, reset TOPGUN, ramps down
  mode_canyon_run_started:
    - reset_topgun_letters
    - barrier_raise
    - right_ramp_down
    - top_ramp_down

  # Normal intro path: video ends naturally
  # scoop_ball_release fires barrier_drop immediately; ball hold release delayed 400ms so barrier is down first
  timer_canyon_run_intro_video_delay_complete:
    - scoop_ball_release
    - canyon_run_ball_released|400ms
    - canyon_run_setup_step_1|400ms

  # Skip intro path: both flippers held
  canyon_run_skip_intro:
    - scoop_ball_release
    - canyon_run_ball_released|400ms
    - canyon_run_setup_step_1|400ms

  # After won video: release ball hold (barrier already raised by canyon_run_complete)
  canyon_run_victory_ball_released:
    - canyon_run_set_skip_won_fired
    - canyon_run_victory_ball_exit|400ms

  # Skip intro detection - both flippers
  s_flipper_left_active{current_player.canyon_run_step==0 and device.timers.canyon_run_intro_video_delay.running}:
    - canyon_run_check_skip_intro
  s_flipper_right_active{current_player.canyon_run_step==0 and device.timers.canyon_run_intro_video_delay.running}:
    - canyon_run_check_skip_intro
  canyon_run_check_skip_intro{device.switches.s_flipper_left.state and device.switches.s_flipper_right.state}:
    - canyon_run_skip_intro

  # Skip won video detection - both flippers (flag prevents double-fire)
  s_flipper_left_active{current_player.canyon_run_complete_flag==1 and device.timers.canyon_run_complete_delay.running and current_player.canyon_run_skip_won_fired==0}:
    - canyon_run_check_skip_won
  s_flipper_right_active{current_player.canyon_run_complete_flag==1 and device.timers.canyon_run_complete_delay.running and current_player.canyon_run_skip_won_fired==0}:
    - canyon_run_check_skip_won
  canyon_run_check_skip_won{device.switches.s_flipper_left.state and device.switches.s_flipper_right.state}:
    - canyon_run_victory_ball_released

  # Timer expired
  timer_canyon_run_timer_complete{current_player.afterburner_perk_active==0}:
    - canyon_run_failed

  # Step progression chain
  canyon_run_step_1_complete:
    - canyon_run_setup_step_2

  canyon_run_step_2_complete:
    - canyon_run_setup_step_3

  canyon_run_step_3_complete:
    - canyon_run_setup_step_4

  canyon_run_step_4_complete:
    - canyon_run_setup_step_5

  canyon_run_step_5_complete:
    - canyon_run_setup_step_6

  canyon_run_step_6_complete:
    - canyon_run_setup_step_7

  canyon_run_step_7_complete:
    - canyon_run_setup_step_8

  canyon_run_step_8_complete:
    - canyon_run_setup_step_9

  canyon_run_step_9_complete:
    - canyon_run_complete

  # Servo events - staggered to prevent power contention
  # Step 2: raise top ramp + right ramp (TL/TO shots - right ramp feeds upper flipper via RO)
  canyon_run_setup_step_2:
    - top_ramp_up
    - right_ramp_up|500ms

  # Step 3: lower right ramp first, then top ramp (staggered)
  canyon_run_setup_step_3:
    - right_ramp_down
    - top_ramp_down|500ms

  # Step 4: raise right ramp (RO shot)
  canyon_run_setup_step_4:
    - right_ramp_up

  # Step 5: raise top ramp + right ramp (TL/TO shots again - right ramp feeds upper flipper)
  canyon_run_setup_step_5:
    - top_ramp_up
    - right_ramp_up|500ms

  # Step 6: lower right ramp first, then top ramp (staggered)
  canyon_run_setup_step_6:
    - right_ramp_down
    - top_ramp_down|500ms

  # Step 9: drop barrier so player can hit scoop
  canyon_run_setup_step_9:
    - barrier_drop

  # Complete: raise barrier for won video, start delay timer
  # NOTE: canyon_run_cleanup deliberately NOT fired here - it would kill the strobe show immediately
  canyon_run_complete:
    - barrier_raise
    - right_ramp_down
    - top_ramp_down|500ms
    - timer_canyon_run_complete_delay_start
    - missiles_perk_unload

  canyon_run_failed:
    - barrier_raise
    - canyon_run_cleanup
    - right_ramp_down
    - top_ramp_down|500ms
    - timer_canyon_run_failed_delay_start
    - missiles_perk_unload

  timer_canyon_run_complete_delay_complete:
    - canyon_run_cleanup       # Cleanup fires here, AFTER won video plays
    - scoop_ball_release       # Drop barrier before mode stops and ball releases
    - pilot_mode_cleanup_complete

  timer_canyon_run_failed_delay_complete:
    - pilot_mode_cleanup_complete

  # Step 8 moving target cycle logic
  timer_canyon_run_step8_initial_complete:
    - canyon_run_step8_target_advance

  timer_canyon_run_step8_cycle_complete:
    - canyon_run_step8_target_advance

  canyon_run_step8_target_advance{current_player.canyon_run_step8_position==0}:
    - canyon_run_step8_goto_1
  canyon_run_step8_target_advance{current_player.canyon_run_step8_position==1}:
    - canyon_run_step8_goto_2
  canyon_run_step8_target_advance{current_player.canyon_run_step8_position==2}:
    - canyon_run_step8_goto_3
  canyon_run_step8_target_advance{current_player.canyon_run_step8_position==3}:
    - canyon_run_step8_goto_4
  canyon_run_step8_target_advance{current_player.canyon_run_step8_position==4}:
    - canyon_run_step8_goto_5
  canyon_run_step8_target_advance{current_player.canyon_run_step8_position==5}:
    - canyon_run_step8_goto_6
  canyon_run_step8_target_advance{current_player.canyon_run_step8_position==6}:
    - canyon_run_step8_goto_1

  # SHOT DETECTION

  # Step 1: Spinner
  spinner_shot_made{current_player.canyon_run_step==0}:
    - canyon_run_step_1_complete
    - canyon_run_step_1_shot_hit

  # Step 2: TL (s_orbit_upper) or TO (s_orbit_lower) - top ramp UP
  s_orbit_upper_active{current_player.canyon_run_step==1}:
    - canyon_run_step_2_complete
    - canyon_run_step_2_shot_hit

  s_orbit_lower_active{current_player.canyon_run_step==1}:
    - canyon_run_step_2_complete
    - canyon_run_step_2_shot_hit

  # Step 3: Spinner
  spinner_shot_made{current_player.canyon_run_step==2}:
    - canyon_run_step_3_complete
    - canyon_run_step_3_shot_hit

  # Step 4: RO composite shot - right ramp UP
  right_orbit_shot_hit{current_player.canyon_run_step==3}:
    - canyon_run_step_4_complete
    - canyon_run_step_4_shot_hit

  # Step 5: TL or TO - top ramp UP
  s_orbit_upper_active{current_player.canyon_run_step==4}:
    - canyon_run_step_5_complete
    - canyon_run_step_5_shot_hit

  s_orbit_lower_active{current_player.canyon_run_step==4}:
    - canyon_run_step_5_complete
    - canyon_run_step_5_shot_hit

  # Step 6: LO composite shot
  left_orbit_shot_hit{current_player.canyon_run_step==5}:
    - canyon_run_step_6_complete
    - canyon_run_step_6_shot_hit

  # Step 7: TWR (no callout - intentional, step 8 voice fires on setup instead)
  s_ramp_tower_exit_active{current_player.canyon_run_step==6}:
    - canyon_run_step_7_complete
    - canyon_run_step_7_shot_hit

  # Step 8: Moving target - position 0 = LR (initial 7s)
  s_ramp_left_exit_active{current_player.canyon_run_step==7 and current_player.canyon_run_step8_position==0}:
    - canyon_run_step_8_complete
    - canyon_run_step_8_shot_hit

  # Step 8: position 1 = TWR
  s_ramp_tower_exit_active{current_player.canyon_run_step==7 and current_player.canyon_run_step8_position==1}:
    - canyon_run_step_8_complete
    - canyon_run_step_8_shot_hit

  # Step 8: position 2 = RR (right ramp DOWN)
  s_ramp_right_exit_active{current_player.canyon_run_step==7 and current_player.canyon_run_step8_position==2}:
    - canyon_run_step_8_complete
    - canyon_run_step_8_shot_hit

  # Step 8: position 3 = LO
  left_orbit_shot_hit{current_player.canyon_run_step==7 and current_player.canyon_run_step8_position==3}:
    - canyon_run_step_8_complete
    - canyon_run_step_8_shot_hit

  # Step 8: position 4 = Spinner
  spinner_shot_made{current_player.canyon_run_step==7 and current_player.canyon_run_step8_position==4}:
    - canyon_run_step_8_complete
    - canyon_run_step_8_shot_hit

  # Step 8: position 5 = RR (right ramp DOWN again)
  s_ramp_right_exit_active{current_player.canyon_run_step==7 and current_player.canyon_run_step8_position==5}:
    - canyon_run_step_8_complete
    - canyon_run_step_8_shot_hit

  # Step 8: position 6 = LR (loops back)
  s_ramp_left_exit_active{current_player.canyon_run_step==7 and current_player.canyon_run_step8_position==6}:
    - canyon_run_step_8_complete
    - canyon_run_step_8_shot_hit

  # Step 9: Scoop (barrier DOWN, s_mode_start)
  s_mode_start_active{current_player.canyon_run_step==8}:
    - canyon_run_step_9_complete
    - canyon_run_step_9_shot_hit

  # MISSILES PERK - auto-complete current step
  missiles_perk_complete_shot{current_player.canyon_run_step==0 and current_player.canyon_run_complete_flag==0}:
    - canyon_run_step_1_complete
    - canyon_run_step_1_shot_hit

  missiles_perk_complete_shot{current_player.canyon_run_step==1 and current_player.canyon_run_complete_flag==0}:
    - canyon_run_step_2_complete
    - canyon_run_step_2_shot_hit

  missiles_perk_complete_shot{current_player.canyon_run_step==2 and current_player.canyon_run_complete_flag==0}:
    - canyon_run_step_3_complete
    - canyon_run_step_3_shot_hit

  missiles_perk_complete_shot{current_player.canyon_run_step==3 and current_player.canyon_run_complete_flag==0}:
    - canyon_run_step_4_complete
    - canyon_run_step_4_shot_hit

  missiles_perk_complete_shot{current_player.canyon_run_step==4 and current_player.canyon_run_complete_flag==0}:
    - canyon_run_step_5_complete
    - canyon_run_step_5_shot_hit

  missiles_perk_complete_shot{current_player.canyon_run_step==5 and current_player.canyon_run_complete_flag==0}:
    - canyon_run_step_6_complete
    - canyon_run_step_6_shot_hit

  missiles_perk_complete_shot{current_player.canyon_run_step==6 and current_player.canyon_run_complete_flag==0}:
    - canyon_run_step_7_complete
    - canyon_run_step_7_shot_hit

  missiles_perk_complete_shot{current_player.canyon_run_step==7 and current_player.canyon_run_complete_flag==0}:
    - canyon_run_step_8_complete
    - canyon_run_step_8_shot_hit

  # Step 9 = scoop shot - missile cannot substitute (ball must physically enter scoop)
  # missiles_perk_complete_shot for step 8 intentionally omitted

