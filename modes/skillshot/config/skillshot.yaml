#config_version=6
mode:
  # Only start skillshot when ball enters shooter lane AND:
  # - ball_just_saved flag is 0 (not a ball save return)
  # - multiball_active is 0 (not during any multiball - includes add-a-balls)
  # - training_mission_active is 0 (not during training missions)
  # - ejection_seat not active (its ball_save re-launches through plunger lane)
  start_events: s_shooter_lane_active{current_player.ball_just_saved==0 and current_player.multiball_active==0 and current_player.training_mission_active==0 and mode.ejection_seat.active==False}
  priority: 300  # Higher than mig_letters (200) to ensure skillshot lights show
  stop_events:
    timer_skillshot_complete: 0s
    mig_lane_left_skill_lit_hit: 0s  # Stop immediately when hit
    mig_lane_right_skill_lit_hit: 0s  # Stop immediately when hit
    spinner_skill_lit_hit: 0s
    orbit_upper_skill_lit_hit: 0s
    ramp_inner_skill_lit_hit: 0s
    # Stop immediately on any non-skillshot switch
    s_i_iceman_target_active: 0s
    s_c_iceman_target_active: 0s  
    s_e_iceman_target_active: 0s
    s_m_iceman_target_active: 0s
    s_a_iceman_target_active: 0s
    s_n_iceman_target_active: 0s
    s_l_lock_target_active: 0s
    s_o_lock_target_active: 0s
    s_c_lock_target_active: 0s
    s_k_lock_target_active: 0s
    s_barrier_target_active: 0s
    s_flight_gear_target_active: 0s
    s_bumper_left_active: 0s
    s_bumper_center_active: 0s
    s_bumper_right_active: 0s
    s_slingshot_left_active: 0s
    s_slingshot_right_active: 0s
    s_inlane_left_active: 0s
    s_inner_inlane_right_active: 0s
    s_outer_inlane_right_active: 0s
    s_outlane_left_active: 0s
    s_outlane_right_active: 0s
    s_lane_left_active: 0s
    s_ramp_left_exit_active: 0s
    s_ramp_right_exit_active: 0s
    s_ramp_tower_exit_active: 0s

shots:
  mig_lane_left:
    switch: s_mig_lane_left
    profile: skill
    show_tokens:
      leds: l_mig_m
    advance_events: skillshot_mig_position_m   # Lit when M is active position
    reset_events: skillshot_mig_position_i, skillshot_mig_position_g

  mig_lane_right:
    switch: s_mig_lane_right
    profile: skill
    show_tokens:
      leds: l_mig_g
    advance_events: skillshot_mig_position_g   # Lit when G is active position
    reset_events: skillshot_mig_position_m, skillshot_mig_position_i

  spinner:
    switch: s_spinner
    profile: skill
    show_tokens:
      leds: l_shot_spinner
    advance_events: mode_skillshot_started

  orbit_upper:
    switch: s_orbit_upper
    profile: skill
    show_tokens:
      leds: l_shot_upper_orbit
    advance_events: mode_skillshot_started

  ramp_inner:
    switch: s_ramp_inner_exit
    profile: skill
    show_tokens:
      leds: l_shot_middle_ramp
    advance_events: mode_skillshot_started

shot_profiles:
  skill:
    advance_on_hit: false
    states:
      - name: off
        show: off
      - name: lit
        show: skillshot_cyan_flash

shot_groups:
  skillshot_group:
    shots: mig_lane_left, mig_lane_right, spinner, orbit_upper, ramp_inner
    enable_events: mode_skillshot_started

timers:
  skillshot:
    start_value: 9
    end_value: 0
    direction: down
    tick_interval: 1s
    control_events:
      - action: start
        event: s_shooter_lane_inactive
      - action: stop
        event: mode_skillshot_will_stop

  skillshot_sound_loop:
    start_value: 0
    end_value: 999
    direction: up
    tick_interval: 3s
    start_running: false
    control_events:
      - action: start
        event: mode_skillshot_started
      - action: start
        event: s_shooter_lane_active{mode.skillshot.active}
      - action: stop
        event: s_shooter_lane_inactive
      - action: stop
        event: mode_skillshot_will_stop

  # Left MIG post hold timer - 3 seconds when ball is plunged without flipper held
  skillshot_left_mig_post_timer:
    start_value: 0
    end_value: 3
    direction: up
    tick_interval: 1s
    control_events:
      - action: start
        event: skillshot_activate_left_mig_post
      - action: stop
        event: mode_skillshot_will_stop

variable_player:
  # Track which MIG position is active: 0=M, 1=I (miss - no switch), 2=G
  skillshot_mig_position_m:
    skillshot_mig_position:
      action: set
      int: 0
  skillshot_mig_position_i:
    skillshot_mig_position:
      action: set
      int: 1
  skillshot_mig_position_g:
    skillshot_mig_position:
      action: set
      int: 2

  # Conditional scoring based on skillshot count - use priorities to control execution order
  mig_lane_left_skill_lit_hit{current_player.skillshot_count>=4}:
    score: 350000
    mode_points_scored:
      action: set
      int: 350000
    skillshot_count:
      action: add
      int: 1
      block: true
    priority: 1000
  mig_lane_left_skill_lit_hit{current_player.skillshot_count==3}:
    score: 300000
    mode_points_scored:
      action: set
      int: 300000
    skillshot_count:
      action: add
      int: 1
      block: true
    priority: 900
  mig_lane_left_skill_lit_hit{current_player.skillshot_count==2}:
    score: 250000
    mode_points_scored:
      action: set
      int: 250000
    skillshot_count:
      action: add
      int: 1
      block: true
    priority: 800
  mig_lane_left_skill_lit_hit{current_player.skillshot_count==1}:
    score: 200000
    mode_points_scored:
      action: set
      int: 200000
    skillshot_count:
      action: add
      int: 1
      block: true
    priority: 700
  mig_lane_left_skill_lit_hit{current_player.skillshot_count==0}:
    score: 150000
    mode_points_scored:
      action: set
      int: 150000
    skillshot_count:
      action: add
      int: 1
      block: true
    priority: 600

  mig_lane_right_skill_lit_hit{current_player.skillshot_count>=4}:
