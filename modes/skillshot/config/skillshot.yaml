event_player:
  # When skillshot is hit, trigger video in base mode instead of skillshot mode
  mig_lane_left_skill_lit_hit:
    - show_skillshot_mig_video  # Post event for base mode to handle
    - skillshot_show_points
    - skillshot_add_topgun_letter          # Letter 1 of 2
    - skillshot_add_topgun_letter|200ms    # Letter 2 of 2
  mig_lane_right_skill_lit_hit:
    - show_skillshot_mig_video
    - skillshot_show_points
    - skillshot_add_topgun_letter          # Letter 1 of 2
    - skillshot_add_topgun_letter|200ms    # Letter 2 of 2
  spinner_skill_lit_hit:
    - show_skillshot_miramar_video
    - skillshot_show_points
    - skillshot_add_topgun_letter          # Letter 1 of 3
    - skillshot_add_topgun_letter|200ms    # Letter 2 of 3
    - skillshot_add_topgun_letter|400ms    # Letter 3 of 3
  orbit_upper_skill_lit_hit:
    - show_skillshot_tower_video
    - skillshot_show_points
    - skillshot_add_topgun_letter          # Letter 1 of 3
    - skillshot_add_topgun_letter|200ms    # Letter 2 of 3
    - skillshot_add_topgun_letter|400ms    # Letter 3 of 3
  ramp_inner_skill_lit_hit:
    - show_skillshot_inverted_video
    - skillshot_show_points
    - skillshot_add_topgun_letter          # Letter 1 of 3
    - skillshot_add_topgun_letter|200ms    # Letter 2 of 3
    - skillshot_add_topgun_letter|400ms    # Letter 3 of 3
    
  # On mode start, set position to M
  mode_skillshot_started:
    - skillshot_mig_position_m

  # Right flipper: M -> I -> G -> M
  s_flipper_right_active{mode.skillshot.active and current_player.skillshot_mig_position==0}:
    - skillshot_mig_position_i
  s_flipper_right_active{mode.skillshot.active and current_player.skillshot_mig_position==1}:
    - skillshot_mig_position_g
  s_flipper_right_active{mode.skillshot.active and current_player.skillshot_mig_position==2}:
    - skillshot_mig_position_m

  # Left flipper: M -> G -> I -> M
  s_flipper_left_active{mode.skillshot.active and current_player.skillshot_mig_position==0}:
    - skillshot_mig_position_g
  s_flipper_left_active{mode.skillshot.active and current_player.skillshot_mig_position==2}:
    - skillshot_mig_position_i
  s_flipper_left_active{mode.skillshot.active and current_player.skillshot_mig_position==1}:
    - skillshot_mig_position_m

  # LEFT MIG POST CONTROL ON PLUNGE
  # When ball is plunged (leaves shooter lane), check if left flipper is NOT held
  # If flipper not held, activate the left MIG post for 3 seconds
  s_shooter_lane_inactive{mode.skillshot.active and not device.switches.s_flipper_left.state}:
    - skillshot_activate_left_mig_post
    
  # When MIG post timer completes, deactivate the post
  timer_skillshot_left_mig_post_timer_complete:
    - skillshot_deactivate_left_mig_post
      
  # Skillshot collected sound files moved to modes/base/sounds/
  # Sound definitions now handled by GMC from base mode

sound_player:
  timer_skillshot_sound_loop_tick:
    soundfx_skillshot_idle:
      bus: effects
  s_shooter_lane_inactive:
    soundfx_skillshot_idle:
      action: stop
  s_shooter_lane_inactive{mode.skillshot.active}:
    soundfx_skillshot_launch:
      bus: effects
      delay: 100ms

  # Skillshot collected sounds moved to base.yaml sound_player
  # (mode stops immediately on hit, so base must play them)

slide_player:
  timer_skillshot_sound_loop_tick:
    skillshot_ball_in_shooter_lane:
      action: play
      
  s_shooter_lane_inactive{mode.skillshot.active}:
    skillshot_ball_in_shooter_lane:
      action: remove
    skillshot_ball_launched:
      action: play

####################################################################################
# SHOW PLAYER - Engine fire while ball is in shooter lane
####################################################################################

show_player:
  mode_skillshot_started:
    engine_fire_skillshot:
      show: eos_engine_fire
      key: skillshot_engine_fire
      speed: 30
      loops: -1

  mode_skillshot_will_stop:
    stop_engine_fire_skillshot:
      show: eos_engine_fire
      action: stop
      key: skillshot_engine_fire

####################################################################################
# LIGHT PLAYER - MIG Insert Lighting During Skillshot
####################################################################################

light_player:
  skillshot_mig_position_m:
    l_mig_i:
      color: off
      fade: 0ms

  skillshot_mig_position_i:
    l_mig_i:
      color: cyan
      fade: 0ms

  skillshot_mig_position_g:
    l_mig_i:
      color: off
      fade: 0ms

  mode_skillshot_will_stop:
    l_mig_i:
      color: off
      fade: 0ms

####################################################################################
# COIL PLAYER - Left MIG Post Control During Skillshot
####################################################################################

coil_player:
  # Activate left MIG post when ball is plunged (if flipper not held)
  skillshot_activate_left_mig_post:
    c_left_mig_up_post:
      action: enable
      
  # Deactivate left MIG post when timer completes
  skillshot_deactivate_left_mig_post:
    c_left_mig_up_post:
      action: disable
      
  # Safety: deactivate post when mode stops
  mode_skillshot_will_stop:
    c_left_mig_up_post:
      action: disable